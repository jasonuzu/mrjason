<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seating Planner</title>
    <style>
        :root { --primary: #4a6fa5; --bg: #f8f9fa; --panel-bg: #ffffff; --border: #cccccc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; user-select: none; }
        #toolbar { width: 300px; background-color: var(--panel-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button { padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button.danger { background-color: #d9534f; }
        #canvas-container { flex-grow: 1; position: relative; overflow: auto; background-color: #e5e5e5; padding: 50px; }
        #classroom-canvas { width: 1000px; height: 700px; background-color: white; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .movable-element { position: absolute; border: 2px solid #333; background-color: #a3cef1; display: flex; align-items: center; justify-content: center; cursor: move; font-size: 0.8rem; resize: both; overflow: hidden; min-width: 40px; min-height: 40px; }
        .movable-element.selected { outline: 3px solid #007bff; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h2>Seating Planner</h2>
        <div class="btn-grid">
            <button onclick="addRow()">Add Row of Seats</button>
            <button onclick="spawnItem('teacher')">Add Teacher Desk</button>
        </div>
        <div id="inspector" style="display:none; border-top: 1px solid #ccc; padding-top:20px;">
            <label>Name/Label:</label>
            <input type="text" id="prop-label" oninput="updateLabel()" style="width:100%; padding:8px; margin: 10px 0;">
            <button class="danger" style="width:100%" onclick="deleteItem()">Delete Item</button>
        </div>
    </div>
    <div id="canvas-container"><div id="classroom-canvas" onclick="deselect()"></div></div>

    <script>
        var canvas = document.getElementById('classroom-canvas'), selectedEl = null;

        function addRow() {
            let count = prompt("How many seats in this row? (Max 8)", "4");
            count = Math.min(parseInt(count) || 1, 8);
            for(let i = 0; i < count; i++) {
                spawnItem('student', 50 + (i * 90), 50);
            }
        }

        function spawnItem(type, x = 50, y = 50) {
            let el = document.createElement('div');
            el.className = 'movable-element';
            el.innerHTML = type === 'student' ? 'Student' : 'Teacher';
            el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.width = '80px'; el.style.height = '50px';
            el.onmousedown = function(e) { e.stopPropagation(); selectItem(el); };
            canvas.appendChild(el);
            selectItem(el);
        }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            document.getElementById('inspector').style.display = 'block';
            document.getElementById('prop-label').value = el.innerText;
        }

        function deselect() { if(selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; document.getElementById('inspector').style.display = 'none'; } }
        function updateLabel() { if(selectedEl) selectedEl.innerText = document.getElementById('prop-label').value; }
        function deleteItem() { if(selectedEl) { selectedEl.remove(); deselect(); } }
        document.addEventListener('keydown', (e) => { if((e.key === 'Delete' || e.key === 'Backspace') && selectedEl) deleteItem(); });
    </script>
</body>
</html>
