<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Designer</title>
    <style>
        :root { --primary: #4a6fa5; --bg: #f8f9fa; --panel-bg: #ffffff; --border: #cccccc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; user-select: none; }
        #toolbar { width: 300px; background-color: var(--panel-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; background-color: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        button.danger { background-color: #d9534f; }
        #canvas-container { flex-grow: 1; position: relative; overflow: auto; background-color: #e5e5e5; padding: 50px; }
        #classroom-canvas { width: 1000px; height: 700px; background-color: white; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .movable-element { position: absolute; border: 2px solid #333; background-color: #a3cef1; display: flex; align-items: center; justify-content: center; cursor: move; font-size: 0.8rem; resize: both; overflow: hidden; min-width: 40px; min-height: 40px; padding: 5px; text-align: center; }
        .movable-element.selected { outline: 3px solid #007bff; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h2>Classroom Designer</h2>
        
        <div class="section-title">Spawn Items</div>
        <div class="btn-grid">
            <button onclick="spawnItem('student')">Student Desk</button>
            <button onclick="spawnItem('teacher')">Teacher Desk</button>
            <button onclick="spawnItem('door')">Door</button>
            <button onclick="spawnItem('arrow')">Arrow</button>
        </div>

        <div class="section-title">Automation</div>
        <button onclick="addRow()" style="width: 100%;">Add Row of Seats</button>
        <button onclick="generateRandomPlan()" style="width: 100%; background-color: #28a745;">Generate Random Plan</button>

        <div id="inspector" style="display:none; border-top: 1px solid #ccc; padding-top:15px; margin-top: 10px;">
            <label style="font-size: 0.8rem;">Label:</label>
            <input type="text" id="prop-label" oninput="updateLabel()" style="width:100%; padding:5px; margin: 5px 0 10px 0;">
            <button class="danger" style="width:100%" onclick="deleteItem()">Delete Item</button>
        </div>
    </div>
    <div id="canvas-container"><div id="classroom-canvas" onclick="deselect()"></div></div>

    <script>
        var canvas = document.getElementById('classroom-canvas'), selectedEl = null;

        function addRow() {
            let count = prompt("How many seats in this row? (Max 8)", "4");
            count = Math.min(parseInt(count) || 1, 8);
            for(let i = 0; i < count; i++) { spawnItem('student', 50 + (i * 90), 50); }
        }

        function generateRandomPlan() {
            let namesInput = prompt("Enter student names (comma separated):");
            if (!namesInput) return;
            let names = namesInput.split(',').map(n => n.trim()).sort(() => Math.random() - 0.5);
            let mode = prompt("Choose layout: 'rows', 'table4', 'table5', 'table6'");
            
            canvas.innerHTML = '';
            
            names.forEach((name, i) => {
                let x, y;
                if (mode === 'rows') {
                    x = 50 + (i % 8) * 100;
                    y = 50 + Math.floor(i / 8) * 70;
                } else if (mode.startsWith('table')) {
                    let seatsPerTable = parseInt(mode.replace('table', ''));
                    let tableIdx = Math.floor(i / seatsPerTable);
                    let seatInTable = i % seatsPerTable;
                    x = 100 + (tableIdx % 4) * 200 + (seatInTable % 2) * 90;
                    y = 100 + Math.floor(tableIdx / 4) * 200 + Math.floor(seatInTable / 2) * 60;
                } else {
                    x = 50 + (i % 5) * 100;
                    y = 50 + Math.floor(i / 5) * 70;
                }
                spawnItem('student', x, y, name);
            });
        }

        function spawnItem(type, x = 50, y = 50, text = null) {
            let el = document.createElement('div');
            el.className = 'movable-element';
            el.setAttribute('data-type', type);
            el.innerText = text ? text : (type.charAt(0).toUpperCase() + type.slice(1));
            el.style.left = x + 'px'; el.style.top = y + 'px'; 
            el.style.width = '80px'; el.style.height = '50px';
            el.onmousedown = function(e) { e.stopPropagation(); selectItem(el); };
            canvas.appendChild(el);
            selectItem(el);
        }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            document.getElementById('inspector').style.display = 'block';
            document.getElementById('prop-label').value = el.innerText;
        }

        function deselect() { if(selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; document.getElementById('inspector').style.display = 'none'; } }
        function updateLabel() { if(selectedEl) selectedEl.innerText = document.getElementById('prop-label').value; }
        function deleteItem() { if(selectedEl) { selectedEl.remove(); deselect(); } }
        document.addEventListener('keydown', (e) => { if((e.key === 'Delete' || e.key === 'Backspace') && selectedEl && document.activeElement.tagName !== 'INPUT') deleteItem(); });
    </script>
</body>
</html>
