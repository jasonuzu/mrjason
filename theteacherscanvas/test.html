$20!' 'Extra credit question -- starting at $30!' Students bid their earnings.", "variations": "Silent auction (written bids); Team auction; Knowledge auction (bid on which question you want to answer for points); Reverse auction (lowest unique bid wins).", "materials": "Play money or point tracker, items to auction (homework passes, bonus points, seat choice, etc.), questions.", "time": "25-35 minutes.", "research": "Combines review with economics and decision-making. Students are motivated to answer correctly to earn auction money. The auction phase creates excitement and teaches budgeting strategy."}}, "GRAMMAR_ACTIVITIES": {"Grammar Auction": {"desc": "Display sentences -- some correct, some with errors. Teams bid play money on sentences they think are correct.", "example": "10 sentences on the board. Teams have $500 each. 'He don't like pizza' -- Team A bids $50 (incorrect -- they lose $50!). 'She has been studying all day' -- Team B bids $100 (correct -- they keep their money and earn $100). Richest team wins.", "variations": "Targeted grammar auction (all sentences test one structure); Student-written sentences; Progressive auction (later sentences worth more); Justify auction (must explain WHY it's correct/incorrect to earn double).", "materials": "Sentences on board, play money or point tracker.", "time": "15-20 minutes.", "research": "Forces analytical thinking about grammar rather than production. Students must evaluate accuracy -- a different and complementary skill to generating correct sentences. The financial element creates memorable engagement."}, "Error Correction Race": {"desc": "Teams race to find and correct all errors in a text. First team with all corrections accurate wins.", "example": "A paragraph with 10 deliberate errors (spelling, grammar, punctuation) is given to each team. Teams work together to find and correct all 10. First team to submit a fully corrected version wins.", "variations": "Individual error hunt; Timed error correction (how many can you find in 3 minutes?); Categorized errors (only grammar, only spelling); Student-written error texts (write a paragraph with deliberate errors for another team).", "materials": "Error-laden text (one copy per team), pens, answer key.", "time": "10-15 minutes.", "research": "Develops proofreading skills -- essential for writing improvement. Working as a team means stronger students can explain errors to weaker ones. The race element creates urgency."}, "Grammar Board Race": {"desc": "Two teams, two markers. Teacher calls out a grammar transformation. First correct answer on the board wins.", "example": "Teacher: 'Change to passive: They built this house in 1900.' Two students race to the board. First to write 'This house was built in 1900' correctly wins the point.", "variations": "Verb form race (conjugate quickly); Tense transformation race; Question formation race; Reported speech race; Conditional race; Sentence combining race.", "materials": "Whiteboard, markers, list of transformation prompts.", "time": "10-15 minutes.", "research": "Fast-paced practice of grammatical transformations. The competitive element motivates accuracy under pressure. Good for drilling specific structures that need automatization."}, "Sentence Unscramble": {"desc": "Words of a sentence are jumbled. Students race to put them in the correct order.", "example": "Cards on the table: 'yesterday / to / the / went / I / store'. Students arrange: 'I went to the store yesterday.' Increase difficulty with longer sentences and more complex structures.", "variations": "Physical unscramble (word cards on a table); Digital unscramble; Team race (which team orders first); Progressive difficulty; Paragraph unscramble (order sentences into a paragraph); Two possible correct orders (discuss both).", "materials": "Word cards or cut-up sentences.", "time": "10-15 minutes.", "research": "Builds syntactic awareness -- students must understand sentence structure to arrange words correctly. Physical manipulation of cards adds a kinesthetic element. Self-correcting: the sentence either makes sense or it doesn't."}, "Grammar Bingo": {"desc": "Bingo cards with grammar answers. Teacher reads prompts and students find the matching form on their card.", "example": "Cards have verb forms: 'swum, went, has been, would have, were going.' Teacher reads: 'Past participle of swim.' Students find 'swum' and cover it. First to complete a row wins.", "variations": "Tense Bingo; Irregular verb Bingo; Part of speech Bingo; Sentence completion Bingo; Student-created Bingo cards; Pronunciation Bingo (hear the word, find the spelling).", "materials": "Pre-made Bingo cards, counters, prompt list.", "time": "15-20 minutes.", "research": "Combines listening with grammar knowledge. The game format makes drill practice engaging. Every student processes every prompt (unlike hand-raising where only one student responds)."}, "Conditional Chain Story": {"desc": "Each student adds a conditional sentence that continues from the previous one, building an absurd chain.", "example": "Teacher: 'If it rains tomorrow...' Student 1: 'If it rains tomorrow, I will stay home.' Student 2: 'If I stay home, I will watch TV all day.' Student 3: 'If I watch TV all day, my eyes will hurt.' The chain gets increasingly absurd.", "variations": "Mixed conditional chain (vary the conditional type); Written chain (pass paper); Timed chain (5 seconds per contribution); Reverse chain (start with the result, work backward); Unless chain (use 'unless' instead of 'if').", "materials": "None required.", "time": "5-10 minutes.", "research": "Contextualizes conditional grammar in a creative, memorable activity. The chain format means every student produces a conditional sentence. The natural absurdity makes the grammar practice feel like play rather than drill."}, "Gap Fill Relay": {"desc": "Teams relay-race to a worksheet at the front of the room, filling in one gap per runner.", "example": "A gap-fill exercise with 10 blanks is posted at the front for each team. Runner 1 sprints up, fills in gap 1, runs back. Runner 2 goes for gap 2. First team to complete all 10 correctly wins.", "variations": "Cloze relay (fill gaps in a paragraph); Multiple choice relay (circle the correct option); Error correction relay; Verb form relay; Preposition relay.", "materials": "Gap-fill worksheet posted at front (one per team), pens.", "time": "10-15 minutes.", "research": "Transforms a standard grammar exercise into a high-energy team activity. The relay format means students must work quickly but accurately -- errors cost time when the teacher checks at the end."}, "Grammar Jeopardy": {"desc": "Jeopardy format with grammar categories: Verb Tenses, Prepositions, Articles, Word Order, Conditionals.", "example": "5 grammar categories, 5 difficulty levels each (100-500 points). 'Verb Tenses for 300: Change this sentence to the past perfect.' Teams answer. Most points wins.", "variations": "Themed Jeopardy (all one grammar area); Student-created questions; Daily Double; Final Jeopardy with wagering; Progressive difficulty (must clear lower levels before higher).", "materials": "Jeopardy board (PowerPoint or physical), questions organized by category and difficulty.", "time": "25-40 minutes.", "research": "The category system lets you target multiple grammar areas in one game. Students self-select difficulty, which creates natural differentiation. The point system adds strategic thinking to grammar review."}, "Transformation Drill Game": {"desc": "Teacher says a sentence. Students must transform it according to the given instruction -- fast and competitive.", "example": "Teacher: 'I eat breakfast every day. Make it negative.' Student: 'I don't eat breakfast every day.' Teacher: 'Now past tense.' Next student: 'I didn't eat breakfast every day.' Teacher: 'Now a question.' 'Did I eat breakfast every day?'", "variations": "Chain transformation (each student does a different transformation); Written transformations; Timed transformations (5 seconds); Error spotting (teacher deliberately makes errors, students catch them); Complex chains (3 transformations in one turn).", "materials": "None required.", "time": "5-10 minutes.", "research": "Builds grammatical flexibility -- the ability to manipulate sentence forms quickly. This automatization is essential for fluent communication. The rapid pace prevents overthinking and builds procedural knowledge."}, "Grammar Dictation (Dictogloss)": {"desc": "Teacher reads a text at natural speed. Students take notes, then reconstruct the text collaboratively, focusing on grammar accuracy.", "example": "Teacher reads a short paragraph twice at natural speed. Students jot key words. In groups of 3, they reconstruct the full text. Groups compare their versions with the original. Differences highlight grammar gaps.", "variations": "Targeted dictogloss (text loaded with one grammar structure); Running dictogloss (combination with running dictation); Peer dictogloss (students read to each other); Dictogloss with pictures (visual support).", "materials": "Short text (40-60 words) rich in the target grammar structure.", "time": "20-25 minutes.", "research": "Wajnryb (1990). One of the most effective grammar activities because it integrates listening, writing, speaking (negotiation), and grammar analysis. Students notice grammar gaps they didn't know they had."}, "Find Someone Who (Grammar)": {"desc": "Students mingle with grammar-focused questions, practicing specific structures through genuine communication.", "example": "Worksheet: 'Find someone who HAS BEEN to another country. Find someone who CAN play a musical instrument. Find someone who WOULD LIKE TO live abroad.' Students mingle, ask in full sentences, write names.", "variations": "Tense-targeted (all present perfect, all conditionals); Follow-up questions required; Speed version (5-minute time limit); Seated version (ask neighbors); Report back (tell the class what you learned).", "materials": "Grammar-targeted worksheet with 10-12 prompts.", "time": "10-15 minutes.", "research": "Contextualizes grammar practice in genuine communication. Students produce target structures repeatedly and naturally. The mingling format ensures maximum speaking time."}, "Correct or Incorrect Corners": {"desc": "Teacher reads a sentence. Students move to the 'Correct' or 'Incorrect' side of the room. Those on the wrong side sit down.", "example": "Teacher reads: 'She don't like coffee.' Students run to Correct or Incorrect corner. Those who correctly chose 'Incorrect' survive. 'She doesn't like coffee' -- students at 'Correct' survive. Continue until a champion remains.", "variations": "Sit-down version (no movement); Written version; Explain version (must explain the error to survive); Team version; Progressive difficulty (trickier sentences each round).", "materials": "None required -- just space to move.", "time": "10-15 minutes.", "research": "Physical movement makes grammar analysis engaging. The elimination format creates drama. The 'explain why' variation adds depth beyond simple identification. Good for common error patterns."}, "Sentence Auction": {"desc": "Teams bid on sentences they believe are grammatically correct. Buy a correct sentence to earn points; buy an incorrect one and lose your money.", "example": "15 sentences displayed -- some correct, some with subtle errors. Each team starts with $1000. They bid on sentences they think are correct. Correct purchases earn bonus money. Incorrect purchases lose the bid amount.", "variations": "Targeted errors (all testing one grammar point); Student-written sentences; Blind auction (bid without seeing the sentence first, just the grammar topic); Progressive rounds with harder sentences.", "materials": "Sentences on display, play money or score tracker.", "time": "15-20 minutes.", "research": "Forces careful grammatical analysis rather than production. The financial stakes create engagement and memorable discussion about why sentences are correct or incorrect."}, "Grammar Tennis": {"desc": "Two students volley examples of a grammar structure back and forth. Hesitate or make an error and you lose the point.", "example": "Structure: Present Perfect. Student A: 'I have visited Paris.' B: 'She has eaten sushi.' A: 'We have finished our homework.' B: '...um...' -- point to A! New challenger steps in.", "variations": "Team tennis (teams alternate members); Speed tennis (3-second limit); Theme tennis (all sentences about travel, food, etc.); Mixed tennis (alternate between two grammar structures).", "materials": "None required.", "time": "5-10 minutes.", "research": "Rapid production practice under competitive pressure. Students must generate correct examples quickly, building automaticity. The game format disguises intensive drilling."}, "Grammar Detectives": {"desc": "Give students a text. They must find and categorize all examples of specific grammar structures.", "example": "Text about a holiday. Students must find and highlight: all past simple verbs (blue), all past continuous verbs (green), all present perfect verbs (yellow). Compare findings in pairs.", "variations": "Error detective (find deliberate mistakes); Tense detective; Part of speech detective; Pronoun reference detective; Connective detective; Comparative detective.", "materials": "Text with target structures, colored highlighters or pencils.", "time": "15-20 minutes.", "research": "Builds grammar awareness through analysis rather than production. Noticing grammar in context is a key step toward acquisition (Schmidt's Noticing Hypothesis). More engaging than underlining exercises because the detective frame adds purpose."}}, "READING_ACTIVITIES": {"Prediction Walk": {"desc": "Before reading, students examine the title, images, headings, and first/last paragraphs to predict content.", "example": "Teacher distributes an article face-down. Students can only look at the title and first image. In pairs, they predict 5 things the article will discuss. After reading, they check which predictions were correct.", "variations": "Progressive reveal (title only, then headings, then images, then first paragraph); Written predictions; Prediction bets (which pair's predictions were most accurate?); Prediction comparison (before vs. after reading).", "materials": "Text with clear title, headings, and images.", "time": "5-10 minutes for prediction, 5 minutes for checking.", "research": "Activates schema and creates a purpose for reading. Research shows that making predictions before reading significantly improves comprehension because readers are actively looking to confirm or deny their predictions."}, "Read and Run": {"desc": "A text is posted on the wall. One partner runs to read a section, memorizes it, returns, and dictates to the writing partner.", "example": "Text posted at the far end of the room. Runner goes, reads the first sentence, memorizes it, runs back and dictates to Writer. Runner goes back for sentence 2. Continue until the whole text is written. Compare to original.", "variations": "Comprehension questions version (run to read, return to answer questions); Summary version (read the whole thing, return and summarize); Translation version (read in L2, dictate in L1); Jigsaw version (different texts on different walls).", "materials": "Text posted on wall, paper for writers.", "time": "15-20 minutes.", "research": "Combines reading with speaking, listening, writing, and memory -- a true integrated skills activity. The physical element raises energy. Students naturally read and re-read sections, building comprehension through repetition."}, "Text Reconstruction": {"desc": "Cut a text into strips. Students work in groups to reassemble it in the correct order.", "example": "A 10-sentence paragraph is cut into strips (one sentence per strip). Groups of 3 receive an envelope of jumbled strips. They read, discuss, and physically arrange the strips into the correct order. Check against the original.", "variations": "Paragraph reconstruction; Dialogue reconstruction; Timeline reconstruction; Argument reconstruction (arrange claims and evidence); Mixed-up story (order the events).", "materials": "Text cut into sentence or paragraph strips, envelopes.", "time": "10-15 minutes.", "research": "Develops understanding of text coherence -- how sentences connect through cohesion devices (pronouns, conjunctions, time markers). Students must read closely and think about logical sequence."}, "Margin Notes": {"desc": "Students annotate a text in the margins while reading -- questions, reactions, connections, vocabulary notes.", "example": "Students read an article with wide margins. They annotate as they go: star = important, ? = confused, ! = surprising, circle = unknown word, arrow = connection to another text or personal experience. Share annotations in pairs.", "variations": "Structured annotations (specific symbols required); Color-coded annotations; Digital annotations (Google Docs comments); Annotation gallery walk (post annotated texts, others read annotations); Teacher-modeled annotations first.", "materials": "Text with wide margins (or sticky notes), pens/pencils.", "time": "15-25 minutes.", "research": "Makes reading visible and active. Annotations slow students down and force engagement with the text. Harvey and Goudvis (2007) identify annotation as a key comprehension strategy. The shared annotations create rich discussion."}, "Question the Author": {"desc": "While reading, students stop and ask questions directly to the author: 'What are you trying to say here? Why did you use this word?'", "example": "At planned stopping points in the text, teacher asks: 'What is the author trying to tell us here? Why did the author include this detail? Do you think the author is being fair?' Students discuss in pairs, then share.", "variations": "Written questions to the author; Author hot-seat (one student role-plays the author and answers questions); Letter to the author (write a response); Author comparison (compare how two authors handle the same topic).", "materials": "Text with pre-identified stopping points.", "time": "20-30 minutes.", "research": "Beck, McKeown, Hamilton, and Kucan (1997). QtA moves students from passively receiving information to actively interrogating the text. Develops critical reading and the understanding that texts are constructed by people with purposes and biases."}, "Say Something": {"desc": "Partners take turns reading a section of text aloud. After each section, the listener must 'say something' -- a reaction, question, or connection.", "example": "Partner A reads paragraph 1 aloud. Partner B must say something: 'I think this connects to what we learned about...' or 'I don't understand why the author...' or 'This reminds me of...' Then B reads paragraph 2 and A responds.", "variations": "Written Say Something (write responses instead of speaking); Triple Say Something (say something about content, language, and personal connection); Say Something with sentence starters; Group Say Something (small groups).", "materials": "Text divided into short sections, optional sentence starters.", "time": "15-20 minutes.", "research": "Prevents passive reading by requiring active response after every section. The 'say something' constraint means students cannot simply decode words -- they must process meaning deeply enough to formulate a response."}, "Think Aloud Reading": {"desc": "Teacher reads aloud and verbalizes their thinking process: predictions, confusions, connections, visualizations.", "example": "Teacher reads: 'The old house stood at the end of the street.' Teacher says aloud: 'I'm picturing a creepy abandoned house... I predict something mysterious will happen there. The word old makes me think it's been empty a long time.'", "variations": "Student think-alouds (students practice the same technique); Partner think-alouds; Written think-alouds (annotate thinking in margins); Video think-aloud (teacher records for students to watch at home).", "materials": "Text for reading, none else required.", "time": "15-20 minutes.", "research": "Makes expert reading strategies visible. Researchers (Pressley and Afflerbach, 1995) show that skilled readers constantly predict, question, visualize, and monitor comprehension. Think-alouds teach students to do the same."}, "GIST Summary": {"desc": "After reading a section, students summarize the GIST (main idea) in exactly 20 words. No more, no less.", "example": "Students read a paragraph about climate change. They must write a 20-word summary: 'Climate change is caused by greenhouse gases from burning fossil fuels and is making Earth's temperature rise dangerously.' Exactly 20 words.", "variations": "15-word GIST (harder); 10-word GIST (very challenging); Progressive GIST (summarize each paragraph, then summarize the summaries); Partner GIST (compare and combine); Headline GIST (write a newspaper headline instead).", "materials": "Text, paper for summaries.", "time": "10-15 minutes.", "research": "The exact word count forces precision and distillation. Students must identify what's essential and cut everything else. Cunningham (1982) developed this strategy. The constraint is what makes it powerful -- without it, summaries are vague."}, "Reciprocal Reading Cards": {"desc": "Students use role cards (Predictor, Questioner, Summarizer, Clarifier) while reading in groups.", "example": "Group of 4 reads a passage. Predictor: 'I think the next section will be about solutions.' Questioner: 'Why did the author use the word devastating?' Summarizer: 'This paragraph mainly discussed causes.' Clarifier: 'The word mitigation means reducing the severity.'", "variations": "Rotating roles (switch each paragraph); Paired reciprocal (2 roles each); Teacher-modeled first; Written role responses; Digital role cards with sentence starters.", "materials": "Role cards with descriptions and sentence starters.", "time": "20-30 minutes.", "research": "Palincsar and Brown (1984). One of the most researched and effective reading comprehension strategies. The four roles map directly to what skilled readers do automatically. Builds metacognitive awareness."}, "Reading Races": {"desc": "Teams race to find specific information in a text. First team to locate the answer and write it correctly wins each round.", "example": "Each team has the same article. Teacher asks: 'Find the year the building was constructed.' Teams scan frantically. First hand up with the correct answer wins the point. 10 rounds.", "variations": "Page-number races (find info on specific pages); Index races (use the index to find information fastest); Digital races (use Ctrl+F on a digital text); Detail races vs. inference races.", "materials": "Copies of the same text for each team, questions.", "time": "10-15 minutes.", "research": "Builds scanning skills -- the ability to locate specific information quickly. The competitive element motivates focus. Also teaches students that different reading purposes require different reading strategies."}, "Readers Theater Scripts": {"desc": "Students adapt a text they've read into a dramatic script, then perform it.", "example": "After reading a chapter, groups of 4 convert the key scene into a script with narrator and character parts. They rehearse for 10 minutes, then perform. No memorization required -- scripts in hand.", "variations": "Radio drama (voices only); News report adaptation; Interview adaptation (interview the characters); Courtroom drama (put a character on trial); Modern adaptation (set the story in today's world).", "materials": "Original text, blank paper for script writing.", "time": "25-35 minutes.", "research": "Deepens comprehension by requiring students to interpret character emotions, identify key dialogue, and understand narrative structure well enough to adapt it. The performance motivates careful preparation."}, "Annotation Symbols": {"desc": "Teach a set of symbols students use while reading: star (important), ? (confused), ! (surprised), circle (new word).", "example": "Before reading, teach 5 symbols. Students read actively, marking the text as they go. After reading, pairs compare: 'I starred the same sentence you did -- why did you think it was important?'", "variations": "Content-specific symbols; Digital annotation (highlighting in different colors); Annotation journals (write annotations in a separate notebook); Annotation discussions (group based on what you starred).", "materials": "Text with margins, pen/pencil, symbol key posted.", "time": "15-20 minutes.", "research": "Makes invisible thinking visible. Annotations provide a concrete record of the reading process that can be discussed, compared, and reflected upon. Supports formative assessment -- the teacher can see how students are processing text."}}, "WRITING_ACTIVITIES": {"Speed Writing": {"desc": "Write as much as possible on a topic in exactly 5 minutes. No stopping, no editing, no lifting your pen.", "example": "Timer starts. Topic: 'The best day of my life.' Students write continuously for 5 minutes. Pen never stops -- if stuck, write 'I don't know what to write' until ideas come. Count words at the end. Try to beat your record next time.", "variations": "Timed sprints (3 minutes, 2 minutes, 1 minute); Topic roulette (random topic); Partner speed write (swap and continue each other's text); Genre speed write (write in a specific style); Word count challenge (personal best tracking).", "materials": "Paper, pen, timer.", "time": "5-7 minutes.", "research": "Elbow (1998) freewriting research. The no-stopping rule bypasses the inner critic and builds writing fluency. Students are often surprised by how much they can produce. Tracking word count over time shows concrete improvement."}, "Sentence Combining": {"desc": "Give students several short, choppy sentences. They combine them into one or two sophisticated sentences.", "example": "Short sentences: 'The dog was big. The dog was brown. The dog ran fast. The dog chased the cat.' Combined: 'The big, brown dog ran fast as it chased the cat through the garden.'", "variations": "Progressive combining (start with 2 sentences, build to 5); Competitive combining (who can create the most elegant version?); Reverse combining (break a complex sentence into simple ones); Genre-specific combining (academic, narrative, journalistic).", "materials": "Sentence sets on paper or board.", "time": "10-15 minutes.", "research": "Strong and Perin (2007) meta-analysis identifies sentence combining as one of the most effective writing interventions. It directly builds syntactic maturity without teaching grammar rules explicitly."}, "Dictated Composition": {"desc": "Teacher dictates a model paragraph slowly. Students write it. Then students write their own version on the same topic.", "example": "Teacher slowly dictates a 5-sentence descriptive paragraph about a market scene. Students write. Then teacher says: 'Now write your own paragraph describing a place you know, using the same structure but your own details.'", "variations": "Partial dictation (dictate the structure with blanks students fill); Partner dictation (students dictate to each other); Reconstruction (listen, then write from memory); Adaptation (change the setting, characters, or genre).", "materials": "Pre-written model text.", "time": "15-20 minutes.", "research": "Provides a model and structure that students can lean on while building their own version. Less intimidating than a blank page. The dictation phase builds listening, spelling, and punctuation awareness simultaneously."}, "Peer Editing Stations": {"desc": "Students rotate their drafts through 3-4 editing stations, each focused on one specific aspect.", "example": "Station 1: Content and Ideas (Is the argument clear?). Station 2: Organization (Does it flow logically?). Station 3: Language (Circle any grammar errors). Station 4: Mechanics (Check spelling and punctuation). Drafts move through all stations.", "variations": "Fewer stations (2 for younger students); Digital stations (Google Doc comments by category); Self-editing stations (student edits their own with a different focus at each); Color-coded editing (each station uses a different color pen).", "materials": "Draft copies, station signs with editing criteria, colored pens.", "time": "20-30 minutes.", "research": "Breaking editing into focused passes is more effective than asking students to 'fix everything.' Each station develops a specific editorial skill. Students also learn from seeing others' writing and errors."}, "Exit Ticket Writing": {"desc": "Last 5 minutes of class: write one paragraph responding to the lesson using a specific structure or vocabulary.", "example": "After a lesson on cause and effect: 'Write 3 sentences explaining one cause and one effect of climate change. Use at least 2 vocabulary words from today.' Students write, hand in at the door.", "variations": "Sentence-level exit ticket; Question exit ticket (write 1 question you still have); Connection exit ticket (connect today's lesson to your life); Summary exit ticket (summarize in exactly 3 sentences).", "materials": "Paper or card, prompt displayed.", "time": "5 minutes.", "research": "Combines formative assessment with writing practice. The short time frame and specific constraint lower anxiety while providing the teacher with immediate diagnostic information about understanding."}, "Genre Transformation": {"desc": "Take a text in one genre and rewrite it in another -- a news article becomes a diary entry, a fairy tale becomes a police report.", "example": "Original: A news article about a bank robbery. Task: Rewrite it as the robber's diary entry for that day. Students must maintain the key facts while completely changing the voice, perspective, and format.", "variations": "Multiple genres from one source (news -> diary -> poem -> text message); Genre comparison (how does the same event sound in different genres?); Student-chosen genre; Historical genre transformation (rewrite a historical event as a social media post).", "materials": "Source text, genre guide with features of each genre.", "time": "20-30 minutes.", "research": "Develops genre awareness and register flexibility simultaneously. Students must understand both genres deeply to transform between them. Produces creative, engaged writing because the constraint provides a clear direction."}, "Collaborative Story Writing": {"desc": "Groups write a story together, with each member contributing a section. The constraints force collaboration.", "example": "Group of 4. Writer 1 writes the opening paragraph (setting and character). Passes to Writer 2 who introduces the problem. Writer 3 develops the climax. Writer 4 writes the resolution. Group revises together.", "variations": "Round-robin story (pass every 3 minutes); Exquisite corpse (fold paper, only see the last line); Genre roulette (each section must be a different genre); Character tag (each writer controls a different character).", "materials": "Paper, pens, optional planning template.", "time": "25-35 minutes.", "research": "Builds collaborative writing skills and exposes students to different writing styles. The sectional structure means every student contributes meaningfully. The surprise of reading what others wrote sparks creativity."}, "Postcard Writing": {"desc": "Students write a postcard from a character, historical figure, or imaginary traveler -- short, focused, purposeful writing.", "example": "Task: Write a postcard as if you are a soldier in World War 1 writing home to your family. Include: where you are, how you feel, one specific detail about daily life, and a message of hope. Maximum 60 words.", "variations": "Tourist postcards (from places being studied); Character postcards (from a book character); Future postcards (from yourself 10 years from now); Postcard exchange (send to another class); Historical postcards (from key moments in history).", "materials": "Postcard templates (or blank cards), pens.", "time": "10-15 minutes.", "research": "The short format and clear purpose make this accessible for reluctant writers. The character/perspective element develops empathy and voice. The word limit forces precision. Display-worthy outputs boost confidence."}, "Dialogue Writing": {"desc": "Students write a conversation between two characters using proper dialogue formatting and natural speech patterns.", "example": "Scenario: A parent discovers their teenager has been skipping school. Write the conversation. Students must include dialogue tags, varied speech patterns, emotional subtext, and at least one moment of silence or interruption.", "variations": "Scripted dialogue (for performance); Eavesdropped dialogue (write what two strangers might be saying); Historical dialogue (two historical figures meet); Debate dialogue; Interview dialogue; Text message dialogue vs. face-to-face.", "materials": "Scenario cards, dialogue formatting guide, model examples.", "time": "20-30 minutes.", "research": "Develops ear for natural speech patterns, punctuation of dialogue, and character voice. Students who can write believable dialogue understand register, tone, and pragmatics -- skills that transfer to all communication."}, "Writing from Images": {"desc": "Show a compelling image. Students write a response -- description, narrative, poem, or analysis.", "example": "Project a photograph of an empty chair in a field. Students choose: write a description of the scene, a story about who sat there, a poem inspired by the mood, or an analysis of the photographer's choices. Share in pairs.", "variations": "Progressive image writing (reveal more of the image over time); Contrasting images (write about two images); Sequential images (write the story connecting them); Found image writing (students find their own image); Timed image writing (5 minutes per image).", "materials": "Compelling images (photographs, paintings, illustrations), projected or printed.", "time": "15-25 minutes.", "research": "Visual prompts bypass the 'I don't know what to write about' problem. Every student can respond to an image. The choice of response type (narrative, description, poem) provides natural differentiation. High-quality images produce high-quality writing."}}, "FILLERS": {"Quick Draw": {"desc": "Teacher says a word. Students have 10 seconds to draw it. No words or numbers allowed. Compare drawings.", "example": "Teacher: 'DEMOCRACY.' Students draw for 10 seconds. One student draws a ballot box. Another draws people raising hands. Another draws a parliament building. Compare: which drawing captures the meaning best?", "variations": "Partner Quick Draw (draw for your partner to guess); Team Quick Draw (relay style); Quick Draw vocabulary review; Progressive Quick Draw (add to the same drawing over multiple rounds).", "materials": "Paper, pencils.", "time": "2-5 minutes.", "research": "Instant vocabulary processing activity. The 10-second constraint prevents overthinking. The visual output reveals how students conceptualize abstract terms. Good for filling 3-minute gaps."}, "Thumbs Up / Down": {"desc": "Teacher makes a statement. Students show thumbs up (agree/true), down (disagree/false), or sideways (not sure).", "example": "Teacher: 'The past tense of go is goed.' Thumbs down. 'Paris is the capital of France.' Thumbs up. 'Water boils at 50 degrees.' Thumbs down. Quick formative check -- no materials needed.", "variations": "Stand up / sit down version; Traffic light cards (red/yellow/green); Finger voting (1-5 confidence scale); Verbal thumbs (say 'true' or 'false'); Written thumbs (write T or F on mini whiteboard).", "materials": "None required.", "time": "1-3 minutes.", "research": "The fastest possible formative assessment. Every student responds simultaneously. The teacher gets an instant read on comprehension. The sideways option is important -- it gives students permission to be uncertain."}, "Tongue Twisters": {"desc": "Practice pronunciation with tongue twisters. Start slow, build speed. Great for targeted sound practice.", "example": "Teacher: 'Red lorry, yellow lorry.' Students repeat slowly, then faster. For /th/: 'The thirty-three thieves thought they thrilled the throne.' For /s/ vs /sh/: 'She sells seashells by the seashore.'", "variations": "Tongue twister competition (who can say it fastest?); Student-created tongue twisters; L1-specific tongue twisters (targeting sounds that are hard for speakers of that language); Tongue twister chain (add a word each round).", "materials": "Tongue twister collection (printed or projected).", "time": "2-5 minutes.", "research": "Targeted pronunciation practice disguised as a game. The difficulty creates laughter, which lowers anxiety. Good for minimal pair practice (s/sh, l/r, b/v) depending on the students' L1."}, "Complete the Sentence": {"desc": "Teacher starts a sentence. Students complete it. Quick, versatile, and no prep.", "example": "Teacher: 'If I could travel anywhere, I would go to...' Students complete individually, then share with a partner. Can target any grammar structure by choosing the right sentence starter.", "variations": "Written completion; Round-robin completion (each student adds a different ending); Themed completion (all starters about the unit topic); Grammar-targeted completion (practice specific structures); Chain completion (each ending becomes the next starter).", "materials": "None required.", "time": "2-5 minutes.", "research": "Infinitely adaptable filler. The sentence starter scaffolds production so even weak students can participate. By choosing the starter carefully, the teacher can target any grammar structure, vocabulary set, or discussion topic."}, "Word Ladder": {"desc": "Change one letter at a time to transform one word into another. Each step must be a real word.", "example": "CAT -> COT -> COG -> DOG. Students work individually or in pairs to find the path. Challenge: who can do it in the fewest steps?", "variations": "Team word ladder race; Longest ladder challenge; Themed ladders (start and end words from the unit); Student-created ladders; Reverse engineering (given the ladder, find the changed letters).", "materials": "Start and end words on the board.", "time": "3-5 minutes.", "research": "Builds spelling awareness and phonological manipulation skills. The puzzle format engages students who enjoy logic challenges. Good for filling 3-5 minute gaps while reinforcing letter-sound relationships."}, "Would You Rather (Quick Fire)": {"desc": "Rapid-fire Would You Rather questions. No discussion -- just choose. Point left or right. GO.", "example": "Teacher rapid-fires: 'Would you rather fly or be invisible? LEFT or RIGHT.' Students point. 'Would you rather live 100 years ago or 100 years from now?' Point. No stopping, no explaining. Pure energy for 2 minutes.", "variations": "With one-sentence justification; Moving version (walk to one side); Progressive depth (silly questions first, then deeper); Student-created questions; Chain version (winner poses next question).", "materials": "None required.", "time": "2-3 minutes.", "research": "The fastest possible energizer. Gets bodies and minds active in under a minute. Zero preparation. Useful between activities, after a long reading, or to wake up a sleepy class."}, "Countdown Spelling": {"desc": "Teacher says a word. Students have 5 seconds to write it. Reveal the correct spelling. Self-check.", "example": "Teacher: 'NECESSARY.' Students write quickly. Teacher shows correct spelling. Students check their own. Move to the next word. 10 words in 3 minutes.", "variations": "Partner check (swap papers); Difficult words from the unit; Progressive difficulty; Reverse countdown (show the word for 3 seconds, cover it, students write from memory); Etymology hint before spelling.", "materials": "None required.", "time": "3-5 minutes.", "research": "Micro-practice for spelling accuracy. The time pressure creates engagement. Self-checking builds metacognitive awareness -- students learn which words they habitually misspell."}, "Vocabulary Whispers": {"desc": "Teacher whispers a definition. Students whisper the word back. Quick, quiet, and focused.", "example": "Teacher leans in and whispers: 'A feeling of sadness about something that happened in the past.' Student whispers back: 'Regret.' Teacher nods. Move to the next student.", "variations": "Chain whispers (student whispers definition to next student, who whispers the word to the next); Written whispers (write definition, swap, write word); Reverse whispers (teacher whispers word, student whispers definition).", "materials": "None required.", "time": "3-5 minutes.", "research": "The whispering creates focus and intimacy. Students must listen carefully. Works well as a calming transition between a loud activity and a quiet one. The one-on-one format means every student gets checked."}, "Mental Associations": {"desc": "Teacher says a word. Students write the first 3 words that come to mind. Compare -- same or different?", "example": "Teacher: 'SCHOOL.' Student A writes: learning, friends, homework. Student B writes: boring, lunch, bell. Compare in pairs. Discuss: why did we associate differently? What does that reveal?", "variations": "Timed associations (5 seconds per word); Category associations (only adjectives, only verbs); Chain associations (first association becomes the next prompt); Visual associations (draw instead of write).", "materials": "None required -- paper optional.", "time": "3-5 minutes.", "research": "Reveals individual semantic networks and cultural differences in word associations. Creates interesting discussion about how vocabulary is organized in the mind. Quick, revealing, and always surprising."}, "Sentence Stretch": {"desc": "Start with a 3-word sentence. Each student adds one word or phrase to make it longer and more interesting.", "example": "Start: 'The cat sat.' Student 1: 'The fat cat sat.' Student 2: 'The fat orange cat sat.' Student 3: 'The fat orange cat sat lazily.' Student 4: 'The fat orange cat sat lazily on the windowsill.' Continue until the sentence is impressively long.", "variations": "Written sentence stretch; Competitive stretch (which group can make the longest grammatically correct sentence?); Reverse stretch (start long, remove one word at a time); Adjective stretch (only add adjectives); Adverb stretch.", "materials": "None required.", "time": "3-5 minutes.", "research": "Builds syntactic awareness and vocabulary through collaborative sentence construction. Students see how modifiers, phrases, and clauses expand meaning. The growing sentence creates a satisfying sense of accomplishment."}}}, "templates": [{"id": "read-skimming", "skill": "Reading", "name": "Skimming for Gist", "summary": "Train students to read quickly to grasp the overall meaning or main idea of a text.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Show the title, headings, or images from the text. Elicit predictions about what the text is about.", "time": 5}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Introduce 4-6 essential words students need before reading. Use visuals or examples.", "time": 8}, {"name": "Set Skimming Task", "interaction": "T-S", "description": "Give a single gist question (e.g. 'What is the writer's main argument?'). Set a strict time limit (1-2 min).", "time": 3}, {"name": "Skim the Text", "interaction": "Individual", "description": "Students skim silently within the time limit. Discourage stopping at unknown words.", "time": 2}, {"name": "Pair Check", "interaction": "Pair", "description": "Students compare their gist answers with a partner and justify briefly.", "time": 4}, {"name": "Class Feedback", "interaction": "S-T", "description": "Elicit answers, confirm the gist, and discuss how students arrived at it.", "time": 5}, {"name": "Follow-up Discussion", "interaction": "Group", "description": "Brief discussion connecting the gist to students' opinions or experiences.", "time": 8}]}, {"id": "read-scanning", "skill": "Reading", "name": "Scanning for Specific Information", "summary": "Train students to locate specific facts, names, dates, or numbers quickly without reading every word.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Show a real-world example (timetable, menu, ad). Ask: 'How do you read this?' to introduce scanning naturally.", "time": 5}, {"name": "Model Scanning", "interaction": "T-S", "description": "Demonstrate scanning aloud  --  show how your eyes jump for a name or number rather than read line by line.", "time": 5}, {"name": "Set Scanning Questions", "interaction": "T-S", "description": "Hand out 6-8 wh-questions targeting specific details. Set a tight time limit.", "time": 3}, {"name": "Scan the Text", "interaction": "Individual", "description": "Students scan silently to locate answers. Time pressure is essential.", "time": 5}, {"name": "Pair Compare", "interaction": "Pair", "description": "Students compare answers and re-scan to settle disagreements.", "time": 5}, {"name": "Whole-Class Check", "interaction": "S-T", "description": "Go through answers together, asking students where exactly they found each one.", "time": 7}, {"name": "Extension Task", "interaction": "Pair", "description": "Students write 3 of their own scanning questions to swap with another pair.", "time": 10}]}, {"id": "read-detail", "skill": "Reading", "name": "Reading for Detail", "summary": "Develop close reading skills  --  understanding nuance, inference, and specific information in depth.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Activate schema with a related image, question, or short discussion.", "time": 5}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Introduce key vocabulary essential for understanding the details.", "time": 8}, {"name": "Gist Read (1st reading)", "interaction": "Individual", "description": "Quick first read for general understanding before zooming in. Set 1 gist question.", "time": 5}, {"name": "Detailed Reading Task", "interaction": "Individual", "description": "Students re-read carefully and answer 6-10 detail/inference questions.", "time": 12}, {"name": "Pair Check", "interaction": "Pair", "description": "Students compare answers, justifying with evidence from the text.", "time": 6}, {"name": "Whole-Class Feedback", "interaction": "S-T", "description": "Review answers, focusing on tricky inference questions and supporting evidence.", "time": 8}, {"name": "Reaction & Discussion", "interaction": "Group", "description": "Open discussion on the text's themes or the writer's purpose.", "time": 6}]}, {"id": "read-jigsaw", "skill": "Reading", "name": "Jigsaw Reading", "summary": "Students become experts on different parts of a text, then teach each other  --  combines reading with speaking.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Introduce the topic with a hook image or question. Form home groups of 3-4.", "time": 5}, {"name": "Split Texts", "interaction": "T-S", "description": "Give each student in a home group a different section (A, B, C, D) of the same text.", "time": 2}, {"name": "Expert Groups", "interaction": "Group", "description": "Students with the same section meet to read together and agree on key points.", "time": 12}, {"name": "Return to Home Groups", "interaction": "Group", "description": "Students return and take turns teaching their section to the rest of their home group.", "time": 12}, {"name": "Comprehension Check", "interaction": "Individual", "description": "Quick written task covering all sections  --  checks if everyone really learned from each other.", "time": 6}, {"name": "Whole-Class Synthesis", "interaction": "S-T", "description": "Pull the whole text together, clarify confusion, highlight key takeaways.", "time": 5}]}, {"id": "write-process", "skill": "Writing", "name": "Process Writing (Full Cycle)", "summary": "A complete writing lesson: brainstorm, plan, draft, peer review, and revise.", "steps": [{"name": "Lead-in & Topic Intro", "interaction": "T-S", "description": "Introduce the writing task and genre. Show a model text briefly.", "time": 5}, {"name": "Brainstorming", "interaction": "Pair", "description": "Students brainstorm ideas in pairs using a mind map or list.", "time": 8}, {"name": "Planning / Outlining", "interaction": "Individual", "description": "Students structure their ideas into an outline (intro, body, conclusion).", "time": 7}, {"name": "Drafting", "interaction": "Individual", "description": "First draft. Encourage flow over perfection  --  they'll revise later.", "time": 15}, {"name": "Peer Review", "interaction": "Pair", "description": "Swap drafts. Use a peer-feedback checklist (clarity, organization, language).", "time": 8}, {"name": "Revision", "interaction": "Individual", "description": "Students revise based on peer feedback.", "time": 10}, {"name": "Reflection", "interaction": "Individual", "description": "Quick written reflection: 'What was easy? What was hard? What will I improve next time?'", "time": 5}]}, {"id": "write-genre", "skill": "Writing", "name": "Genre Analysis & Imitation", "summary": "Students study a model text of a genre, identify its features, then write their own.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Show examples of the target genre (email, review, report). Discuss when/why people write it.", "time": 5}, {"name": "Read Model Text", "interaction": "Individual", "description": "Students read a strong example of the genre carefully.", "time": 6}, {"name": "Feature Hunt", "interaction": "Pair", "description": "Students identify structural and language features (greetings, tone, key phrases).", "time": 8}, {"name": "Class Synthesis", "interaction": "S-T", "description": "Build a shared 'features' list on the board.", "time": 5}, {"name": "Guided Practice", "interaction": "Pair", "description": "Pairs co-write a short version using the features list as a checklist.", "time": 12}, {"name": "Independent Writing", "interaction": "Individual", "description": "Students write their own version of the genre on a new prompt.", "time": 12}, {"name": "Share & Compare", "interaction": "Group", "description": "Small groups read each other's work and identify which features were used well.", "time": 7}]}, {"id": "write-sentence", "skill": "Writing", "name": "Sentence-Level Writing", "summary": "Focus on building accurate, varied sentences  --  grammar in use rather than in isolation.", "steps": [{"name": "Warm-up", "interaction": "T-S", "description": "Show 3 sentences and ask: 'Which is best? Why?' to surface awareness of structure.", "time": 5}, {"name": "Target Structure", "interaction": "T-S", "description": "Present the focus structure with clear examples and form rules.", "time": 8}, {"name": "Controlled Practice", "interaction": "Individual", "description": "Gap-fills or sentence-completion exercises using the target structure.", "time": 8}, {"name": "Pair Check", "interaction": "Pair", "description": "Compare answers and discuss any disagreements.", "time": 5}, {"name": "Sentence Building", "interaction": "Pair", "description": "Pairs build original sentences using the target structure on prompt cards.", "time": 10}, {"name": "Sharing & Correction", "interaction": "S-T", "description": "Volunteers share. Class helps polish and correct collaboratively.", "time": 8}, {"name": "Free Production", "interaction": "Individual", "description": "Short personalised writing using the target structure at least 3 times.", "time": 6}]}, {"id": "listen-gist", "skill": "Listening", "name": "Listening for Gist", "summary": "Train students to grasp the main idea or overall meaning of spoken input on first listen.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Activate schema  --  show an image or ask a prediction question related to the audio topic.", "time": 5}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Introduce 4-5 essential words to lower the cognitive load during listening.", "time": 6}, {"name": "Set Gist Task", "interaction": "T-S", "description": "Give one clear gist question (e.g. 'What is the main topic?' or 'How does the speaker feel?').", "time": 2}, {"name": "First Listen", "interaction": "Individual", "description": "Play the audio once without pausing. Students listen for the gist only.", "time": 4}, {"name": "Pair Check", "interaction": "Pair", "description": "Students compare their gist answers and predictions.", "time": 4}, {"name": "Whole-Class Feedback", "interaction": "S-T", "description": "Confirm the gist together. Replay key segments if needed.", "time": 5}, {"name": "Reaction Discussion", "interaction": "Group", "description": "Brief discussion: 'Do you agree with the speaker? Why/why not?'", "time": 8}]}, {"id": "listen-detail", "skill": "Listening", "name": "Listening for Specific Information", "summary": "Train students to catch specific details  --  names, numbers, times  --  within spoken text.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Set the context: who is speaking, where, why. A short visual works well.", "time": 4}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Introduce key words students need to recognize when listening.", "time": 5}, {"name": "Gist Listen", "interaction": "Individual", "description": "First listen for general understanding so students aren't lost in details.", "time": 4}, {"name": "Set Detail Questions", "interaction": "T-S", "description": "Hand out 6-10 questions targeting specific details. Students read them first.", "time": 3}, {"name": "Second Listen", "interaction": "Individual", "description": "Students listen again and write answers. Pause briefly between sections if needed.", "time": 6}, {"name": "Pair Check", "interaction": "Pair", "description": "Compare answers  --  predict what to listen for in the third listen.", "time": 4}, {"name": "Third Listen & Confirm", "interaction": "Individual", "description": "Final play to confirm or correct answers.", "time": 5}, {"name": "Whole-Class Feedback", "interaction": "S-T", "description": "Go through answers, replaying tricky sections.", "time": 6}]}, {"id": "listen-inference", "skill": "Listening", "name": "Listening for Inference & Attitude", "summary": "Higher-level listening  --  picking up on tone, emotion, opinion, and what's implied but not said.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Discuss how tone of voice changes meaning. Play 2-3 short audio snippets and ask 'How does this person feel?'", "time": 6}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Focus on attitude/emotion vocabulary (sceptical, enthusiastic, hesitant, dismissive).", "time": 6}, {"name": "First Listen for Gist", "interaction": "Individual", "description": "Quick listen to grasp the overall situation.", "time": 4}, {"name": "Inference Questions", "interaction": "Individual", "description": "Distribute questions like: 'How does the speaker really feel? What is their attitude toward X?'", "time": 3}, {"name": "Second Listen", "interaction": "Individual", "description": "Students listen carefully for tone, hesitation, sarcasm, emphasis.", "time": 5}, {"name": "Pair Discussion", "interaction": "Pair", "description": "Pairs justify their inferences  --  what specifically in the audio supports their answer?", "time": 6}, {"name": "Class Feedback", "interaction": "S-T", "description": "Replay key moments and discuss the linguistic clues to attitude.", "time": 8}]}, {"id": "speak-fluency", "skill": "Speaking", "name": "Fluency Practice", "summary": "Build smooth, confident speaking by reducing hesitation  --  the focus is flow, not accuracy.", "steps": [{"name": "Warm-up", "interaction": "S-S", "description": "Quick-fire 'find someone who...' or icebreaker question to get everyone talking.", "time": 5}, {"name": "Topic Introduction", "interaction": "T-S", "description": "Introduce the speaking topic. Brainstorm vocabulary briefly on the board.", "time": 5}, {"name": "Planning Time", "interaction": "Individual", "description": "Students think about what they want to say  --  but no full scripts.", "time": 4}, {"name": "First Round (4-3-2)", "interaction": "Pair", "description": "Student A speaks for 4 minutes to a new partner about the topic.", "time": 5}, {"name": "Second Round", "interaction": "Pair", "description": "Same content, new partner, 3 minutes  --  students naturally speed up and improve.", "time": 4}, {"name": "Third Round", "interaction": "Pair", "description": "Same content, new partner, 2 minutes. Speed and confidence usually peak here.", "time": 3}, {"name": "Reflection", "interaction": "S-T", "description": "Discuss as a class: 'Was it easier the third time? Why?' Highlight fluency growth.", "time": 5}]}, {"id": "speak-discussion", "skill": "Speaking", "name": "Discussion / Debate", "summary": "Develop the ability to express opinions, agree/disagree, and respond to others' arguments.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Pose a provocative question or show a thought-provoking image to spark interest.", "time": 5}, {"name": "Useful Language", "interaction": "T-S", "description": "Pre-teach functional phrases for agreeing, disagreeing, and interrupting politely.", "time": 8}, {"name": "Preparation", "interaction": "Group", "description": "Form opposing teams. Each side prepares 3 arguments and likely counter-arguments.", "time": 10}, {"name": "Opening Statements", "interaction": "S-T", "description": "Each team presents their main position (1-2 minutes per side).", "time": 5}, {"name": "Open Debate", "interaction": "Group", "description": "Free debate with the teacher monitoring and noting lan  8}, {"name": "Selective Revision", "interaction": "Individual", "description": "Students revise their draft, accepting or rejecting AI suggestions with reasons.", "time": 12}, {"name": "Reflection on Process", "interaction": "S-T", "description": "Discuss as a class: What did AI help with? What did it miss? When is it useful?", "time": 7}]}, {"id": "tech-collab-doc", "skill": "Writing", "name": "Collaborative Google Doc Lesson", "summary": "All students write in a shared document simultaneously  --  teacher monitors live and gives real-time feedback.", "steps": [{"name": "Lead-in & Topic", "interaction": "T-S", "description": "Introduce the topic and the collaborative writing task. Share the doc link.", "time": 5}, {"name": "Brainstorm Together", "interaction": "Whole Class", "description": "Each student adds 2-3 ideas to a shared brainstorm section.", "time": 7}, {"name": "Section Assignment", "interaction": "T-S", "description": "Assign each pair a section to write (intro, body 1, body 2, conclusion).", "time": 3}, {"name": "Pair Writing", "interaction": "Pair", "description": "Pairs write their section while teacher monitors live and comments in the doc.", "time": 18}, {"name": "Read All Sections", "interaction": "Individual", "description": "Students read what others have written in the document.", "time": 6}, {"name": "Coherence Edit", "interaction": "Group", "description": "Groups discuss and edit transitions between sections to make the whole piece flow.", "time": 8}, {"name": "Final Review", "interaction": "Whole Class", "description": "Project the final document and read aloud together. Celebrate the collective product.", "time": 5}]}, {"id": "speak-virtual-trip", "skill": "Speaking", "name": "Virtual Field Trip & Description", "summary": "Use Google Earth, Street View, or 360 degrees videos to 'visit' places  --  students describe, compare, and discuss.", "steps": [{"name": "Hook", "interaction": "T-S", "description": "Show a striking image of the destina
