n": "Individual", "description": "Students write one hope and one goal for the course on a sticky note. Post on the wall.", "time": 5}, {"name": "Closing Reflection", "interaction": "T-S", "description": "Brief positive close. Highlight names you remembered. Set the tone for next class.", "time": 5}]}, {"id": "warmer-only", "skill": "Warmer", "name": "10-Minute Warmer Set", "summary": "Three short warmers stitched together  --  perfect for the first 10 minutes of any lesson to energize and engage.", "steps": [{"name": "Energy Check-in", "interaction": "Whole Class", "description": "Emoji mood check or 1-10 scale of how they feel. Everyone shares quickly.", "time": 2}, {"name": "Word Association Chain", "interaction": "Whole Class", "description": "Start with a topic word. Each student says an associated word, going around the room.", "time": 4}, {"name": "Quick Question Round", "interaction": "Pair", "description": "Pose 2-3 'Would You Rather' questions. Pairs discuss for 90 seconds each.", "time": 4}]}, {"id": "review-lesson", "skill": "Vocabulary", "name": "Unit Review & Recycling", "summary": "End-of-unit review combining games, retrieval practice, and reflection  --  solidifies learning before assessment.", "steps": [{"name": "Brain Dump", "interaction": "Individual", "description": "Students write everything they remember from the unit on a blank page  --  no peeking.", "time": 6}, {"name": "Pair Pooling", "interaction": "Pair", "description": "Pairs combine their lists and add anything they missed.", "time": 5}, {"name": "Kahoot/Quizlet Live", "interaction": "Whole Class", "description": "Game-based review of key vocabulary and concepts.", "time": 12}, {"name": "Concept Mapping", "interaction": "Group", "description": "Small groups create a visual map showing how unit ideas connect.", "time": 12}, {"name": "Mock Practice Question", "interaction": "Individual", "description": "Students attempt a sample assessment question independently.", "time": 8}, {"name": "Self-Assessment", "interaction": "Individual", "description": "Students rate confidence (1-5) on each unit objective and identify what to review at home.", "time": 5}, {"name": "Q&A & Closing", "interaction": "T-S", "description": "Open floor for any final questions before assessment.", "time": 5}]}, {"id": "project-based", "skill": "Speaking", "name": "Project-Based Learning Launch", "summary": "Kicks off a multi-lesson project. Students explore a driving question and plan their research path.", "steps": [{"name": "The Driving Question", "interaction": "T-S", "description": "Introduce the project's driving question (e.g. 'How can our school become more sustainable?').", "time": 8}, {"name": "Need-to-Knows", "interaction": "Group", "description": "Groups brainstorm: What do we need to know to answer this question?", "time": 10}, {"name": "Class Need-to-Knows Wall", "interaction": "Whole Class", "description": "Combine group lists into a class wall of questions to investigate.", "time": 7}, {"name": "Group Formation & Roles", "interaction": "Whole Class", "description": "Form project teams; assign roles (researcher, designer, presenter, project manager).", "time": 8}, {"name": "Research Planning", "interaction": "Group", "description": "Groups plan how they'll gather information (interviews, sources, observations).", "time": 12}, {"name": "Milestone Setting", "interaction": "Group", "description": "Groups break the project into 4-5 milestones with deadlines.", "time": 10}, {"name": "Closing Commit", "interaction": "S-T", "description": "Each group shares their first milestone and commits to a check-in date.", "time": 5}]}, {"id": "blended-station", "skill": "Reading", "name": "Station Rotation (Blended)", "summary": "Three stations: teacher-led, collaborative, and digital. Students rotate every 15 minutes.", "steps": [{"name": "Set-Up & Briefing", "interaction": "T-S", "description": "Explain the three stations and the rotation order. Show what each station looks like.", "time": 5}, {"name": "Station 1: Teacher-Led", "interaction": "Group", "description": "Small group works directly with the teacher on the day's focus skill (e.g. close reading).", "time": 15}, {"name": "Station 2: Collaborative Task", "interaction": "Group", "description": "Group works on a hands-on collaborative task (jigsaw, discussion, project).", "time": 15}, {"name": "Station 3: Digital / Independent", "interaction": "Individual", "description": "Students work on Edpuzzle, Quizlet, Kahoot review, or independent reading on a device.", "time": 15}, {"name": "Whole-Class Synthesis", "interaction": "Whole Class", "description": "All come together to share a key insight from each station.", "time": 7}, {"name": "Exit Ticket", "interaction": "Individual", "description": "One thing learned, one question still open.", "time": 3}]}, {"id": "song-lyrics", "skill": "Listening", "name": "Song & Lyric Analysis", "summary": "Use a current English song to develop listening, vocabulary, and cultural understanding  --  high engagement.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Show the artist/album cover. Ask what students know about the artist or genre.", "time": 4}, {"name": "First Listen (No Lyrics)", "interaction": "Individual", "description": "Play the song. Students listen for mood, theme, and any words they catch.", "time": 4}, {"name": "Pair Reaction", "interaction": "Pair", "description": "Pairs share what they heard, the mood, and what they think the song is about.", "time": 4}, {"name": "Lyric Gap-Fill", "interaction": "Individual", "description": "Distribute lyrics with key words missing. Play again  --  students fill in.", "time": 5}, {"name": "Check & Discuss", "interaction": "Pair", "description": "Pairs check answers and discuss any unfamiliar phrases or expressions.", "time": 6}, {"name": "Deep Dive", "interaction": "Group", "description": "Groups analyze the song's message: What is the singer feeling? Who are they singing to?", "time": 10}, {"name": "Personal Connection", "interaction": "Individual", "description": "Students write a short response: 'This song reminds me of...' or 'I disagree with the singer because...'", "time": 8}]}, {"id": "task-based", "skill": "Speaking", "name": "Task-Based Lesson", "summary": "Students complete a real-world task; the language they need emerges from the task. No coursebook required.", "steps": [{"name": "Pre-Task Warmer", "interaction": "T-S", "description": "Introduce the task topic with a hook. Activate relevant schema.", "time": 5}, {"name": "Task Introduction", "interaction": "T-S", "description": "Explain the task clearly: e.g. 'Plan a weekend trip together within a GBP100 budget.'", "time": 4}, {"name": "Planning", "interaction": "Pair", "description": "Pairs plan how they'll approach the task  --  language emerges as they need it.", "time": 5}, {"name": "Task Performance", "interaction": "Pair", "description": "Pairs do the task. Teacher monitors silently, noting language gaps and good usage.", "time": 15}, {"name": "Report Back", "interaction": "S-T", "description": "Pairs share their outcomes with the class.", "time": 8}, {"name": "Language Focus", "interaction": "T-S", "description": "Teacher addresses language that came up  --  both errors and good examples  --  based on monitoring notes.", "time": 10}, {"name": "Task Repetition", "interaction": "Pair", "description": "Pairs do the task again with new partners  --  improved fluency and accuracy.", "time": 8}]}, {"id": "feedback-peer-review", "skill": "Writing", "name": "Peer Review Workshop", "summary": "A structured lesson dedicated entirely to peer feedback  --  students learn to give and receive constructive criticism.", "steps": [{"name": "Why Peer Feedback?", "interaction": "T-S", "description": "Open with a discussion: Why does feedback from peers matter? Set the tone of growth, not judgment.", "time": 6}, {"name": "Model Feedback", "interaction": "T-S", "description": "Show a sample piece of work and model giving feedback aloud using Two Stars and a Wish.", "time": 8}, {"name": "Feedback Norms", "interaction": "Whole Class", "description": "Co-create class norms: be specific, be kind, focus on the work not the person.", "time": 5}, {"name": "Pair Up & Exchange", "interaction": "Pair", "description": "Pairs swap drafts. Each reads silently, taking notes using a peer-feedback checklist.", "time": 10}, {"name": "Feedback Conference", "interaction": "Pair", "description": "Pairs talk through their feedback face-to-face, asking clarifying questions.", "time": 10}, {"name": "Reflection", "interaction": "Individual", "description": "Students reflect: What feedback was most useful? What will I change first?", "time": 5}, {"name": "Revision Plan", "interaction": "Individual", "description": "Students write a 3-step revision plan based on the feedback received.", "time": 6}]}, {"id": "feedback-self-assessment", "skill": "Writing", "name": "Self-Assessment & Goal Setting", "summary": "Students assess their own work against a rubric, identify growth areas, and set personalized learning goals.", "steps": [{"name": "Introduce Rubric", "interaction": "T-S", "description": "Walk through the assessment rubric. Discuss what each level looks like with examples.", "time": 8}, {"name": "Compare Exemplars", "interaction": "Pair", "description": "Pairs assess sample work (strong, average, weak) using the rubric to calibrate their judgment.", "time": 10}, {"name": "Self-Assess Own Work", "interaction": "Individual", "description": "Students apply the rubric honestly to their own work, marking strengths and gaps.", "time": 12}, {"name": "Identify Top 3 Areas", "interaction": "Individual", "description": "Students choose 3 specific aspects to improve based on their self-assessment.", "time": 5}, {"name": "SMART Goal Writing", "interaction": "Individual", "description": "For each area, students write a Specific, Measurable, Achievable, Relevant, Time-bound goal.", "time": 8}, {"name": "Pair Accountability", "interaction": "Pair", "description": "Pairs share their goals and agree to check in next week on progress.", "time": 5}, {"name": "Teacher Conference Sign-up", "interaction": "T-S", "description": "Students sign up for brief individual conferences with teacher to discuss their plan.", "time": 2}]}, {"id": "grammar-deductive", "skill": "Grammar", "name": "Deductive Grammar (PPP)", "summary": "Classic Present-Practice-Produce: teacher explains the rule, students practice in controlled exercises, then use it freely.", "steps": [{"name": "Lead-in & Context", "interaction": "T-S", "description": "Set a context where the target structure appears naturally. Elicit what students already know.", "time": 5}, {"name": "Presentation", "interaction": "T-S", "description": "Explain the grammar rule clearly with form, meaning, and pronunciation. Use the board to show the pattern.", "time": 10}, {"name": "Checking Understanding", "interaction": "T-S", "description": "Ask concept-check questions (CCQs) to verify students understand the meaning and use.", "time": 5}, {"name": "Controlled Practice", "interaction": "Individual", "description": "Gap-fill, matching, or transformation exercises focusing on accuracy.", "time": 10}, {"name": "Semi-Controlled Practice", "interaction": "Pair", "description": "Structured speaking or writing activity using the target structure with some freedom.", "time": 8}, {"name": "Free Production", "interaction": "Group", "description": "Open speaking or writing task where students use the structure naturally in meaningful communication.", "time": 10}, {"name": "Feedback & Error Correction", "interaction": "T-S", "description": "Address common errors observed during production. Highlight good usage too.", "time": 7}]}, {"id": "grammar-test-teach-test", "skill": "Grammar", "name": "Test-Teach-Test Grammar", "summary": "Start by testing what students can already do, teach what they struggle with, then test again to show improvement.", "steps": [{"name": "Diagnostic Test", "interaction": "Individual", "description": "Give a short task using the target structure WITHOUT teaching it first. See what students can already do.", "time": 8}, {"name": "Pair Check", "interaction": "Pair", "description": "Students compare answers. This surfaces disagreements and areas of uncertainty.", "time": 4}, {"name": "Identify Gaps", "interaction": "T-S", "description": "Review the diagnostic together. Identify the specific gaps and errors the class shares.", "time": 5}, {"name": "Teach the Gap", "interaction": "T-S", "description": "Focus instruction ONLY on what students got wrong -- not a full presentation of what they already know.", "time": 10}, {"name": "Practice", "interaction": "Pair", "description": "Targeted practice on the specific gaps identified, not the whole structure.", "time": 8}, {"name": "Re-Test", "interaction": "Individual", "description": "A new task similar to the diagnostic. Students see concrete improvement from the first test.", "time": 8}, {"name": "Reflection", "interaction": "S-T", "description": "Compare first and second test. Celebrate improvement. Identify remaining gaps for homework.", "time": 5}]}, {"id": "grammar-error-analysis", "skill": "Grammar", "name": "Error Analysis Lesson", "summary": "Students analyze real errors from their own writing, identify patterns, learn the rules, and self-correct.", "steps": [{"name": "Display Errors", "interaction": "T-S", "description": "Show 8-10 anonymous errors collected from recent student writing. No names -- just the sentences.", "time": 5}, {"name": "Error Hunt", "interaction": "Pair", "description": "Pairs identify what is wrong in each sentence and try to correct it.", "time": 8}, {"name": "Categorize", "interaction": "S-T", "description": "Together, sort errors into categories: verb tense, word order, agreement, articles, etc.", "time": 5}, {"name": "Rule Focus", "interaction": "T-S", "description": "Teach or review the rule behind the most common error category.", "time": 8}, {"name": "Self-Edit", "interaction": "Individual", "description": "Students return to their own recent writing and look specifically for this error type.", "time": 10}, {"name": "Peer Check", "interaction": "Pair", "description": "Partners check each other's corrections. Did they find all instances?", "time": 5}, {"name": "Reflection", "interaction": "Individual", "description": "Write one 'grammar goal' for next time based on your most common error.", "time": 4}]}, {"id": "grammar-communicative", "skill": "Grammar", "name": "Communicative Grammar Lesson", "summary": "Grammar taught through a communicative task -- students need the structure to complete a meaningful activity.", "steps": [{"name": "Set the Task", "interaction": "T-S", "description": "Introduce a communicative task that requires the target structure. Example: plan a hypothetical holiday (conditionals).", "time": 5}, {"name": "First Attempt", "interaction": "Pair", "description": "Students try the task with whatever language they have. Teacher monitors and notes grammar gaps.", "time": 10}, {"name": "Language Focus", "interaction": "T-S", "description": "Based on monitoring, teach the grammar structure students needed but lacked.", "time": 10}, {"name": "Practice", "interaction": "Individual", "description": "Quick controlled practice to consolidate the new structure.", "time": 5}, {"name": "Task Repeat", "interaction": "Pair", "description": "Same task, new partner. Students perform noticeably better with the new grammar tool.", "time": 8}, {"name": "Report", "interaction": "S-T", "description": "Pairs share their outcomes. Class notices how the grammar structure enabled better communication.", "time": 5}, {"name": "Written Record", "interaction": "Individual", "description": "Students write the rule and 2-3 personal example sentences in their notebooks.", "time": 5}]}, {"id": "pronunciation-sounds", "skill": "Speaking", "name": "Pronunciation: Sounds & Minimal Pairs", "summary": "Target a specific sound contrast (e.g. /i/ vs /i:/, /b/ vs /v/) through listening discrimination and production practice.", "steps": [{"name": "Ear Training", "interaction": "T-S", "description": "Play or say pairs of words. Students identify: same or different? Which sound do you hear?", "time": 6}, {"name": "Sound Isolation", "interaction": "T-S", "description": "Model the target sounds clearly. Show mouth position, airflow, voicing. Students mirror.", "time": 5}, {"name": "Minimal Pair Drill", "interaction": "T-S", "description": "Practice word pairs that differ only in the target sound: ship/sheep, bit/beat, live/leave.", "time": 6}, {"name": "Minimal Pair Sentences", "interaction": "Pair", "description": "Partner A reads a sentence with one of the pair words. Partner B identifies which word they heard.", "time": 8}, {"name": "Tongue Twisters", "interaction": "Pair", "description": "Practice tongue twisters loaded with the target sounds. Start slow, build speed.", "time": 5}, {"name": "Connected Speech", "interaction": "Pair", "description": "Read a short dialogue containing the target sounds naturally. Focus on natural rhythm, not isolated sounds.", "time": 8}, {"name": "Feedback", "interaction": "T-S", "description": "Common issues addressed. Homework: record yourself reading the dialogue, listen back, re-record.", "time": 5}]}, {"id": "pronunciation-intonation", "skill": "Speaking", "name": "Pronunciation: Stress & Intonation", "summary": "Focus on word stress, sentence stress, and intonation patterns -- the music of English that carries meaning.", "steps": [{"name": "Listen & Notice", "interaction": "T-S", "description": "Play two versions of the same sentence with different stress/intonation. Students describe the difference in meaning.", "time": 6}, {"name": "Rules & Patterns", "interaction": "T-S", "description": "Teach the pattern: content words are stressed, function words are weak. Rising intonation for yes/no questions, falling for wh-questions.", "time": 8}, {"name": "Mark the Stress", "interaction": "Individual", "description": "Students mark stress patterns on a written dialogue using dots or underlining.", "time": 6}, {"name": "Choral Drill", "interaction": "Whole Class", "description": "Class reads the dialogue together with exaggerated stress and intonation. Teacher conducts.", "time": 5}, {"name": "Pair Practice", "interaction": "Pair", "description": "Pairs perform the dialogue with natural stress and intonation. Record on phones if possible.", "time": 8}, {"name": "Meaning Shift", "interaction": "Pair", "description": "Same sentence, different stress = different meaning. 'I didn't say he stole it' -- stress each word in turn and discuss meaning change.", "time": 8}, {"name": "Reflection", "interaction": "S-T", "description": "Why does intonation matter? Discuss how flat delivery can cause misunderstanding.", "time": 4}]}, {"id": "listen-dictogloss", "skill": "Listening", "name": "Dictogloss", "summary": "Students listen to a short text, take notes, then reconstruct it collaboratively -- integrating listening, writing, and grammar.", "steps": [{"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Introduce 4-5 key words from the text. These help students follow the listening.", "time": 6}, {"name": "First Listen (No Writing)", "interaction": "Individual", "description": "Students listen to the full text at natural speed. No writing -- just listen for gist.", "time": 3}, {"name": "Second Listen (Note Key Words)", "interaction": "Individual", "description": "Listen again. Students jot down key words, phrases, numbers -- whatever they catch.", "time": 4}, {"name": "Reconstruction", "interaction": "Group", "description": "Groups of 3 pool their notes and reconstruct the text as closely as possible.", "time": 12}, {"name": "Compare Versions", "interaction": "Group", "description": "Groups compare their reconstructions with another group. Discuss differences.", "time": 6}, {"name": "Compare with Original", "interaction": "S-T", "description": "Display the original text. Students compare and notice what they missed -- especially grammar.", "time": 5}, {"name": "Language Focus", "interaction": "T-S", "description": "Address the grammar or vocabulary gaps revealed by the reconstruction.", "time": 8}]}, {"id": "listen-authentic-interview", "skill": "Listening", "name": "Authentic Interview Listening", "summary": "Use a real interview (TV, podcast, YouTube) to develop tolerance for natural speech speed, accents, and hesitation.", "steps": [{"name": "Context Setting", "interaction": "T-S", "description": "Who is being interviewed? What topic? Show a photo. Predict what they might say.", "time": 5}, {"name": "Pre-teach", "interaction": "T-S", "description": "Teach 5-6 key terms and any cultural context needed to follow the interview.", "time": 7}, {"name": "Gist Listen", "interaction": "Individual", "description": "Watch/listen to the full clip (3-5 minutes). Students answer: What is the main topic? How does the speaker feel?", "time": 5}, {"name": "Detail Listen with Scaffold", "interaction": "Individual", "description": "Listen again with a structured task: fill in a summary with blanks, or tick statements true/false.", "time": 6}, {"name": "Language Focus", "interaction": "Pair", "description": "Identify 3 natural speech features: hesitation markers, fillers (um, like, you know), contractions, connected speech.", "time": 6}, {"name": "Discussion", "interaction": "Group", "description": "Do you agree with the interviewee? What would you ask them? What surprised you?", "time": 8}, {"name": "Response Task", "interaction": "Individual", "description": "Write 3 sentences responding to the interview, using vocabulary from the lesson.", "time": 6}]}, {"id": "read-extensive", "skill": "Reading", "name": "Extensive Reading Lesson", "summary": "Students read self-selected books at their level for pleasure. Focus is on quantity, enjoyment, and reading habit formation.", "steps": [{"name": "Book Buzz", "interaction": "T-S", "description": "Teacher or student shares a 2-minute book recommendation to spark interest.", "time": 4}, {"name": "Silent Reading", "interaction": "Individual", "description": "Sustained silent reading. Everyone reads -- including the teacher. No interruptions.", "time": 20}, {"name": "Reading Log", "interaction": "Individual", "description": "Students record pages read, a brief reaction, and any interesting words in their reading log.", "time": 5}, {"name": "Book Chat", "interaction": "Pair", "description": "Partners share what they read: what happened, how they feel about it, would they recommend it?", "time": 6}, {"name": "Vocabulary Harvest", "interaction": "Individual", "description": "Choose 3 interesting new words from today's reading. Write them in your vocabulary notebook with context.", "time": 5}, {"name": "Reading Goals", "interaction": "Individual", "description": "Set a goal for next reading session: how many pages, chapters, or minutes.", "time": 3}]}, {"id": "read-compare-texts", "skill": "Reading", "name": "Comparing Two Texts", "summary": "Students read two texts on the same topic and analyze differences in perspective, style, purpose, or argument.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "Introduce the topic. Ask: can two texts about the same thing say different things? Why?", "time": 5}, {"name": "Read Text A", "interaction": "Individual", "description": "Students read the first text and answer 3-4 comprehension questions.", "time": 8}, {"name": "Read Text B", "interaction": "Individual", "description": "Students read the second text (same topic, different source/perspective) and answer similar questions.", "time": 8}, {"name": "Comparison Task", "interaction": "Pair", "description": "Complete a comparison chart: What does each text say? Where do they agree? Where do they differ? Which is more convincing?", "time": 10}, {"name": "Class Discussion", "interaction": "Whole Class", "description": "Share findings. Discuss why the texts differ: audience, purpose, bias, evidence quality.", "time": 8}, {"name": "Written Response", "interaction": "Individual", "description": "Write a paragraph: Which text is more convincing and why? Cite evidence from both.", "time": 8}]}, {"id": "write-email", "skill": "Writing", "name": "Email Writing (Formal & Informal)", "summary": "Teach the conventions of email writing -- register, structure, openings/closings -- for both formal and informal contexts.", "steps": [{"name": "Compare Examples", "interaction": "Pair", "description": "Show a formal and informal email side by side. Students identify 5 differences in language, tone, and structure.", "time": 8}, {"name": "Feature Analysis", "interaction": "S-T", "description": "Build a class chart: formal email features (Dear Sir, I am writing to, Yours faithfully) vs. informal (Hey!, Just a quick note, See you soon).", "time": 7}, {"name": "Register Sort", "interaction": "Pair", "description": "Sort phrases into formal or informal columns. Discuss borderline cases.", "time": 6}, {"name": "Guided Writing", "interaction": "Individual", "description": "Write a formal email replying to a job advertisement OR an informal email to a friend about a party. Use the features chart.", "time": 12}, {"name": "Peer Review", "interaction": "Pair", "description": "Partners check: Is the register consistent? Are the opening and closing appropriate? Any informal language in a formal email?", "time": 6}, {"name": "Register Swap", "interaction": "Individual", "description": "Rewrite your email in the opposite register. Formal becomes informal, informal becomes formal.", "time": 8}, {"name": "Share & Discuss", "interaction": "S-T", "description": "Volunteers share both versions. Discuss how meaning stays the same but tone changes completely.", "time": 5}]}, {"id": "write-summary", "skill": "Writing", "name": "Summary Writing", "summary": "Teach students to condense a longer text into a short, accurate summary -- a key academic skill.", "steps": [{"name": "What is a Summary?", "interaction": "T-S", "description": "Discuss: a summary is shorter than the original, in your OWN words, captures the main idea, omits details.", "time": 5}, {"name": "Read Source Text", "interaction": "Individual", "description": "Students read a 300-word article carefully. Underline the main idea of each paragraph.", "time": 8}, {"name": "Identify Key Points", "interaction": "Pair", "description": "In pairs, agree on the 3-4 most important points. Discard supporting details and examples.", "time": 6}, {"name": "Model Summary", "interaction": "T-S", "description": "Teacher models writing a summary of paragraph 1, thinking aloud about word choice and paraphrasing.", "time": 7}, {"name": "Write Summary", "interaction": "Individual", "description": "Students write a 60-80 word summary of the full article using their key points. Must paraphrase -- no copying sentences.", "time": 12}, {"name": "Peer Compare", "interaction": "Pair", "description": "Compare summaries: Did you include the same key points? Is anything important missing? Any copied phrases?", "time": 6}, {"name": "Revision", "interaction": "Individual", "description": "Revise based on peer feedback. Check: Is it under 80 words? Is it in my own words? Does it capture the gist?", "time": 5}]}, {"id": "write-narrative", "skill": "Writing", "name": "Narrative Writing (Story Structure)", "summary": "Teach story structure (orientation, complication, resolution) and craft techniques for engaging narrative writing.", "steps": [{"name": "Story Hooks", "interaction": "T-S", "description": "Read 3 story openings. Which hooks you in? Why? Teach hook techniques: dialogue, action, question, description.", "time": 8}, {"name": "Story Mountain", "interaction": "T-S", "description": "Teach the story mountain: orientation (who, where, when) -> rising action -> climax -> falling action -> resolution.", "time": 7}, {"name": "Plan Your Story", "interaction": "Individual", "description": "Using a story mountain template, plan a short story. Focus on a clear complication and satisfying resolution.", "time": 8}, {"name": "Craft Mini-Lesson", "interaction": "T-S", "description": "One technique focus: show-don't-tell, sensory details, strong verbs, or varied sentence length.", "time": 6}, {"name": "Draft", "interaction": "Individual", "description": "Write the first draft. Focus on getting the story down -- editing comes later.", "time": 15}, {"name": "Peer Feedback", "interaction": "Pair", "description": "Partner reads and answers: What's the strongest moment? Where did you lose interest? One suggestion.", "time": 6}, {"name": "Revision Focus", "interaction": "Individual", "description": "Revise ONE aspect based on feedback and the craft lesson. Quality over quantity.", "time": 8}]}, {"id": "speak-interview-skills", "skill": "Speaking", "name": "Interview Skills Practice", "summary": "Practice job interview or academic interview skills -- questions, answers, body language, and follow-up.", "steps": [{"name": "What Makes a Good Interview?", "interaction": "T-S", "description": "Watch a short clip of a strong and weak interview. Class identifies what works and what doesn't.", "time": 7}, {"name": "Common Questions", "interaction": "T-S", "description": "Teach 8-10 common interview questions. Practice strong answer structures: STAR method (Situation, Task, Action, Result).", "time": 10}, {"name": "Answer Preparation", "interaction": "Individual", "description": "Students prepare answers to 5 key questions using notes (not full scripts).", "time": 8}, {"name": "Practice Round 1", "interaction": "Pair", "description": "Mock interview: Partner A interviews, Partner B answers. Swap roles. Give feedback on content and delivery.", "time": 12}, {"name": "Body Language Focus", "interaction": "T-S", "description": "Quick lesson on non-verbal communication: eye contact, posture, handshake, smiling. Students practice.", "time": 5}, {"name": "Practice Round 2", "interaction": "Pair", "description": "New partner. Second mock interview incorporating body language feedback.", "time": 10}, {"name": "Debrief", "interaction": "S-T", "description": "Share tips and common mistakes. What was hardest? What will you practice more?", "time": 5}]}, {"id": "speak-storytelling", "skill": "Speaking", "name": "Oral Storytelling", "summary": "Students learn to tell a story aloud engagingly -- with structure, detail, expression, and audience awareness.", "steps": [{"name": "Model Story", "interaction": "T-S", "description": "Teacher tells a short personal story (2-3 minutes) with expression, pauses, gestures. Students note what made it engaging.", "time": 5}, {"name": "Story Structure", "interaction": "T-S", "description": "Teach oral storytelling structure: hook, build-up, key moment, reflection. Different from written stories.", "time": 6}, {"name": "Story Selection", "interaction": "Individual", "description": "Students choose a personal story to tell: a funny moment, an embarrassing experience, a time they learned something.", "time": 5}, {"name": "Note Cards", "interaction": "Individual", "description": "Plan the story on note cards: key moments only, NOT a full script. 3-5 bullet points maximum.", "time": 8}, {"name": "Small Group Practice", "interaction": "Group", "description": "Tell the story to a group of 3. Listeners give feedback: What was the best moment? Where did it drag?", "time": 12}, {"name": "Revision & Retelling", "interaction": "Pair", "description": "Revise based on feedback. Tell again to a new partner. Notice improvement.", "time": 8}, {"name": "Volunteer Performances", "interaction": "S-T", "description": "2-3 volunteers tell their story to the class. Celebrate good storytelling.", "time": 10}]}, {"id": "speak-negotiation", "skill": "Speaking", "name": "Negotiation & Persuasion", "summary": "Practice persuasive language, making proposals, compromising, and reaching agreement.", "steps": [{"name": "Lead-in", "interaction": "T-S", "description": "When do we negotiate in real life? Brainstorm scenarios: buying a car, splitting chores, planning with friends.", "time": 5}, {"name": "Functional Language", "interaction": "T-S", "description": "Teach key phrases: 'How about if we...', 'I see your point, but...', 'Would you consider...', 'What if I offered...', 'That works for me.'", "time": 8}, {"name": "Model Negotiation", "interaction": "T-S", "description": "Teacher and a strong student demonstrate a short negotiation. Class identifies the strategies used.", "time": 5}, {"name": "Preparation", "interaction": "Individual", "description": "Students receive a role card with a negotiation scenario and their position, priorities, and deal-breakers.", "time": 5}, {"name": "Negotiation Round 1", "interaction": "Pair", "description": "Partners negotiate. Goal: reach an agreement both sides can accept. Teacher monitors and notes language use.", "time": 10}, {"name": "Debrief Round 1", "interaction": "S-T", "description": "Did you reach agreement? What strategies worked? What language did you use?", "time": 5}, {"name": "Negotiation Round 2", "interaction": "Pair", "description": "New scenario, new partner. Apply lessons from round 1.", "time": 10}]}, {"id": "assess-formative-cycle", "skill": "Vocabulary", "name": "Formative Assessment Cycle", "summary": "A complete assess-reteach-reassess cycle. Use exit ticket data to plan targeted reteaching for the next lesson.", "steps": [{"name": "Review Exit Ticket Data", "interaction": "T-S", "description": "Share patterns from yesterday's exit tickets (anonymized). 'Many of you struggled with X. Let's fix that today.'", "time": 5}, {"name": "Targeted Mini-Lesson", "interaction": "T-S", "description": "Reteach ONLY the specific gap identified. Not a full repeat -- focused instruction on the exact sticking point.", "time": 8}, {"name": "Guided Practice", "interaction": "Pair", "description": "Practice the specific skill with teacher monitoring. Check that the reteaching is landing.", "time": 8}, {"name": "Independent Check", "interaction": "Individual", "description": "Students attempt a new task testing the same skill. This is the reassessment.", "time": 8}, {"name": "Self-Assessment", "interaction": "Individual", "description": "Students compare their first exit ticket with today's work. Traffic light: green (got it now), yellow (improving), red (still stuck).", "time": 4}, {"name": "Targeted Support", "interaction": "T-S", "description": "While greens and yellows move to extension, teacher pulls the red group for intensive small-group support.", "time": 10}, {"name": "New Exit Ticket", "interaction": "Individual", "description": "Fresh exit ticket on the same skill. Compare with the original to measure growth.", "time": 4}]}, {"id": "culture-comparison", "skill": "Speaking", "name": "Cultural Comparison Lesson", "summary": "Compare cultural practices between students' own culture and a target culture -- builds intercultural competence.", "steps": [{"name": "Cultural Snapshot", "interaction": "T-S", "description": "Show 3-4 images or a short video from the target culture. Students observe and share first impressions.", "time": 6}, {"name": "KWL Chart", "interaction": "Individual", "description": "What do you Know about this culture? What do you Want to know? (L column filled later.)", "time": 5}, {"name": "Information Input", "interaction": "Individual", "description": "Students read or watch a short text about a specific cultural practice (festivals, food, greetings, education, family).", "time": 8}, {"name": "Comparison Chart", "interaction": "Pair", "description": "Complete a chart comparing the practice in the target culture with your own: similarities in one column, differences in another.", "time": 8}, {"name": "Discussion", "interaction": "Group", "description": "Discuss: What surprised you? What is similar to your culture? Is one way better or just different?", "time": 8}, {"name": "Complete the L", "interaction": "Individual", "description": "Fill in the L column of the KWL chart: What did you Learn? What do you still want to know?", "time": 4}, {"name": "Personal Reflection", "interaction": "Individual", "description": "Write 3 sentences about what you found most interesting and how it changed your perspective.", "time": 5}]}, {"id": "exam-practice", "skill": "Reading", "name": "Exam Skills Practice", "summary": "Timed exam-style tasks with strategy instruction -- teach students HOW to approach exam questions, not just content.", "steps": [{"name": "Exam Strategy", "interaction": "T-S", "description": "Teach one exam strategy: read questions before the text, time management, elimination for multiple choice, keyword scanning.", "time": 7}, {"name": "Model Application", "interaction": "T-S", "description": "Teacher demonstrates the strategy on one exam question, thinking aloud about the process.", "time": 6}, {"name": "Timed Practice", "interaction": "Individual", "description": "Students complete an exam-style task under timed conditions. Strict timing -- realistic exam pressure.", "time": 15}, {"name": "Self-Check", "interaction": "Individual", "description": "Students check their own answers against the answer key. Mark and note which questions they got wrong.", "time": 5}, {"name": "Error Analysis", "interaction": "Pair", "description": "Discuss wrong answers: Was it a vocabulary problem? Misread the question? Ran out of time? Couldn't find the answer in the text?", "time": 6}, {"name": "Strategy Reflection", "interaction": "S-T", "description": "Did the strategy help? What will you do differently next time? Share tips.", "time": 5}, {"name": "Targeted Practice", "interaction": "Individual", "description": "Redo 2-3 questions you got wrong, applying the strategy more carefully.", "time": 6}]}, {"id": "tech-screencast-tutorial", "skill": "Tech", "name": "Student Screencast Tutorial", "summary": "Students create a screen-recorded tutorial explaining a concept -- teaching others solidifies their own understanding.", "steps": [{"name": "Watch Examples", "interaction": "T-S", "description": "Watch 2 short screencasts (Khan Academy style). Discuss: what makes a good tutorial? Clear voice, visual support, logical steps.", "time": 7}, {"name": "Topic Selection", "interaction": "Individual", "description": "Each student picks a concept from the current unit they feel confident explaining.", "time": 3}, {"name": "Script & Storyboard", "interaction": "Individual", "description": "Plan the tutorial: what will you show on screen at each moment? What will you say? Keep it under 3 minutes.", "time": 12}, {"name": "Practice Run", "interaction": "Pair", "description": "Explain your tutorial to a partner WITHOUT recording. Partner gives feedback: Was it clear? What was confusing?", "time": 8}, {"name": "Record", "interaction": "Individual", "description": "Record the screencast using Loom, Screencastify, or similar. One take is fine -- imperfection is okay.", "time": 10}, {"name": "Peer Review", "interaction": "Pair", "description": "Watch each other's tutorials. Give 1 star (strength) and 1 wish (improvement).", "time": 8}, {"name": "Share & Archive", "interaction": "Whole Class", "description": "Upload tutorials to a shared class folder. These become revision resources for the whole class.", "time": 5}]}, {"id": "tech-data-collection", "skill": "Tech", "name": "Data Collection & Presentation", "summary": "Students design a survey, collect real data from classmates, analyze it, and present findings -- cross-curricular tech + math + speaking.", "steps": [{"name": "Research Question", "interaction": "T-S", "description": "Model turning a curiosity into a research question: 'I wonder how much sleep teenagers get' becomes 'How many hours do students in our school sleep on weeknights?'", "time": 6}, {"name": "Survey Design", "interaction": "Pair", "description": "Pairs design a 5-question survey using Google Forms. Teach question types: multiple choice, scale, short answer.", "time": 12}, {"name": "Data Collection", "interaction": "S-S", "description": "Students share their survey link. Everyone completes 3-4 classmates' surveys.", "time": 8}, {"name": "Data Analysis", "interaction": "Pair", "description": "Review the responses. Identify patterns. Create 1-2 charts (Google Sheets or by hand) showing key findings.", "time": 12}, {"name": "Presentation Prep", "interaction": "Pair", "description": "Prepare a 2-minute presentation of findings: question, method, key results, one surprising finding.", "time": 8}, {"name": "Present", "interaction": "S-T", "description": "Each pair presents their findings. Audience asks one question per presentation.", "time": 15}, {"name": "Reflection", "interaction": "Individual", "description": "What did you learn about surveys? What would you do differently? How could you improve your questions?", "time": 5}]}, {"id": "model-reading-b1-news", "skill": "Reading", "name": "[MODEL] B1 News Article: Social Media & Mental Health", "summary": "A fully completed model lesson showing how to teach a reading lesson on social media and teen mental health for B1 intermediate students. 50 minutes.", "isModel": true, "steps": [{"name": "Warmer: Would You Rather", "interaction": "S-S", "description": "Would you rather give up your phone for a month or give up your favorite food for a year? Students discuss in pairs for 2 minutes, then share answers. This naturally leads into the topic of phone/social media dependency.", "time": 5, "differentiation": "Lower levels: provide the question on the board. Higher: ask follow-up 'why?'", "bloom": "Remember"}, {"name": "Lead-in: Photo Discussion", "interaction": "T-S", "description": "Project 3 images: a teen scrolling alone, friends laughing together WITHOUT phones, a 'no phones' sign. Ask: What do you see? How do these images connect? Elicit the topic: social media and how it affects us.", "time": 5, "differentiation": "Provide sentence starters for weaker students: 'I think this shows...'", "bloom": "Understand"}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Teach 6 key words: anxiety, self-esteem, comparison, cyberbullying, screen time, well-being. For each: show image, give definition, model pronunciation, students repeat, use in an example sentence. Check with CCQs.", "time": 8, "differentiation": "Strong students get the words in context sentences to guess meaning first. Weaker students get definitions directly with L1 translation if needed.", "bloom": "Remember"}, {"name": "Gist Reading", "interaction": "Individual", "description": "Students read the article (350 words) in 3 minutes with ONE gist question: 'Is the author for or against social media?' They should not stop at unknown words -- just get the overall message. Strict time limit.", "time": 5, "differentiation": "Provide a glossary sidebar for A2 students. B2 students get no support.", "bloom": "Understand"}, {"name": "Pair Check: Gist", "interaction": "Pair", "description": "Partners compare: Did you get the same answer? The author is NEITHER fully for nor against -- they present both sides. If pairs disagree, they re-read the first and last paragraphs together.", "time": 3, "differentiation": "", "bloom": "Understand"}, {"name": "Detailed Reading", "interaction": "Individual", "description": "Students re-read carefully and answer 8 questions: 3 true/false, 3 detail questions ('According to paragraph 2, what percentage of teens...'), 2 inference questions ('Why does the author mention sleep?'). 8 minutes.", "time": 10, "differentiation": "Weaker students: do questions 1-5 only. Stronger students: all 8 plus a bonus question: 'Do you think this article is biased?'", "bloom": "Analyze"}, {"name": "Pair Check: Details", "interaction": "Pair", "description": "Compare answers. For any disagreements, go back to the text and find the evidence. Underline the sentence that supports your answer. Teacher circulates and helps with the trickiest questions.", "time": 5, "differentiation": "", "bloom": "Analyze"}, {"name": "Whole-Class Feedback", "interaction": "S-T", "description": "Go through answers together. For inference questions, ask multiple students -- accept different answers if they can justify with text evidence. Highlight the vocabulary from pre-teaching as it appears in context.", "time": 5, "differentiation": "", "bloom": "Evaluate"}, {"name": "Discussion: Personal Response", "interaction": "Group", "description": "Groups of 3-4 discuss: 'Do you agree that social media harms mental health? What rules do you have for your own screen time? What would you change about social media if you could?' Each group reports their most interesting point.", "time": 8, "differentiation": "Provide discussion question cards. Assign a facilitator in each group to ensure everyone speaks.", "bloom": "Evaluate"}, {"name": "Exit Ticket", "interaction": "Individual", "description": "On a slip of paper: Write 2 things you learned from the article and 1 thing you still wonder about. Use at least 2 vocabulary words from today. Hand in at the door.", "time": 3, "differentiation": "Sentence stem: 'I learned that... I still wonder whether...'", "bloom": "Create"}]}, {"id": "model-grammar-a2-past", "skill": "Grammar", "name": "[MODEL] A2 Past Simple vs Past Continuous", "summary": "A fully completed model grammar lesson for elementary learners distinguishing past simple and past continuous. Uses a story context. 45 minutes.", "isModel": true, "steps": [{"name": "Warmer: Continue the Story", "interaction": "Whole Class", "description": "Teacher starts: 'Last Saturday, I was walking in the park when...' Each student adds one sentence. Accept all contributions. This naturally generates past tense forms that you can refer back to during the lesson.", "time": 5, "differentiation": "Accept simple sentences from weaker students. Encourage stronger students to add detail.", "bloom": "Remember"}, {"name": "Context: Story Reading", "interaction": "T-S", "description": "Read aloud a short story (100 words): 'Maria was cooking dinner when the phone rang. She was listening to music, so she didn't hear it at first. Her cat was sleeping on the sofa. Suddenly, the doorbell rang. She opened the door and...' Students listen and predict the ending.", "time": 5, "differentiation": "Display the text on the board so students can read along.", "bloom": "Understand"}, {"name": "Noticing: Underline the Verbs", "interaction": "Pair", "description": "Give students the printed story. Task: underline all the verbs in BLUE if they describe a long action (was cooking, was listening, was sleeping) and RED if they describe a short, completed action (rang, opened, heard). Compare with partner.", "time": 6, "differentiation": "For weaker students: pre-highlight the verbs and just ask them to sort into two columns.", "bloom": "Analyze"}, {"name": "Rule Discovery", "interaction": "S-T", "description": "Elicit the rule from students: 'Which actions were already happening? Which actions interrupted them?' Draw a timeline on the board: long wavy line (was cooking) interrupted by a short arrow (rang). Students copy the timeline into notebooks.", "time": 7, "differentiation": "Provide a written rule summary handout for students who need it.", "bloom": "Understand"}, {"name": "Form Focus", "interaction": "T-S", "description": "Write the forms on the board: PAST CONTINUOUS = was/were + verb-ing (long background action). PAST SIMPLE = verb-ed or irregular (short completed action). Drill pronunciation: 'She WAS COOKing when the phone RANG.' Emphasize the stress pattern.", "time": 5, "differentiation": "", "bloom": "Remember"}, {"name": "Controlled Practice: Gap Fill", "interaction": "Individual", "description": "10 sentences with gaps: 'I ___ (walk) home when it ___ (start) to rain.' Students choose past simple or past continuous for each gap. First 5 are straightforward. Last 5 include some tricky ones.", "time": 7, "differentiation": "Weaker: do sentences 1-7. Stronger: all 10 plus write 2 of your own.", "bloom": "Apply"}, {"name": "Pair Check", "interaction": "Pair", "description": "Compare answers. For any disagreements, draw the timeline (long action + interruption) to decide which tense fits. Teacher checks the tricky ones with the whole class.", "time": 4, "differentiation": "", "bloom": "Apply"}, {"name": "Free Practice: Alibi Game", "interaction": "Group", "description": "Two students leave the room -- they are 'suspects' and must agree on an alibi for last night. The class prepares questions: 'What were you doing at 8pm? Who were you with? What happened when...?' Suspects return and are questioned separately. Class spots inconsistencies.", "time": 12, "differentiation": "Provide question stems on the board. Weaker students can read from the stems.", "bloom": "Create"}, {"name": "Error Correction", "interaction": "T-S", "description": "Write 4 errors heard during the alibi game on the board (anonymously): 'I was go to the cinema' / 'She was cooking when I was arriving.' Students correct them. Reinforce the rule.", "time": 4, "differentiation": "", "bloom": "Evaluate"}, {"name": "Exit: 3-2-1", "interaction": "Individual", "description": "Write: 3 example sentences using both tenses. 2 things you understand now. 1 thing still confusing. Hand in at the door.", "time": 3, "differentiation": "Sentence starter: 'I was ___ when ___ .'", "bloom": "Create"}]}, {"id": "model-writing-b2-opinion", "skill": "Writing", "name": "[MODEL] B2 Opinion Essay: Should University Be Free?", "summary": "A fully completed model writing lesson guiding upper-intermediate students through planning, drafting, and peer-reviewing an opinion essay. 60 minutes.", "isModel": true, "steps": [{"name": "Warmer: Quick Poll", "interaction": "Whole Class", "description": "Show statement: 'University education should be free for everyone.' Students stand on a spectrum line: left wall = strongly agree, right wall = strongly disagree. 3-4 students explain their position in one sentence.", "time": 5, "differentiation": "", "bloom": "Evaluate"}, {"name": "Model Essay Analysis", "interaction": "Pair", "description": "Hand out a model opinion essay (250 words) on a DIFFERENT topic ('Should voting be compulsory?'). Pairs identify: the thesis statement, topic sentences for each body paragraph, the counter-argument paragraph, and the conclusion. Label each part.", "time": 8, "differentiation": "Weaker: provide paragraph labels to match. Stronger: identify without labels.", "bloom": "Analyze"}, {"name": "Structure Mini-Lesson", "interaction": "T-S", "description": "On the board, build the essay structure: 1) Introduction with hook and thesis. 2) Body 1: strongest argument + evidence. 3) Body 2: second argument + evidence. 4) Counter-argument + rebuttal. 5) Conclusion restating position. Provide 3 thesis statement models.", "time": 7, "differentiation": "Provide a printed structure template that weaker students can fill in.", "bloom": "Understand"}, {"name": "Academic Language Bank", "interaction": "T-S", "description": "Teach/review 10 useful phrases: 'It is widely believed that...', 'One compelling argument is...', 'Critics may argue that... however...', 'On balance, I firmly believe...', 'The evidence suggests that...' Students write each in their notebooks.", "time": 5, "differentiation": "Stronger students: challenge them to come up with their own academic phrases.", "bloom": "Remember"}, {"name": "Brainstorm & Plan", "interaction": "Individual", "description": "Students choose their position on free university. Brainstorm 3 arguments FOR their side and 1 counter-argument. Organize into the 5-paragraph structure. Must include at least one piece of evidence (statistic, example, expert opinion -- can be invented for practice).", "time": 8, "differentiation": "Provide a brainstorm template with prompts: 'My first reason is... because... For example...'", "bloom": "Create"}, {"name": "Draft: Introduction + Body 1", "interaction": "Individual", "description": "Write ONLY the introduction and first body paragraph. Focus on a strong hook, clear thesis, and well-supported first argument. Must use at least 2 phrases from the language bank. Teacher circulates giving live feedback.", "time": 12, "differentiation": "Weaker: use the template. Stronger: write freely but must include a rhetorical question in the hook.", "bloom": "Create"}, {"name": "Peer Review: Focused Check", "interaction": "Pair", "description": "Swap papers. Peer reviewer answers 3 questions: 1) Can you identify the thesis statement? Underline it. 2) Is the first argument supported with evidence? Circle it. 3) Did they use academic language? Star any examples. Write one suggestion on a sticky note.", "time": 6, "differentiation": "Provide the 3 review questions printed on a checklist.", "bloom": "Evaluate"}, {"name": "Complete the Draft", "interaction": "Individual", "description": "Using peer feedback, revise the intro if needed, then continue writing: Body 2, Counter-argument with rebuttal, and Conclusion. Aim for 200-280 words total. This may be finished as homework.", "time": 10, "differentiation": "Weaker students: focus on completing Body 2 and Conclusion only (skip counter-argument). Stronger: include the counter-argument paragraph.", "bloom": "Create"}, {"name": "Exit: Self-Assessment", "interaction": "Individual", "description": "Checklist self-assessment: Does my essay have a clear thesis? (Y/N) Did I include evidence? (Y/N) Did I address a counter-argument? (Y/N) Did I use 3+ academic phrases? (Y/N) What is my biggest strength? What needs more work?", "time": 4, "differentiation": "", "bloom": "Evaluate"}]}, {"id": "model-speaking-a1-introductions", "skill": "Speaking", "name": "[MODEL] A1 Introductions & Personal Information", "summary": "A fully completed model speaking lesson for absolute beginners practicing introducing themselves, asking personal questions, and exchanging basic information. 40 minutes.", "isModel": true, "steps": [{"name": "Warmer: Name Toss", "interaction": "Whole Class", "description": "Stand in a circle. Teacher throws a soft ball to a student and says their own name: 'I'm Mr. Ault.' Student catches, says 'I'm [name]' and throws to someone else. Continue until everyone has said their name twice. Repeat faster.", "time": 5, "differentiation": "For very shy students, accept just the name without 'I'm'.", "bloom": "Remember"}, {"name": "Model Dialogue", "interaction": "T-S", "description": "Teacher plays both parts of a dialogue (using a puppet or two hats to show the switch): 'Hello, my name is Anna. What's your name?' 'My name is Carlos. Nice to meet you.' 'Nice to meet you too. Where are you from?' 'I'm from Mexico.' Students listen twice.", "time": 5, "differentiation": "Write the dialogue on the board during the second listen.", "bloom": "Understand"}, {"name": "Drill the Dialogue", "interaction": "T-S", "description": "Teacher drills each line: 'Repeat after me: What's your name?' Focus on pronunciation, especially contractions (What's, I'm). Choral drill first, then individual students. Drill question intonation (rising for yes/no, falling for wh-).", "time": 5, "differentiation": "Drill more slowly with weaker students. Use backchaining for long phrases: 'your name' -> 'What's your name?'", "bloom": "Remember"}, {"name": "Controlled Practice: Read the Dialogue", "interaction": "Pair", "description": "Pairs read the dialogue from the board. Partner A is Anna, Partner B is Carlos. Read it through, then swap roles. Teacher monitors pronunciation and intonation.", "time": 4, "differentiation": "", "bloom": "Apply"}, {"name": "Extend: Add Questions", "interaction": "T-S", "description": "Add 3 more questions to the board: 'How old are you?' 'What do you do?' / 'Are you a student?' 'What's your phone number?' Drill each. Show how to answer: 'I'm 25.' 'I'm a student.' 'It's 555-1234.'", "time": 5, "differentiation": "For absolute beginners, stick to name and country only. Add age and job for stronger students.", "bloom": "Remember"}, {"name": "Semi-Controlled: Information Exchange", "interaction": "Pair", "description": "Students put away the board text. Using their REAL information, they introduce themselves to their partner using all the questions. Partner writes down the answers. Then swap. Teacher circulates, noting errors for later.", "time": 6, "differentiation": "Provide a small card with question prompts face-down -- students can peek if stuck.", "bloom": "Apply"}, {"name": "Mingle: Find Someone Who", "interaction": "S-S", "description": "Students stand up and mingle. Task: talk to 5 different classmates. For each person, write down: name, country, and one more fact (age, job, or phone number). Use full questions, not just 'Name?' -- must ask 'What's your name?'", "time": 8, "differentiation": "Weaker: talk to 3 people. Stronger: talk to 5 and report back one interesting fact to the class.", "bloom": "Apply"}, {"name": "Report Back", "interaction": "S-T", "description": "Teacher asks: 'Tell me about someone you talked to.' Students practice third person: 'This is Maria. She's from Brazil. She's a teacher.' Gently correct: 'She's, not she are.' Celebrate successful introductions.", "time": 4, "differentiation": "Accept 'Maria -- Brazil -- teacher' from very weak students. Model the full sentence and have them repeat.", "bloom": "Create"}, {"name": "Exit: My Information Card", "interaction": "Individual", "description": "Students write a small card with: My name is ___. I'm from ___. I'm ___ years old. I'm a ___. This goes on the classroom wall as a class directory.", "time": 3, "differentiation": "Provide a template card with blanks.", "bloom": "Create"}]}, {"id": "model-listening-b1-podcast", "skill": "Listening", "name": "[MODEL] B1 Podcast Lesson: How Sleep Affects Learning", "summary": "A fully completed model listening lesson using a real-style podcast about sleep science for intermediate students. 50 minutes.", "isModel": true, "steps": [{"name": "Warmer: Sleep Survey", "interaction": "Pair", "description": "Pairs ask each other: How many hours did you sleep last night? Do you feel rested? What time did you go to bed? Quick share: who slept the most? The least? This activates the topic and personal connection.", "time": 4, "differentiation": "", "bloom": "Remember"}, {"name": "Predict from Title", "interaction": "T-S", "description": "Show the podcast title: 'Why Your Brain Needs Sleep to Learn.' Students predict in pairs: What do you think the podcast will say? Write 3 predictions on the board. We'll check these after listening.", "time": 4, "differentiation": "Provide prediction stems: 'I think the podcast will say that...'", "bloom": "Understand"}, {"name": "Pre-teach Vocabulary", "interaction": "T-S", "description": "Teach 6 words: consolidate (make stronger), REM sleep (deep sleep with dreams), memory retention (keeping information), cognitive (related to thinking), deprivation (not having enough), optimal (the best possible). Use images, definitions, and example sentences.", "time": 7, "differentiation": "Stronger students guess meaning from context sentences before definitions are given.", "bloom": "Remember"}, {"name": "First Listen: Gist", "interaction": "Individual", "description": "Play the podcast (4 minutes). ONE question: 'According to the speaker, what is the MAIN reason sleep is important for students?' Students listen without writing -- just focus on the overall message. No pausing.", "time": 5, "differentiation": "Show the gist question on the board before playing. Allow weaker students to read the transcript after listening.", "bloom": "Understand"}, {"name": "Pair Check: Gist", "interaction": "Pair", "description": "Compare answers. Main reason: sleep is when the brain consolidates memories -- without enough sleep, you forget what you learned during the day. Check predictions from earlier: which were correct?", "time": 3, "differentiation": "", "bloom": "Understand"}, {"name": "Second Listen: Detail Questions", "interaction": "Individual", "description": "Hand out 8 questions. Students read them first (2 min), then listen again: 1) How many hours should teens sleep? 2) What happens during REM sleep? 3) What did the Stanford study find? 4) What is 'sleep debt'? 5-6) True/False. 7-8) Inference questions. Pause between sections if needed.", "time": 8, "differentiation": "Weaker: answer questions 1-5 only. Stronger: all 8.", "bloom": "Analyze"}, {"name": "Pair Check: Details", "interaction": "Pair", "description": "Compare answers. For disagreements, note the question number -- teacher will replay those sections. Students should try to remember WHERE in the podcast they heard the answer.", "time": 3, "differentiation": "", "bloom": "Analyze"}, {"name": "Third Listen: Targeted Replay", "interaction": "S-T", "description": "Replay only the 2-3 sections where students disagreed. After each, confirm the correct answer and show how to identify it. For inference questions, discuss what clues the speaker gave (tone, hedging language, examples).", "time": 5, "differentiation": "", "bloom": "Analyze"}, {"name": "Vocabulary in Context", "interaction": "Pair", "description": "Students find where each pre-taught word appeared in the podcast (using the transcript if needed). Write the sentence containing the word. Discuss: does the word mean exactly what we said, or is there a slight difference in context?", "time": 4, "differentiation": "Provide line numbers for weaker students.", "bloom": "Apply"}, {"name": "Discussion: Personal Response", "interaction": "Group", "description": "Groups discuss: Do you get enough sleep? What stops you? Will you change your habits after hearing this? What advice would you give to a younger student about sleep? Each group shares their best piece of advice.", "time": 6, "differentiation": "Provide discussion cards with the questions. Assign a facilitator.", "bloom": "Evaluate"}, {"name": "Exit Ticket", "interaction": "Individual", "description": "Write 2 facts you learned about sleep and learning, using at least 2 vocabulary words from today. Example: 'Sleep deprivation reduces memory retention because the brain cannot consolidate information without REM sleep.'", "time": 3, "differentiation": "Stem: 'I learned that... This is important because...'", "bloom": "Create"}]}, {"id": "model-vocab-b1-collocations", "skill": "Vocabulary", "name": "[MODEL] B1 Vocabulary: Travel Collocations", "summary": "A fully completed model vocabulary lesson teaching travel collocations (catch a flight, book accommodation, go sightseeing) through games and authentic use. 45 minutes.", "isModel": true, "steps": [{"name": "Warmer: Travel Photo", "interaction": "T-S", "description": "Project a photo of a busy airport. Students brainstorm: What words come to mind? Write them on the board in a cluster. Expect: plane, ticket, passport, luggage. This activates the travel semantic field.", "time": 4, "differentiation": "", "bloom": "Remember"}, {"name": "Collocation Matching", "interaction": "Pair", "description": "Give pairs 12 cut-up cards: 6 verbs (catch, book, go, miss, pack, check) and 6 nouns (a flight, accommodation, sightseeing, your connection, your suitcase, into the hotel). Pairs match them. Most are intuitive but 'miss your connection' and 'check into' may need help.", "time": 6, "differentiation": "Weaker pairs: give 8 cards (4 pairs). Stronger: give all 12 plus 2 distractors.", "bloom": "Understand"}, {"name": "Check & Drill", "interaction": "T-S", "description": "Confirm matches. Drill pronunciation of each collocation as a chunk: 'CATCH a FLIGHT' (not 'catch... a... flight'). Model natural sentence stress. Students repeat chorally, then individually. Board all 6 collocations.", "time": 5, "differentiation": "", "bloom": "Remember"}, {"name": "Meaning Check: CCQs", "interaction": "T-S", "description": "'If you MISS your connection, is that good or bad? Bad. If you BOOK accommodation, do you pay now or later? Usually now. If you GO SIGHTSEEING, are you inside or outside? Outside.' Quick oral check for all 6.", "time": 3, "differentiation": "", "bloom": "Understand"}, {"name": "Controlled Practice: Gap Fill", "interaction": "Individual", "description": "6 sentences: 'We need to ___ our suitcases before we leave.' 'Don't forget to ___ into the hotel when you arrive.' Students fill gaps with the correct verb. Self-check against the board.", "time": 5, "differentiation": "Weaker: verbs given in a word bank. Stronger: no word bank.", "bloom": "Apply"}, {"name": "Game: Collocation Tennis", "interaction": "Pair", "description": "Partner A says a verb: 'Book!' Partner B must say a matching noun: 'Accommodation!' Then B says a verb, A responds. Speed up. Hesitate for more than 3 seconds and you lose the point. Play to 10.", "time": 5, "differentiation": "Allow weaker students to keep the board visible.", "bloom": "Apply"}, {"name": "Personalization: Travel Story", "interaction": "Pair", "description": "Tell your partner about a real or imaginary trip. You MUST use at least 4 of the 6 collocations naturally in your story. Partner listens and counts how many collocations were used. Then swap.", "time": 8, "differentiation": "Provide a story starter: 'Last summer, I decided to go to... First, I had to...'", "bloom": "Create"}, {"name": "Game: Flyswatter Review", "interaction": "Whole Class", "description": "Write all 12 words (verbs and nouns) scattered on the board. Two students with flyswatters. Teacher reads a definition or sentence with a gap. First to slap the correct word wins. Rotate players every 2 rounds.", "time": 6, "differentiation": "", "bloom": "Remember"}, {"name": "Exit Ticket", "interaction": "Individual", "description": "Write 3 sentences about your dream holiday using 3 different travel collocations. Example: 'First, I would book accommodation in a luxury hotel. Then I would go sightseeing in the old city. I hope I don't miss my connection!'", "time": 3, "differentiation": "Stem: 'On my dream holiday, I would...'", "bloom": "Create"}]}]}
