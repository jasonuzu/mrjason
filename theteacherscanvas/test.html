ve odd one out (teams race to explain); Semantic field odd one out (all words from one field except one).", "materials": "Word sets on board or cards.", "time": "5-10 minutes for 4-5 sets.", "research": "Develops categorization and semantic analysis skills. The requirement to EXPLAIN the reasoning is where the deep processing happens -- not just identifying the odd one out. Accept multiple valid answers to encourage flexible thinking."}, "Word Jumble Sentence": {"desc": "Give students a sentence with the words in scrambled order. They must unscramble it using their knowledge of target vocabulary and grammar.", "example": "Jumbled: 'the / resilient / was / incredibly / community / after / flood / the'. Answer: 'The community was incredibly resilient after the flood.' Students must know 'resilient' to place it correctly.", "variations": "Multiple possible correct orders (discuss which sounds most natural); Timed jumble race; Progressive difficulty (3-word jumbles up to 12-word jumbles); Student-created jumbles; Paragraph jumble (order sentences, not words).", "materials": "Jumbled sentences on board, worksheet, or cut-up word cards.", "time": "10-15 minutes for 5-6 sentences.", "research": "Combines vocabulary knowledge with syntactic awareness. Students must understand both meaning and grammatical function of target words to place them correctly. More demanding than simple matching."}, "Fill-in-the-Blank Sentences": {"desc": "Sentences with a gap where the target vocabulary word should go. Context clues in the sentence help students choose the right word.", "example": "1. 'The scientist made a groundbreaking ___ that changed medicine forever.' (discovery) 2. 'She showed great ___ by speaking up despite her fear.' (courage) Word bank provided for support.", "variations": "With word bank (easier); Without word bank (harder); Multiple gaps per sentence; First-letter hint (d_____); Student-created gap-fills (write sentences for classmates); Cloze passage (gaps in a full paragraph).", "materials": "Gap-fill worksheet or sentences on board.", "time": "10-15 minutes for 8-10 sentences.", "research": "Context-based practice strengthens the word-meaning-usage connection. Students must understand both the word's meaning AND how it fits grammatically. Research shows contextual practice produces better retention than isolated definition study."}, "Sentence Creation": {"desc": "Students write their own original sentences using target vocabulary. The most demanding productive vocabulary exercise.", "example": "Word: PERSEVERANCE. Student writes: 'Learning to ride a bike requires perseverance because you fall down many times before you succeed.' Teacher checks: Does the sentence show you understand the meaning? Is the grammar correct?", "variations": "One sentence per word; Paragraph using 5+ words; Creative sentences (make them funny or surprising); Partner sentences (write together); Sentence auction (class votes on the best sentence per word); True sentences about your life.", "materials": "Word list, paper.", "time": "15-20 minutes for 6-8 words.", "research": "Generative use (creating with the word) produces the deepest processing and strongest retention. Laufer and Hulstijn (2001) involvement load hypothesis: the more effort required, the better the learning. Sentence creation demands understanding, search, and evaluation."}, "Word Transformation": {"desc": "Students change a word's form: noun to adjective, verb to noun, adding prefixes/suffixes. Builds word family knowledge.", "example": "Base word: HAPPY. Students generate: happiness (noun), happily (adverb), unhappy (adjective), unhappiness (noun). Display in a word family tree. Discuss how meaning shifts with each form.", "variations": "Word family trees (visual display); Transformation tables (fill in noun/verb/adjective/adverb columns); Suffix sorting (group words by suffix type); Prefix focus (un-, re-, dis-, mis-); Text transformation (rewrite a paragraph changing all nouns to adjectives where possible).", "materials": "Base words, word family template or table.", "time": "15-20 minutes.", "research": "Morphological awareness is one of the strongest predictors of vocabulary size (Carlisle, 2010). Teaching word families multiplies vocabulary knowledge -- learning one base word gives access to 4-6 related forms. Essential for academic vocabulary development."}, "Synonym / Antonym Hunt": {"desc": "Students find synonyms or antonyms for target words, either from memory or by searching through a text.", "example": "Give a paragraph. Task: find a synonym for 'happy' (joyful, paragraph 2), an antonym for 'ancient' (modern, paragraph 3). Alternatively: teacher says a word, students race to write 3 synonyms on mini whiteboards.", "variations": "Text-based hunt (find synonyms/antonyms in a reading); Brainstorm hunt (generate from memory); Thesaurus hunt (use a thesaurus to find 5 synonyms ranked by intensity); Replace hunt (find overused words in your own writing and replace with better synonyms).", "materials": "Text with target words, thesaurus optional.", "time": "10-15 minutes.", "research": "Builds semantic networks -- the web of connections between related words. Students who know synonyms and antonyms have richer, more flexible vocabulary. Also develops the replacement skill essential for good writing."}, "Definition Writing": {"desc": "Students write definitions of vocabulary words in their own words -- not copying from a dictionary.", "example": "Word: PROCRASTINATE. Student definition: 'When you know you should do something but you keep putting it off and doing other things instead, even though you know it will cause problems later.' Teacher: 'Does this capture the meaning? What would you add?'", "variations": "Kid-friendly definitions (explain to a 5-year-old); One-sentence definitions; Definition + example; Definition comparison (compare student definition to dictionary -- which is clearer?); Wrong definition game (write one real and one fake definition, class guesses).", "materials": "Word list, paper. Dictionaries for checking, not copying.", "time": "15-20 minutes for 5-6 words.", "research": "Writing definitions in your own words requires the deepest level of semantic processing. If you can define it clearly, you truly understand it. Research shows that student-generated definitions produce better retention than copied dictionary definitions."}, "Example vs Non-Example": {"desc": "For each vocabulary word, students generate examples (things that ARE the word) and non-examples (things that are NOT). Clarifies meaning boundaries.", "example": "Word: COURAGEOUS. Examples: a firefighter running into a burning building, standing up to a bully, admitting you made a mistake. Non-examples: running away from a spider, staying quiet when someone is being mean, doing something dangerous for no reason (that is reckless, not courageous).", "variations": "Teacher gives examples and non-examples, students guess the word; Borderline cases (is this an example or not? Debate it); Visual examples (find images that are and aren't); Paired with Frayer Model; Class consensus (vote on borderline cases).", "materials": "Word list, two-column template (Examples / Non-Examples).", "time": "15-20 minutes for 4-5 words.", "research": "Concept attainment research (Bruner) shows that non-examples are as important as examples for defining meaning boundaries. Students who only see examples may over-generalize. Non-examples sharpen the concept: courage vs. recklessness, confidence vs. arrogance."}, "Describe and Guess": {"desc": "One student describes a vocabulary word without saying it. Others guess. Builds circumlocution and explanation skills.", "example": "Student describes 'TELESCOPE': 'It is a long tube that you look through. Scientists use it to see things that are very far away, like stars and planets. It makes things look bigger.' Class guesses: 'Telescope!'", "variations": "Timed (30 seconds per word); Team competition; One-clue-at-a-time (progressive reveal); Drawing + describing; Taboo version (forbidden clue words listed); Written descriptions (partner reads and guesses).", "materials": "Word cards.", "time": "10-15 minutes.", "research": "Develops the circumlocution skill -- the ability to explain a word you can't remember, which is essential for real-world communication. Also deepens the describer's understanding because they must analyze the word's key features."}, "Board Game (Custom Vocab)": {"desc": "A simple board game where students move spaces by answering vocabulary questions correctly. Easy to make, endlessly replayable.", "example": "Draw a path of 20 squares on A3 paper. Some squares have stars (draw a vocab card), some have arrows (move forward/back), some say 'use the word in a sentence.' Players roll a die, move, and follow the square's instruction. First to finish wins.", "variations": "Snakes and Ladders vocab edition; Monopoly-style (buy words by defining them); Trivial Pursuit categories (synonym, antonym, definition, sentence, spelling, word form); Digital board game; Student-designed boards.", "materials": "Game board (teacher-made or template), dice, counters, vocabulary question cards.", "time": "15-25 minutes.", "research": "Game-based learning research shows that the game format increases time-on-task and willingness to practice. Students will answer 30+ vocabulary questions in a board game session that they would resist in worksheet form."}, "Spin the Wheel Vocab": {"desc": "A spinning wheel determines the vocabulary challenge: define it, use it in a sentence, spell it, act it out, draw it, or give a synonym.", "example": "Teacher spins the wheel. It lands on 'ACT IT OUT.' Teacher draws a vocab card: 'EXHAUSTED.' Student must act out exhaustion for the class to guess. Next spin: 'USE IN A SENTENCE.' Next card: 'AMBITIOUS.' Student says a sentence.", "variations": "Physical wheel (DIY cardboard spinner); Digital wheel (Wheel of Names, Wheel Decide); Team competition; Progressive difficulty (harder words in later rounds); Student-chosen challenges (pick which task you want).", "materials": "Spinning wheel (physical or digital), vocabulary cards, task categories on the wheel.", "time": "10-15 minutes.", "research": "The randomness creates excitement and prevents students from preparing only for one type of task. Each spin requires a different cognitive process (recall, production, physical, visual), creating multi-modal vocabulary practice."}, "Story Writing (Vocab)": {"desc": "Students write a short story that must include a specified number of target vocabulary words used correctly in context.", "example": "Task: Write a 100-word story using at least 8 of these 12 vocabulary words. Students must weave the words naturally into a narrative -- not just list them in random sentences. Share the best stories with the class.", "variations": "Partner story (alternate paragraphs); Genre-specific story (horror, romance, sci-fi using the words); Shortest story wins (use all words in minimum words); Illustrated story; Story chain (each student adds a paragraph with 2 new words).", "materials": "Word list, paper.", "time": "20-30 minutes for writing. 10 min for sharing.", "research": "Generative use in extended context is the gold standard for vocabulary practice. Students must understand meaning, collocations, and register to use words naturally in a story. The creative element increases motivation and memorable associations."}, "Comic Strip Creation": {"desc": "Students create a short comic strip (4-6 panels) where characters use target vocabulary in dialogue and narration.", "example": "Word list includes: bewildered, investigate, peculiar. Student draws a 4-panel comic: Panel 1: A detective looks bewildered at a crime scene. Panel 2: 'I must investigate this peculiar situation,' she says. Panel 3-4: Resolution using more target words.", "variations": "Digital comics (Canva, Pixton, or Google Slides); Partner comics (one draws, one writes dialogue); Wordless comics (vocabulary words as captions only); Series comics (continue the story next lesson); Class comic book (compile all strips).", "materials": "Paper divided into panels, colored pens, word list. Or digital tools.", "time": "20-30 minutes.", "research": "Combines visual and linguistic processing. The visual context provides a memory anchor for each word. Students must understand words well enough to create appropriate visual scenes. Particularly effective for visual learners and reluctant writers."}, "Poster Creation (Vocab)": {"desc": "Students create a poster for one vocabulary word featuring the word, definition, image, example sentence, and personal connection.", "example": "Word: EMPATHY. Poster includes: the word in decorative lettering, a student-written definition, a drawn image of two people connecting, an example sentence, a synonym, and a personal story about a time they showed empathy. Display on the classroom wall.", "variations": "Digital posters (Canva); Mini-posters (half-sheet for each word); Group posters (each member contributes one element); Poster gallery walk (display and peer review); Infographic style; Word wall posters (ongoing classroom display).", "materials": "Large paper or card, markers, colored pencils, word list, display space.", "time": "20-30 minutes for creation. 10 min for gallery walk.", "research": "Multi-modal processing (visual + linguistic + personal) creates stronger memory traces than any single mode alone. The display element means students see their work and others' daily, providing ongoing passive exposure. Builds classroom vocabulary culture."}, "Vocabulary Error Correction": {"desc": "Sentences with vocabulary words used INCORRECTLY. Students identify and fix the errors.", "example": "Sentence: 'She was very preserved about the test results.' Error: 'preserved' should be 'nervous' or 'anxious.' Student explains why 'preserved' is wrong (it means kept safe, not worried) and provides the correct word.", "variations": "Wrong word errors (similar-sounding words swapped); Wrong form errors (using noun form where adjective needed); Wrong collocation errors (make a homework instead of do homework); Wrong register errors; Student-created error sentences for classmates.", "materials": "Error sentences on worksheet or board.", "time": "10-15 minutes for 8-10 sentences.", "research": "Error analysis forces students to distinguish between similar words -- a skill that prevents fossilized errors. Processing why a word is WRONG deepens understanding of when it is RIGHT. Particularly useful for commonly confused pairs."}, "5-Minute Quick Write (Vocab)": {"desc": "Write continuously for exactly 5 minutes using as many target vocabulary words as possible. No stopping, no editing.", "example": "Word list on the board: adventure, treacherous, magnificent, endure, discovery. Timer starts. Students write anything -- a story, a diary entry, a description -- as long as they keep writing and include the words. Count words and vocab hits at the end.", "variations": "3-minute sprint; Partner quick write (swap and continue); Topic + vocab quick write (topic: 'a journey' plus word list); Weekly quick write (track word count growth over time); Read-aloud quick write (volunteer reads theirs).", "materials": "Word list on display, paper, timer.", "time": "5 minutes writing + 3 minutes counting/sharing.", "research": "Freewriting (Elbow, 1998) builds fluency by bypassing the internal editor. Adding the vocabulary constraint ensures target words are practiced in context. Tracking word count over weeks shows concrete progress."}, "Speed Matching Race": {"desc": "Cards with words and definitions scattered on a table. Teams race to match all pairs correctly. Fastest accurate team wins.", "example": "20 cards on the table: 10 words and 10 definitions, all mixed up. Team of 3 races to pair them all. First team to match all 10 correctly wins. If any are wrong, they must find and fix the errors before claiming victory.", "variations": "Individual speed match; Word-to-picture speed match; Three-way match (word + definition + example sentence); Relay speed match (one pair at a time, tag teammate); Digital speed match (Quizlet Match).", "materials": "Word cards and definition cards (one set per team).", "time": "5-10 minutes for 2-3 rounds.", "research": "The speed element creates urgency and engagement. The physical manipulation of cards adds kinesthetic processing. Teams naturally discuss and negotiate meanings, creating peer teaching opportunities. Self-correcting: wrong matches are visible."}, "Mini Whiteboard Challenges": {"desc": "Teacher gives a vocabulary prompt. Students write answers on mini whiteboards and hold up simultaneously. Instant formative assessment.", "example": "Teacher: 'Write a synonym for HAPPY.' Students write on whiteboards, hold up on the count of 3. Teacher scans: joyful, glad, delighted, content, cheerful -- all correct! 'Now write an ANTONYM.' Hold up: miserable, sad, gloomy. Instant feedback.", "variations": "Spelling challenges; Definition challenges; Draw the word; Write a sentence using the word; Word form challenge (noun -> adjective); Speed rounds (5 seconds per prompt); Team whiteboards (group consensus).", "materials": "Mini whiteboards (or laminated card), dry-erase markers, erasers (socks work).", "time": "5-10 minutes.", "research": "The simultaneous reveal ensures every student responds to every prompt -- no hiding. The teacher gets instant whole-class data. The write-and-show format is more engaging than hand-raising and eliminates the problem of one student answering while others disengage."}}, "WARMERS": {"Two Truths and a Lie": {"desc": "A student shares three statements about themselves  --  two true, one false. The class guesses the lie and asks follow-up questions.", "example": "See the description above for typical classroom use of Two Truths and a Lie.", "variations": "Adapt Two Truths and -up routine improves engagement throughout the lesson."}, "Name Toss": {"desc": "Stand in a circle. Toss a ball  --  say the name of whoever you throw to. Builds names quickly on day one.", "example": "See the description above for typical classroom use of Name Toss.", "variations": "Adapt Name Toss for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Magazine Personalities": {"desc": "Bring magazines. Students pick an image of a person and invent that person's life, hobbies, and story.", "example": "See the description above for typical classroom use of Magazine Personalities.", "variations": "Adapt Magazine Personalities for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "What's in My Bag?": {"desc": "The teacher (or a student) shows 5 items from their bag. Class asks questions to learn the story behind each item.", "example": "See the description above for typical classroom use of What's in My Bag?.", "variations": "Adapt What's in My Bag? for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Continue the Story": {"desc": "Teacher starts a story with one sentence. Each student adds a sentence in turn until the story comes back around.", "example": "See the description above for typical classroom use of Continue the Story.", "variations": "Adapt Continue the Story for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Three Things in Common": {"desc": "Pairs talk for 2 minutes and find 3 unexpected things they have in common  --  share with the class.", "example": "See the description above for typical classroom use of Three Things in Common.", "variations": "Adapt Three Things in Common for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Alphabet Brainstorm": {"desc": "Pick a topic (animals, foods, jobs). Students work in pairs to find one item for each letter A-Z within a time limit.", "example": "See the description above for typical classroom use of Alphabet Brainstorm.", "variations": "Adapt Alphabet Brainstorm for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Yes/No Questions Game (Hot Seat)": {"desc": "A student sits facing away from the board with a word/character on it. They ask yes/no questions to guess.", "example": "See the description above for typical classroom use of Yes/No Questions Game (Hot Seat).", "variations": "Adapt Yes/No Questions Game (Hot Seat) for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "If You Were...": {"desc": "Project a series of 'If you were...' prompts (a season, a color, an animal). Students share and explain.", "example": "See the description above for typical classroom use of If You Were....", "variations": "Adapt If You Were... for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Picture Predictions": {"desc": "Show an intriguing image. Students predict what's happening, what happened before, what will happen next.", "example": "See the description above for typical classroom use of Picture Predictions.", "variations": "Adapt Picture Predictions for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Word Cloud Reactions": {"desc": "Project a word cloud of a topic. Students pick one word that catches their eye and explain why.", "example": "See the description above for typical classroom use of Word Cloud Reactions.", "variations": "Adapt Word Cloud Reactions for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Last Night I Dreamed...": {"desc": "Each student invents a one-sentence dream. Encourages creative language and silliness.", "example": "See the description above for typical classroom use of Last Night I Dreamed....", "variations": "Adapt Last Night I Dreamed... for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Question Roulette": {"desc": "Students write a question on a slip; collect them in a hat. Each student draws and answers one.", "example": "See the description above for typical classroom use of Question Roulette.", "variations": "Adapt Question Roulette for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Energy Stretch & Share": {"desc": "Students stand and stretch while answering a quick question (best part of yesterday, weekend plans, etc.).", "example": "See the description above for typical classroom use of Energy Stretch & Share.", "variations": "Adapt Energy Stretch & Share for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "First Letter Last Letter": {"desc": "Teacher says a word. Next student must say a word starting with the last letter of the previous word.", "example": "See the description above for typical classroom use of First Letter Last Letter.", "variations": "Adapt First Letter Last Letter for different levels, group sizes, or digital/physical formats.", "materials": "No materials needed for most warmers. Timer optional.", "time": "3-10 minutes.", "research": "Warmers activate prior knowledge, lower affective filters, and build classroom community. Research on lesson starts shows a warm-up routine improves engagement throughout the lesson."}, "Countdown Challenge": {"desc": "Students list as many items in a category as they can before the teacher counts down from 10.", "example": "Teacher says 'Name countries in Europe -- GO!' and counts slowly from 10. Students shout answers. At zero, the last person to have named one wins. Switch categories and repeat.", "variations": "Written countdown (write instead of shout); Team countdown (groups compete); Reverse countdown (start at 1, each correct answer earns a number); Speed countdown (count from 5 instead of 10).", "materials": "None required.", "time": "3-5 minutes.", "research": "Quick retrieval practice activates prior knowledge and gets voices warmed up. The time pressure creates excitement without requiring any setup."}, "Would You Rather Line-up": {"desc": "Read a Would You Rather question -- students physically move to one side of the room or the other based on their choice.", "example": "Teacher asks: 'Would you rather be able to fly or be invisible?' Students walk to the left wall (fly) or right wall (invisible). A few volunteers explain their choice.", "variations": "Spectrum version (stand anywhere on a line between the two options); Moving version (new question every 30 seconds, keep moving); Justify version (must give a reason before you can move).", "materials": "None required -- just space to move.", "time": "5-8 minutes for 3-4 questions.", "research": "Combines movement with opinion sharing. The physical commitment to a position makes students more willing to defend their choice verbally."}, "Human Bingo (Verbal)": {"desc": "No cards needed -- teacher calls out traits and students find someone who matches by talking to each other.", "example": "Teacher says: 'Find someone who has a pet.' Students mingle and ask each other. When they find someone, they stay with them. Teacher calls the next trait: 'Find someone who speaks three languages.' Students find a new partner.", "variations": "Timed rounds (30 seconds to find someone); Chain version (stay in growing groups); Interview version (ask 2 follow-up questions when you find someone).", "materials": "None required.", "time": "5-10 minutes.", "research": "Gets every student talking immediately. The no-materials version is faster to start than printed bingo cards and allows the teacher to tailor traits to the specific class."}, "Word Tennis": {"desc": "Two students volley words back and forth within a category. Hesitate or repeat and you're out.", "example": "Two students face each other. Teacher says 'Fruits!' Student A: 'Apple.' B: 'Banana.' A: 'Mango.' B: 'Kiwi.' A: '...um...' -- out! Next challenger steps in.", "variations": "Team tennis (teams alternate members); Speed tennis (must answer within 2 seconds); Chain tennis (word must start with last letter of previous word); Theme tennis (words must connect thematically).", "materials": "None required.", "time": "5-10 minutes.", "research": "Builds rapid vocabulary retrieval under pressure. The competitive format creates engagement. Good for reviewing semantic fields and expanding category knowledge."}, "20 Questions": {"desc": "One student thinks of a word. Others ask yes/no questions to guess it within 20 questions.", "example": "Student thinks of 'elephant.' Class asks: 'Is it alive? Yes. Is it a person? No. Is it bigger than a dog? Yes. Does it live in Africa? Yes.' They narrow down and guess.", "variations": "Category 20 Questions (must be from current unit vocabulary); Team 20 Questions; Reverse 20 Questions (class thinks of word, one student guesses); 10 Questions (harder, fewer guesses).", "materials": "None required.", "time": "5-10 minutes per round.", "research": "Develops question formation, logical deduction, and category thinking. Students must formulate strategic questions rather than random guesses -- a higher-order thinking skill."}, "The Minister's Cat": {"desc": "Going around the circle, each student describes the minister's cat with an adjective starting with the next letter of the alphabet.", "example": "Student 1: 'The minister's cat is an ANGRY cat.' Student 2: 'The minister's cat is a BEAUTIFUL cat.' Student 3: 'The minister's cat is a CURIOUS cat.' Continue through the alphabet.", "variations": "Speed version (5-second time limit); Theme version (only emotions, only colors); Reverse alphabet; Story version (each adjective must also advance a narrative).", "materials": "None required.", "time": "5-10 minutes.", "research": "Classic Victorian parlor game that builds adjective vocabulary systematically. The alphabetical constraint forces students to think beyond their most common words."}, "Fortunately / Unfortunately": {"desc": "Students alternate adding sentences to a story, alternating between fortunately and unfortunately.", "example": "Teacher starts: 'A man found a magic lamp.' Student 1: 'Unfortunately, a dragon was guarding it.' Student 2: 'Fortunately, the dragon was asleep.' Student 3: 'Unfortunately, it snored fire.'", "variations": "Written version (pass a paper around); Timed version (5 seconds per sentence); Theme-based (must connect to the current unit topic); Pairs version (partners alternate).", "materials": "None required.", "time": "5-10 minutes.", "research": "Develops narrative thinking, conjunctions, and creative language use. The alternating structure creates natural comedy, which lowers anxiety and increases participation."}, "One Word Story": {"desc": "Going around the room, each student adds exactly one word to build a story together.", "example": "Teacher: 'Once.' Student 1: 'upon.' Student 2: 'a.' Student 3: 'time.' Student 4: 'there.' Student 5: 'lived.' Student 6: 'a.' Student 7: 'dragon.' The story builds unpredictably.", "variations": "Two-word version (easier); Sentence story (each person adds a full sentence); Theme story (must include unit vocabulary); Recorded story (record and play back).", "materials": "None required.", "time": "5-8 minutes.", "research": "Demands intense listening -- you must hear every word to contribute meaningfully. Builds grammatical awareness because students must produce words that fit syntactically with what came before."}, "Desert Island": {"desc": "If you were stranded on a desert island, what 3 items would you bring? Students explain and defend their choices.", "example": "Students think for 1 minute, then share in pairs: 'I would bring a knife because I could build shelter, a water filter because clean water is essential, and a book because I would get bored.' Partner asks follow-up questions.", "variations": "Desert island with 1 item only (harder); Desert island people (which 3 people?); Desert island books/songs/foods; Group consensus (group of 4 must agree on 3 items); Debate version (argue against someone else's choices).", "materials": "None required.", "time": "8-12 minutes.", "research": "Combines conditional language practice (I would bring...) with justification skills. The hypothetical scenario is universally engaging and accessible at all levels."}, "Speed Dating Questions": {"desc": "Students sit in two rows facing each other. Each pair has 60 seconds to discuss a question, then one row shifts.", "example": "Question: 'What is the best age to be and why?' Pairs discuss for 60 seconds. Timer rings. One row shifts one seat to the right. New question: 'What would you do with a million dollars?' New partner, new discussion.", "variations": "Topic-based (all questions from the unit); Escalating depth (easy questions first, deep questions last); Interview style (one asks, one answers, then swap); No-repeat rule (can't give the same answer to a new partner).", "materials": "None required -- just chairs in two rows.", "time": "10-15 minutes for 6-8 rotations.", "research": "Maximum speaking time for every student. The rotation means shy students get a fresh start with each new partner. The time constraint forces concise expression."}, "Lie Detector": {"desc": "A student makes 3 statements -- the class asks questions to determine which one is false.", "example": "Student says: '1. I have been to Japan. 2. I can play the piano. 3. I once met a famous actor.' Class asks probing questions: 'Which city in Japan?' 'What songs can you play?' They vote on the lie.", "variations": "Two Truths and a Dream (the lie is something you wish were true); Expert Lie Detector (one designated questioner); Written version (write statements, swap papers); Teacher edition (teacher plays, students detect).", "materials": "None required.", "time": "5-10 minutes for 2-3 rounds.", "research": "Develops question formation and critical listening. Students must listen carefully to detect inconsistencies. The social element builds classroom community."}, "This or That": {"desc": "Quick-fire binary choices -- students point left or right (or stand/sit) to show their preference.", "example": "Teacher rapid-fires: 'Cats or dogs? Summer or winter? Pizza or sushi? Morning or night? City or countryside?' Students physically indicate their choice. No explanation needed -- pure energy.", "variations": "Justify This or That (must explain in one sentence); Moving This or That (run to one wall or the other); Controversial This or That (harder choices that spark debate); Chain This or That (winner of each pair chooses next topic).", "materials": "None required.", "time": "3-5 minutes.", "research": "The fastest possible warmer. Gets bodies moving and voices ready in under a minute. Useful data for the teacher about student preferences and personalities."}, "Rapid Fire Questions": {"desc": "One student in the hot seat answers as many quick questions as possible in 60 seconds.", "example": "Student sits at the front. Class fires questions: 'Favorite color?' 'Blue.' 'Best holiday?' 'Christmas.' 'Cats or dogs?' 'Dogs.' 'Last film you watched?' Goal: answer as many as possible in 60 seconds.", "variations": "Teacher rapid fire (teacher asks); Pair rapid fire (partners take turns); Topic rapid fire (all questions must be about one subject); Language rapid fire (answer in target language only).", "materials": "None required -- just a timer.", "time": "5-8 minutes for 3-4 students.", "research": "Builds fluency and reduces hesitation. The speed removes time for self-monitoring, which paradoxically often produces more natural language."}, "Never Have I Ever (Classroom)": {"desc": "Students hold up 5 fingers. Read statements -- put a finger down if you have done it. Last person standing wins.", "example": "Teacher: 'Never have I ever been to another country.' Students who HAVE been lower a finger. 'Never have I ever eaten sushi.' And so on. Person with fingers still up at the end wins.", "variations": "Student-led (students create the statements); Category version (only food, only travel); Written version (check boxes instead of fingers); Discussion version (explain the most interesting revelation).", "materials": "None required.", "time": "5-10 minutes.", "research": "Builds community by revealing shared and unique experiences. Naturally generates present perfect tense practice. Keep statements school-appropriate -- focus on travel, food, hobbies, and experiences."}, "Association Web": {"desc": "Teacher says a word. First student says an associated word. Continue until someone repeats or can't think of one.", "example": "Teacher: 'Ocean.' Student 1: 'Fish.' Student 2: 'Chips.' Student 3: 'British.' Student 4: 'Queen.' Student 5: 'Chess.' The chain of associations reveals fascinating thinking patterns.", "variations": "Timed version (3 seconds per word); Explain version (must briefly explain the connection); Return version (must connect back to the original word within 10 steps); Written web (draw the connections on the board).", "materials": "None required.", "time": "3-5 minutes.", "research": "Activates semantic networks and reveals how students organize vocabulary in their minds. The unexpected connections often generate humor and discussion."}, "Odd One Out": {"desc": "Give three words -- students identify which doesn't belong and explain why. Multiple answers can be correct.", "example": "Teacher says: 'Apple, banana, carrot.' Students might say 'carrot -- it is a vegetable not a fruit' OR 'apple -- it is the only one that is not yellow.' Both are valid -- the reasoning matters more than the answer.", "variations": "Four items instead of three; Student-created sets; Visual odd one out (show 3 pictures); Trick sets (all could be the odd one out depending on reasoning); Unit vocabulary sets.", "materials": "None required.", "time": "5-10 minutes for 4-5 sets.", "research": "Develops classification skills and flexible thinking. The fact that multiple answers are valid teaches students that reasoning and justification matter more than a single correct response."}, "5-4-3-2-1 Senses": {"desc": "Students name 5 things they can see, 4 they can hear, 3 they can touch, 2 they can smell, 1 they can taste.", "example": "Used as a calming mindfulness warmer: 'Look around the room. Name 5 things you can see right now.' Students share: 'The clock, my backpack, the whiteboard marker...' Move through each sense.", "variations": "Partner version (share with a partner); Written version (journal entry); Imaginary version (describe a scene from a book or topic being studied); Target language only (builds descriptive vocabulary).", "materials": "None required.", "time": "5-8 minutes.", "research": "Doubles as a mindfulness grounding exercise. Reduces anxiety at the start of class. Also builds sensory vocabulary and descriptive language. Especially useful before tests or presentations."}, "Celebrity Heads (Verbal)": {"desc": "One student has a famous person in mind (or assigned). They ask yes/no questions to figure out who they 'are.'", "example": "Teacher whispers 'Einstein' to a student. Student asks the class: 'Am I alive? No. Am I male? Yes. Am I a scientist? Yes. Am I from Germany? Yes.' They guess.", "variations": "Historical figures only; Book characters; Unit-related people; Team Celebrity Heads (teams compete); Reverse (class guesses who the student is pretending to be from clues).", "materials": "None required.", "time": "5-10 minutes per round.", "research": "Builds question formation and deductive reasoning. Can be tied to any content area -- use historical figures during a history unit, scientists during science, authors during literature."}, "The Price is Right (Guessing)": {"desc": "Teacher gives a fact with a numerical answer. Students guess closest without going over.", "example": "Teacher: 'How many countries are there in Africa?' Students write guesses on mini whiteboards or paper. Closest without going over wins. Reveals and corrects misconceptions.", "variations": "Team version; Bidding up (start low, students bid higher); Category rounds (geography, science, history); Student-submitted questions; Daily challenge (one question per day for a week).", "materials": "None required -- whiteboards optional.", "time": "5-10 minutes for 3-4 questions.", "research": "Activates estimation skills and general knowledge. The 'closest without going over' rule from the TV show creates excitement. Great for cross-curricular numerical literacy."}, "Rhyme Time": {"desc": "Teacher says a word. Students race to find as many rhymes as possible in 30 seconds.", "example": "Teacher: 'Cat!' Students call out: 'Hat, bat, sat, mat, flat, chat, rat, that, fat...' Teacher: 'Now use three of those in a sentence!' This pushes beyond simple recall into production.", "variations": "Rhyme chain (each student adds one, going around); Written rhyme race (write as many as possible); Rhyme story (build a short rhyming couplet); Near-rhyme challenge (slant rhymes count).", "materials": "None required.", "time": "3-5 minutes.", "research": "Builds phonological awareness and sound pattern recognition. Useful for pronunciation work, poetry preparation, and building awareness of English spelling patterns."}, "Mental Math Chain": {"desc": "Teacher gives a starting number. Going around the room, each student performs an operation called by the teacher.", "example": "Teacher: 'Start with 5. Add 3.' Student 1: '8.' Teacher: 'Multiply by 2.' Student 2: '16.' Teacher: 'Subtract 7.' Student 3: '9.' The chain continues around the room.", "variations": "Student-led operations; Reverse chain (start with answer, work backward); Fast chain (3 seconds per answer); Written chain (pass a paper); Cross-curricular (use measurements, money, or dates).", "materials": "None required.", "time": "3-5 minutes.", "research": "Cross-curricular numeracy warmer. Keeps every student engaged because they must track the running total. Useful in language classes for practicing numbers and mathematical vocabulary."}, "Spelling Bee": {"desc": "Classic format -- teacher says a word, student spells it aloud. Incorrect spelling and you sit down.", "example": "Teacher: 'Necessary.' Student: 'N-E-C-E-S-S-A-R-Y.' Correct! Next student. Continue until a winner remains. Use words from the current unit for relevance.", "variations": "Team spelling bee; Written spelling bee (everyone writes, reveal together); Reverse spelling bee (teacher spells incorrectly, students spot the error); Speed spelling (time limit per word).", "materials": "Word list from current unit.", "time": "5-15 minutes.", "research": "Reinforces orthography through oral production. The public performance creates healthy pressure. Most effective when using words from the current unit rather than random difficult words."}, "Category Countdown": {"desc": "Name a category. Students go around the room, each naming one item. Repeat or hesitate and you're out.", "example": "Category: 'Things in a kitchen.' Students go around: 'Fridge, spatula, oven, sink, cutting board, blender, toaster, dishwasher...' Hesitate for more than 5 seconds and you're out.", "variations": "Speed countdown (3-second limit); Alphabetical (must go in order); Themed to unit content; Elimination tournament; Written version (write lists, compare).", "materials": "None required.", "time": "5-8 minutes.", "research": "Simple but effective vocabulary activation. The elimination format creates engagement. Works as review for any content area -- name things from the unit, historical events, scientific terms, etc."}, "Telephone Pictionary": {"desc": "Alternate writing and drawing: write a phrase, pass it. Next person draws it. Next person writes what they see. Compare start and end.", "example": "Student 1 writes 'A cat sitting on a piano.' Passes to Student 2 who draws it. Student 3 sees the drawing and writes 'A cat playing music.' Student 4 draws that. Compare the original and final version -- usually hilarious.", "variations": "Speed version (15 seconds per turn); Vocabulary version (must use a specific word); Whole-class chain; Theme-based (all starting phrases from the unit); Digital version (on shared devices).", "materials": "Paper and pens.", "time": "10-15 minutes.", "research": "Combines writing, drawing, and interpretation. The inevitable distortions create humor and show how meaning shifts through communication -- a great lesson in precision of language."}, "Sound Effects Story": {"desc": "Teacher tells a short story. Students provide sound effects for key words whenever they hear them.", "example": "Assign sounds: 'rain' = tapping desks, 'wind' = whooshing, 'door' = knock knock, 'dog' = woof. Teacher reads a story containing these words. Students perform their sound effect every time they hear their word.", "variations": "Student-assigned sounds; Musical version (use instruments); Progressive story (add more sound words as story continues); Student-written stories with sound effects.", "materials": "None required.", "time": "5-10 minutes.", "research": "Develops active listening -- students must listen intently for their assigned word. The physical response (making the sound) adds kinesthetic engagement. Young learners especially love this."}, "Guess the Drawing": {"desc": "Teacher slowly draws something on the board. Students shout guesses as the drawing progresses.", "example": "Teacher starts drawing lines that will eventually become the Eiffel Tower. Students shout guesses as more lines appear. First correct guess wins. Use to introduce the day's topic.", "variations": "Student drawer (volunteer draws); Team version (teams take turns guessing); Themed drawing (always related to the lesson topic); Progressive reveal (cover drawing, reveal sections one at a time).", "materials": "Board and marker.", "time": "3-5 minutes.", "research": "Creates anticipation and activates prediction skills. Works as a lead-in to introduce a topic. The slow reveal builds suspense and gets every student watching and thinking."}, "Two Minute Debate": {"desc": "Give a provocative statement. One minute to argue FOR, one minute to argue AGAINST. No prep needed.", "example": "Statement: 'Homework should be banned.' Student A argues FOR for one minute. Student B argues AGAINST for one minute. Class votes. Then give a new statement to new students.", "variations": "Switch sides (argue the opposite of what you believe); Tag-team debate (partner can jump in); Silent debate (write arguments on board); Fishbowl debate (pair debates, class observes).", "materials": "None required.", "time": "5-8 minutes for 2-3 debates.", "research": "Develops impromptu speaking, argumentation, and the ability to see multiple perspectives. The no-prep constraint removes the anxiety of formal debate preparation."}, "Mystery Person": {"desc": "Teacher describes a person (historical, famous, or from the class) with increasingly specific clues. Students guess.", "example": "Clue 1: 'This person was born in the 1800s.' Clue 2: 'This person was American.' Clue 3: 'This person freed enslaved people.' Clue 4: 'This person was the 16th president.' Answer: Abraham Lincoln.", "variations": "Student-created mystery persons; Mystery object; Mystery place; Mystery word (from vocabulary); Team competition (first team to guess wins); Reverse (students give clues, teacher guesses).", "materials": "Prepared clues (can be improvised).", "time": "5-8 minutes.", "research": "Develops listening comprehension and inference skills. The progressive reveal format builds suspense. Can be tied to any content area for review."}, "Emoji Story": {"desc": "Teacher shows a sequence of 5-6 emojis. Students create a story that connects all of them.", "example": "Emojis shown: airplane, mountain, bear, running person, hospital, thumbs up. Student story: 'I flew to the mountains for a hike. I saw a bear and ran. I ended up in the hospital but I'm okay now!'", "variations": "Partner emoji stories; Student-chosen emojis; Emoji retelling (retell a story from class using only emojis, partner decodes); Progressive emojis (add one at a time).", "materials": "Emojis displayed on board or screen.", "time": "5-10 minutes.", "research": "Combines visual literacy with narrative construction. The constraint of connecting unrelated images builds creative thinking. Highly engaging for digital-native students."}}, "TECH_ACTIVITIES": {"Kahoot Quiz": {"desc": "Teacher creates an interactive multiple-choice quiz. Students join via code on phones/laptops and compete in real time.", "example": "See the description above for typical classroom use of Kahoot Quiz.", "variations": "Adapt Kahoot Quiz for different levels, group sizes, or digital/physical formats.", "materials": "Devices (phones, tablets, or laptops), internet connection, teacher account on the platform.", "time": "10-20 minutes for the activity itself.", "research": "EdTech research supports intentional technology integration. Tools should enhance interaction and feedback, not just digitize worksheets. SAMR model guides moving from substitution to redefinition."}, "Quizlet Live": {"desc": "Team-based vocabulary or concept-matching game. Students get re-shuffled into new teams if any one player makes a mistake.", "example": "See the description above for typical classroom use of Quizlet Live.", "variations": "Adapt Quizlet Live for different levels, group sizes, or digital/physical formats.", "materials": "Devices (phones, tablets, or laptops), internet connection, teacher account on the platform.", "time": "10-20 minutes for the activity itself.", "research": "EdTech research supports intentional technology integration. Tools should enhance interaction and feedback, not just digitize worksheets. SAMR model guides moving from substitution to redefinition."}, "Padlet Wall": {"desc": "A digital pinboard where students post text, images, links, or videos collaboratively in real time.", "example": "See the description above for typical classroom use of Padlet Wall.", "variations": "Adapt Padlet Wall for different levels, group sizes, or digital/physical formats.", "materials": "Devices (phones, tablets, or laptops), internet connection, teacher account on the platform.", "time": "10-20 minutes for the activity itself.", "research": "EdTech research supports intentional technology integration. Tools should enhanc , exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Analytic Rubric (4-Level)": {"desc": "Multiple criteria scored separately on a 4-level scale (Exceeding / Meeting / Approaching / Beginning).", "example": "See the description above for typical classroom use of Analytic Rubric (4-Level).", "variations": "Adapt Analytic Rubric (4-Level) for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Holistic Rubric": {"desc": "Single overall score based on the work as a whole  --  fast to use, less detailed feedback.", "example": "See the description above for typical classroom use of Holistic Rubric.", "variations": "Adapt Holistic Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Developmental Rubric": {"desc": "Shows progression of skill over time (Novice -> Apprentice -> Practitioner -> Expert)  --  supports growth mindset.", "example": "See the description above for typical classroom use o izes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Listening Rubric (Gist, Detail, Inference, Note-Taking)": {"desc": "Comprehensive listening assessment from main idea to higher-order thinking.", "example": "See the description above for typical classroom use of Listening Rubric (Gist, Detail, Inference, Note-Taking).", "variations": "Adapt Listening Rubric (Gist, Detail, Inference, Note-Taking) for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Project Rubric (Process, Product, Presentation, Reflection)": {"desc": "Assesses the full project lifecycle, not just the final product.", "example": "See the description above for typical classroom use of Project Rubric (Process, Product, Presentation, Reflection).", "variations": "Adapt Project Rubric (Process, Product, Presentation, Reflection) for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Group Work Rubric": {"desc": "Assesses individual contribution, collaboration, communication, and group outcome separately.", "example": "See the description above for typical classroom use of Group Work Rubric.", "variations": "Adapt Group Work Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Self-Assessment Rubric": {"desc": "Same criteria as teacher rubric, designed for student self-reflection before submission.", "example": "See the description above for typical classroom use of Self-Assessment Rubric.", "variations": "Adapt Self-Assessment Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Peer Feedback Rubric": {"desc": "Structured rubric peers use to give specific, kind, useful feedback to one another.", "example": "See the description above for typical classroom use of Peer Feedback Rubric.", "variations": "Adapt Peer Feedback Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "IELTS-Style Rubric": {"desc": "Modeled on IELTS speaking/writing bands for exam preparation classes.", "example": "See the description above for typical classroom use of IELTS-Style Rubric.", "variations": "Adapt IELTS-Style Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "CEFR Descriptors": {"desc": "A1-C2 'can do' statements used as informal rubrics aligned to international standards.", "example": "See the description above for typical classroom use of CEFR Descriptors.", "variations": "Adapt CEFR Descriptors for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Effort & Process Rubric": {"desc": "Assesses effort, persistence, and growth in addition to (or instead of) outcomes  --  for growth-mindset classrooms.", "example": "See the description above for typical classroom use of Effort & Process Rubric.", "variations": "Adapt Effort & Process Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Participation Rubric": {"desc": "Clear criteria for what 'good participation' looks like  --  not just talking frequency, but quality and listening.", "example": "See the description above for typical classroom use of Participation Rubric.", "variations": "Adapt Participation Rubric for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Presentation Rubric (Content, Delivery, Visuals, Engagement)": {"desc": "Standard rubric for student presentations across four dimensions.", "example": "See the description above for typical classroom use of Presentation Rubric (Content, Delivery, Visuals, Engagement).", "variations": "Adapt Presentation Rubric (Content, Delivery, Visuals, Engagement) for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}, "Creative Work Rubric (Originality, Craft, Risk, Refinement)": {"desc": "Assesses creative outcomes without crushing creativity  --  recognizes both skill and innovation.", "example": "See the description above for typical classroom use of Creative Work Rubric (Originality, Craft, Risk, Refinement).", "variations": "Adapt Creative Work Rubric (Originality, Craft, Risk, Refinement) for different levels, group sizes, or digital/physical formats.", "materials": "Rubric template, exemplar student work at each level, scoring guide.", "time": "Creation: 30-60 min. Usage: 2-5 min per student to score.", "research": "Brookhart (2013) rubric research. Rubrics improve both assessment consistency and student understanding of expectations. Most effective when shared with students BEFORE the task, not just used for grading after."}}, "GAMES": {"Quiz Quiz Trade": {"desc": "Students each hold a question card. They quiz a partner, swap cards, find a new partner. Everyone keeps moving and quizzing.", "example": "Each student gets a card with a question on the front and answer on the back. Student A quizzes Student B, then B quizzes A. They trade cards and find new partners. After 10 minutes, everyone has seen 8-10 different questions.", "variations": "Content-specific cards (vocab, grammar, content knowledge); Tiered cards (easy/medium/hard marked with stars); Find Your Match version (half have questions, half have answers); Silent Quiz Quiz Trade (written answers).", "materials": "One question card per student (question on front, answer on back).", "time": "10-15 minutes.", "research": "Kagan cooperative structure. Every student is actively engaged the entire time -- no waiting for turns. The card trading ensures exposure to multiple questions. Builds both recall and social interaction."}, "Scavenger Hunt": {"desc": "Questions or tasks hidden around the room or school. Students find them, answer them, and move to the next.", "example": "10 envelopes posted around the room. Each contains a question. Students work in pairs, find an envelope, answer the question on their answer sheet, then find the next one. First pair to answer all 10 correctly wins.", "variations": "QR code scavenger hunt (scan codes linking to questions); Digital scavenger hunt (tasks on a shared doc); Outdoor scavenger hunt; Photo scavenger hunt (find and photograph items); Clue chain (answer reveals location of next clue).", "materials": "Question cards posted around the room, answer sheets for students.", "time": "15-25 minutes.", "research": "Combines movement with content review. The treasure-hunt format creates excitement. Students work at their own pace. More engaging than a traditional worksheet for the same content."}, "Escape Room": {"desc": "Students solve a series of puzzles using lesson content. Each solution unlocks a clue leading to the final 'escape.'", "example": "Theme: 'Escape the haunted library.' 5 puzzles testing vocabulary, grammar, and reading comprehension. Solving each gives a digit. All 5 digits form a combination that opens a locked box containing the 'key' (candy or a certificate).", "variations": "Digital escape room (Google Forms with branching); Physical locks and boxes; Timed escape (beat the clock); Competitive escape (teams race); Mini-escape (3 puzzles, 15 minutes).", "materials": "Puzzles, answer keys, locks or envelopes, themed decorations optional.", "time": "30-45 minutes for full escape; 15-20 for mini.", "research": "Gamification at its most engaging. Develops problem-solving, collaboration, and content knowledge simultaneously. The narrative frame (escape!) creates urgency that worksheets cannot match."}, "Jeopardy Review": {"desc": "Classic Jeopardy format -- categories and point values on a grid. Teams choose a category and point value, then answer the question.", "example": "5 categories (Vocabulary, Grammar, Reading, Listening, Culture) with 5 questions each worth 100-500 points. Teams take turns choosing. 'I will take Grammar for 300.' Correct answer earns points. Most points wins.", "variations": "Double Jeopardy (harder questions, double points); Final Jeopardy (teams wager on last question); Student-created Jeopardy; Daily Double (random bonus question); Digital Jeopardy (JeopardyLabs.com).", "materials": "Jeopardy board (PowerPoint, Google Slides, or JeopardyLabs), questions prepared.", "time": "25-40 minutes.", "research": "One of the most popular review game formats. The strategic element (choosing difficulty) adds engagement beyond simple quizzing. Works for any subject and any level."}, "Around the World": {"desc": "Two students stand. Teacher asks a question. First to answer correctly moves to the next desk. Loser sits. Winner tries to go 'around the world' (the whole room).", "example": "Student A stands next to Student B's desk. Teacher holds up a flashcard: 'PAST TENSE OF GO.' First to say 'went' wins. Winner moves to Student C's desk. Loser sits down. Can you make it all the way around?", "variations": "Team Around the World; Written version (write answers, faster one wins); Subject-specific (math facts, vocab, dates); Reverse (go the other direction); Speed round (3-second limit).", "materials": "Question cards or flashcards.", "time": "10-20 minutes.", "research": "High-energy competitive review. Every student pays attention because they might be challenged next. The 'around the world' journey creates a compelling narrative arc within the game."}, "Relay Race Review": {"desc": "Teams line up. First member runs to the board, answers a question, runs back. Next member goes. First team to finish wins.", "example": "4 teams lined up. A worksheet with 10 questions is posted at the front for each team. Runner 1 runs up, answers question 1, runs back and tags Runner 2 who answers question 2. First team with all 10 correct wins.", "variations": "Board race relay (write answers on board); Puzzle relay (assemble a puzzle, each piece earned by answering); Vocabulary relay (match words to definitions); Translation relay; Spelling relay.", "materials": "Questions posted at front of room, one set per team.", "time": "10-15 minutes.", "research": "Combines physical movement with academic content. The team element creates positive pressure and peer support. High energy -- excellent after lunch or during low-energy periods."}, "Trashketball": {"desc": "Answer a question correctly and earn the right to shoot a paper ball into the trash can for bonus points.", "example": "Team answers a review question correctly -- worth 1 point. Then a team member shoots a crumpled paper ball into the trash can from a marked line -- worth 1 bonus point if they make it. 2 points possible per question.", "variations": "Distance tiers (closer shot = 1 point, farther = 2, half-court = 3); Steal round (other teams can answer if first team misses); Individual Trashketball; Progressive difficulty (harder questions, more shooting distance).", "materials": "Crumpled paper balls, trash can or bucket, tape for shooting lines, questions.", "time": "15-25 minutes.", "research": "The physical shooting element transforms a basic quiz into an exciting game. Students who struggle academically can still contribute through shooting. Inclusive and high-energy."}, "Board Race": {"desc": "Two students at the board simultaneously. Teacher reads a prompt. First to write the correct answer wins the point.", "example": "Two students stand at the board with markers. Teacher says 'Write the past tense of SWIM.' First to correctly write 'swam' wins. Rotate students so everyone gets a turn.", "variations": "Team board race (teams send one member at a time); Category board race (write as many words in a category as possible in 30 seconds); Sentence board race (write a complete sentence using a given word); Drawing board race.", "materials": "Whiteboard and markers.", "time": "10-15 minutes.", "research": "Simple, fast, and engaging. The public performance element motivates effort. Good for practicing spelling, verb forms, vocabulary, and quick-recall facts."}, "Tic-Tac-Toe Review": {"desc": "Draw a tic-tac-toe grid. Two teams. Answer a question correctly to place your X or O. First to get three in a row wins.", "example": "3x3 grid on the board. Team X answers a question. Correct? Place an X in their chosen square. Team O's turn. Strategy matters -- block the other team while building your own line.", "variations": "Super Tic-Tac-Toe (3x3 grid of 3x3 grids); Vocabulary Tic-Tac-Toe (words in squares, must define to claim); Difficulty Tic-Tac-Toe (harder questions for center square); Physical Tic-Tac-Toe (students stand in the grid).", "materials": "Board with tic-tac-toe grid, questions.", "time": "10-15 minutes.", "research": "Adds strategy to review. Students must think about both answering correctly AND choosing the optimal square. The familiar format requires no rule explanation."}, "Battleships Grammar": {"desc": "Adapt the classic Battleship game for grammar practice. Axes are subjects and verb forms. Students conjugate to 'fire.'", "example": "Grid: rows are subjects (I, you, he, she, we, they), columns are verbs (go, eat, play, write, sing). To fire at a square, student must correctly conjugate: 'He goes.' If the opponent has a ship there, it's a hit.", "variations": "Tense Battleships (rows = subjects, columns = tenses); Vocabulary Battleships (rows = words, columns = definitions); Phonics Battleships (rows = sounds, columns = letters); Digital version (Google Sheets).", "materials": "Battleship grids (printed or drawn), pencils.", "time": "15-25 minutes.", "research": "Transforms drill-based grammar practice into an engaging game. Students produce dozens of conjugations willingly because they are focused on the game strategy, not the grammar drill."}, "Connect Four Review": {"desc": "A Connect Four grid on the board. Teams answer questions to drop their color chip into a column. Four in a row wins.", "example": "7-column, 6-row grid drawn on the board. Team Red answers correctly and places a red magnet in their chosen column (drops to the lowest empty row). Team Yellow's turn. First to connect four in any direction wins.", "variations": "Digital Connect Four; Vocabulary Connect Four (words in cells, define to claim); Difficulty-graded columns (edge = easy, center = hard); Timed turns (30 seconds to answer).", "materials": "Large grid on board, colored magnets or sticky notes in two colors, questions.", "time": "15-25 minutes.", "research": "Strategic depth beyond basic quiz games. Students must balance answering questions with spatial strategy. The visual board creates excitement as patterns form."}, "Who Wants to Be a Millionaire": {"desc": "Progressively harder questions with lifelines (50/50, Ask the Audience, Phone a Friend). Students work toward the 'million.'", "example": "15 questions from easy to hard. Student in the hot seat answers one at a time. Three lifelines available: 50/50 (remove two wrong answers), Ask the Audience (class votes), Phone a Friend (ask one classmate). Get it wrong and drop to your last 'safe haven' score.", "variations": "Team Millionaire; Speed Millionaire (time limit per question); Topic Millionaire (all questions from one unit); Student-created questions; Multiple students in the hot seat simultaneously.", "materials": "Questions in order of difficulty, lifeline system, scoring board.", "time": "20-30 minutes.", "research": "The escalating tension of the TV format translates perfectly to the classroom. Lifelines create collaboration opportunities. The 'safe haven' system means students don't lose everything on one wrong answer."}, "Deal or No Deal": {"desc": "Numbered 'briefcases' with point values. Students answer questions to open briefcases and reveal scores. Teacher offers deals to trade.", "example": "20 briefcases with hidden point values (1 to 1000). Student answers a question to open a briefcase. After each round, teacher offers a deal: 'I will give you 200 points to stop now.' Student decides: deal or no deal?", "variations": "Team version; Content briefcases (each contains a bonus question); Risk/reward version (harder questions open more briefcases); Simplified version (10 briefcases, faster game).", "materials": "Numbered envelopes or cards with hidden point values, questions.", "time": "20-30 minutes.", "research": "The risk/reward psychology is compelling. Students practice decision-making alongside content review. The 'deal' offers create dramatic moments that students remember."}, "Wheel of Fortune": {"desc": "A spinning wheel determines point values. Students solve word puzzles letter by letter, earning points for correct consonant guesses.", "example": "A vocabulary word or phrase on the board with blanks. Student spins the wheel (real or digital), guesses a consonant. If it appears, they earn the wheel value times the number of occurrences. Buy vowels for a fixed cost. Solve the puzzle to win.", "variations": "Grammar Wheel (solve sentence puzzles); Definition Wheel (reveal a definition letter by letter); Team Wheel; Digital wheel (random.org or Wheel of Names); Speed Wheel (time limit per turn).", "materials": "Wheel (physical spinner or digital), puzzle board (whiteboard), point tracker.", "time": "15-25 minutes.", "research": "Excellent for spelling awareness and vocabulary review. The wheel adds randomness and excitement. Students must think strategically about which letters to guess based on English letter frequency."}, "Team Trivia": {"desc": "Teams of 3-4 answer trivia questions from the unit. Written answers submitted simultaneously. Correct teams earn points.", "example": "10 rounds of 2 questions each. Teams write answers on a mini whiteboard and hold up simultaneously. All correct teams earn the points. This prevents fast teams from dominating -- everyone answers every question.", "variations": "Progressive difficulty; Themed rounds (vocabulary round, grammar round, culture round); Wager round (teams bet points); Speed round (15 seconds per question); Picture round; Audio round.", "materials": "Questions, mini whiteboards or paper for each team, scoreboard.", "time": "20-30 minutes.", "research": "The simultaneous-reveal format ensures every team engages with every question. Unlike buzzer-based games, quiet or slower students are not disadvantaged. The team element creates discussion and peer teaching."}, "Lightning Round": {"desc": "Rapid-fire questions -- teams buzz in (or raise hands). 10 seconds per question. Most correct answers wins.", "example": "Teacher fires questions as fast as students can answer: 'Past tense of buy? Capital of France? Synonym for happy? Opposite of tall?' First hand up gets to answer. Wrong answer gives the point to the other team.", "variations": "Individual lightning round; Written lightning (write answers, 5 seconds each); Elimination lightning (wrong answer and you sit down); Team relay lightning (team members take turns).", "materials": "Questions prepared, timer, scoreboard.", "time": "5-10 minutes.", "research": "The fastest review format. Creates high energy and tests automatic recall. Best used for material students should know fluently -- not for introducing new content."}, "Elimination Quiz": {"desc": "Everyone stands. Teacher asks questions. Get it wrong and sit down. Last person standing wins.", "example": "All students stand. Teacher asks: 'Spell NECESSARY.' Students who spell it wrong sit down. 'What is the past participle of SWIM?' Wrong answers sit. Continue until one champion remains.", "variations": "Team elimination (teams vote on answers, wrong team sits); Lifeline elimination (one chance to stay standing); Category elimination (all questions from one topic); Speed elimination (3-second answer limit).", "materials": "Questions prepared.", "time": "10-15 minutes.", "research": "Simple and thrilling. The public elimination creates drama. Include some easy questions early so weaker students stay standing longer. The last few students get a genuine sense of achievement."}, "Survivor Challenge": {"desc": "Teams compete in a series of academic challenges. After each round, the losing team votes off one member. Last team standing wins.", "example": "Round 1: Vocabulary relay. Losing team votes off one member. Round 2: Grammar quiz. Losing team votes again. Round 3: Speaking challenge. Continue until one team remains. Voted-off students become judges.", "variations": "Individual Survivor; Immunity challenges (win an advantage for next round); Tribal Council discussion; Alliance formation; Merge (combine remaining teams halfway through).", "materials": "Multiple challenge types prepared, voting system, scoreboard.", "time": "30-45 minutes (full class period).", "research": "The social dynamics of voting add a layer beyond academic content. Students strategize about who to keep on their team. Voted-off students remain engaged as judges. Best as an end-of-unit celebration."}, "Musical Chairs Review": {"desc": "Music plays, students walk around chairs. Music stops, grab a seat. The standing student answers a question to stay in the game.", "example": "Chairs in a circle, one fewer than students. Music plays. Students walk around. Music stops -- grab a seat! Standing student must answer a question correctly to stay in the game (but still removes a chair). Wrong answer and they are out.", "variations": "No elimination version (standing student answers, everyone continues); Team Musical Chairs; Musical Statues variant (freeze when music stops, teacher quizzes unfrozen students); Topic-based music (play songs related to the unit).", "materials": "Chairs, music source, questions.", "time": "10-15 minutes.", "research": "Combines physical activity with academic content. The music creates excitement. Best for end-of-week review or as a reward activity. Ensure questions are accessible so elimination feels fair."}, "Auction Game": {"desc": "Items (bonus points, homework passes, etc.) are auctioned. Students earn auction money by answering questions correctly.", "example": "Students answer 20 review questions. Each correct answer earns $10 in play money. Then the auction begins: 'A homework pass -- bidding starts at
