/* ══════════════════════════════════════════════════════════════
   AI ANALYSIS EXPORT — generates a prompt-ready markdown document
   containing everything an AI needs to give specific teaching advice
   ══════════════════════════════════════════════════════════════ */

function buildAIAnalysisDoc(rec){
  const secs = SECTIONS[rec.level];
  const scaleMax = scaleMaxFor(rec.level);
  const scale = LEVEL_META[rec.level].scale;
  const date = new Date(rec.updatedAt||rec.createdAt).toLocaleDateString(undefined,{day:'numeric',month:'long',year:'numeric'});
  const ageDisplay = computeAge(rec.birthdate) !== null ? computeAge(rec.birthdate) : (rec.age || '?');
  const lines = [];

  lines.push('# Student Learner Profile — AI Analysis Document');
  lines.push('');
  lines.push('> **This document is generated by the Learner Profile System for the purpose of AI-assisted teaching analysis. Paste the entire document into ChatGPT, Claude, or any AI assistant to get specific, research-grounded advice about how to teach this student.**');
  lines.push('');

  // ── Identity & Context ──
  lines.push('## 1. Student Identity & Context');
  lines.push('');
  lines.push(`- **Name:** ${rec.name||'(unnamed)'}`);
  lines.push(`- **Age:** ${ageDisplay}`);
  if(rec.birthdate) lines.push(`- **Date of birth:** ${rec.birthdate}`);
  lines.push(`- **Class:** ${rec.className||'(unassigned)'}`);
  lines.push(`- **Assessment level:** ${LEVEL_META[rec.level].label} (${LEVEL_META[rec.level].grades})`);
  lines.push(`- **Assessment date:** ${date}`);
  if(rec.history && rec.history.length) lines.push(`- **Assessment count:** ${rec.history.length + 1} (this is a reassessment; previous dates: ${rec.history.map(h=>new Date(h.date).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})).join(', ')})`);
  lines.push(`- **Response scale:** ${scale.join(' / ')} (values 0–${scaleMax})`);
  lines.push('');

  // ── Goal ──
  if(rec.goal){
    lines.push('## 2. Student Goal');
    lines.push('');
    lines.push(rec.goal);
    lines.push('');
  }

  // ── Scored Assessment Sections with item-level detail ──
  lines.push('## 3. Assessment Results (Scored Sections)');
  lines.push('');
  lines.push('Zone thresholds are proportional heuristics (not normed clinical cutoffs):');
  lines.push('- **Strength (green):** student is functioning well in this area');
  lines.push('- **Monitor (yellow):** some concerns; watch and adjust');
  lines.push('- **Support Needed (red):** significant difficulty; active intervention recommended');
  lines.push('');

  const scoredIds = ['A','C','D','E'];
  scoredIds.forEach(id => {
    const sec = secs.find(s=>s.id===id);
    if(!sec) return;
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
    const zm = ZONE_META[zone];
    const matrix = ACTION_MATRIX[sec.id] && ACTION_MATRIX[sec.id][zone];

    lines.push(`### Section ${sec.id}: ${sec.title} — **${zm.label.toUpperCase()}** (${res.compositeScore}/${res.compositeMax})`);
    lines.push('');
    if(matrix){
      lines.push(`**Interpretation:** ${matrix.meaning}`);
      lines.push('');
      lines.push('**Recommended strategies:**');
      matrix.actions.forEach(a => lines.push(`- ${a}`));
      lines.push('');
    }

    // Item-level detail — always include for red/yellow, include for green too for completeness
    lines.push('**Item-level responses:**');
    lines.push('');
    lines.push('| # | Item | Response | Direction |');
    lines.push('|---|------|----------|-----------|');
    sec.items.forEach((it, i) => {
      const val = rec.answers[it.id];
      const label = val !== undefined ? scale[val] : '(unanswered)';
      const dirLabel = it.direction === 'difficulty' ? 'Difficulty ↑' : it.direction === 'strength' ? 'Strength ↑' : 'Preference';
      const flag = (it.direction === 'difficulty' && val >= scaleMax * 0.66) ? ' ⚠️' :
                   (it.direction === 'strength' && val <= scaleMax * 0.33) ? ' ⚠️' : '';
      lines.push(`| ${i+1} | ${it.text} | **${label}** (${val !== undefined ? val : '?'}/${scaleMax})${flag} | ${dirLabel} |`);
    });
    lines.push('');

    // Trend from previous assessment
    if(rec.history && rec.history.length){
      const prev = rec.history[rec.history.length-1];
      const prevRes = computeSectionResult(sec, prev.answers || {}, scaleMax);
      const prevZone = getZone(prevRes.compositeScore, prevRes.compositeMax, prevRes.isPositive);
      if(prevZone !== zone){
        const zoneOrder = { green:0, yellow:1, red:2 };
        const direction = zoneOrder[zone] < zoneOrder[prevZone] ? 'IMPROVED' : 'DECLINED';
        lines.push(`**Trend:** ${direction} — was ${ZONE_META[prevZone].label} (${prevRes.compositeScore}/${prevRes.compositeMax}), now ${zm.label} (${res.compositeScore}/${res.compositeMax})`);
      } else {
        lines.push(`**Trend:** Unchanged from previous assessment (${zm.label})`);
      }
      lines.push('');
    }
  });

  // ── Learning Preferences ──
  lines.push('## 4. Learning Preferences (Descriptive — NOT Predictive)');
  lines.push('');
  lines.push('> **CRITICAL RESEARCH CAVEAT:** Strong evidence (Pashler et al. 2008; Rogowsky et al. 2015, 2020) shows that matching instruction FORMAT to a student\'s preferred "learning style" does NOT improve learning outcomes. Do NOT recommend teaching this student "visually because they\'re a visual learner." Instead, use these preferences to add variety and engagement — the research supports connecting content to INTERESTS (Section 6 below), not to modality preferences.');
  lines.push('');

  const secB = secs.find(s=>s.id==='B');
  if(secB){
    const bScores = {};
    secB.items.forEach(it => { bScores[it.domain] = (bScores[it.domain]||0) + (rec.answers[it.id]||0); });
    const sorted = Object.entries(bScores).sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([domain, score]) => {
      lines.push(`- **${DOMAIN_LABELS[domain]||domain}:** ${score} — ${DOMAIN_STRATEGIES[domain]||''}`);
    });
    lines.push('');
  }

  // ── Achievement Goal Orientation ──
  lines.push('## 5. Achievement Goal Orientation');
  lines.push('');
  lines.push('> Based on achievement goal theory (Ames 1992; Dweck & Elliot 2005; Elliot 2005). This IS genuinely predictive of engagement and persistence, unlike learning styles.');
  lines.push('');

  const secG = secs.find(s=>s.id==='G');
  if(secG){
    const gScores = {};
    secG.items.forEach(it => { gScores[it.domain] = (gScores[it.domain]||0) + (rec.answers[it.id]||0); });
    const sorted = Object.entries(gScores).sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([domain, score]) => {
      const guide = GOAL_GUIDE[domain];
      lines.push(`- **${guide ? guide.label : domain}:** ${score}`);
      if(guide) lines.push(`  - ${guide.text}`);
    });
    const top = sorted[0];
    if(top) lines.push(`\n**Dominant orientation:** ${GOAL_GUIDE[top[0]]?.label || top[0]}`);
    lines.push('');

    // Item-level for goal orientation
    lines.push('**Item-level responses:**');
    secG.items.forEach((it, i) => {
      const val = rec.answers[it.id];
      const label = val !== undefined ? scale[val] : '(unanswered)';
      lines.push(`- G${i+1}: "${it.text}" → **${label}** (${val !== undefined ? val : '?'}/${scaleMax}) [${GOAL_LABELS[it.domain]||it.domain}]`);
    });
    lines.push('');
  }

  // ── Interests ──
  lines.push('## 6. Interests (Evidence-Based Engagement Lever)');
  lines.push('');
  lines.push('> Based on Hidi & Renninger (2006) four-phase model. Unlike learning styles, connecting content to a student\'s interests IS supported by evidence as improving engagement and depth of processing. Use these to choose examples, contexts, and project themes.');
  lines.push('');
  if((rec.interestsChecked||[]).length){
    lines.push('**Checked interests:** ' + rec.interestsChecked.join(', '));
  } else {
    lines.push('No interests recorded.');
  }
  if(rec.interestsFree) lines.push(`\n**Free response:** "${rec.interestsFree}"`);
  lines.push('');

  // ── Personal Profile ──
  lines.push('## 7. Personal Profile');
  lines.push('');
  if((rec.subjectStrengths||[]).length) lines.push(`- **Subject strengths:** ${rec.subjectStrengths.join(', ')}`);
  if(rec.likes) lines.push(`- **Likes:** ${rec.likes}`);
  if(rec.dislikes) lines.push(`- **Dislikes:** ${rec.dislikes}`);
  lines.push('');

  // ── Learning Access & Accommodations ──
  lines.push('## 8. Learning Access & Accommodations');
  lines.push('');
  if((rec.accommodations||[]).length) lines.push(`- **Accommodations:** ${rec.accommodations.join(', ')}`);
  if(rec.accommodationNotes) lines.push(`- **Accommodation notes:** ${rec.accommodationNotes}`);
  if(rec.attendancePattern){
    const attLabel = ATTENDANCE_OPTIONS.find(o=>o.value===rec.attendancePattern)?.label || rec.attendancePattern;
    lines.push(`- **Attendance:** ${attLabel}${rec.attendanceNote ? ' — ' + rec.attendanceNote : ''}`);
  }
  if(rec.firstLanguage) lines.push(`- **First language:** ${rec.firstLanguage}`);
  if(rec.otherLanguages) lines.push(`- **Other languages:** ${rec.otherLanguages}`);
  if(rec.englishProficiency){
    const engLabel = PROFICIENCY_LEVELS.find(o=>o.value===rec.englishProficiency)?.label || rec.englishProficiency;
    lines.push(`- **English proficiency:** ${engLabel}${rec.cefrLevel ? ' (CEFR: ' + rec.cefrLevel + ')' : ''}`);
  } else if(rec.cefrLevel){
    lines.push(`- **CEFR level:** ${rec.cefrLevel}`);
  }
  if(rec.chineseProficiency){
    const chiLabel = PROFICIENCY_LEVELS.find(o=>o.value===rec.chineseProficiency)?.label || rec.chineseProficiency;
    lines.push(`- **Chinese proficiency:** ${chiLabel}`);
  }
  // Cambridge exams
  if((rec.cambridgeExams||[]).length){
    lines.push('- **Cambridge exam results:**');
    rec.cambridgeExams.forEach(e => {
      const type = CAMBRIDGE_EXAM_TYPES.find(t=>t.value===e.testType);
      const label = type ? type.label : (e.testType||'Unknown');
      const parts = [];
      if(e.reading) parts.push(`Reading: ${e.reading}`);
      if(e.writing) parts.push(`Writing: ${e.writing}`);
      if(e.listening) parts.push(`Listening: ${e.listening}`);
      if(e.speaking) parts.push(`Speaking: ${e.speaking}`);
      if(e.total) parts.push(`Total: ${e.total}`);
      lines.push(`  - ${label}${e.date ? ' (' + e.date + ')' : ''}: ${parts.join(', ') || '(no scores entered)'}`);
    });
  }
  if((rec.otherEnglishTests||[]).length){
    lines.push('- **Other English test results:**');
    rec.otherEnglishTests.forEach(t => {
      lines.push(`  - ${t.testName||'Test'}${t.date ? ' (' + t.date + ')' : ''}: ${t.score||'—'}${t.notes ? ' — ' + t.notes : ''}`);
    });
  }
  if(rec.physicalMedicalNotes) lines.push(`- **Physical/medical:** ${rec.physicalMedicalNotes}`);
  lines.push('');

  // ── Communication & Context ──
  if(rec.bestTimeOfDay || (rec.communicationPreferences||[]).length || rec.groupRoleTendency || rec.familyContext || rec.supportNetwork){
    lines.push('## 9. Communication & Personal Context');
    lines.push('');
    if(rec.bestTimeOfDay) lines.push(`- **Best time of day:** ${TIME_OF_DAY_OPTIONS.find(o=>o.value===rec.bestTimeOfDay)?.label || rec.bestTimeOfDay}`);
    if((rec.communicationPreferences||[]).length) lines.push(`- **Communication preferences:** ${rec.communicationPreferences.join(', ')}`);
    if(rec.groupRoleTendency) lines.push(`- **Group role tendency:** ${GROUP_ROLE_OPTIONS.find(o=>o.value===rec.groupRoleTendency)?.label || rec.groupRoleTendency}`);
    if(rec.familyContext) lines.push(`- **Family context:** ${rec.familyContext}`);
    if(rec.supportNetwork) lines.push(`- **Support network:** ${rec.supportNetwork}`);
    lines.push('');
  }

  // ── Teacher Observations ──
  const obs = rec.teacherObs || {};
  if(Object.values(obs).some(v=>v)){
    lines.push('## 10. Teacher Observations (First-Hand)');
    lines.push('');
    lines.push('> These are the teacher\'s direct observations, which may differ from the student\'s self-report. Discrepancies are informative — they may indicate limited self-awareness or context-dependent behaviour.');
    lines.push('');
    if(obs.attention) lines.push(`- **Attention / Focus:** ${obs.attention}`);
    if(obs.social) lines.push(`- **Social Interaction:** ${obs.social}`);
    if(obs.emotional) lines.push(`- **Emotional Regulation:** ${obs.emotional}`);
    if(obs.workHabits) lines.push(`- **Work Habits:** ${obs.workHabits}`);
    lines.push('');
  }

  // ── Cross-Section Pattern Analysis ──
  lines.push('## 11. Cross-Section Pattern Analysis');
  lines.push('');
  lines.push('The following patterns are automatically detected from the combination of scores across sections. These compound patterns often matter more than any single domain:');
  lines.push('');

  const patterns = detectCrossSectionPatterns(rec, secs, scaleMax);
  if(patterns.length){
    patterns.forEach(p => {
      lines.push(`### ${p.name}`);
      lines.push(p.description);
      lines.push('');
    });
  } else {
    lines.push('No notable cross-section patterns detected. Individual section interpretations above are sufficient.');
    lines.push('');
  }

  // ── Additional Notes ──
  if(rec.notes){
    lines.push('## 12. Additional Teacher Notes');
    lines.push('');
    lines.push(rec.notes);
    lines.push('');
  }

  // ── Posts & Timeline ──
  const posts = (rec.posts||[]).slice().sort((a,b)=>b.timestamp-a.timestamp);
  if(posts.length){
    lines.push('## 13. Posts & Updates Timeline');
    lines.push('');
    lines.push('Timestamped observations recorded by the teacher over time (newest first):');
    lines.push('');
    posts.forEach(p => {
      const dateStr = formatPostTimestamp(p.timestamp);
      const src = p.source && p.source !== 'Learner Profile' ? ' — ' + p.source : '';
      lines.push(`**${dateStr}${p.editedAt ? ' (edited)' : ''}${src}**`);
      lines.push(p.content);
      lines.push('');
    });
  }

  // ── Research Limitations ──
  lines.push('---');
  lines.push('');
  lines.push('## Important Notes for AI Analysis');
  lines.push('');
  lines.push('When analysing this profile and generating teaching advice, please observe these constraints:');
  lines.push('');
  lines.push('1. **This is NOT a validated clinical instrument.** Items are adapted from the SDQ (Goodman, 1997) and BASC-3 BESS concepts, but reworded and shortened. The original reliability statistics (α ≈ 0.77–0.81) apply to the original instruments, not this adapted version. Treat scores as directional screening data, not diagnoses.');
  lines.push('2. **Score zones are proportional heuristics** (roughly top/bottom third of possible range), NOT normed clinical cutoffs. Use them to prioritise attention, not to make high-stakes decisions.');
  lines.push('3. **Do NOT recommend matching instruction format to learning preferences.** This is a debunked claim (Pashler et al. 2008; Rogowsky et al. 2015, 2020). Connecting content to the student\'s INTERESTS (Section 6) IS supported by evidence.');
  lines.push('4. **Achievement goal orientation IS genuinely predictive** — especially performance-avoidance, which is consistently linked to disengagement. Advice based on this section is well-grounded.');
  lines.push('5. **The teacher\'s own observations and posts (Sections 10, 12, 13) are often the most valuable signal** — they contain first-hand context that the questionnaire cannot capture.');
  lines.push('6. **This student is in a bilingual English/Chinese international school.** Language proficiency affects every aspect of classroom participation. Factor the language background into your advice.');
  lines.push('7. **Process praise vs. person praise** (Dweck) is well-replicated in Western samples but at least one Chinese-sample study did not replicate. Treat as a reasonable default rather than a guaranteed effect in this bilingual context.');
  lines.push('');

  // ── AI Instructions ──
  lines.push('---');
  lines.push('');
  lines.push('## Instructions for AI');
  lines.push('');
  lines.push('You are a professional teaching assistant helping a teacher understand and support a student. You have been given a detailed learner profile above. Your tone should be conversational but professional — like a trusted colleague, not a textbook. Be direct, be truthful, and keep responses concise (a few sentences to a short paragraph at most). Do not overwhelm the teacher with information.');
  lines.push('');
  lines.push('When the teacher first pastes this document, respond with exactly this:');
  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('**⚠️ Important: This conversation is AI-generated and is for reference only.** All advice provided here is based on assessment data and general educational research — it is not a substitute for professional judgement. Any recommendations should be discussed with colleagues and checked against your own knowledge of this student before being implemented.');
  lines.push('');
  lines.push('Have you read and understood this, and are you ready to proceed?');
  lines.push('');
  lines.push('**→ Yes** &nbsp;&nbsp; **→ No**');
  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('**If the teacher says No:** Respond with "No problem. When you\'re ready, feel free to come back to this conversation." Then stop. Do not continue.');
  lines.push('');
  lines.push('**If the teacher says Yes:** Respond with:');
  lines.push('');
  lines.push(`> "Great. I've processed the learner profile for **${rec.name||'this student'}**. Let me ask you a couple of quick questions so I can give you the most relevant advice."`);
  lines.push('');
  lines.push('Then ask:');
  lines.push('> "What subject are you teaching?"');
  lines.push('');
  lines.push('Wait for their response. Then ask:');
  lines.push('> "What is the topic of the lesson?"');
  lines.push('');
  lines.push('Wait for their response. Then ask:');
  lines.push('> "How can I help you with this student?"');
  lines.push('');
  lines.push('Wait for their response, then answer their question.');
  lines.push('');
  lines.push('### How to respond');
  lines.push('');
  lines.push('- **Keep it short.** A few sentences to one paragraph per response. If there\'s more to say, give the key point first and offer to go deeper: "Would you like me to explain more about that?"');
  lines.push('- **Be natural.** Write like a knowledgeable colleague having a conversation, not like a report. No bullet-point dumps unless the teacher specifically asks for a list.');
  lines.push('- **Ground your advice in the data.** When you make a recommendation, briefly say why — e.g. "Because their profile shows high performance-avoidance, I\'d avoid cold-calling them. A write-first-then-share approach would work better." Don\'t cite section numbers or quote the raw data table — just reference the insight naturally.');
  lines.push('- **Be honest about what you don\'t know.** If the teacher asks something the profile doesn\'t cover, say so. If a concern seems beyond classroom adjustment, suggest they talk to the school counsellor.');
  lines.push('- **Occasionally remind the teacher this is AI advice.** Every few responses, naturally drop in a reminder like "Of course, you know this student better than any profile can capture — trust your instincts too" or "This is just based on the data — worth checking with your colleagues who also work with them."');
  lines.push('- **Don\'t overwhelm.** If the teacher asks a broad question like "tell me about this student," give the 2-3 most important takeaways, not a full data review. They can always ask for more.');
  lines.push('');
  lines.push('### What you know about good advice');
  lines.push('');
  lines.push('When giving teaching advice, keep these research-informed principles in mind — but weave them into your answers naturally, don\'t lecture about them:');
  lines.push('');
  lines.push('- **Do NOT recommend matching instruction format to learning preferences.** This is debunked (Pashler et al. 2008). DO recommend connecting lesson content to the student\'s stated interests — that IS evidence-based.');
  lines.push('- **Achievement goal orientation matters.** Mastery orientation is good — protect it. Performance-avoidance is the most harmful — actively reduce public failure risk for these students.');
  lines.push('- **Accommodations are non-negotiable.** If the profile lists accommodations, every recommendation must work within them.');
  lines.push('- **Language background affects everything.** If the student is developing in English, factor that into participation expectations and feedback approach.');
  lines.push('- **The teacher\'s own posts and observations are gold.** If the timeline mentions a recent breakthrough or setback, reference it — it\'s more current than the assessment scores.');
  lines.push('- **Process praise works better than person praise** — but note this may be less effective in Chinese educational contexts, so treat as a default rather than a guarantee.');
  lines.push('- **Score zones are heuristics, not diagnoses.** Don\'t overstate what the data shows. "The data suggests..." is better than "This student definitely..."');
  lines.push('');

  return lines.join('\n');
}

// Detect compound patterns across multiple assessment sections
function detectCrossSectionPatterns(rec, secs, scaleMax){
  const patterns = [];
  const zones = {};
  ['A','C','D','E'].forEach(id => {
    const sec = secs.find(s=>s.id===id);
    if(!sec) return;
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    zones[id] = getZone(res.compositeScore, res.compositeMax, res.isPositive);
  });

  // Goal orientation
  const secG = secs.find(s=>s.id==='G');
  let topGoal = null;
  if(secG){
    const gScores = {};
    secG.items.forEach(it => gScores[it.domain] = (gScores[it.domain]||0)+(rec.answers[it.id]||0));
    const sorted = Object.entries(gScores).sort((a,b)=>b[1]-a[1]);
    if(sorted.length) topGoal = sorted[0][0];
  }

  // Pattern: Low motivation + Performance avoidance = Disengagement risk
  if(zones.D === 'red' && topGoal === 'performance_avoidance'){
    patterns.push({
      name: '⚠️ Disengagement Risk: Low Motivation + Performance-Avoidance',
      description: 'This student has low academic self-efficacy AND their dominant goal orientation is performance-avoidance (fear of looking incompetent). This combination is the strongest predictor of disengagement in the research literature. They are likely to avoid challenge, refuse help, and withdraw from visible participation. **Priority actions:** Start every task at guaranteed success level, eliminate public failure risk entirely (no cold-calling, no public grading, no competitive framing), use private check-ins, connect tasks to their stated interests, and set micro-goals they can achieve within a single lesson.',
    });
  }

  // Pattern: Low motivation + Low attention = Struggling learner
  if(zones.D === 'red' && zones.C === 'red'){
    patterns.push({
      name: '⚠️ Struggling Learner: Low Motivation + Low Self-Regulation',
      description: 'Low confidence and poor self-regulation co-occurring typically means the student has been struggling for a while and has developed avoidance strategies. They may appear "lazy" or "unmotivated" but the underlying pattern is usually repeated failure → learned helplessness → disengagement. **Priority actions:** Break work into very small, visible steps. Provide immediate, specific feedback on each step. Avoid lengthy instructions. Use a timer to create short focused bursts (8–10 minutes). Celebrate task completion, not quality, until confidence rebuilds.',
    });
  }

  // Pattern: Low social-emotional + Low attention = Behaviour concern
  if(zones.E === 'red' && zones.A === 'red'){
    patterns.push({
      name: '⚠️ Wellbeing Concern: Emotional Distress + Social Difficulty',
      description: 'Elevated emotional/behavioural difficulties combined with poor social-emotional functioning may indicate a student who is struggling both internally and in relationships. This warrants a counsellor referral if not already in place. **Classroom adjustments:** Predictable routine, consistent seat near a calm peer, private check-in at start of each lesson (30 seconds: "How are you doing?"), avoid confrontation or public correction, create one safe role in the classroom (material manager, tech helper) that gives purpose without exposure.',
    });
  }

  // Pattern: High motivation + Performance avoidance = Anxious achiever
  if(zones.D === 'green' && topGoal === 'performance_avoidance'){
    patterns.push({
      name: '📋 Anxious Achiever: Strong Motivation but Fear of Failure',
      description: 'This student is motivated and capable but driven by fear of looking bad rather than love of learning. They may achieve well but at a cost to wellbeing — perfectionism, anxiety about grades, reluctance to take intellectual risks. **Priority actions:** Frame assessments as learning opportunities rather than judgements, give explicit permission to make mistakes, use mastery-oriented language ("what did you learn from this?" not "what did you score?"), offer revision/resubmission opportunities, avoid ranking or comparative feedback.',
    });
  }

  // Pattern: Good social + Low confidence = Social scaffolding opportunity
  if(zones.E === 'green' && zones.D === 'red'){
    patterns.push({
      name: '💡 Social Scaffolding Opportunity: Strong Peer Skills + Low Confidence',
      description: 'This student is socially adept but academically underconfident. Their social skills are an asset you can leverage: pair them with a supportive, slightly-above-level peer for academic tasks. Use collaborative work where the social dimension carries the engagement while the academic content builds. Think-pair-share formats let them rehearse answers socially before public exposure. Their strong social presence means public praise (if they\'re comfortable with it) can be especially motivating.',
    });
  }

  // Pattern: Low attention + Good social = Potential distraction pattern
  if(zones.C === 'red' && zones.E === 'green'){
    patterns.push({
      name: '📋 Social Distraction Risk: Low Focus + Strong Social Drive',
      description: 'A student who struggles with attention but has strong social skills may use social interaction as an escape from difficult cognitive tasks. They\'re likely the student who "chats instead of working." **Nuance:** Don\'t seat them with their friends during focused work. Instead, pair them with a focused, task-oriented peer — their social skills mean they\'ll adapt to the partner\'s work style. Use their social drive constructively: assign them a collaborative leadership role (discussion facilitator, group reporter) so the social behaviour IS the task.',
    });
  }

  // Pattern: Mastery orientation across the board = low-maintenance, challenge-ready
  if(topGoal === 'mastery' && zones.D === 'green' && zones.E === 'green'){
    patterns.push({
      name: '✅ Challenge-Ready: Mastery-Oriented, Confident, Socially Strong',
      description: 'This student has the ideal motivational profile for deep learning. They value understanding, persist through difficulty, and function well socially. **Don\'t waste this:** Give them genuinely challenging, open-ended tasks. Let them lead inquiry-based work. Offer extension rather than repetition. They can handle honest, critical feedback — in fact, they prefer it to empty praise. Consider them as peer mentors for struggling students, but protect their own learning time too.',
    });
  }

  return patterns;
}

function csvEscape(val){
  val = String(val == null ? '' : val);
  if(val.indexOf(',') >= 0 || val.indexOf('"') >= 0 || val.indexOf('\n') >= 0)
    return '"' + val.replace(/"/g, '""') + '"';
  return val;
}

function downloadCSV(csv, filename){
  const bom = '\uFEFF'; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildStudentCSV(students){
  const headers = [
    'Name','Age','Birthdate','Class','Level','Goal',
    'Subject Strengths','Likes','Dislikes',
    'Accommodations','Accommodation Notes','Attendance Pattern','Attendance Note',
    'First Language','Other Languages','English Proficiency','CEFR Level','Chinese Proficiency',
    'Cambridge Exams','Other English Tests',
    'Physical/Medical Notes',
    'Best Time of Day','Communication Preferences','Group Role','Family Context','Support Network',
    'Section A Score','Section A Max','Section A Zone',
    'Section C Score','Section C Max','Section C Zone',
    'Section D Score','Section D Max','Section D Zone',
    'Section E Score','Section E Max','Section E Zone',
    'Top Learning Preference','Dominant Goal Orientation',
    'Interests','Interest Free Response',
    'Teacher Obs: Attention','Teacher Obs: Social','Teacher Obs: Emotional','Teacher Obs: Work Habits',
    'Notes','Post Count','Latest Post Date',
    'Assessment Count','Latest Assessment Date',
  ];

  const rows = students.map(rec => {
    const secs = SECTIONS[rec.level];
    const scaleMax = scaleMaxFor(rec.level);
    const vals = [];

    vals.push(rec.name||'');
    vals.push(computeAge(rec.birthdate) !== null ? computeAge(rec.birthdate) : (rec.age||''));
    vals.push(rec.birthdate||'');
    vals.push(rec.className||'');
    vals.push(LEVEL_META[rec.level]?.label||rec.level||'');
    vals.push(rec.goal||'');
    vals.push((rec.subjectStrengths||[]).join('; '));
    vals.push(rec.likes||'');
    vals.push(rec.dislikes||'');
    vals.push((rec.accommodations||[]).join('; '));
    vals.push(rec.accommodationNotes||'');
    vals.push(ATTENDANCE_OPTIONS.find(o=>o.value===rec.attendancePattern)?.label || rec.attendancePattern || '');
    vals.push(rec.attendanceNote||'');
    vals.push(rec.firstLanguage||'');
    vals.push(rec.otherLanguages||'');
    vals.push(PROFICIENCY_LEVELS.find(o=>o.value===rec.englishProficiency)?.label || rec.englishProficiency || '');
    vals.push(rec.cefrLevel||'');
    vals.push(PROFICIENCY_LEVELS.find(o=>o.value===rec.chineseProficiency)?.label || rec.chineseProficiency || '');

    // Cambridge exams as compact string
    const camStr = (rec.cambridgeExams||[]).map(e => {
      const t = CAMBRIDGE_EXAM_TYPES.find(x=>x.value===e.testType);
      return `${t?t.label:e.testType||'?'}: R${e.reading||'-'} W${e.writing||'-'} L${e.listening||'-'} S${e.speaking||'-'} T${e.total||'-'}${e.date?' ('+e.date+')':''}`;
    }).join('; ');
    vals.push(camStr);

    const otherStr = (rec.otherEnglishTests||[]).map(t => `${t.testName||'?'}: ${t.score||'-'}${t.date?' ('+t.date+')':''}${t.notes?' ['+t.notes+']':''}`).join('; ');
    vals.push(otherStr);

    vals.push(rec.physicalMedicalNotes||'');
    vals.push(TIME_OF_DAY_OPTIONS.find(o=>o.value===rec.bestTimeOfDay)?.label || rec.bestTimeOfDay || '');
    vals.push((rec.communicationPreferences||[]).join('; '));
    vals.push(GROUP_ROLE_OPTIONS.find(o=>o.value===rec.groupRoleTendency)?.label || rec.groupRoleTendency || '');
    vals.push(rec.familyContext||'');
    vals.push(rec.supportNetwork||'');

    // Scored sections
    ['A','C','D','E'].forEach(id => {
      const sec = secs.find(s=>s.id===id);
      if(!sec){ vals.push('','',''); return; }
      const res = computeSectionResult(sec, rec.answers, scaleMax);
      const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
      vals.push(res.compositeScore);
      vals.push(res.compositeMax);
      vals.push(ZONE_META[zone].label);
    });

    // Top learning preference
    const secB = secs.find(s=>s.id==='B');
    if(secB){
      const bScores = {};
      secB.items.forEach(it => bScores[it.domain] = (bScores[it.domain]||0)+(rec.answers[it.id]||0));
      const top = Object.entries(bScores).sort((a,b)=>b[1]-a[1]);
      vals.push(top.length ? (DOMAIN_LABELS[top[0][0]]||top[0][0]) : '');
    } else vals.push('');

    // Dominant goal orientation
    const secG = secs.find(s=>s.id==='G');
    if(secG){
      const gScores = {};
      secG.items.forEach(it => gScores[it.domain] = (gScores[it.domain]||0)+(rec.answers[it.id]||0));
      const top = Object.entries(gScores).sort((a,b)=>b[1]-a[1]);
      vals.push(top.length ? (GOAL_LABELS[top[0][0]]||top[0][0]) : '');
    } else vals.push('');

    vals.push((rec.interestsChecked||[]).join('; '));
    vals.push(rec.interestsFree||'');

    const obs = rec.teacherObs||{};
    vals.push(obs.attention||'');
    vals.push(obs.social||'');
    vals.push(obs.emotional||'');
    vals.push(obs.workHabits||'');

    vals.push(rec.notes||'');
    const posts = rec.posts||[];
    vals.push(posts.length);
    vals.push(posts.length ? new Date(Math.max(...posts.map(p=>p.timestamp))).toLocaleDateString() : '');

    const history = rec.history||[];
    vals.push(history.length + 1);
    vals.push(new Date(rec.updatedAt||rec.createdAt).toLocaleDateString());

    return vals.map(csvEscape).join(',');
  });

  return headers.map(csvEscape).join(',') + '\n' + rows.join('\n');
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return String(str||'').replace(/'/g, "\\'"); }

// Human-friendly interpretation of common Postgres/Supabase errors
function diagnoseErrorMessage(err){
  if(!err) return '';
  const e = err.toLowerCase();
  if(e.includes('date/time field value out of range') || e.includes('22008')){
    return '➜ A timestamp was sent as a raw number instead of a date. This is now fixed in the app — refresh the page to load the fix, then try again.';
  }
  if(e.includes('owner_id') && (e.includes('does not exist') || e.includes('column'))){
    return '➜ The owner_id column is missing from your students table. Run COMPLETE-SETUP.sql in your Supabase SQL Editor to fix this.';
  }
  if(e.includes('row-level security') || e.includes('rls') || e.includes('policy')){
    return '➜ Row Level Security is blocking the write. This usually means owner_id isn\'t being set correctly, or the RLS policies weren\'t created. Run COMPLETE-SETUP.sql.';
  }
  if(e.includes('violates') && e.includes('null')){
    return '➜ A required field is missing. This is likely a schema mismatch — run COMPLETE-SETUP.sql for the correct table structure.';
  }
  if(e.includes('duplicate') || e.includes('unique')){
    return '➜ A record with this ID already exists. This is usually harmless (upsert handles it), but if you see many of these, you may have duplicate data.';
  }
  if(e.includes('relation') && e.includes('does not exist')){
    return '➜ The table doesn\'t exist. Run COMPLETE-SETUP.sql to create the students and classes tables.';
  }
  if(e.includes('jwt') || e.includes('auth') || e.includes('token')){
    return '➜ Authentication issue. Try logging out and back in.';
  }
  return '➜ Run COMPLETE-SETUP.sql in your Supabase SQL Editor to ensure the schema is correct. If the problem persists, note this exact error message.';
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  const badge = document.getElementById('copy-badge');
  if(badge) badge.innerHTML = '<span class="copy-success">✓ Copied!</span>';
  setTimeout(()=>{ if(badge) badge.innerHTML = ''; }, 3000);
}
