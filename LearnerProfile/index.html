<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learner Profile System</title>
<style>
  :root {
    --paper: #F7F5F0;
    --paper-raised: #FFFFFF;
    --ink: #1E2A32;
    --ink-soft: #4A5A63;
    --ink-faint: #8B979D;
    --rule: #D8D3C7;
    --rule-soft: #E8E4DA;
    --accent: #3B6E71;
    --accent-light: #E3EEEE;
    --primary: #2B7A5F;
    --primary-light: #E8F5EE;
    --primary-mid: #B8DFC9;
    --junior: #2D5FA6;
    --junior-light: #E8EFF8;
    --junior-mid: #B3CCE8;
    --senior: #7B3FA0;
    --senior-light: #F3ECF8;
    --senior-mid: #D4B8E8;
    --green: #2E7D32;
    --green-bg: #E8F5E9;
    --green-border: #A5D6A7;
    --yellow: #B35C00;
    --yellow-bg: #FFF3E0;
    --yellow-border: #FFCC80;
    --red: #B23A34;
    --red-bg: #FBEAE9;
    --red-border: #E8A8A3;
    --shadow: 0 1px 2px rgba(30,42,50,0.06), 0 4px 12px rgba(30,42,50,0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  #app { min-height: 100vh; padding-bottom: 60px; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }
  .wrap-narrow { max-width: 640px; margin: 0 auto; padding: 0 24px; }

  h1, h2, h3, h4 { font-family: Georgia, "Times New Roman", serif; font-weight: 700; color: var(--ink); margin: 0; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

  /* ── Top bar ── */
  .topbar {
    background: var(--paper-raised);
    border-bottom: 1px solid var(--rule);
    padding: 18px 0;
    margin-bottom: 32px;
  }
  .topbar-inner { display: flex; align-items: baseline; justify-content: space-between; }
  .brand { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .brand-mark { font-family: Georgia, serif; font-weight: 700; font-size: 20px; color: var(--accent); letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); }
  .topbar-nav { display: flex; gap: 18px; align-items: center; }
  .topbar-nav a { font-size: 13px; color: var(--ink-soft); text-decoration: none; cursor: pointer; border-bottom: 1px solid transparent; }
  .topbar-nav a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 6px; border: 1.5px solid transparent;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.12s ease;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2f595c; }
  .btn-primary:disabled { background: #C6CDCF; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink-faint); color: var(--ink); }
  .btn-danger-ghost { background: transparent; color: var(--red); border-color: var(--red-border); }
  .btn-danger-ghost:hover { background: var(--red-bg); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 5px; }
  .btn-block { width: 100%; justify-content: center; }

  /* ── Cards / index-card motif ── */
  .card {
    background: var(--paper-raised);
    border: 1px solid var(--rule-soft);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .record-tab {
    font-family: Georgia, serif; font-weight: 700; font-size: 15px;
    width: 40px; height: 40px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .record-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .record-meta { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .zone-dot { width: 9px; height: 9px; border-radius: 50%; }
  .record-arrow { color: var(--ink-faint); font-size: 16px; flex-shrink: 0; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 64px 24px; color: var(--ink-faint); }
  .empty-state h3 { color: var(--ink-soft); margin-bottom: 8px; font-size: 17px; }
  .empty-state p { font-size: 14px; margin: 0 0 20px; }

  /* ── Form elements ── */
  label.field-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft); margin-bottom: 6px; }
  input[type=text], input[type=number] {
    width: 100%; padding: 11px 14px; border-radius: 6px;
    border: 1.5px solid var(--rule); font-size: 15px; font-family: inherit;
    background: var(--paper-raised); color: var(--ink);
    outline: none; transition: border-color 0.12s;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--accent); }
  .field-group { margin-bottom: 20px; }

  /* ── Level picker ── */
  .level-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .level-opt {
    border: 1.5px solid var(--rule); border-radius: 8px; padding: 14px 10px;
    text-align: center; cursor: pointer; background: var(--paper-raised);
    transition: all 0.12s;
  }
  .level-opt.selected { border-width: 2px; }
  .level-opt .lo-label { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .level-opt .lo-grades { font-size: 11px; color: var(--ink-faint); }

  /* ── Progress ── */
  .progress-track { height: 4px; background: var(--rule-soft); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.25s; }
  .progress-label { font-size: 11px; color: var(--ink-faint); display: flex; justify-content: space-between; margin-bottom: 20px; }

  .section-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .section-tab {
    padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--rule); background: var(--paper-raised); color: var(--ink-faint);
    cursor: pointer;
  }
  .section-tab.active { border-width: 2px; }
  .section-tab.complete::before { content: "✓ "; }

  /* ── Question items ── */
  .q-item {
    border: 1px solid var(--rule-soft); border-radius: 8px; padding: 16px 18px;
    margin-bottom: 12px; background: var(--paper-raised);
    transition: border-color 0.12s, background 0.12s;
  }
  .q-item.answered { }
  .q-text { font-size: 14px; color: var(--ink); margin-bottom: 12px; line-height: 1.5; }
  .q-num { color: var(--ink-faint); font-size: 12px; margin-right: 6px; }
  .q-scale { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-opt {
    flex: 1; min-width: 90px; padding: 8px 10px; border-radius: 6px; text-align: center;
    border: 1.5px solid var(--rule); font-size: 12px; cursor: pointer; background: var(--paper-raised);
    color: var(--ink-soft); font-weight: 500; transition: all 0.1s;
  }
  .q-opt.selected { color: #fff; }

  /* ── Interest checklist ── */
  .interest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 20px; }
  .interest-chip {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--rule); border-radius: 6px; cursor: pointer; background: var(--paper-raised);
    font-size: 13.5px; color: var(--ink-soft); transition: all 0.1s;
  }
  .interest-chip.checked { font-weight: 600; }
  .interest-chip .box { width: 16px; height: 16px; border: 1.5px solid var(--ink-faint); border-radius: 3px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size: 11px; }
  textarea {
    width: 100%; padding: 11px 14px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 70px; outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  /* ── Nav row ── */
  .nav-row { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; }

  /* ── Report ── */
  .report-header { margin-bottom: 28px; }
  .report-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 6px; }
  .report-title { font-size: 26px; margin-bottom: 4px; }
  .report-meta { font-size: 13px; color: var(--ink-faint); }

  .zone-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .zone-card { border-radius: 8px; padding: 14px 14px; text-align: center; border: 1.5px solid; }
  .zone-card .zc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .zone-card .zc-title { font-size: 12.5px; font-weight: 600; color: var(--ink); }

  .section-block {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 10px;
    padding: 22px 26px; margin-bottom: 20px;
  }
  .sb-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .sb-title { font-size: 17px; margin-bottom: 2px; }
  .sb-domain { font-size: 11.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; }
  .zone-pill { padding: 4px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; border: 1px solid; white-space: nowrap; }

  .score-bar-track { height: 9px; background: var(--rule-soft); border-radius: 5px; margin: 6px 0 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 5px; }
  .score-bar-label { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--ink-faint); margin-bottom: 4px; }

  .item-row { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--rule-soft); font-size: 13px; }
  .item-row:last-child { border-bottom: none; }
  .item-row .it-text { color: var(--ink-soft); flex: 1; }
  .item-tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--rule-soft); color: var(--ink-soft); white-space: nowrap; }

  .strategy-box { background: var(--accent-light); border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .strategy-box .sx-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .strategy-box ul { margin: 0; padding-left: 18px; }
  .strategy-box li { font-size: 13px; color: var(--ink); margin-bottom: 5px; line-height: 1.5; }

  .pref-row { margin-bottom: 12px; }
  .pref-row-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
  .pref-row-head strong { color: var(--ink); }
  .pref-bar-track { height: 8px; background: var(--rule-soft); border-radius: 4px; overflow: hidden; }
  .pref-bar-fill { height: 100%; border-radius: 4px; }
  .pref-strategy { font-size: 11.5px; color: var(--ink-faint); margin-top: 3px; }

  .info-callout {
    border-radius: 8px; padding: 14px 16px; font-size: 12.5px; line-height: 1.6;
    margin-bottom: 16px; border: 1px solid;
  }
  .info-callout strong { display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }

  .interest-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .interest-tag { background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 600; }
  .free-response { background: var(--rule-soft); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--ink-soft); font-style: italic; }

  .obs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  .obs-field select {
    width: 100%; padding: 9px 10px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 13px; font-family: inherit; background: var(--paper-raised); color: var(--ink);
  }
  .obs-field label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 4px; }
  .match-note { font-size: 12.5px; padding: 10px 12px; border-radius: 6px; margin-top: 10px; }

  .disclaimer-footer { font-size: 11px; color: var(--ink-faint); line-height: 1.6; padding-top: 18px; border-top: 1px solid var(--rule); margin-top: 8px; }

  .action-row { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }

  /* Research page */
  .evidence-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 13px; }
  .evidence-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-faint); border-bottom: 2px solid var(--rule); padding: 8px 10px; }
  .evidence-table td { padding: 10px; border-bottom: 1px solid var(--rule-soft); vertical-align: top; }
  .grade-badge { font-weight: 700; font-size: 12px; color: var(--accent); white-space: nowrap; }

  @media print {
    .topbar, .no-print { display: none !important; }
    body { background: #fff; }
    .section-block, .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }

  /* ── Class grouping on dashboard ── */
  .class-group { margin-bottom: 32px; }
  .class-group-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 12px 10px; margin-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    border-radius: 4px 4px 0 0;
    transition: background 0.1s;
  }
  .class-group-header.clickable { cursor: pointer; }
  .class-group-header.clickable:hover { background: var(--accent-light); }
  .class-group-name {
    font-family: Georgia, serif; font-weight: 700; font-size: 16px; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .class-group-hint { font-size: 11px; color: var(--accent); margin-top: 1px; }
  .class-group-count {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-faint);
  }

  /* ── Class overview page ── */
  .class-actions-bar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 8px; padding: 16px 18px; box-shadow: var(--shadow); }
  .stat-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-faint); margin-bottom: 12px; }
  .stat-bars { display: flex; flex-direction: column; gap: 6px; }
  .stat-bar-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
  .stat-bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--rule-soft); overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; }
  .stat-count { font-weight: 700; min-width: 24px; text-align: right; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .stat-names { font-size: 11.5px; color: var(--ink-faint); margin-top: 4px; padding-left: 18px; }
  .stat-names .name-chip { display: inline-block; margin: 2px 4px 2px 0; padding: 1px 8px; border-radius: 3px; background: var(--rule-soft); color: var(--ink-soft); cursor: pointer; font-size: 11px; }
  .stat-names .name-chip:hover { background: var(--accent-light); color: var(--accent); }

  /* Interest tally list */
  .interest-tally { display: flex; flex-direction: column; gap: 10px; }
  .interest-tally-row { border-bottom: 1px solid var(--rule-soft); padding-bottom: 8px; }
  .interest-tally-row:last-child { border-bottom: none; }
  .interest-tally-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .interest-tally-head strong { color: var(--ink); }
  .interest-tally-count { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink-faint); font-size: 12px; }

  /* Watch list */
  .watch-list-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 6px; background: var(--paper-raised);
    border: 1px solid var(--rule-soft); margin-bottom: 8px;
    cursor: pointer; transition: background 0.1s;
  }
  .watch-list-row:hover { background: var(--red-bg); }
  .watch-list-name { font-weight: 600; font-size: 14px; color: var(--ink); flex: 1; }
  .watch-list-reasons { font-size: 12px; color: var(--ink-faint); }
  .watch-list-badge { padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; background: var(--red-bg); color: var(--red); }

  /* Compare view */
  .compare-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .compare-picker select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit; background: var(--paper-raised); }
  .compare-table {
    width: 100%; border-collapse: collapse; background: var(--paper-raised);
    border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .compare-table th, .compare-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--rule-soft); font-size: 13.5px; }
  .compare-table th { background: var(--rule-soft); font-family: Georgia, serif; font-weight: 700; font-size: 15px; }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table td:first-child { font-weight: 600; color: var(--ink-soft); background: #FBFAF6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; width: 25%; }
  .compare-insights { background: var(--accent-light); border-radius: 8px; padding: 16px 20px; }
  .compare-insights h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .compare-insights li { font-size: 13px; margin-bottom: 6px; }

  /* Grouping view */
  .group-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 20px; align-items: end; }
  .group-controls select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit; background: var(--paper-raised); }
  .group-card {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-left: 4px solid var(--accent);
    border-radius: 6px; padding: 16px 20px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .group-card h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent); }
  .group-members { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .group-member { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
  .group-member .zone-dot { width: 8px; height: 8px; }
  .group-member-name { font-weight: 500; }
  .group-member-role { font-size: 11px; color: var(--ink-faint); font-style: italic; margin-left: 4px; }
  .group-rationale { font-size: 12.5px; color: var(--ink-soft); background: #FBFAF6; padding: 8px 12px; border-radius: 5px; line-height: 1.55; border-left: 3px solid var(--rule); }

  /* Data view */
  .data-section {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .data-section h2 { font-size: 17px; margin-bottom: 6px; }
  .data-section p { font-size: 13px; color: var(--ink-soft); margin: 0 0 12px; line-height: 1.55; }
  .file-input-wrap {
    border: 1.5px dashed var(--rule); border-radius: 6px; padding: 20px; text-align: center;
    background: #FBFAF6; margin-bottom: 12px;
  }
  .file-input-wrap input[type=file] { font-family: inherit; font-size: 13px; }

  /* Trend indicators on report */
  .trend-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700;
    margin-left: 8px; vertical-align: middle;
  }
  .trend-improved { background: var(--green-bg); color: var(--green); }
  .trend-worsened { background: var(--red-bg); color: var(--red); }
  .trend-same { background: var(--rule-soft); color: var(--ink-faint); }
  .history-strip {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 11.5px; color: var(--ink-faint);
    padding: 10px 14px; background: #FBFAF6; border-radius: 6px; margin-bottom: 16px;
  }
  .history-strip strong { color: var(--ink-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-item { padding: 3px 10px; border-radius: 12px; background: var(--paper-raised); border: 1px solid var(--rule); }
  .history-item.current { background: var(--accent-light); color: var(--accent); font-weight: 600; border-color: var(--accent); }

  /* ── Record card actions ── */
  .record-card {
    background: var(--paper-raised);
    border: 1px solid var(--rule-soft);
    border-left: 6px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.1s ease;
    margin-bottom: 10px;
  }
  .record-card:hover { transform: translateX(2px); }
  .record-info { flex: 1; min-width: 0; cursor: pointer; }
  .record-zones { display: flex; gap: 5px; flex-shrink: 0; cursor: pointer; }
  .record-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .record-move {
    padding: 6px 8px; border-radius: 5px; border: 1px solid var(--rule);

// Compute integer age (in whole years) from an ISO date string. Returns null if invalid.
function computeAge(birthdateISO){
  if(!birthdateISO) return null;
  const bd = new Date(birthdateISO);
  if(isNaN(bd.getTime())) return null;
  const now = new Date();
  let age = now.getFullYear() - bd.getFullYear();
  const m = now.getMonth() - bd.getMonth();
  if(m < 0 || (m === 0 && now.getDate() < bd.getDate())) age--;
  return age >= 0 && age < 130 ? age : null;
}

/* ══════════════════════════════════════════════════════════════
   STORAGE — uses localStorage in a normal browser, falls back to
   an in-memory store if localStorage is unavailable (e.g. very
   restricted sandboxes). Records survive page reloads and browser
   restarts on the machine you saved them on.
   ══════════════════════════════════════════════════════════════ */

const storage = (function(){
  let mem = {};
  let persistent = false;
  try{
    if(typeof localStorage !== 'undefined'){
      localStorage.setItem('__lp_test__','1');
      localStorage.removeItem('__lp_test__');
      persistent = true;
    }
  }catch(e){ persistent = false; }

  if(persistent){
    return {
      persistent: true,
      set(k,v){ localStorage.setItem(k,v); return v; },
      get(k){ return localStorage.getItem(k); },
      del(k){ localStorage.removeItem(k); },
      keys(prefix){
        const out = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(!prefix || (k && k.indexOf(prefix)===0)) out.push(k);
        }
        return out;
      },
    };
  }
  return {
    persistent: false,
    set(k,v){ mem[k]=v; return v; },
    get(k){ return (k in mem) ? mem[k] : null; },
    del(k){ delete mem[k]; },
    keys(prefix){ return Object.keys(mem).filter(k=>!prefix||k.indexOf(prefix)===0); },
  };
})();

function loadAllStudents(){
  const out = [];
  const keys = storage.keys('student:');
  for(const k of keys){
    try{
      const raw = storage.get(k);
      if(raw) out.push(migrateStudent(JSON.parse(raw)));
    }catch(e){ /* skip unreadable record */ }
  }
  out.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  return out;
}

function scaleMaxFor(level){ return LEVEL_META[level].scale.length - 1; }

function computeSectionResult(sec, answers, scaleMax){
  const isProfile = sec.items.every(i=>i.direction==='preference');
  if(isProfile){
    const domainScores = {};
    sec.items.forEach(it=>{
      domainScores[it.domain] = (domainScores[it.domain]||0) + (answers[it.id]||0);
    });
    return { type:'profile', domainScores };
  }
  let diffScore=0, diffMax=0, strScore=0, strMax=0;
  sec.items.forEach(it=>{
    const v = answers[it.id]||0;
    if(it.direction==='difficulty'){ diffScore+=v; diffMax+=scaleMax; }
    else if(it.direction==='strength'){ strScore+=v; strMax+=scaleMax; }
  });
  const isPositive = (sec.id==='D' || sec.id==='E');
  let compositeScore, compositeMax;
  if(isPositive){ compositeScore = strScore; compositeMax = strMax; }
  else { compositeScore = diffScore + (strMax - strScore); compositeMax = diffMax + strMax; }
  return { type:'composite', compositeScore, compositeMax, isPositive };
}

function getZone(compositeScore, compositeMax, isPositive){
  if(compositeMax===0) return 'neutral';
  const pct = compositeScore/compositeMax;
  if(isPositive){
    if(pct>=0.75) return 'green';
    if(pct>=0.4) return 'yellow';
    return 'red';
  }
  if(pct>=0.65) return 'red';
  if(pct>=0.35) return 'yellow';
  return 'green';
}

}

  if(groups.__unassigned__) orderedGroups.push({ name: 'Unassigned', students: groups.__unassigned__, isUnassigned: true });

  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap;">
      <div>
        <h1 style="font-size:24px;">Student Records</h1>
        <p style="color:var(--ink-faint);font-size:13px;margin-top:4px;">${students.length} record${students.length===1?'':'s'} across ${classNames.length} class${classNames.length===1?'':'es'}${groups.__unassigned__ ? ' + unassigned' : ''}</p>
      </div>
      <button class="btn btn-primary" onclick="App.startNew()">+ New Assessment</button>
    </div>
    ${students.length === 0 ? `
      <div class="empty-state card">
        <h3>No records yet</h3>
        <p>Start a new assessment to build a student's first learner profile.</p>
        <button class="btn btn-primary" onclick="App.startNew()">+ New Assessment</button>
      </div>
    ` : orderedGroups.map(renderClassGroup).join('')}
  </div>`;
}

function renderClassGroup(g){
  const clickable = !g.isUnassigned;
  return `
  <div class="class-group">
    <div class="class-group-header ${clickable?'clickable':''}" ${clickable?`onclick="App.openClassOverview('${escapeAttr(g.name)}')"`:''}>
      <div>

      </div>
      <div class="class-group-count">${g.students.length} student${g.students.length===1?'':'s'}</div>
    </div>
    ${g.students.map(renderRecordCard).join('')}
  </div>`;
}

function renderRecordCard(rec){
  const lvl = LEVEL_META[rec.level] || LEVEL_META.primary;
  const zones = computeAllZones(rec);
  const date = new Date(rec.updatedAt || rec.createdAt).toLocaleDateString(undefined,{ day:'numeric', month:'short', year:'numeric' });
  const initials = (rec.name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const allClasses = getAllClassNames();
  const currentClass = (rec.className||'').trim();
  const hasAccommodations = (rec.accommodations && rec.accommodations.length) || (rec.accommodationNotes && rec.accommodationNotes.trim());
  // Build the "move" select options: existing classes + Unassigned + option to prompt for new
  const moveOptions = [
    `<option value="" disabled selected>Move to…</option>`,
    ...allClasses.filter(c => c !== currentClass).map(c => `<option value="__cls__${escapeHtml(c)}">${escapeHtml(c)}</option>`),
    currentClass ? `<option value="__unassign__">Unassigned</option>` : '',
    `<option value="__new__">+ New class…</option>`,
  ].join('');
  return `
  <div class="record-card" style="border-left-color:${lvl.color};">
    <div class="record-tab" style="background:${lvl.light};color:${lvl.color};">${initials}</div>
    <div class="record-info" onclick="App.openReport('${rec.id}')">
      <div class="record-name">${escapeHtml(rec.name)}${hasAccommodations ? '<span class="acc-badge" title="Has accommodations on file">ACC</span>' : ''}</div>
      <div class="record-meta">${lvl.label} · Age ${escapeHtml(String(rec.age||'?'))} · Updated ${date}</div>
    </div>
    <div class="record-zones" onclick="App.openReport('${rec.id}')" title="Section zones">
      ${zones.map(z=>`<div class="zone-dot" style="background:${ZONE_META[z].text};" title="${ZONE_META[z].label}"></div>`).join('')}
    </div>
    <div class="record-actions">
      <select class="record-move" onchange="App.quickMove('${rec.id}', this.value); this.value='';" onclick="event.stopPropagation()" title="Move to a different class">
        ${moveOptions}
      </select>
      <button class="record-delete" onclick="event.stopPropagation(); App.confirmDelete('${rec.id}')" title="Delete record">×</button>
    </div>
  </div>`;
}

function computeAllZones(rec){
  const secs = SECTIONS[rec.level] || [];
  const scaleMax = scaleMaxFor(rec.level);
  const zones = [];
  ['A','C','D','E'].forEach(id=>{
    const sec = secs.find(s=>s.id===id);
    if(!sec) return;
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    zones.push(getZone(res.compositeScore, res.compositeMax, res.isPositive));
  });
  return zones;
}

/* ── New assessment: Step 2..N — sections ── */

function renderAssess(){
  const d = state.draft;
  const lvl = LEVEL_META[d.level];
  const secs = SECTIONS[d.level];
  const idx = d.sectionIndex;
  // virtual section list: A,B,C,D,E,F(interests),G,H(personal profile)
  const order = ['A','B','C','D','E','F','G','H'];
  const currentKey = order[idx];

  const totalQuestions = secs.reduce((n,s)=>n+s.items.length,0);
  const answeredCount = Object.keys(d.answers).length;

  let content = '';
  if(currentKey === 'F'){
    content = renderInterestStep(d, lvl);
  } else if(currentKey === 'H'){
    content = renderPersonalProfileStep(d, lvl);
  } else {
    const sec = secs.find(s=>s.id===currentKey);
    content = renderQuestionStep(sec, d, lvl);
  }

  const allSectionsComplete = order.every(k => isStepComplete(k, d, secs));

  return `
  <div class="wrap-narrow">
    <div class="progress-label">
      <span>Step ${idx+1} of ${order.length}</span>
      <span>${answeredCount}/${totalQuestions} questions answered</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${((idx+1)/order.length)*100}%;background:${lvl.color};"></div>
    </div>

    <div class="section-tabs">
      ${order.map((k,i)=>{
        const complete = isStepComplete(k, d, secs);
        const active = i===idx;
        return `<div class="section-tab ${complete?'complete':''} ${active?'active':''}"
          style="${active? `border-color:${lvl.color};color:${lvl.color};background:${lvl.light};` : complete ? `color:var(--ink-soft);` : ''}"
          onclick="App.jumpToStep(${i})">${k}</div>`;
      }).join('')}
    </div>

    ${content}

    <div class="nav-row">
      <button class="btn btn-ghost" onclick="App.stepBack()">${idx===0?'Cancel':'← Back'}</button>
      ${idx < order.length-1
        ? `<button class="btn btn-primary" ${!isStepComplete(currentKey,d,secs)?'disabled':''} onclick="App.stepNext()" style="background:${lvl.color};">Next →</button>`
        : `<button class="btn btn-primary" ${!allSectionsComplete?'disabled':''} onclick="App.finishAssessment()" style="background:${lvl.color};">View Interpretation →</button>`
      }
    </div>
  </div>`;
}

function isStepComplete(key, d, secs){
  if(key === 'F') return true; // interests optional
  if(key === 'H') return true; // personal profile optional
  const sec = secs.find(s=>s.id===key);
  if(!sec) return true;
  return sec.items.every(it => d.answers[it.id] !== undefined);
}

function renderQuestionStep(sec, d, lvl){
  return `
  <div style="margin-bottom:8px;">
    <h2 style="font-size:19px;margin-bottom:4px;">${sec.title}</h2>
    <p style="color:var(--ink-faint);font-size:13px;margin:0 0 18px;">${sec.subtitle}</p>
  </div>
  ${sec.items.map((it,i)=>{
    const val = d.answers[it.id];
    return `
    <div class="q-item ${val!==undefined?'answered':''}" style="${val!==undefined?`border-color:${lvl.mid};`:''}">
      <div class="q-text"><span class="q-num">${i+1}</span>${escapeHtml(it.text)}</div>
      <div class="q-scale">
        ${lvl.scale.map((label,v)=>{
          const sel = val===v;
          return `<div class="q-opt ${sel?'selected':''}" style="${sel?`background:${lvl.color};border-color:${lvl.color};`:''}"
            onclick="App.answer('${it.id}', ${v})">${label}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}`;
}

  </div>

  <div style="margin-bottom:22px;">
    <label class="field-label" for="f-likes">Likes</label>
    <p style="color:var(--ink-faint);font-size:12px;margin:0 0 6px;">What does this student enjoy? Foods, activities, topics, styles of work — anything specific helps.</p>
    <textarea id="f-likes" placeholder="e.g. animals, video games, working in small groups, humor, hands-on tasks"
      oninput="App.updateDraftLikes(this.value)">${escapeHtml(d.likes||'')}</textarea>
  </div>

  <div>

function formatPostTimestamp(ts){
  const d = new Date(ts);
  const dateStr = d.toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
  const timeStr = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
  return dateStr + ' · ' + timeStr;
}

// Render a multi-select chip group (checkbox-style), for accommodations/communication prefs
function renderChipMultiSelect(selectedList, allOptions, toggleMethod, lvl){
  const selected = selectedList || [];
  const custom = selected.filter(x => !allOptions.includes(x));
  const chips = [...allOptions, ...custom];
  return chips.map(item => {
    const checked = selected.includes(item);
    return `<div class="interest-chip ${checked?'checked':''}" style="${checked?`border-color:${lvl.color};background:${lvl.light};color:${lvl.color};`:''}" onclick="App.${toggleMethod}('${escapeAttr(item)}')">
      <span class="box" style="${checked?`border-color:${lvl.color};color:${lvl.color};`:''}">${checked?'✓':''}</span>${escapeHtml(item)}
    </div>`;
  }).join('');
}

function renderScoredSection(sec, rec, lvl, scaleMax){
  const res = computeSectionResult(sec, rec.answers, scaleMax);
  const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
  const zm = ZONE_META[zone];
  const matrixEntry = (ACTION_MATRIX[sec.id] && ACTION_MATRIX[sec.id][zone]) || null;

  // Trend: compare to previous assessment if there is one
  let trendBadge = '';
  if(rec.history && rec.history.length){
    const prev = rec.history[rec.history.length-1];
    const prevRes = computeSectionResult(sec, prev.answers || {}, scaleMax);
    const prevZone = getZone(prevRes.compositeScore, prevRes.compositeMax, prevRes.isPositive);
    if(prevZone !== zone){
      const zoneOrder = { green:0, yellow:1, red:2 };
      const improved = zoneOrder[zone] < zoneOrder[prevZone];
      trendBadge = improved
        ? `<span class="trend-badge trend-improved" title="Improved from ${ZONE_META[prevZone].label}">↑ ${ZONE_META[prevZone].label} → ${zm.label}</span>`
        : `<span class="trend-badge trend-worsened" title="Declined from ${ZONE_META[prevZone].label}">↓ ${ZONE_META[prevZone].label} → ${zm.label}</span>`;
    } else {
      trendBadge = `<span class="trend-badge trend-same" title="Unchanged since last assessment">= no change</span>`;
    }
  }

  return `
  <div class="section-block">
    <div class="sb-head">
      <div>
        <div class="sb-title">${sec.title}${trendBadge}</div>
        <div class="sb-domain">${sec.domainLabel}</div>
      </div>
      <span class="zone-pill" style="background:${zm.bg};color:${zm.text};border-color:${zm.border};">${zm.label}</span>
    </div>

    <div class="score-bar-label">
      <span>${res.isPositive ? 'Strength score' : 'Difficulty score'}</span>
      <span class="mono">${res.compositeScore} / ${res.compositeMax}</span>
    </div>
    <div class="score-bar-track">
      <div class="score-bar-fill" style="width:${res.compositeMax? (res.compositeScore/res.compositeMax*100):0}%;background:${zm.text};"></div>
    </div>

    <div style="margin-top:16px;">
      ${sec.items.map(it=>{
        const val = rec.answers[it.id];
        const label = LEVEL_META[rec.level].scale[val] || '—';
        return `<div class="item-row"><span class="it-text">${escapeHtml(it.text)}</span><span class="item-tag">${label}</span></div>`;
      }).join('')}
    </div>

    ${matrixEntry ? `
      <div class="strategy-box" style="background:${zm.bg};">
        <div class="sx-label" style="color:${zm.text};">What this means &amp; recommended strategies</div>
        <p style="font-size:13px;color:var(--ink);margin:0 0 10px;">${matrixEntry.meaning}</p>
        <ul>${matrixEntry.actions.map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>` : ''}
  </div>`;
}

function renderClassOverview(){
  const className = state.activeClassName;
  const students = studentsInClass(className);

  if(students.length === 0){
    return `
    <div class="wrap">
      <button class="btn btn-ghost btn-sm no-print" onclick="App.goDashboard()" style="margin-bottom:18px;">← All records</button>
      <h1 style="font-size:24px;">${escapeHtml(className)}</h1>
      <p style="color:var(--ink-faint);">No students in this class yet.</p>
    </div>`;
  }

  // Compute per-domain zone distribution
  const zoneCounts = { A:{green:[],yellow:[],red:[]}, C:{green:[],yellow:[],red:[]}, D:{green:[],yellow:[],red:[]}, E:{green:[],yellow:[],red:[]} };
  const goalCounts = { mastery:[], performance_approach:[], performance_avoidance:[] };
  const interestCounts = {};
  const subjectStrengthCounts = {};
  const watchList = [];

  students.forEach(s => {
    const secs = SECTIONS[s.level];
    const scaleMax = scaleMaxFor(s.level);
    const studentReasons = [];
    ['A','C','D','E'].forEach(id => {
      const sec = secs.find(x => x.id === id);
      if(!sec) return;
      const res = computeSectionResult(sec, s.answers, scaleMax);
      const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
      zoneCounts[id][zone].push(s);
      if(zone === 'red') studentReasons.push(sec.title + ' (Support)');
    });
    // Goal orientation dominant
    const secG = secs.find(x => x.id === 'G');
    if(secG){
      const goalRes = computeSectionResult(secG, s.answers, scaleMax);
      const entries = Object.entries(goalRes.domainScores || {}).sort((a,b)=>b[1]-a[1]);
      if(entries.length){
        const top = entries[0][0];
        goalCounts[top].push(s);
        if(top === 'performance_avoidance') studentReasons.push('Performance-avoidance dominant');
      }
    }
    // Interests
    (s.interestsChecked || []).forEach(i => {
      if(!interestCounts[i]) interestCounts[i] = [];
      interestCounts[i].push(s);
    });
    // Subject strengths
    (s.subjectStrengths || []).forEach(sub => {
      if(!subjectStrengthCounts[sub]) subjectStrengthCounts[sub] = [];
      subjectStrengthCounts[sub].push(s);
    });
    if(studentReasons.length) watchList.push({ student:s, reasons:studentReasons });
  });

  const domainConfig = [
    { id:'A', label:'Feelings & Behaviour' },
    { id:'C', label:'Attention & Self-Regulation' },
    { id:'D', label:'Motivation & Confidence' },
    { id:'E', label:'Social-Emotional' },
  ];

  const interestsSorted = Object.entries(interestCounts).sort((a,b)=>b[1].length-a[1].length);
  const subjectsSorted = Object.entries(subjectStrengthCounts).sort((a,b)=>b[1].length-a[1].length);

  return `
  <div class="wrap">
    <button class="btn btn-ghost btn-sm no-print" onclick="App.goDashboard()" style="margin-bottom:18px;">← All records</button>
    <div style="margin-bottom:20px;">
      <div class="report-eyebrow">Class Overview</div>
      <h1 style="font-size:26px;font-family:Georgia,serif;">${escapeHtml(className)}</h1>
      <div style="color:var(--ink-faint);font-size:13px;margin-top:4px;">${students.length} student${students.length===1?'':'s'}</div>
    </div>

    <div class="class-actions-bar no-print">
      <button class="btn btn-primary" onclick="App.openCompare('${escapeAttr(className)}')">🔍 Compare Students</button>
      <button class="btn btn-primary" onclick="App.openGrouping('${escapeAttr(className)}')">👥 Suggest Groupings</button>
      <button class="btn btn-ghost" onclick="window.print()">Print Overview</button>
    </div>

    <h2 style="font-size:16px;font-family:Georgia,serif;margin:24px 0 12px;">Distribution across domains</h2>
    <div class="stat-grid">
      ${domainConfig.map(d => renderZoneStatCard(d, zoneCounts[d.id], students.length)).join('')}
    </div>

    <h2 style="font-size:16px;font-family:Georgia,serif;margin:24px 0 12px;">Achievement goal orientation</h2>
    <div class="stat-card" style="margin-bottom:24px;">
      <div class="stat-bars">
        ${['mastery','performance_approach','performance_avoidance'].map(g => {
          const list = goalCounts[g] || [];
          const meta = { mastery:{label:'Mastery',color:'var(--green)'}, performance_approach:{label:'Performance-approach',color:'var(--yellow)'}, performance_avoidance:{label:'Performance-avoidance',color:'var(--red)'} }[g];
          const pct = students.length ? (list.length/students.length)*100 : 0;
          return `
            <div>
              <div class="stat-bar-row">
                <div style="min-width:140px;font-weight:600;color:${meta.color};font-size:12.5px;">${meta.label}</div>
                <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${meta.color};"></div></div>
                <div class="stat-count">${list.length}</div>
              </div>
              ${list.length ? `<div class="stat-names">${list.map(s=>`<span class="name-chip" onclick="App.openReport('${s.id}')">${escapeHtml(s.name)}</span>`).join('')}</div>` : ''}
            </div>`;
        }).join('')}
      </div>
    </div>

    <h2 style="font-size:16px;font-family:Georgia,serif;margin:24px 0 12px;">Common interests</h2>
    <div class="stat-card" style="margin-bottom:24px;">
      ${interestsSorted.length ? `<div class="interest-tally">${interestsSorted.map(([interest, list]) => `
        <div class="interest-tally-row">
          <div class="interest-tally-head">
            <strong>${escapeHtml(interest)}</strong>
            <span class="interest-tally-count">${list.length} student${list.length===1?'':'s'}</span>
          </div>
          <div>${list.map(s=>`<span class="name-chip" onclick="App.openReport('${s.id}')">${escapeHtml(s.name)}</span>`).join('')}</div>
        </div>
      `).join('')}</div>` : '<p style="color:var(--ink-faint);font-size:13px;margin:0;">No interests recorded yet for this class.</p>'}
    </div>

    <h2 style="font-size:16px;font-family:Georgia,serif;margin:24px 0 12px;">Common subject strengths</h2>
    <div class="stat-card" style="margin-bottom:24px;">
      ${subjectsSorted.length ? `<div class="interest-tally">${subjectsSorted.map(([subject, list]) => `
        <div class="interest-tally-row">
          <div class="interest-tally-head">
            <strong>${escapeHtml(subject)}</strong>
            <span class="interest-tally-count">${list.length} student${list.length===1?'':'s'}</span>
          </div>
          <div>${list.map(s=>`<span class="name-chip" onclick="App.openReport('${s.id}')">${escapeHtml(s.name)}</span>`).join('')}</div>
        </div>
      `).join('')}</div>` : '<p style="color:var(--ink-faint);font-size:13px;margin:0;">No subject strengths recorded yet for this class.</p>'}
    </div>

    ${watchList.length ? `
      <h2 style="font-size:16px;font-family:Georgia,serif;margin:24px 0 12px;">Students to keep in mind</h2>
      <p style="color:var(--ink-faint);font-size:12.5px;margin:0 0 12px;">Students who scored in the Support zone on at least one domain or whose dominant goal orientation is performance-avoidance.</p>
      ${watchList.map(w => `
        <div class="watch-list-row" onclick="App.openReport('${w.student.id}')">
          <div class="watch-list-name">${escapeHtml(w.student.name)}</div>
          <div class="watch-list-reasons">${w.reasons.map(r => `<span class="watch-list-badge">${escapeHtml(r)}</span>`).join(' ')}</div>
        </div>
      `).join('')}
    ` : ''}
  </div>`;
}

function renderZoneStatCard(domain, counts, total){
  const zones = ['green','yellow','red'];
  return `
  <div class="stat-card">
    <div class="stat-title">${domain.label}</div>
    <div class="stat-bars">
      ${zones.map(z => {
        const list = counts[z] || [];
        const pct = total ? (list.length/total)*100 : 0;
        const zm = ZONE_META[z];
        return `
          <div>
            <div class="stat-bar-row">
              <div style="min-width:90px;font-weight:600;color:${zm.text};font-size:12px;">${zm.label}</div>
              <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${zm.text};"></div></div>
              <div class="stat-count">${list.length}</div>
            </div>
            ${list.length ? `<div class="stat-names">${list.map(s=>`<span class="name-chip" onclick="App.openReport('${s.id}')">${escapeHtml(s.name)}</span>`).join('')}</div>` : ''}
          </div>`;

}

function renderCompare(){
  const candidates = state.activeClassName
    ? studentsInClass(state.activeClassName)
    : state.students;

  const leftId = state.compareLeftId;
  const rightId = state.compareRightId;
  const left = candidates.find(s => s.id === leftId);
  const right = candidates.find(s => s.id === rightId);

  const optionsHtml = (selectedId) => `
    <option value="">— Choose a student —</option>
    ${candidates.map(s => `<option value="${s.id}" ${s.id===selectedId?'selected':''}>${escapeHtml(s.name)}${s.className?' ('+escapeHtml(s.className)+')':''}</option>`).join('')}`;

  return `
  <div class="wrap">
    <button class="btn btn-ghost btn-sm no-print" onclick="${state.activeClassName ? `App.openClassOverview('${escapeAttr(state.activeClassName)}')` : 'App.goDashboard()'}" style="margin-bottom:18px;">← Back</button>
    <div style="margin-bottom:20px;">
      <div class="report-eyebrow">Compare Two Students</div>
      <h1 style="font-size:24px;font-family:Georgia,serif;">Side-by-side comparison</h1>
      <p style="color:var(--ink-faint);font-size:13px;margin-top:4px;">${state.activeClassName ? 'From class: ' + escapeHtml(state.activeClassName) : 'All students'}</p>
    </div>

    <div class="compare-picker no-print">
      <select onchange="App.selectCompare('left', this.value)">${optionsHtml(leftId)}</select>
      <select onchange="App.selectCompare('right', this.value)">${optionsHtml(rightId)}</select>
    </div>

    ${(left && right) ? renderCompareBody(left, right) : `
      <div class="stat-card" style="text-align:center;color:var(--ink-faint);padding:32px 20px;">
        Choose two students above to see their side-by-side comparison.
      </div>
    `}
  </div>`;
}

function renderCompareBody(left, right){
  const rows = [];
  rows.push(['Name', escapeHtml(left.name), escapeHtml(right.name)]);
  const leftAge = computeAge(left.birthdate);
  const rightAge = computeAge(right.birthdate);
  rows.push(['Age', escapeHtml(String(leftAge !== null ? leftAge : (left.age||'?'))), escapeHtml(String(rightAge !== null ? rightAge : (right.age||'?')))]);
  if(left.birthdate || right.birthdate){
    rows.push(['Birthdate', escapeHtml(left.birthdate||'—'), escapeHtml(right.birthdate||'—')]);
  }
  rows.push(['Class', escapeHtml(left.className||'—'), escapeHtml(right.className||'—')]);
  rows.push(['Level', LEVEL_META[left.level].label, LEVEL_META[right.level].label]);

  // For each scored section, show zone for both
  const domainConfig = [
    { id:'A', label:'Feelings & Behaviour' },
    { id:'C', label:'Attention & Self-Regulation' },
    { id:'D', label:'Motivation & Confidence' },
    { id:'E', label:'Social-Emotional' },
  ];
  domainConfig.forEach(d => {
    rows.push([d.label, renderZoneCell(left, d.id), renderZoneCell(right, d.id)]);
  });

  // Preferences
  rows.push(['Top learning preference', getTopPreference(left, 'B'), getTopPreference(right, 'B')]);
  rows.push(['Dominant goal orientation', getTopPreference(left, 'G', GOAL_LABELS), getTopPreference(right, 'G', GOAL_LABELS)]);

  // Subject strengths
  const leftSubjects = new Set(left.subjectStrengths || []);
  const rightSubjects = new Set(right.subjectStrengths || []);
  const sharedSubjects = [...leftSubjects].filter(x => rightSubjects.has(x));
  if(leftSubjects.size || rightSubjects.size){
    rows.push(['Subject strengths', [...leftSubjects].map(i=>escapeHtml(i)).join(', ')||'—', [...rightSubjects].map(i=>escapeHtml(i)).join(', ')||'—']);
  }

  // Interests overlap
  const leftInterests = new Set(left.interestsChecked || []);
  const rightInterests = new Set(right.interestsChecked || []);
  const sharedInterests = [...leftInterests].filter(x => rightInterests.has(x));
  rows.push(['Interests', [...leftInterests].map(i=>escapeHtml(i)).join(', ')||'—', [...rightInterests].map(i=>escapeHtml(i)).join(', ')||'—']);

  // Likes / dislikes
  if(left.likes || right.likes) rows.push(['Likes', escapeHtml(left.likes||'—'), escapeHtml(right.likes||'—')]);
  if(left.dislikes || right.dislikes) rows.push(['Dislikes', escapeHtml(left.dislikes||'—'), escapeHtml(right.dislikes||'—')]);

  const insights = buildComparisonInsights(left, right, sharedInterests, sharedSubjects);

  return `
    <table class="compare-table">
      <thead><tr><th></th><th>${escapeHtml(left.name)}</th><th>${escapeHtml(right.name)}</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody>
    </table>

    ${sharedInterests.length ? `<div class="stat-card" style="margin-bottom:16px;background:var(--primary-light);border-color:var(--primary-mid);"><div class="stat-title" style="color:var(--primary);">Shared interests (${sharedInterests.length})</div><div>${sharedInterests.map(i=>`<span class="name-chip" style="background:var(--primary-mid);color:var(--primary);">${escapeHtml(i)}</span>`).join('')}</div></div>` : ''}

    ${sharedSubjects.length ? `<div class="stat-card" style="margin-bottom:16px;background:var(--accent-light);border-color:var(--accent);"><div class="stat-title" style="color:var(--accent);">Shared subject strengths (${sharedSubjects.length})</div><div>${sharedSubjects.map(i=>`<span class="name-chip" style="background:var(--accent);color:#fff;">${escapeHtml(i)}</span>`).join('')}</div></div>` : ''}

    <div class="compare-insights">
      <h3>Pairing insights</h3>
      <ul>${insights.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
  `;
}

function renderZoneCell(rec, secId){
  const secs = SECTIONS[rec.level];
  const sec = secs.find(x => x.id === secId);
  if(!sec) return '—';
  const res = computeSectionResult(sec, rec.answers, scaleMaxFor(rec.level));
  const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
  const zm = ZONE_META[zone];
  return `<span style="display:inline-flex;align-items:center;gap:6px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${zm.text};"></span>${zm.label}</span>`;
}

function getTopPreference(rec, secId, labelMap){
  const secs = SECTIONS[rec.level];
  const sec = secs.find(x => x.id === secId);
  if(!sec) return '—';
  const res = computeSectionResult(sec, rec.answers, scaleMaxFor(rec.level));
  const entries = Object.entries(res.domainScores || {}).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '—';
  const top = entries[0][0];
  return escapeHtml((labelMap || DOMAIN_LABELS)[top] || top);
}

function buildComparisonInsights(left, right, sharedInterests, sharedSubjects){
  const insights = [];
  const secs = SECTIONS[left.level];
  const scaleMax = scaleMaxFor(left.level);
  const zonesFor = (rec) => {
    const out = {};
    ['A','C','D','E'].forEach(id => {
      const s = secs.find(x=>x.id===id);
      if(!s) return;
      const r = computeSectionResult(s, rec.answers, scaleMax);
      out[id] = getZone(r.compositeScore, r.compositeMax, r.isPositive);
    });
    return out;
  };
  const lz = zonesFor(left), rz = zonesFor(right);

  // Complementary strengths
  ['A','C','D','E'].forEach(id => {
    const sec = secs.find(x=>x.id===id);
    if(!sec) return;
    if(lz[id]==='green' && rz[id]==='red')
      insights.push(`${escapeHtml(left.name)} is strong in <strong>${sec.title}</strong> where ${escapeHtml(right.name)} needs support — potentially a supportive pairing.`);
    if(rz[id]==='green' && lz[id]==='red')
      insights.push(`${escapeHtml(right.name)} is strong in <strong>${sec.title}</strong> where ${escapeHtml(left.name)} needs support — potentially a supportive pairing.`);
    if(lz[id]==='red' && rz[id]==='red')
      insights.push(`Both students scored in the Support zone for <strong>${sec.title}</strong> — this pairing may struggle without teacher scaffolding.`);
  });

  // Goal orientation dynamics
  const goalTop = (rec) => {
    const secG = secs.find(x=>x.id==='G');
    if(!secG) return null;
    const res = computeSectionResult(secG, rec.answers, scaleMax);
    const entries = Object.entries(res.domainScores || {}).sort((a,b)=>b[1]-a[1]);
    return entries.length ? entries[0][0] : null;
  };
  const lg = goalTop(left), rg = goalTop(right);
  if(lg === 'mastery' && rg === 'performance_avoidance')
    insights.push(`${escapeHtml(left.name)}'s mastery orientation could positively model resilience for ${escapeHtml(right.name)}, who tends toward performance-avoidance.`);
  if(rg === 'mastery' && lg === 'performance_avoidance')
    insights.push(`${escapeHtml(right.name)}'s mastery orientation could positively model resilience for ${escapeHtml(left.name)}, who tends toward performance-avoidance.`);
  if(lg === 'performance_avoidance' && rg === 'performance_avoidance')
    insights.push(`Both students lean toward performance-avoidance — pairing them may amplify avoidance behaviour. Consider adding a mastery-oriented third member or teacher check-ins.`);

  // Shared subject strengths
  if(sharedSubjects && sharedSubjects.length >= 2)
    insights.push(`Both students are strong in ${sharedSubjects.length} shared subjects (${sharedSubjects.map(s=>escapeHtml(s)).join(', ')}) — a natural pairing for peer teaching in those areas.`);
  else if(sharedSubjects && sharedSubjects.length === 1)
    insights.push(`Both are strong in <strong>${escapeHtml(sharedSubjects[0])}</strong> — a natural pairing for peer collaboration in that subject.`);

  // Shared interests
  if(sharedInterests.length >= 2)
    insights.push(`Strong shared-interest base (${sharedInterests.length} interests in common) — good for interest-driven project work or contexts.`);
  else if(sharedInterests.length === 1)
    insights.push(`One shared interest (${escapeHtml(sharedInterests[0])}) — a possible bridge for early rapport.`);
  else
    insights.push(`No shared interests recorded — you may need to bridge with a teacher-chosen context or common project theme.`);

  if(!insights.length) insights.push('No strong complementary or conflicting patterns detected.');
  return insights;
}

/* ══════════════════════════════════════════════════════════════
   GROUPING SUGGESTIONS
   ══════════════════════════════════════════════════════════════ */

const LESSON_TYPES = {
  group_discussion: {
    label: 'Group Discussion',
    description: 'Balances confident participators with quieter students; avoids concentrating performance-avoidance in one group.',
    trait: 'participationConfidence',
    rationaleTemplate: 'Anchored by strong participation; distributed so quieter students have supportive peers to model from.',
  },
  hands_on_project: {
    label: 'Hands-on Project',
    description: 'Distributes students with hands-on preference across groups, and mixes collaborative and independent workers.',
    trait: 'kinestheticPreference',
    rationaleTemplate: 'Hands-on learners lead the practical work; independent workers balance the group so it doesn\'t become chaotic.',
  },
  presentation_prep: {
    label: 'Presentation Prep',
    description: 'Pairs performance-avoidance students with mastery-oriented supportive peers.',
    trait: 'performanceAvoidance',
    rationaleTemplate: 'Performance-avoidance students supported by mastery-oriented peers who model resilience and reduce fear of failure.',
  },
  peer_feedback: {
    label: 'Peer Feedback / Review',
    description: 'Distributes mastery orientation across groups — these students give more constructive feedback.',
    trait: 'masteryOrientation',
    rationaleTemplate: 'Mastery-oriented students distributed as feedback anchors; they emphasise understanding over rank.',
  },
  independent_work: {
    label: 'Independent Work',
    description: 'For independent work, seating rather than grouping matters. This shows a solo-preference ranking to guide seating.',
    trait: 'independentPreference',
    rationaleTemplate: 'Students who thrive independently seated with space; students needing support seated near the teacher.',
  },
};

function computeGroupingTraits(rec){
  const secs = SECTIONS[rec.level];
  const scaleMax = scaleMaxFor(rec.level);
  const a = rec.answers || {};

  // Aggregated traits
  const secB = secs.find(x=>x.id==='B');
  const secG = secs.find(x=>x.id==='G');
  const secE = secs.find(x=>x.id==='E');
  const secD = secs.find(x=>x.id==='D');

  const bScores = {};
  if(secB) secB.items.forEach(it => bScores[it.domain] = (bScores[it.domain]||0) + (a[it.id]||0));

  const gScores = {};
  if(secG) secG.items.forEach(it => gScores[it.domain] = (gScores[it.domain]||0) + (a[it.id]||0));

  const eRes = secE ? computeSectionResult(secE, a, scaleMax) : {compositeScore:0, compositeMax:1};
  const dRes = secD ? computeSectionResult(secD, a, scaleMax) : {compositeScore:0, compositeMax:1};

  const aRes = computeSectionResult(secs.find(x=>x.id==='A'), a, scaleMax);
  const cRes = computeSectionResult(secs.find(x=>x.id==='C'), a, scaleMax);

  return {
    rec,
    participationConfidence: (eRes.compositeScore/(eRes.compositeMax||1)) + (dRes.compositeScore/(dRes.compositeMax||1)),
    kinestheticPreference: bScores.kinesthetic || 0,
    independentPreference: bScores.independent || 0,
    socialPreference: bScores.social || 0,
    performanceAvoidance: gScores.performance_avoidance || 0,
    masteryOrientation: gScores.mastery || 0,
    zoneA: getZone(aRes.compositeScore, aRes.compositeMax, aRes.isPositive),
    zoneC: getZone(cRes.compositeScore, cRes.compositeMax, cRes.isPositive),
    zoneD: getZone(dRes.compositeScore, dRes.compositeMax, dRes.isPositive),
    zoneE: getZone(eRes.compositeScore, eRes.compositeMax, eRes.isPositive),
  };
}

function buildGroupings(students, lessonType, groupSize){
  if(!students.length) return [];
  const cfg = LESSON_TYPES[lessonType];
  if(!cfg) return [];
  const traits = students.map(computeGroupingTraits);
  // Sort DESC on trait for most lesson types, ASC for performance_avoidance-based (distribute avoidance evenly)
  const asc = (lessonType === 'presentation_prep');
  traits.sort((a,b) => asc ? a[cfg.trait]-b[cfg.trait] : b[cfg.trait]-a[cfg.trait]);
  const numGroups = Math.max(1, Math.ceil(students.length / groupSize));
  const groups = Array.from({length: numGroups}, () => []);
  // Snake-order distribution: 0,1,2,...N-1,N-1,...,1,0,0,1,...
  let idx = 0, dir = 1;
  traits.forEach(t => {
    groups[idx].push(t);
    if(numGroups === 1) return;
    if(dir === 1){ if(idx === numGroups-1) dir = -1; else idx++; }
    else { if(idx === 0) dir = 1; else idx--; }
  });

  return groups.map((g, gi) => ({
    number: gi+1,
    members: g,
    rationale: buildGroupRationale(g, lessonType),
  }));
}

function buildGroupRationale(members, lessonType){
  const cfg = LESSON_TYPES[lessonType];
  if(!members.length) return '';
  const parts = [];

  if(lessonType === 'group_discussion'){
    const strong = members.filter(m => m.zoneE === 'green' || m.zoneD === 'green');
    const shy = members.filter(m => m.performanceAvoidance >= 3);
    if(strong.length) parts.push(`${strong.map(s=>escapeHtml(s.rec.name)).join(' and ')} can help anchor discussion.`);
    if(shy.length) parts.push(`${shy.map(s=>escapeHtml(s.rec.name)).join(' and ')} may need explicit invitation to contribute — consider a "write first, then share" opener.`);
  }
  if(lessonType === 'hands_on_project'){
    const hoLovers = members.filter(m => m.kinestheticPreference >= 2);
    const solo = members.filter(m => m.independentPreference > m.socialPreference);
    if(hoLovers.length) parts.push(`${hoLovers.map(s=>escapeHtml(s.rec.name)).join(' and ')} strongly prefer hands-on work — natural leads.`);
    if(solo.length) parts.push(`${solo.map(s=>escapeHtml(s.rec.name)).join(' and ')} tend to prefer solo work — assign them a distinct subtask within the group.`);
  }
  if(lessonType === 'presentation_prep'){
    const avoiders = members.filter(m => m.performanceAvoidance >= 3);
    const supporters = members.filter(m => m.masteryOrientation >= 3 && m.zoneE === 'green');
    if(avoiders.length) parts.push(`${avoiders.map(s=>escapeHtml(s.rec.name)).join(' and ')} may fear presenting — pair for rehearsal, offer private feedback.`);
    if(supporters.length) parts.push(`${supporters.map(s=>escapeHtml(s.rec.name)).join(' and ')} bring mastery orientation and social support — well-placed here.`);
  }
  if(lessonType === 'peer_feedback'){
    const mastery = members.filter(m => m.masteryOrientation >= 3);
    if(mastery.length) parts.push(`${mastery.map(s=>escapeHtml(s.rec.name)).join(' and ')} give feedback that focuses on understanding rather than rank.`);
  }
  if(lessonType === 'independent_work'){
    parts.push('For this activity, seating matters more than grouping — see individual ranking above.');
  }

  const supportZones = members.filter(m => m.zoneA === 'red' || m.zoneC === 'red');
  if(supportZones.length) parts.push(`Watch for: ${supportZones.map(s=>escapeHtml(s.rec.name)).join(', ')} scored in Support zone for behavioural or attention domains — check in briefly during activity.`);

  if(!parts.length) parts.push(cfg.rationaleTemplate);
  return parts.join(' ');
}

function performImport(incoming, mode){
  let added = 0, updated = 0, skipped = 0;
  const currentById = {};
  state.students.forEach(s => currentById[s.id] = s);

  if(mode === 'overwrite_all'){
    // Delete all first
    state.students.forEach(s => deleteStudentRecord(s.id));
    incoming.forEach(s => { s = migrateStudent(s); saveStudent(s); added++; });
    return { added, updated, skipped };
  }

  incoming.forEach(s => {
    s = migrateStudent(s);
    if(currentById[s.id]){
      if(mode === 'replace'){ saveStudent(s); updated++; }
      else skipped++;
    } else {
      saveStudent(s); added++;
    }
  });
  return { added, updated, skipped };
}

const App = {

  // Full-render version (used for level clicks, where there's no focused text field to disturb)
  updateDraftField(key,val){ state.draft[key]=val; render(); },

  // This preserves keyboard focus during typing.
  updateDraftName(val){
    state.draft.name = val;
    App._syncBeginButton();
  },
  updateDraftAge(val){
    state.draft.age = val;
    // Auto-suggest a level from age, but only if the teacher hasn't set one yet
    if(!state.draft._levelChosen){
      const suggestion = suggestLevel(val);

        App._syncLevelOptions();
      }
    }
    App._syncBeginButton();
  },
  updateDraftBirthdate(val){
    state.draft.birthdate = val;

      state.draft.age = String(age);
      // Silently update the age input in place (no re-render, preserves focus)
      const ageEl = document.getElementById('f-age');
      if(ageEl) ageEl.value = String(age);
      if(!state.draft._levelChosen){
        const suggestion = suggestLevel(age);
        if(suggestion){
          state.draft.level = suggestion;
          App._syncLevelOptions();
        }
      }

    App._syncBeginButton();
  },

    App._syncBeginButton();
  },
  _syncBeginButton(){
    const btn = document.getElementById('btn-begin');
    if(!btn) return;
    const d = state.draft;
    const enabled = !!(d && d.name && d.name.trim() && d.level);
    btn.disabled = !enabled;
  },
  _syncLevelOptions(){
    const container = document.getElementById('level-options');
    if(container) container.innerHTML = renderLevelOptionsHTML(state.draft);
  },

    if(!state.draft.name.trim() || !state.draft.level) return;

  },

    render({preserveScroll:true});

    if(!state.draft.subjectStrengths) state.draft.subjectStrengths = [];

  jumpToStep(i){ state.draft.sectionIndex = i; render(); },
  stepNext(){
    const order = ['A','B','C','D','E','F','G','H'];
    if(state.draft.sectionIndex < order.length-1){ state.draft.sectionIndex++; render(); }
  },
  stepBack(){
    if(state.draft.sectionIndex===0){ App.goDashboard(); return; }
    state.draft.sectionIndex--; render();
  },

  finishAssessment(){
    const rec = state.draft;
    if(rec._studentId){
      // Reassessment path — update existing student
      const existing = state.students.find(s => s.id === rec._studentId);
      if(!existing){ alert('Original record not found; could not save reassessment.'); return; }
      // Snapshot current data into history before replacing
      existing.history = existing.history || [];
      existing.history.push({
        date: existing.updatedAt || existing.createdAt || Date.now(),
        answers: existing.answers || {},
        interestsChecked: existing.interestsChecked || [],
        interestsFree: existing.interestsFree || '',
        teacherObs: existing.teacherObs || {},
      });
      // Replace current with new answers
      existing.answers = rec.answers;
      existing.interestsChecked = rec.interestsChecked;
      existing.interestsFree = rec.interestsFree;
      // Allow editable identity + profile fields to update too
      existing.name = rec.name;
      existing.age = rec.age;
      existing.className = rec.className;
      existing.birthdate = rec.birthdate || '';
      existing.subjectStrengths = rec.subjectStrengths || [];
      existing.likes = rec.likes || '';
      existing.dislikes = rec.dislikes || '';
      const ok = saveStudent(existing);
      if(!ok){ alert('Could not save. Please try again.'); return; }
      state.activeId = existing.id;
    } else {
      // New student path
      if(!rec.history) rec.history = [];
      if(rec.notes === undefined) rec.notes = '';
      if(rec.birthdate === undefined) rec.birthdate = '';
      if(!rec.subjectStrengths) rec.subjectStrengths = [];

      if(!rec.posts) rec.posts = [];
      const existingIdx = state.students.findIndex(s=>s.id===rec.id);
      const ok = saveStudent(rec);
      if(!ok){ alert('Could not save this record. Please try again.'); return; }
      if(existingIdx>=0) state.students[existingIdx]=rec; else state.students.unshift(rec);
      state.activeId = rec.id;
    }
    state.view='report'; state.draft=null;
    render();
  },

    render({preserveScroll:true});
  },
  updateOtherEnglishTest(id, field, val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec || !rec.otherEnglishTests) return;
    const test = rec.otherEnglishTests.find(e => e.id === id);
    if(!test) return;
    test[field] = val;
    saveStudent(rec);
    // No re-render — silent update preserves focus
  },
  deleteOtherEnglishTest(id){
    if(!confirm('Delete this test entry? This cannot be undone.')) return;
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec || !rec.otherEnglishTests) return;
    rec.otherEnglishTests = rec.otherEnglishTests.filter(e => e.id !== id);
    saveStudent(rec);
    render({preserveScroll:true});
  },
  updatePhysicalMedicalNotes(val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    rec.physicalMedicalNotes = val;
    saveStudent(rec);
  },

  /* ── Communication & Personal Context (Tier 1 family + Tier 2) ── */
  updateFamilyContext(val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    rec.familyContext = val;
    saveStudent(rec);
  },
  updateSupportNetwork(val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    rec.supportNetwork = val;
    saveStudent(rec);
  },
  setBestTimeOfDay(val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    rec.bestTimeOfDay = val;
    saveStudent(rec);
    render({preserveScroll:true});
  },
  toggleCommunicationPref(item){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    if(!rec.communicationPreferences) rec.communicationPreferences = [];
    const idx = rec.communicationPreferences.indexOf(item);
    if(idx>=0) rec.communicationPreferences.splice(idx,1);
    else rec.communicationPreferences.push(item);
    saveStudent(rec);
    render({preserveScroll:true});
  },
  setGroupRoleTendency(val){
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    rec.groupRoleTendency = val;
    saveStudent(rec);
    render({preserveScroll:true});
  },

  /* ── Posts / Timeline ── */
  addStudentPost(){
    const input = document.getElementById('new-post-content');
    if(!input) return;
    const content = input.value.trim();
    if(!content) return;
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec) return;
    if(!rec.posts) rec.posts = [];
    rec.posts.push({
      id: 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6),
      timestamp: Date.now(),
      content: content,
    });
    input.value = '';
    saveStudent(rec);
    render();
  },

  startEditPost(postId){
    state.editingPostId = postId;
    render();
  },

  cancelEditPost(){
    state.editingPostId = null;
    render();
  },

  saveEditPost(postId){
    const input = document.getElementById('edit-post-' + postId);
    if(!input) return;
    const content = input.value.trim();
    if(!content) return;
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec || !rec.posts) return;
    const post = rec.posts.find(p => p.id === postId);
    if(!post) return;
    post.content = content;
    post.editedAt = Date.now();
    state.editingPostId = null;
    saveStudent(rec);
    render();
  },

  deleteStudentPost(postId){
    if(!confirm('Delete this post? This cannot be undone.')) return;
    const rec = state.students.find(s=>s.id===state.activeId);
    if(!rec || !rec.posts) return;
    rec.posts = rec.posts.filter(p => p.id !== postId);
    saveStudent(rec);
    render();
  },

  quickMove(id, choice){
    if(!choice) return;
    const rec = state.students.find(s=>s.id===id);
    if(!rec) return;
    let target;
    if(choice === '__unassign__'){
      target = '';
    } else if(choice === '__new__'){
      const entered = prompt('Enter a new class name:', '');
      if(entered === null) return;
      target = entered.trim();
    } else if(choice.indexOf('__cls__') === 0){
      target = choice.slice(7);
    } else return;
    rec.className = target;
    saveStudent(rec);
    render(); // full re-render OK — regrouping the dashboard is the whole point
  },

  confirmDelete(id){
    const rec = state.students.find(s=>s.id===id);
    if(!rec) return;
    if(!confirm('Delete the record for '+rec.name+'? This cannot be undone.')) return;
    deleteStudentRecord(id);
    state.students = state.students.filter(s=>s.id!==id);
    App.goDashboard();
  },

  /* ── Reassessment ── */
  startReassessment(id){
    const existing = state.students.find(s=>s.id===id);
    if(!existing) return;
    state.draft = {
      id: uid(),
      _studentId: id,
      _levelChosen: true,
      name: existing.name,
      age: existing.age,
      birthdate: existing.birthdate || '',
      className: existing.className || '',
      level: existing.level,
      notes: existing.notes || '',
      subjectStrengths: (existing.subjectStrengths || []).slice(),
      likes: existing.likes || '',
      dislikes: existing.dislikes || '',
      sectionIndex: 0,
      answers: {},
      interestsChecked: [],
      interestsFree: '',
      teacherObs: existing.teacherObs || { attention:'', social:'', emotional:'', workHabits:'' },
      createdAt: Date.now(),
    };
    state.view = 'assess';
    render();
  },

  /* ── New views ── */
  goData(){ state.view = 'data'; render(); },

  openClassOverview(className){
    state.activeClassName = className;
    state.view = 'classOverview';
    render();
  },

  openCompare(className){
    state.activeClassName = className || null;
    state.compareLeftId = null;
    state.compareRightId = null;
    state.view = 'compare';
    render();
  },

  selectCompare(side, id){
    if(side === 'left') state.compareLeftId = id;
    else state.compareRightId = id;
    render();
  },

  openGrouping(className){
    state.activeClassName = className;
    state.groupingLesson = state.groupingLesson || 'group_discussion';
    state.groupingSize = state.groupingSize || 4;
    state.groupingResults = null;
    state.view = 'grouping';
    render();
  },

  updateGroupingLesson(v){ state.groupingLesson = v; state.groupingResults = null; render(); },
  updateGroupingSize(v){ state.groupingSize = parseInt(v, 10); state.groupingResults = null; render(); },
  generateGroupings(){
    const className = state.activeClassName;
    const students = state.students.filter(s => (s.className||'').trim() === className);
    state.groupingResults = buildGroupings(students, state.groupingLesson, state.groupingSize);
    render();
  },

  /* ── Export / Import ── */
  exportAll(){
    const payload = {
      _tool: 'Learner Profile System',
      _version: 1,
      exportedAt: new Date().toISOString(),
      students: state.students,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `learner-profiles-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  handleImportFile(input){
    const file = input.files && input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = JSON.parse(e.target.result);
        if(!data.students || !Array.isArray(data.students)) throw new Error('Invalid file format');
        const mode = document.querySelector('input[name="import-mode"]:checked').value;
        const result = performImport(data.students, mode);
        state.students = loadAllStudents();
        alert(`Import complete. Added ${result.added}, updated ${result.updated}, skipped ${result.skipped}.`);
        render();
      } catch(err){
        alert('Could not import file: ' + err.message);
      }
    };
    reader.readAsText(file);
  },
};
window.App = App;

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return String(str||'').replace(/'/g, "\\'"); }

init();
})();
</script>
