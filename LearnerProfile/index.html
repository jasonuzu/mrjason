<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Classroom Designer</title>
    <style>
        :root { --primary: #4a6fa5; --draw-mode: #28a745; --bg: #f8f9fa; --panel-bg: #ffffff; --border: #cccccc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; user-select: none; }
        #toolbar { width: 320px; background-color: var(--panel-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; overflow-y: auto; }
        .section { border-top: 1px solid #eee; padding-top: 15px; }
        .section-title { font-size: 0.8rem; text-transform: uppercase; color: #777; margin-bottom: 10px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; background-color: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.danger { background-color: #d9534f; }
        input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        #canvas-container { flex-grow: 1; position: relative; overflow: auto; background-color: #e5e5e5; display: flex; justify-content: center; align-items: center; padding: 50px; }
        #classroom-canvas { width: 1000px; height: 700px; background-color: white; background-size: 20px 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .movable-element { position: absolute; border: 2px solid #333; background-color: #fff; display: flex; align-items: center; justify-content: center; cursor: move; font-weight: bold; padding: 5px; resize: both; overflow: hidden; min-width: 30px; min-height: 30px; }
        .movable-element.selected { outline: 3px solid #007bff; }
        .element-label { pointer-events: none; word-wrap: break-word; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h2>Classroom Plan</h2>
        <div class="section"><div class="section-title">Spawn/Draw</div>
            <button onclick="spawnItem('block')">Spawn Block</button>
            <button id="btn-draw" onclick="toggleDrawMode()">Draw Block</button>
        </div>
        <div class="section" id="inspector" style="display: none;">
            <div class="section-title">Properties</div>
            <label>Label:</label>
            <input type="text" id="prop-label" oninput="updateLabel()">
            <button class="danger" style="margin-top:10px; width:100%" onclick="deleteItem()">Delete Item</button>
        </div>
    </div>
    <div id="canvas-container"><div id="classroom-canvas" onmousedown="canvasMouseDown(event)"></div></div>

    <script>
        var canvas = document.getElementById('classroom-canvas'), selectedEl = null;
        var isDrawMode = false, isDrawingBox = false, currentBox = null, drawStartX, drawStartY;

        function spawnItem(type) {
            var el = document.createElement('div');
            el.className = 'movable-element';
            el.innerHTML = '<span class="element-label">New Block</span>';
            el.style.left = '50px'; el.style.top = '50px'; el.style.width = '100px'; el.style.height = '60px';
            el.onmousedown = function(e) { selectItem(el); };
            canvas.appendChild(el);
            selectItem(el);
        }

        function toggleDrawMode() {
            isDrawMode = !isDrawMode;
            document.getElementById('btn-draw').style.backgroundColor = isDrawMode ? 'var(--draw-mode)' : 'var(--primary)';
        }

        function canvasMouseDown(e) {
            if (!isDrawMode || e.target !== canvas) return;
            isDrawingBox = true;
            drawStartX = e.clientX - canvas.getBoundingClientRect().left;
            drawStartY = e.clientY - canvas.getBoundingClientRect().top;
            currentBox = document.createElement('div');
            currentBox.className = 'movable-element';
            currentBox.innerHTML = '<span class="element-label">Block</span>';
            currentBox.style.left = drawStartX + 'px'; currentBox.style.top = drawStartY + 'px';
            currentBox.onmousedown = function(ev) { selectItem(currentBox); };
            canvas.appendChild(currentBox);
        }

        document.onmousemove = function(e) {
            if (isDrawingBox && currentBox) {
                var curX = e.clientX - canvas.getBoundingClientRect().left;
                var curY = e.clientY - canvas.getBoundingClientRect().top;
                currentBox.style.width = Math.abs(curX - drawStartX) + 'px';
                currentBox.style.height = Math.abs(curY - drawStartY) + 'px';
            }
        }

        document.onmouseup = function() { if(isDrawingBox) { isDrawingBox = false; toggleDrawMode(); } }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            document.getElementById('inspector').style.display = 'block';
            document.getElementById('prop-label').value = el.querySelector('.element-label').innerText;
        }

        function updateLabel() {
            if (selectedEl) selectedEl.querySelector('.element-label').innerText = document.getElementById('prop-label').value;
        }

        function deleteItem() {
            if (selectedEl) { selectedEl.remove(); selectedEl = null; document.getElementById('inspector').style.display = 'none'; }
        }
        
        document.addEventListener('keydown', function(e) { if((e.key === 'Delete' || e.key === 'Backspace') && selectedEl) deleteItem(); });
    </script>
</body>
</html>
