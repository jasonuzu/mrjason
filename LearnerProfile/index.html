function renderPrintSummary(rec, lvl){
  const secs = SECTIONS[rec.level];
  const scaleMax = scaleMaxFor(rec.level);
  const date = new Date(rec.updatedAt||rec.createdAt).toLocaleDateString(undefined,{day:'numeric',month:'long',year:'numeric'});
  const ageDisplay = computeAge(rec.birthdate) !== null ? computeAge(rec.birthdate) : (rec.age || '?');

  // Compute all zones + scores
  const scoredIds = ['A','C','D','E'];
  const zoneRows = scoredIds.map(id => {
    const sec = secs.find(s=>s.id===id);
    if(!sec) return null;
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
    const zm = ZONE_META[zone];
    const matrix = ACTION_MATRIX[sec.id] && ACTION_MATRIX[sec.id][zone];
    return { sec, res, zone, zm, recommendation: matrix ? matrix.meaning : '' };
  }).filter(Boolean);

  // Learning preferences top 2
  const secB = secs.find(s=>s.id==='B');
  let topPrefs = '—';
  if(secB){
    const bScores = {};
    secB.items.forEach(it => bScores[it.domain] = (bScores[it.domain]||0) + (rec.answers[it.id]||0));
    const sorted = Object.entries(bScores).sort((a,b)=>b[1]-a[1]);
    topPrefs = sorted.slice(0,2).map(([d])=>DOMAIN_LABELS[d]||d).join(', ');
  }

  // Goal orientation
  const secG = secs.find(s=>s.id==='G');
  let goalOrientation = '—', goalNote = '';
  if(secG){
    const gScores = {};
    secG.items.forEach(it => gScores[it.domain] = (gScores[it.domain]||0) + (rec.answers[it.id]||0));
    const sorted = Object.entries(gScores).sort((a,b)=>b[1]-a[1]);
    if(sorted.length){
      const top = sorted[0][0];
      const guide = GOAL_GUIDE[top];
      goalOrientation = guide ? guide.label : top;
      goalNote = guide ? guide.text.split('.').slice(0,2).join('.') + '.' : '';
    }
  }

  // Posts (newest first, compact)
  const posts = (rec.posts||[]).slice().sort((a,b)=>b.timestamp-a.timestamp);

  // Cambridge exams summary
  const cambridgeSummary = (rec.cambridgeExams||[]).map(e => {
    const type = CAMBRIDGE_EXAM_TYPES.find(t=>t.value===e.testType);
    const label = type ? type.label : (e.testType||'Unknown');
    const dateStr = e.date ? new Date(e.date).toLocaleDateString(undefined,{month:'short',year:'numeric'}) : '';
    return `${label}${dateStr?' ('+dateStr+')':''}: ${e.total||'—'}`;
  }).join('; ');

  const otherTestsSummary = (rec.otherEnglishTests||[]).map(t => {
    const dateStr = t.date ? new Date(t.date).toLocaleDateString(undefined,{month:'short',year:'numeric'}) : '';
    return `${t.testName||'Test'}${dateStr?' ('+dateStr+')':''}: ${t.score||'—'}`;
  }).join('; ');

  return `
  <div class="print-summary">
    <div class="ps-header">
      <h1>Learner Profile — ${escapeHtml(rec.name)}</h1>
      <div class="ps-meta">${lvl.label} · ${lvl.grades} · Age ${ageDisplay} · Class: ${escapeHtml(rec.className||'—')} · Assessed: ${date}${rec.birthdate ? ' · DOB: '+escapeHtml(rec.birthdate) : ''}</div>
    </div>

    ${rec.goal ? `<div class="ps-goal-box"><strong>Goal:</strong> ${escapeHtml(rec.goal)}</div>` : ''}

    <div class="ps-section">
      <div class="ps-section-title">Assessment Summary</div>
      <table class="ps-zone-table">
        <thead><tr><th>Domain</th><th>Score</th><th>Zone</th><th>Interpretation</th></tr></thead>
        <tbody>
          ${zoneRows.map(r => {
            const zoneColor = r.zone==='green'?'#2E7D32':r.zone==='yellow'?'#E8A000':'#C62828';
            return `<tr>
              <td><strong>${r.sec.title}</strong></td>
              <td>${r.res.compositeScore} / ${r.res.compositeMax}</td>
              <td><span class="ps-zone-dot" style="background:${zoneColor};"></span>${r.zm.label}</td>
              <td>${escapeHtml(r.recommendation)}</td>
            </tr>`;
          }).join('')}
          <tr>
            <td><strong>Learning Preferences</strong></td>
            <td colspan="2">Top: ${escapeHtml(topPrefs)}</td>
            <td>Descriptive only — not predictive of outcomes</td>
          </tr>
          <tr>
            <td><strong>Goal Orientation</strong></td>
            <td colspan="2">${escapeHtml(goalOrientation)}</td>
            <td>${escapeHtml(goalNote)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="ps-section">
      <div class="ps-section-title">Student Profile</div>
      <div class="ps-grid">
        ${(rec.subjectStrengths||[]).length ? `<dt>Subject strengths</dt><dd>${(rec.subjectStrengths||[]).map(s=>escapeHtml(s)).join(', ')}</dd>` : ''}
        ${rec.likes ? `<dt>Likes</dt><dd>${escapeHtml(rec.likes)}</dd>` : ''}
        ${rec.dislikes ? `<dt>Dislikes</dt><dd>${escapeHtml(rec.dislikes)}</dd>` : ''}
        ${(rec.interestsChecked||[]).length ? `<dt>Interests</dt><dd>${(rec.interestsChecked||[]).map(i=>escapeHtml(i)).join(', ')}</dd>` : ''}
        ${rec.interestsFree ? `<dt>Other interests</dt><dd>${escapeHtml(rec.interestsFree)}</dd>` : ''}
      </div>
    </div>

    <div class="ps-section">
      <div class="ps-section-title">Learning Access</div>
      <div class="ps-grid">
        ${(rec.accommodations||[]).length ? `<dt>Accommodations</dt><dd>${(rec.accommodations||[]).map(a=>escapeHtml(a)).join(', ')}</dd>` : ''}
        ${rec.accommodationNotes ? `<dt>Accommodation notes</dt><dd>${escapeHtml(rec.accommodationNotes)}</dd>` : ''}
        ${rec.attendancePattern ? `<dt>Attendance</dt><dd>${escapeHtml(ATTENDANCE_OPTIONS.find(o=>o.value===rec.attendancePattern)?.label || rec.attendancePattern)}${rec.attendanceNote ? ' — '+escapeHtml(rec.attendanceNote) : ''}</dd>` : ''}
        ${rec.firstLanguage ? `<dt>First language</dt><dd>${escapeHtml(rec.firstLanguage)}</dd>` : ''}
        ${rec.otherLanguages ? `<dt>Other languages</dt><dd>${escapeHtml(rec.otherLanguages)}</dd>` : ''}
        ${rec.englishProficiency ? `<dt>English proficiency</dt><dd>${escapeHtml(PROFICIENCY_LEVELS.find(o=>o.value===rec.englishProficiency)?.label || rec.englishProficiency)}${rec.cefrLevel ? ' (CEFR: '+escapeHtml(rec.cefrLevel)+')' : ''}</dd>` : rec.cefrLevel ? `<dt>CEFR level</dt><dd>${escapeHtml(rec.cefrLevel)}</dd>` : ''}
        ${rec.chineseProficiency ? `<dt>Chinese proficiency</dt><dd>${escapeHtml(PROFICIENCY_LEVELS.find(o=>o.value===rec.chineseProficiency)?.label || rec.chineseProficiency)}</dd>` : ''}
        ${cambridgeSummary ? `<dt>Cambridge exams</dt><dd>${escapeHtml(cambridgeSummary)}</dd>` : ''}
        ${otherTestsSummary ? `<dt>Other English tests</dt><dd>${escapeHtml(otherTestsSummary)}</dd>` : ''}
        ${rec.physicalMedicalNotes ? `<dt>Physical / medical</dt><dd>${escapeHtml(rec.physicalMedicalNotes)}</dd>` : ''}
      </div>
    </div>

    ${(rec.communicationPreferences?.length || rec.bestTimeOfDay || rec.groupRoleTendency || rec.familyContext || rec.supportNetwork) ? `
    <div class="ps-section">
      <div class="ps-section-title">Communication &amp; Context</div>
      <div class="ps-grid">
        ${rec.bestTimeOfDay ? `<dt>Best time of day</dt><dd>${escapeHtml(TIME_OF_DAY_OPTIONS.find(o=>o.value===rec.bestTimeOfDay)?.label || rec.bestTimeOfDay)}</dd>` : ''}
        ${(rec.communicationPreferences||[]).length ? `<dt>Communication prefs</dt><dd>${rec.communicationPreferences.map(c=>escapeHtml(c)).join(', ')}</dd>` : ''}
        ${rec.groupRoleTendency ? `<dt>Group role</dt><dd>${escapeHtml(GROUP_ROLE_OPTIONS.find(o=>o.value===rec.groupRoleTendency)?.label || rec.groupRoleTendency)}</dd>` : ''}
        ${rec.familyContext ? `<dt>Family context</dt><dd>${escapeHtml(rec.familyContext)}</dd>` : ''}
        ${rec.supportNetwork ? `<dt>Support network</dt><dd>${escapeHtml(rec.supportNetwork)}</dd>` : ''}
      </div>
    </div>
    ` : ''}

    ${rec.notes ? `
    <div class="ps-section">
      <div class="ps-section-title">Additional Notes</div>
      <div class="ps-inline-list">${escapeHtml(rec.notes)}</div>
    </div>
    ` : ''}

    ${(rec.teacherObs && Object.values(rec.teacherObs).some(v=>v)) ? `
    <div class="ps-section">
      <div class="ps-section-title">Teacher Observation</div>
      <div class="ps-grid">
        ${rec.teacherObs.attention ? `<dt>Attention / Focus</dt><dd>${escapeHtml(rec.teacherObs.attention)}</dd>` : ''}
        ${rec.teacherObs.social ? `<dt>Social Interaction</dt><dd>${escapeHtml(rec.teacherObs.social)}</dd>` : ''}
        ${rec.teacherObs.emotional ? `<dt>Emotional Regulation</dt><dd>${escapeHtml(rec.teacherObs.emotional)}</dd>` : ''}
        ${rec.teacherObs.workHabits ? `<dt>Work Habits</dt><dd>${escapeHtml(rec.teacherObs.workHabits)}</dd>` : ''}

    ${posts.length ? `

      <div class="ps-posts">
        ${posts.map(p => { const src = p.source && p.source !== 'Learner Profile' ? p.source : ''; return `<div class="ps-post"><span class="ps-post-date">${formatPostTimestamp(p.timestamp)}${p.editedAt?' (edited)':''}${src ? ' · ' + escapeHtml(src) : ''}</span><br>${escapeHtml(p.content)}</div>`; }).join('')}

function renderScoredSection(sec, rec, lvl, scaleMax){
  const res = computeSectionResult(sec, rec.answers, scaleMax);
  const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
  const zm = ZONE_META[zone];
  const matrixEntry = (ACTION_MATRIX[sec.id] && ACTION_MATRIX[sec.id][zone]) || null;

  // Trend: compare to previous assessment if there is one
  let trendBadge = '';
  if(rec.history && rec.history.length){
    const prev = rec.history[rec.history.length-1];
    const prevRes = computeSectionResult(sec, prev.answers || {}, scaleMax);
    const prevZone = getZone(prevRes.compositeScore, prevRes.compositeMax, prevRes.isPositive);
    if(prevZone !== zone){
      const zoneOrder = { green:0, yellow:1, red:2 };
      const improved = zoneOrder[zone] < zoneOrder[prevZone];
      trendBadge = improved
        ? `<span class="trend-badge trend-improved" title="Improved from ${ZONE_META[prevZone].label}">↑ ${ZONE_META[prevZone].label} → ${zm.label}</span>`
        : `<span class="trend-badge trend-worsened" title="Declined from ${ZONE_META[prevZone].label}">↓ ${ZONE_META[prevZone].label} → ${zm.label}</span>`;
    } else {
      trendBadge = `<span class="trend-badge trend-same" title="Unchanged since last assessment">= no change</span>`;
    }
  }

  return `
  <div class="section-block">
    <div class="sb-head">
      <div>
        <div class="sb-title">${sec.title}${trendBadge}</div>
        <div class="sb-domain">${sec.domainLabel}</div>
      </div>
      <span class="zone-pill" style="background:${zm.bg};color:${zm.text};border-color:${zm.border};">${zm.label}</span>
    </div>

    <div class="score-bar-label">
      <span>${res.isPositive ? 'Strength score' : 'Difficulty score'}</span>
      <span class="mono">${res.compositeScore} / ${res.compositeMax}</span>
    </div>
    <div class="score-bar-track">
      <div class="score-bar-fill" style="width:${res.compositeMax? (res.compositeScore/res.compositeMax*100):0}%;background:${zm.text};"></div>
    </div>

    <div style="margin-top:16px;">
      ${sec.items.map(it=>{
        const val = rec.answers[it.id];
        const label = LEVEL_META[rec.level].scale[val] || '—';
        return `<div class="item-row"><span class="it-text">${escapeHtml(it.text)}</span><span class="item-tag">${label}</span></div>`;
      }).join('')}
    </div>

    ${matrixEntry ? `
      <div class="strategy-box" style="background:${zm.bg};">
        <div class="sx-label" style="color:${zm.text};">What this means &amp; recommended strategies</div>
        <p style="font-size:13px;color:var(--ink);margin:0 0 10px;">${matrixEntry.meaning}</p>
        <ul>${matrixEntry.actions.map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>` : ''}
  </div>`;
}

}

function studentsInClass(className){
  return state.students.filter(s => (s.className||'').trim() === (className||'').trim());
}

function renderClassOverview(){
  const className = state.activeClassName;
  const students = studentsInClass(className);

  if(students.length === 0){
    return `
    <div class="wrap">
      <button class="btn btn-ghost btn-sm no-print" onclick="App.goDashboard()" style="margin-bottom:18px;">← All records</button>
      <h1 style="font-size:24px;">${escapeHtml(className)}</h1>
      <p style="color:var(--ink-faint);">No students in this class yet.</p>
    </div>`;
  }

  // Compute per-domain zone distribution
  const zoneCounts = { A:{green:[],yellow:[],red:[]}, C:{green:[],yellow:[],red:[]}, D:{green:[],yellow:[],red:[]}, E:{green:[],yellow:[],red:[]} };
  const goalCounts = { mastery:[], performance_approach:[], performance_avoidance:[] };
  const interestCounts = {};
  const subjectStrengthCounts = {};
  const watchList = [];

  students.forEach(s => {
    const secs = SECTIONS[s.level];
    const scaleMax = scaleMaxFor(s.level);
    const studentReasons = [];
    ['A','C','D','E'].forEach(id => {
      const sec = secs.find(x => x.id === id);
      if(!sec) return;
      const res = computeSectionResult(sec, s.answers, scaleMax);
      const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
      zoneCounts[id][zone].push(s);
      if(zone === 'red') studentReasons.push(sec.title + ' (Support)');
    });
    // Goal orientation dominant
    const secG = secs.find(x => x.id === 'G');
    if(secG){
      const goalRes = computeSectionResult(secG, s.answers, scaleMax);
      const entries = Object.entries(goalRes.domainScores || {}).sort((a,b)=>b[1]-a[1]);
      if(entries.length){
        const top = entries[0][0];
        goalCounts[top].push(s);
        if(top === 'performance_avoidance') studentReasons.push('Performance-avoidance dominant');
      }
    }
    // Interests
    (s.interestsChecked || []).forEach(i => {
      if(!interestCounts[i]) interestCounts[i] = [];
      interestCounts[i].push(s);
    });
    // Subject strengths
    (s.subjectStrengths || []).forEach(sub => {
      if(!subjectStrengthCounts[sub]) subjectStrengthCounts[sub] = [];
      subjectStrengthCounts[sub].push(s);
    });
    if(studentReasons.length) watchList.push({ student:s, reasons:studentReasons });
  });

  const domainConfig = [
    { id:'A', label:'Feelings & Behaviour' },
    { id:'C', label:'Attention & Self-Regulation' },
    { id:'D', label:'Motivation & Confidence' },
    { id:'E', label:'Social-Emotional' },
  ];

  const interestsSorted = Object.entries(interestCounts).sort((a,b)=>b[1].length-a[1].length);
  const subjectsSorted = Object.entries(subjectStrengthCounts).sort((a,b)=>b[1].length-a[1].length);

  return `
  <div class="wrap">
    <button class="btn btn-ghost btn-sm no-print" onclick="App.goDashboard()" style="margin-bottom:18px;">← All records</button>
    <div style="margin-bottom:20px;">

function renderCompare(){

  <div class="wrap">
    <button class="btn btn-ghost btn-sm no-print" onclick="${state.activeClassName ? `App.openClassOverview('${escapeAttr(state.activeClassName)}')` : 'App.goDashboard()'}" style="margin-bottom:18px;">← Back</button>

function renderCompareBody(left, right){
  const rows = [];
  rows.push(['Name', escapeHtml(left.name), escapeHtml(right.name)]);
  const leftAge = computeAge(left.birthdate);
  const rightAge = computeAge(right.birthdate);
  rows.push(['Age', escapeHtml(String(leftAge !== null ? leftAge : (left.age||'?'))), escapeHtml(String(rightAge !== null ? rightAge : (right.age||'?')))]);
  if(left.birthdate || right.birthdate){
    rows.push(['Birthdate', escapeHtml(left.birthdate||'—'), escapeHtml(right.birthdate||'—')]);
  }
  rows.push(['Class', escapeHtml(left.className||'—'), escapeHtml(right.className||'—')]);
  rows.push(['Level', LEVEL_META[left.level].label, LEVEL_META[right.level].label]);

  // For each scored section, show zone for both
  const domainConfig = [
    { id:'A', label:'Feelings & Behaviour' },
    { id:'C', label:'Attention & Self-Regulation' },
    { id:'D', label:'Motivation & Confidence' },
    { id:'E', label:'Social-Emotional' },
  ];
  domainConfig.forEach(d => {
    rows.push([d.label, renderZoneCell(left, d.id), renderZoneCell(right, d.id)]);
  });

  // Preferences
  rows.push(['Top learning preference', getTopPreference(left, 'B'), getTopPreference(right, 'B')]);
  rows.push(['Dominant goal orientation', getTopPreference(left, 'G', GOAL_LABELS), getTopPreference(right, 'G', GOAL_LABELS)]);

  // Subject strengths
  const leftSubjects = new Set(left.subjectStrengths || []);
  const rightSubjects = new Set(right.subjectStrengths || []);
  const sharedSubjects = [...leftSubjects].filter(x => rightSubjects.has(x));
  if(leftSubjects.size || rightSubjects.size){
    rows.push(['Subject strengths', [...leftSubjects].map(i=>escapeHtml(i)).join(', ')||'—', [...rightSubjects].map(i=>escapeHtml(i)).join(', ')||'—']);
  }

  // Interests overlap
  const leftInterests = new Set(left.interestsChecked || []);
  const rightInterests = new Set(right.interestsChecked || []);
  const sharedInterests = [...leftInterests].filter(x => rightInterests.has(x));
  rows.push(['Interests', [...leftInterests].map(i=>escapeHtml(i)).join(', ')||'—', [...rightInterests].map(i=>escapeHtml(i)).join(', ')||'—']);

  // Likes / dislikes
  if(left.likes || right.likes) rows.push(['Likes', escapeHtml(left.likes||'—'), escapeHtml(right.likes||'—')]);
  if(left.dislikes || right.dislikes) rows.push(['Dislikes', escapeHtml(left.dislikes||'—'), escapeHtml(right.dislikes||'—')]);

  const insights = buildComparisonInsights(left, right, sharedInterests, sharedSubjects);

  return `
    <table class="compare-table">
      <thead><tr><th></th><th>${escapeHtml(left.name)}</th><th>${escapeHtml(right.name)}</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody>
    </table>

    ${sharedInterests.length ? `<div class="stat-card" style="margin-bottom:16px;background:var(--primary-light);border-color:var(--primary-mid);"><div class="stat-title" style="color:var(--primary);">Shared interests (${sharedInterests.length})</div><div>${sharedInterests.map(i=>`<span class="name-chip" style="background:var(--primary-mid);color:var(--primary);">${escapeHtml(i)}</span>`).join('')}</div></div>` : ''}

    ${sharedSubjects.length ? `<div class="stat-card" style="margin-bottom:16px;background:var(--accent-light);border-color:var(--accent);"><div class="stat-title" style="color:var(--accent);">Shared subject strengths (${sharedSubjects.length})</div><div>${sharedSubjects.map(i=>`<span class="name-chip" style="background:var(--accent);color:#fff;">${escapeHtml(i)}</span>`).join('')}</div></div>` : ''}

    <div class="compare-insights">
      <h3>Pairing insights</h3>
      <ul>${insights.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
  `;
}

function renderZoneCell(rec, secId){
  const secs = SECTIONS[rec.level];
  const sec = secs.find(x => x.id === secId);
  if(!sec) return '—';
  const res = computeSectionResult(sec, rec.answers, scaleMaxFor(rec.level));
  const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
  const zm = ZONE_META[zone];
  return `<span style="display:inline-flex;align-items:center;gap:6px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${zm.text};"></span>${zm.label}</span>`;
}

function getTopPreference(rec, secId, labelMap){
  const secs = SECTIONS[rec.level];
  const sec = secs.find(x => x.id === secId);
  if(!sec) return '—';
  const res = computeSectionResult(sec, rec.answers, scaleMaxFor(rec.level));
  const entries = Object.entries(res.domainScores || {}).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '—';
  const top = entries[0][0];
  return escapeHtml((labelMap || DOMAIN_LABELS)[top] || top);
}

function buildComparisonInsights(left, right, sharedInterests, sharedSubjects){
  const insights = [];
  const secs = SECTIONS[left.level];
  const scaleMax = scaleMaxFor(left.level);
  const zonesFor = (rec) => {
    const out = {};
    ['A','C','D','E'].forEach(id => {
      const s = secs.find(x=>x.id===id);
      if(!s) return;
      const r = computeSectionResult(s, rec.answers, scaleMax);
      out[id] = getZone(r.compositeScore, r.compositeMax, r.isPositive);
    });
    return out;
  };
  const lz = zonesFor(left), rz = zonesFor(right);

  // Complementary strengths
  ['A','C','D','E'].forEach(id => {
    const sec = secs.find(x=>x.id===id);
    if(!sec) return;
    if(lz[id]==='green' && rz[id]==='red')
      insights.push(`${escapeHtml(left.name)} is strong in <strong>${sec.title}</strong> where ${escapeHtml(right.name)} needs support — potentially a supportive pairing.`);
    if(rz[id]==='green' && lz[id]==='red')
      insights.push(`${escapeHtml(right.name)} is strong in <strong>${sec.title}</strong> where ${escapeHtml(left.name)} needs support — potentially a supportive pairing.`);
    if(lz[id]==='red' && rz[id]==='red')
      insights.push(`Both students scored in the Support zone for <strong>${sec.title}</strong> — this pairing may struggle without teacher scaffolding.`);
  });

  // Goal orientation dynamics
  const goalTop = (rec) => {
    const secG = secs.find(x=>x.id==='G');
    if(!secG) return null;
    const res = computeSectionResult(secG, rec.answers, scaleMax);
    const entries = Object.entries(res.domainScores || {}).sort((a,b)=>b[1]-a[1]);
    return entries.length ? entries[0][0] : null;
  };
  const lg = goalTop(left), rg = goalTop(right);
  if(lg === 'mastery' && rg === 'performance_avoidance')
    insights.push(`${escapeHtml(left.name)}'s mastery orientation could positively model resilience for ${escapeHtml(right.name)}, who tends toward performance-avoidance.`);
  if(rg === 'mastery' && lg === 'performance_avoidance')
    insights.push(`${escapeHtml(right.name)}'s mastery orientation could positively model resilience for ${escapeHtml(left.name)}, who tends toward performance-avoidance.`);
  if(lg === 'performance_avoidance' && rg === 'performance_avoidance')
    insights.push(`Both students lean toward performance-avoidance — pairing them may amplify avoidance behaviour. Consider adding a mastery-oriented third member or teacher check-ins.`);

  // Shared subject strengths
  if(sharedSubjects && sharedSubjects.length >= 2)
    insights.push(`Both students are strong in ${sharedSubjects.length} shared subjects (${sharedSubjects.map(s=>escapeHtml(s)).join(', ')}) — a natural pairing for peer teaching in those areas.`);
  else if(sharedSubjects && sharedSubjects.length === 1)
    insights.push(`Both are strong in <strong>${escapeHtml(sharedSubjects[0])}</strong> — a natural pairing for peer collaboration in that subject.`);

  // Shared interests
  if(sharedInterests.length >= 2)
    insights.push(`Strong shared-interest base (${sharedInterests.length} interests in common) — good for interest-driven project work or contexts.`);
  else if(sharedInterests.length === 1)
    insights.push(`One shared interest (${escapeHtml(sharedInterests[0])}) — a possible bridge for early rapport.`);
  else
    insights.push(`No shared interests recorded — you may need to bridge with a teacher-chosen context or common project theme.`);

  if(!insights.length) insights.push('No strong complementary or conflicting patterns detected.');
  return insights;
}

/* ══════════════════════════════════════════════════════════════
   GROUPING SUGGESTIONS
   ══════════════════════════════════════════════════════════════ */

const LESSON_TYPES = {
  group_discussion: {
    label: 'Group Discussion',
    description: 'Balances confident participators with quieter students; avoids concentrating performance-avoidance in one group.',
    trait: 'participationConfidence',
    rationaleTemplate: 'Anchored by strong participation; distributed so quieter students have supportive peers to model from.',
  },
  hands_on_project: {
    label: 'Hands-on Project',
    description: 'Distributes students with hands-on preference across groups, and mixes collaborative and independent workers.',
    trait: 'kinestheticPreference',
    rationaleTemplate: 'Hands-on learners lead the practical work; independent workers balance the group so it doesn\'t become chaotic.',
  },
  presentation_prep: {
    label: 'Presentation Prep',
    description: 'Pairs performance-avoidance students with mastery-oriented supportive peers.',
    trait: 'performanceAvoidance',
    rationaleTemplate: 'Performance-avoidance students supported by mastery-oriented peers who model resilience and reduce fear of failure.',
  },
  peer_feedback: {
    label: 'Peer Feedback / Review',
    description: 'Distributes mastery orientation across groups — these students give more constructive feedback.',
    trait: 'masteryOrientation',
    rationaleTemplate: 'Mastery-oriented students distributed as feedback anchors; they emphasise understanding over rank.',
  },
  independent_work: {
    label: 'Independent Work',
    description: 'For independent work, seating rather than grouping matters. This shows a solo-preference ranking to guide seating.',
    trait: 'independentPreference',
    rationaleTemplate: 'Students who thrive independently seated with space; students needing support seated near the teacher.',
  },
};

function computeGroupingTraits(rec){
  const secs = SECTIONS[rec.level];
  const scaleMax = scaleMaxFor(rec.level);
  const a = rec.answers || {};

  // Aggregated traits
  const secB = secs.find(x=>x.id==='B');
  const secG = secs.find(x=>x.id==='G');
  const secE = secs.find(x=>x.id==='E');
  const secD = secs.find(x=>x.id==='D');

  const bScores = {};
  if(secB) secB.items.forEach(it => bScores[it.domain] = (bScores[it.domain]||0) + (a[it.id]||0));

  const gScores = {};
  if(secG) secG.items.forEach(it => gScores[it.domain] = (gScores[it.domain]||0) + (a[it.id]||0));

  const eRes = secE ? computeSectionResult(secE, a, scaleMax) : {compositeScore:0, compositeMax:1};
  const dRes = secD ? computeSectionResult(secD, a, scaleMax) : {compositeScore:0, compositeMax:1};

  const aRes = computeSectionResult(secs.find(x=>x.id==='A'), a, scaleMax);
  const cRes = computeSectionResult(secs.find(x=>x.id==='C'), a, scaleMax);

  return {
    rec,
    participationConfidence: (eRes.compositeScore/(eRes.compositeMax||1)) + (dRes.compositeScore/(dRes.compositeMax||1)),
    kinestheticPreference: bScores.kinesthetic || 0,
    independentPreference: bScores.independent || 0,
    socialPreference: bScores.social || 0,
    performanceAvoidance: gScores.performance_avoidance || 0,
    masteryOrientation: gScores.mastery || 0,
    zoneA: getZone(aRes.compositeScore, aRes.compositeMax, aRes.isPositive),
    zoneC: getZone(cRes.compositeScore, cRes.compositeMax, cRes.isPositive),
    zoneD: getZone(dRes.compositeScore, dRes.compositeMax, dRes.isPositive),
    zoneE: getZone(eRes.compositeScore, eRes.compositeMax, eRes.isPositive),
  };
}

function buildGroupings(students, lessonType, groupSize){
  if(!students.length) return [];
  const cfg = LESSON_TYPES[lessonType];
  if(!cfg) return [];
  const traits = students.map(computeGroupingTraits);
  // Sort DESC on trait for most lesson types, ASC for performance_avoidance-based (distribute avoidance evenly)
  const asc = (lessonType === 'presentation_prep');
  traits.sort((a,b) => asc ? a[cfg.trait]-b[cfg.trait] : b[cfg.trait]-a[cfg.trait]);
  const numGroups = Math.max(1, Math.ceil(students.length / groupSize));
  const groups = Array.from({length: numGroups}, () => []);
  // Snake-order distribution: 0,1,2,...N-1,N-1,...,1,0,0,1,...
  let idx = 0, dir = 1;
  traits.forEach(t => {
    groups[idx].push(t);
    if(numGroups === 1) return;
    if(dir === 1){ if(idx === numGroups-1) dir = -1; else idx++; }
    else { if(idx === 0) dir = 1; else idx--; }
  });

  return groups.map((g, gi) => ({
    number: gi+1,
    members: g,
    rationale: buildGroupRationale(g, lessonType),
  }));
}

function buildGroupRationale(members, lessonType){
  const cfg = LESSON_TYPES[lessonType];
  if(!members.length) return '';
  const parts = [];

  if(lessonType === 'group_discussion'){
    const strong = members.filter(m => m.zoneE === 'green' || m.zoneD === 'green');
    const shy = members.filter(m => m.performanceAvoidance >= 3);
    if(strong.length) parts.push(`${strong.map(s=>escapeHtml(s.rec.name)).join(' and ')} can help anchor discussion.`);
    if(shy.length) parts.push(`${shy.map(s=>escapeHtml(s.rec.name)).join(' and ')} may need explicit invitation to contribute — consider a "write first, then share" opener.`);
  }
  if(lessonType === 'hands_on_project'){
    const hoLovers = members.filter(m => m.kinestheticPreference >= 2);
    const solo = members.filter(m => m.independentPreference > m.socialPreference);
    if(hoLovers.length) parts.push(`${hoLovers.map(s=>escapeHtml(s.rec.name)).join(' and ')} strongly prefer hands-on work — natural leads.`);
    if(solo.length) parts.push(`${solo.map(s=>escapeHtml(s.rec.name)).join(' and ')} tend to prefer solo work — assign them a distinct subtask within the group.`);
  }
  if(lessonType === 'presentation_prep'){
    const avoiders = members.filter(m => m.performanceAvoidance >= 3);
    const supporters = members.filter(m => m.masteryOrientation >= 3 && m.zoneE === 'green');
    if(avoiders.length) parts.push(`${avoiders.map(s=>escapeHtml(s.rec.name)).join(' and ')} may fear presenting — pair for rehearsal, offer private feedback.`);
    if(supporters.length) parts.push(`${supporters.map(s=>escapeHtml(s.rec.name)).join(' and ')} bring mastery orientation and social support — well-placed here.`);
  }
  if(lessonType === 'peer_feedback'){
    const mastery = members.filter(m => m.masteryOrientation >= 3);
    if(mastery.length) parts.push(`${mastery.map(s=>escapeHtml(s.rec.name)).join(' and ')} give feedback that focuses on understanding rather than rank.`);
  }
  if(lessonType === 'independent_work'){
    parts.push('For this activity, seating matters more than grouping — see individual ranking above.');
  }

  const supportZones = members.filter(m => m.zoneA === 'red' || m.zoneC === 'red');
  if(supportZones.length) parts.push(`Watch for: ${supportZones.map(s=>escapeHtml(s.rec.name)).join(', ')} scored in Support zone for behavioural or attention domains — check in briefly during activity.`);

  if(!parts.length) parts.push(cfg.rationaleTemplate);
  return parts.join(' ');
}

  const students = studentsInClass(className);
  const lessonType = state.groupingLesson || 'group_discussion';
  const groupSize = state.groupingSize || 4;

  return `
  <div class="wrap">

function performImport(incoming, mode){
  let added = 0, updated = 0, skipped = 0;
  const currentById = {};
  state.students.forEach(s => currentById[s.id] = s);

  if(mode === 'overwrite_all'){
    // Delete all first
    state.students.forEach(s => deleteStudentRecord(s.id));
    incoming.forEach(s => { s = migrateStudent(s); saveStudent(s); added++; });
    return { added, updated, skipped };
  }

  incoming.forEach(s => {
    s = migrateStudent(s);
    if(currentById[s.id]){
      if(mode === 'replace'){ saveStudent(s); updated++; }
      else skipped++;
    } else {
      saveStudent(s); added++;
    }
  });
  return { added, updated, skipped };
}

const App = {
  goDashboard(){ state.view='dashboard'; state.draft=null; state.activeId=null; state.editingPostId=null; render(); },
  goResearch(){ state.view='research'; render(); },

  goLogin(){ state.view='login'; render(); },
  goSignup(){ state.view='signup'; render(); },

  async submitLogin(){
    const email = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    const errorEl = document.getElementById('auth-error');
    if(!email || !password){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent='Please enter both email and password.'; }
      return;
    }
    if(!db.isConnected()){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent='Database not connected. Check your internet connection and refresh.'; }
      return;
    }
    try{
      const { data, error } = await db.client.auth.signInWithPassword({ email, password });
      if(error) throw error;
      state.userId = data.user.id;
      state.userEmail = data.user.email;
      state.students = await loadAllStudentsAsync();
      state.view = 'dashboard';
      render();

      // If DB is empty but local has data, direct them to diagnostics (don't auto-push)
      if(state.students.length === 0){
        const localCount = loadAllStudentsLocal().length;
        if(localCount > 0){
          setTimeout(() => {
            alert(
              `⚠ Sync mismatch detected\n\n` +
              `Database: 0 students\n` +
              `This browser: ${localCount} students\n\n` +
              `Go to Settings → Sync Diagnostics to review and decide how to resolve this. Do NOT push blindly — check the diagnostic panel first to avoid creating duplicates.`
            );
          }, 300);
        }
      }
      return;
    }catch(e){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent = e.message || 'Login failed.'; }
    }
  },

  async submitSignup(){
    const name = document.getElementById('auth-name')?.value?.trim();
    const email = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    const errorEl = document.getElementById('auth-error');
    if(!email || !password){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent='Please fill in all fields.'; }
      return;
    }
    if(password.length < 6){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent='Password must be at least 6 characters.'; }
      return;
    }
    if(!db.isConnected()){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent='Database not connected. Check your internet connection and refresh.'; }
      return;
    }
    try{
      const { data, error } = await db.client.auth.signUp({
        email, password,
        options: { data: { display_name: name || email.split('@')[0] } }
      });
      if(error) throw error;
      if(data.user && !data.user.confirmed_at && !data.session){
        // Email confirmation required
        if(errorEl){
          errorEl.style.display='block';
          errorEl.style.background='var(--green-bg)';
          errorEl.style.color='var(--green)';
          errorEl.textContent='Account created! Check your email to confirm, then log in.';
        }
        return;
      }
      // Auto-login after signup (if email confirmation not required)
      state.userId = data.user.id;
      state.userEmail = data.user.email;
      state.students = [];
      state.view = 'dashboard';
      render();
    }catch(e){
      if(errorEl){ errorEl.style.display='block'; errorEl.textContent = e.message || 'Signup failed.'; }
    }
  },

  showSyncErrors(){
    const errs = state.dbSyncErrors || [];
    if(!errs.length){ alert('No sync errors.'); return; }
    const msg = `Database sync errors (${errs.length}):\n\n` +
      errs.slice(-10).map(e => `• ${e.name}: ${e.error}`).join('\n') +
      `\n\nMost common cause: the auth-migration.sql file wasn't run in your Supabase SQL Editor. This adds the owner_id column that all writes require.\n\n` +
      `Click OK to clear these errors and retry syncing.`;
    if(confirm(msg)){
      state.dbSyncErrors = [];
      syncLocalToDb().then(result => {
        alert(`Retry complete: ${result.synced} synced, ${result.errors} still failing.`);
        render();
      });
    }
  },

  async logout(){
    if(!confirm('Log out? Your data is saved in the database.')) return;
    if(db.isConnected()){
      try{ await db.client.auth.signOut(); }catch(e){}
    }
    state.userId = null;
    state.userEmail = null;
    state.students = [];
    state.view = 'login';
    render();
  },

  goDbSettings(){ state.view='dbSettings'; render(); },

  /* ── Multi-select ── */
  toggleSelectMode(){
    state.selectMode = !state.selectMode;
    if(!state.selectMode) state.selectedIds = new Set();
    render();
  },

  toggleSelectStudent(id){
    if(!state.selectedIds) state.selectedIds = new Set();
    if(state.selectedIds.has(id)) state.selectedIds.delete(id);
    else state.selectedIds.add(id);
    render({preserveScroll:true});
  },

  toggleSelectGroup(groupName, isUnassigned){
    if(!state.selectedIds) state.selectedIds = new Set();
    const key = isUnassigned ? '' : groupName;
    const inGroup = state.students.filter(s => {
      const cls = (s.className||'').trim();
      return isUnassigned ? !cls : cls === key;
    });
    const allSelected = inGroup.every(s => state.selectedIds.has(s.id));
    if(allSelected){
      inGroup.forEach(s => state.selectedIds.delete(s.id));
    } else {
      inGroup.forEach(s => state.selectedIds.add(s.id));
    }
    render({preserveScroll:true});
  },

  clearSelection(){
    state.selectedIds = new Set();
    render({preserveScroll:true});
  },

  async bulkMoveSelected(action){
    if(!action || !state.selectedIds || !state.selectedIds.size) return;
    let target = '';
    if(action === '__unassign__') target = '';
    else if(action === '__new__'){
      const newClass = prompt('Enter the new class name:');
      if(!newClass || !newClass.trim()) return;
      target = newClass.trim();
      getOrCreateClassEntry(target);
    } else if(action.startsWith('__cls__')){
      target = action.substring(7);
    } else {
      return;
    }

    const selectedIds = Array.from(state.selectedIds);
    let moved = 0, errors = 0;
    for(const id of selectedIds){
      const rec = state.students.find(s => s.id === id);
      if(!rec) continue;
      rec.className = target;
      rec.updatedAt = Date.now();
      // Save locally
      try{ local.set('student:'+rec.id, JSON.stringify(rec)); }catch(e){}
      // Save to DB with error surfacing
      if(db.isConnected()){
        try{
          const row = recToRow(rec);
          const { error } = await db.client.from('students').upsert(row, { onConflict: 'student_id' });
          if(error){ errors++; state.dbSyncErrors=state.dbSyncErrors||[]; state.dbSyncErrors.push({name:rec.name, error:error.message, time:Date.now()}); }
          else moved++;
        }catch(e){ errors++; }
      } else {
        moved++;
      }
    }

    state.selectedIds = new Set();
    state.selectMode = false;
    render();

    if(errors > 0){
      alert(`Moved ${moved} students${target ? ' to ' + target : ' to Unassigned'}.\n\n⚠ ${errors} failed to save to database. Click the sync error banner for details.`);
    } else {
      alert(`Moved ${moved} student${moved===1?'':'s'}${target ? ' to ' + target : ' to Unassigned'}.`);
    }
  },

  async connectDb(){
    const urlEl = document.getElementById('db-url');
    const keyEl = document.getElementById('db-key');
    if(!urlEl || !keyEl) return;
    const url = urlEl.value.trim();
    const key = keyEl.value.trim();
    if(!url || !key){ alert('Please enter both the Supabase URL and API key.'); return; }
    const ok = await db.connect(url, key);
    if(ok){
      alert('Connected successfully! Your data will now sync to the database.');
      // Auto-push local data to DB on first connect
      await syncLocalToDb();
      state.students = await loadAllStudentsAsync();
    } else {
      alert('Connection failed: ' + db.lastError);
    }
    render();
  },

  disconnectDb(){
    if(!confirm('Disconnect from the database? Your local data will be kept, but changes won\'t sync until you reconnect.')) return;
    db.clearConfig();
    render();
  },

  async syncPush(){
    if(!confirm('Push all local records to the database?\n\nThis uses upsert — existing records with matching IDs will be updated, not duplicated.')) return;
    const log = document.getElementById('sync-log');
    if(log){ log.style.display='block'; log.textContent='Pushing local data to database...\n'; }
    const result = await syncLocalToDb();
    if(log) log.textContent += `Done. Synced ${result.synced} records, ${result.errors} errors.\n`;
    if(result.errors > 0 && result.firstError){
      alert(
        `Push finished with errors.\n\n` +
        `Synced: ${result.synced}\n` +
        `Failed: ${result.errors}\n\n` +
        `First error:\n${result.firstError}\n\n` +
        diagnoseErrorMessage(result.firstError)
      );
    } else {
      alert(`Push complete: ${result.synced} records synced successfully.`);
    }
    state.students = await loadAllStudentsAsync();
    render();
  },

  async syncPull(){
    if(!confirm('Pull all records from the database?\n\nThis will overwrite local data with what\'s in the database.')) return;
    const log = document.getElementById('sync-log');
    if(log){ log.style.display='block'; log.textContent='Pulling data from database...\n'; }
    const result = await syncDbToLocal();
    state.students = loadAllStudentsLocal();
    if(log) log.textContent += `Done. Pulled ${result.pulled} records, ${result.errors} errors.\n`;
    alert(`Pull complete: ${result.pulled} records downloaded${result.errors ? ', ' + result.errors + ' errors' : ''}.`);
    render();
  },

  async runDiagnostics(){
    const area = document.getElementById('diag-area');
    if(!area) return;
    area.innerHTML = '<em style="font-family:inherit;color:var(--ink-faint);">Running…</em>';

    const localStudents = loadAllStudentsLocal();
    const localClasses = loadClassRegistry();

    let dbStudents = [], dbClasses = [], dbError = null;
    let schemaErrors = [];
    let testInsertResult = null;

    // Check schema: try to select owner_id specifically
    try{
      const { data, error } = await db.client.from('students').select('owner_id').limit(1);
      if(error) schemaErrors.push({ table: 'students', column: 'owner_id', error: error.message });
    }catch(e){ schemaErrors.push({ table: 'students', column: 'owner_id', error: e.message }); }

    // Fetch counts
    try{
      const { data: sData, error: sErr } = await db.client.from('students').select('student_id, name, user_id, class_name, owner_id, updated_at');
      if(sErr) throw sErr;
      dbStudents = sData || [];
      const { data: cData, error: cErr } = await db.client.from('classes').select('class_id, name, owner_id');
      if(cErr) throw cErr;
      dbClasses = cData || [];
    }catch(e){ dbError = e.message; }

    // TEST INSERT: try inserting one representative student and capture the EXACT error
    if(localStudents.length > 0){
      const sample = localStudents[0];
      const testRow = recToRow({
        ...sample,
        id: 'diag_test_' + Date.now(),  // unique id so we don't conflict
        userId: 'DIAG-' + Math.random().toString(36).substring(2, 7).toUpperCase(),
      });
      try{
        const { data, error } = await db.client.from('students').insert(testRow).select();
        if(error){
          testInsertResult = { success: false, error: error.message, code: error.code, hint: error.hint, details: error.details };
        } else {
          testInsertResult = { success: true, inserted: data };
          // Clean up the test record
          await db.client.from('students').delete().eq('student_id', testRow.student_id);
        }
      }catch(e){
        testInsertResult = { success: false, error: e.message };
      }
    }

    const localIds = new Set(localStudents.map(s=>s.id));
    const dbIds = new Set(dbStudents.map(s=>s.student_id));
    const onlyLocal = localStudents.filter(s => !dbIds.has(s.id));
    const onlyDb = dbStudents.filter(s => !localIds.has(s.student_id));
    const inBoth = localStudents.filter(s => dbIds.has(s.id));

    let html = `<div style="font-family:inherit;">`;
    html += `<div style="margin-bottom:10px;"><strong>Current user:</strong> ${escapeHtml(state.userEmail||'—')} <span style="color:var(--ink-faint);">(${state.userId||'no id'})</span></div>`;

    if(dbError){
      html += `<div style="color:var(--red);padding:10px;background:var(--red-bg);border-radius:4px;margin-bottom:10px;"><strong>Database error:</strong> ${escapeHtml(dbError)}</div>`;
    }

    // Schema issues front and center
    if(schemaErrors.length > 0){
      html += `<div style="padding:12px;background:var(--red-bg);border-radius:6px;margin-bottom:12px;border-left:4px solid var(--red);">
        <strong style="color:var(--red);font-family:inherit;">⚠ Schema issue detected</strong>
        <div style="font-size:12px;margin-top:6px;">${schemaErrors.map(e => `Table <code>${e.table}</code>, column <code>${e.column}</code>: ${escapeHtml(e.error)}`).join('<br>')}</div>
        <div style="font-size:12px;margin-top:8px;color:var(--ink-soft);font-family:inherit;">You need to run <strong>auth-migration.sql</strong> in your Supabase SQL Editor to fix this.</div>
      </div>`;
    }

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div style="padding:12px;background:var(--paper);border-radius:6px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:4px;">This browser (localStorage)</div>
        <div style="font-size:24px;font-weight:700;color:var(--accent);">${localStudents.length}</div>
        <div style="font-size:11px;color:var(--ink-faint);">students · ${Object.keys(localClasses).length} classes</div>
      </div>
      <div style="padding:12px;background:var(--paper);border-radius:6px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:4px;">Database (visible to you)</div>
        <div style="font-size:24px;font-weight:700;color:var(--accent);">${dbStudents.length}</div>
        <div style="font-size:11px;color:var(--ink-faint);">students · ${dbClasses.length} classes</div>
      </div>
    </div>`;

    // TEST INSERT result — this is the money shot for diagnosing
    if(testInsertResult){
      if(testInsertResult.success){
        html += `<div style="padding:12px;background:var(--green-bg);border-radius:6px;margin-bottom:12px;border-left:4px solid var(--green);">
          <strong style="color:var(--green);font-family:inherit;">✓ Test insert succeeded</strong>
          <div style="font-size:12px;margin-top:4px;color:var(--ink-soft);font-family:inherit;">The database CAN accept student writes. If your existing local records aren't syncing, use "Push local → DB" now to sync them.</div>
        </div>`;
      } else {
        html += `<div style="padding:12px;background:var(--red-bg);border-radius:6px;margin-bottom:12px;border-left:4px solid var(--red);">
          <strong style="color:var(--red);font-family:inherit;">✗ Test insert FAILED — this is why students aren't saving</strong>
          <div style="font-size:12.5px;margin-top:6px;padding:8px;background:var(--paper);border-radius:4px;"><strong>Error:</strong> ${escapeHtml(testInsertResult.error)}</div>
          ${testInsertResult.code ? `<div style="font-size:11.5px;margin-top:4px;"><strong>Code:</strong> <code>${escapeHtml(testInsertResult.code)}</code></div>` : ''}
          ${testInsertResult.details ? `<div style="font-size:11.5px;margin-top:4px;"><strong>Details:</strong> ${escapeHtml(testInsertResult.details)}</div>` : ''}
          ${testInsertResult.hint ? `<div style="font-size:11.5px;margin-top:4px;"><strong>Hint:</strong> ${escapeHtml(testInsertResult.hint)}</div>` : ''}
          <div style="font-size:12px;margin-top:10px;color:var(--ink-soft);font-family:inherit;line-height:1.5;">${diagnoseErrorMessage(testInsertResult.error)}</div>
        </div>`;
      }
    }

    if(inBoth.length > 0){
      html += `<div style="color:var(--green);margin-bottom:8px;">✓ ${inBoth.length} student${inBoth.length===1?'':'s'} present in BOTH stores</div>`;
    }
    if(onlyLocal.length > 0){
      html += `<div style="color:var(--yellow);margin-bottom:8px;">⚠ ${onlyLocal.length} student${onlyLocal.length===1?'':'s'} ONLY in local (not in DB): ${onlyLocal.slice(0,5).map(s=>escapeHtml(s.name)).join(', ')}${onlyLocal.length>5?'…':''}</div>`;
    }
    if(onlyDb.length > 0){
      html += `<div style="color:var(--yellow);margin-bottom:8px;">⚠ ${onlyDb.length} student${onlyDb.length===1?'':'s'} ONLY in DB: ${onlyDb.slice(0,5).map(s=>escapeHtml(s.name||s.student_id)).join(', ')}${onlyDb.length>5?'…':''}</div>`;
    }

    // Show any accumulated sync errors
    if((state.dbSyncErrors||[]).length > 0){
      html += `<div style="margin-top:16px;padding:10px;background:var(--yellow-bg);border-radius:6px;">
        <strong style="font-family:inherit;font-size:12px;color:var(--yellow);">Recent sync errors (${state.dbSyncErrors.length}):</strong>
        <div style="max-height:150px;overflow-y:auto;margin-top:6px;font-size:11px;">
          ${state.dbSyncErrors.slice(-10).map(e => `<div style="padding:3px 0;border-bottom:1px solid var(--rule-soft);"><strong>${escapeHtml(e.name)}:</strong> ${escapeHtml(e.error)}</div>`).join('')}
        </div>
      </div>`;
    }

    html += `</div>`;
    area.innerHTML = html;
  },

  async wipeDbForUser(){
    if(!confirm('⚠ WIPE DATABASE\n\nThis will DELETE all your student and class records from the database.\n\nLocal browser data will be kept — you can push again after this.\n\nAre you sure?')) return;
    if(!confirm('Really delete? Type-check: This is irreversible on the database side.\n\nClick OK to proceed.')) return;
    let deleted = 0, errors = 0;
    try{
      const { data, error } = await db.client.from('students').delete().eq('owner_id', state.userId).select();
      if(error) throw error;
      deleted = data ? data.length : 0;
    }catch(e){ errors++; alert('Student delete error: ' + e.message); }
    try{
      await db.client.from('classes').delete().eq('owner_id', state.userId);
    }catch(e){ errors++; }
    alert(`Wiped ${deleted} student records from database.${errors?' Some errors occurred.':''}\n\nYour local data is untouched. Run diagnostics to verify.`);
    state.students = await loadAllStudentsAsync();
    render();
  },

  wipeLocal(){
    if(!confirm('⚠ CLEAR LOCAL DATA\n\nThis will remove all student and class records from THIS BROWSER only. The database is untouched.\n\nAfter this, you can pull from the database to get a clean copy. Continue?')) return;
    const keys = local.keys('student:');
    keys.forEach(k => local.del(k));
    const classKeys = local.keys('classreg:');
    classKeys.forEach(k => local.del(k));
    alert(`Cleared ${keys.length} students and ${classKeys.length} classes from browser.`);
    state.students = [];
    render();
  },

  downloadSchema(){
    const schema = `-- Learner Profile System Database Schema\n-- Run this in Supabase SQL Editor\n\nCREATE TABLE IF NOT EXISTS classes (\n  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,\n  class_id TEXT UNIQUE NOT NULL,\n  name TEXT NOT NULL,\n  created_at TIMESTAMPTZ DEFAULT NOW()\n);\n\nCREATE TABLE IF NOT EXISTS students (\n  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,\n  student_id TEXT UNIQUE NOT NULL,\n  user_id TEXT UNIQUE NOT NULL,\n  password TEXT NOT NULL DEFAULT '',\n  name TEXT NOT NULL DEFAULT '',\n  chinese_name TEXT DEFAULT '',\n  age TEXT DEFAULT '',\n  birthdate TEXT DEFAULT '',\n  class_name TEXT DEFAULT '',\n  level TEXT NOT NULL DEFAULT 'junior',\n  goal TEXT DEFAULT '',\n  notes TEXT DEFAULT '',\n  likes TEXT DEFAULT '',\n  dislikes TEXT DEFAULT '',\n  subject_strengths JSONB DEFAULT '[]'::jsonb,\n  posts JSONB DEFAULT '[]'::jsonb,\n  answers JSONB DEFAULT '{}'::jsonb,\n  interests_checked JSONB DEFAULT '[]'::jsonb,\n  interests_free TEXT DEFAULT '',\n  teacher_obs JSONB DEFAULT '{}',\n  history JSONB DEFAULT '[]'::jsonb,\n  accommodations JSONB DEFAULT '[]'::jsonb,\n  accommodation_notes TEXT DEFAULT '',\n  attendance_pattern TEXT DEFAULT '',\n  attendance_note TEXT DEFAULT '',\n  first_language TEXT DEFAULT '',\n  other_languages TEXT DEFAULT '',\n  english_proficiency TEXT DEFAULT '',\n  chinese_proficiency TEXT DEFAULT '',\n  cefr_level TEXT DEFAULT '',\n  cambridge_exams JSONB DEFAULT '[]'::jsonb,\n  other_english_tests JSONB DEFAULT '[]'::jsonb,\n  family_context TEXT DEFAULT '',\n  physical_medical_notes TEXT DEFAULT '',\n  support_network TEXT DEFAULT '',\n  best_time_of_day TEXT DEFAULT '',\n  communication_preferences JSONB DEFAULT '[]'::jsonb,\n  group_role_tendency TEXT DEFAULT '',\n  created_at TIMESTAMPTZ DEFAULT NOW(),\n  updated_at TIMESTAMPTZ DEFAULT NOW()\n);\n\nCREATE INDEX IF NOT EXISTS idx_students_class ON students (class_name);\nCREATE INDEX IF NOT EXISTS idx_students_user_id ON students (user_id);\n\nCREATE OR REPLACE FUNCTION update_updated_at_column()\nRETURNS TRIGGER AS $$\nBEGIN NEW.updated_at = NOW(); RETURN NEW; END;\n$$ LANGUAGE plpgsql;\n\nDROP TRIGGER IF EXISTS students_updated_at ON students;\nCREATE TRIGGER students_updated_at BEFORE UPDATE ON students FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n\nALTER TABLE students ENABLE ROW LEVEL SECURITY;\nALTER TABLE classes ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "Allow all" ON students FOR ALL USING (true) WITH CHECK (true);\nCREATE POLICY "Allow all" ON classes FOR ALL USING (true) WITH CHECK (true);\n`;
    const blob = new Blob([schema], { type: 'text/sql;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'learner-profile-schema.sql';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  collapseAllSections(){
    document.querySelectorAll('.section-block').forEach(el => el.classList.add('collapsed'));
  },
  expandAllSections(){
    document.querySelectorAll('.section-block').forEach(el => el.classList.remove('collapsed'));
  },

  startNew(){ state.draft = newDraft(); state.view='newInfo'; render(); },

  // Full-render version (used for level clicks, where there's no focused text field to disturb)
  updateDraftField(key,val){ state.draft[key]=val; render(); },

  // Silent versions for text inputs — never call render(), only surgically update dependent UI.
  // This preserves keyboard focus during typing.
  updateDraftName(val){
    state.draft.name = val;
    App._syncBeginButton();
  },
  updateDraftChineseName(val){
    state.draft.chineseName = val;
  },
  updateDraftAge(val){
    state.draft.age = val;
    // Auto-suggest a level from age, but only if the teacher hasn't set one yet
    if(!state.draft._levelChosen){
      const suggestion = suggestLevel(val);
      if(suggestion){
        state.draft.level = suggestion;
        App._syncLevelOptions();
      }
    }
    App._syncBeginButton();
  },
  updateDraftBirthdate(val){
    state.draft.birthdate = val;
    const age = computeAge(val);
    if(age !== null){
      state.draft.age = String(age);
      // Silently update the age input in place (no re-render, preserves focus)
      const ageEl = document.getElementById('f-age');
      if(ageEl) ageEl.value = String(age);
      if(!state.draft._levelChosen){
        const suggestion = suggestLevel(age);
        if(suggestion){
          state.draft.level = suggestion;
          App._syncLevelOptions();
        }
      }
    }
    App._syncBeginButton();
  },
  updateDraftClass(val){
    state.draft.className = val;
  },
  chooseLevel(key){
    state.draft.level = key;
    state.draft._levelChosen = true;
    App._syncLevelOptions();
    App._syncBeginButton();
  },
  _syncBeginButton(){
    const btn = document.getElementById('btn-begin');
    if(!btn) return;
    const d = state.draft;
    const enabled = !!(d && d.name && d.name.trim() && d.level);
    btn.disabled = !enabled;
  },
  _syncLevelOptions(){
    const container = document.getElementById('level-options');
    if(container) container.innerHTML = renderLevelOptionsHTML(state.draft);
  },

  beginAssessment(){
    if(!state.draft.name.trim() || !state.draft.level) return;

  finishAssessment(){
    const rec = state.draft;
    if(rec._studentId){
      // Reassessment path — update existing student
      const existing = state.students.find(s => s.id === rec._studentId);
      if(!existing){ alert('Original record not found; could not save reassessment.'); return; }
      // Snapshot current data into history before replacing
      existing.history = existing.history || [];
      existing.history.push({
        date: existing.updatedAt || existing.createdAt || Date.now(),
        answers: existing.answers || {},
        interestsChecked: existing.interestsChecked || [],
        interestsFree: existing.interestsFree || '',
        teacherObs: existing.teacherObs || {},
      });
      // Replace current with new answers
      existing.answers = rec.answers;
      existing.interestsChecked = rec.interestsChecked;
      existing.interestsFree = rec.interestsFree;
      // Allow editable identity + profile fields to update too
      existing.name = rec.name;
      existing.age = rec.age;
      existing.className = rec.className;
      existing.birthdate = rec.birthdate || '';
      existing.subjectStrengths = rec.subjectStrengths || [];
      existing.likes = rec.likes || '';
      existing.dislikes = rec.dislikes || '';
      const ok = saveStudent(existing);
      if(!ok){ alert('Could not save. Please try again.'); return; }
      state.activeId = existing.id;
    } else {
      // New student path
      if(!rec.history) rec.history = [];
      if(rec.notes === undefined) rec.notes = '';
      if(rec.birthdate === undefined) rec.birthdate = '';
      if(!rec.subjectStrengths) rec.subjectStrengths = [];
      if(rec.likes === undefined) rec.likes = '';
      if(rec.dislikes === undefined) rec.dislikes = '';
      if(!rec.posts) rec.posts = [];
      const existingIdx = state.students.findIndex(s=>s.id===rec.id);
      const ok = saveStudent(rec);
      if(!ok){ alert('Could not save this record. Please try again.'); return; }
      if(existingIdx>=0) state.students[existingIdx]=rec; else state.students.unshift(rec);
      state.activeId = rec.id;
    }
    // Ensure class registry entry exists
    const finalRec = state.students.find(s=>s.id===state.activeId);
    if(finalRec && finalRec.className) getOrCreateClassEntry(finalRec.className);
    state.view='report'; state.draft=null;
    render();
  },

  previewBulkImport(){
    const text = state.bulkText || '';
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
    const parsed = lines.map(line => {
      // Support: "English Name\tChinese Name" or "English Name, Chinese Name" or just "English Name"
      let parts;
      if(line.indexOf('\t') >= 0) parts = line.split('\t');
      else if(line.indexOf(',') >= 0) parts = line.split(',');
      else parts = [line];
      return { name: (parts[0]||'').trim(), chineseName: (parts[1]||'').trim() };
    }).filter(p => p.name);
    state.bulkPreview = parsed;
    render();
  },

  async confirmBulkImport(){
    const preview = state.bulkPreview;
    if(!preview || !preview.length) return;
    const className = (state.bulkClassName||'').trim();
    const level = state.bulkLevel || 'junior';
    if(className) getOrCreateClassEntry(className);

    let added = 0, dbErrors = 0;
    const errorSamples = [];

    for(const p of preview){
      const rec = {
        id: uid(), name: p.name, chineseName: p.chineseName || '',
        age: '', birthdate: '', level: level,
        className: className, notes: '', goal: '',
        userId: generateUserId(), password: generatePassword(),
        subjectStrengths:[], likes:'', dislikes:'', posts:[],
        accommodations:[], accommodationNotes:'', attendancePattern:'', attendanceNote:'',
        firstLanguage:'', otherLanguages:'', englishProficiency:'', chineseProficiency:'',
        cefrLevel:'', cambridgeExams:[], otherEnglishTests:[],
        familyContext:'', physicalMedicalNotes:'',
        supportNetwork:'', bestTimeOfDay:'', communicationPreferences:[], groupRoleTendency:'',
        answers:{}, interestsChecked:[], interestsFree:'',
        teacherObs:{ attention:'', social:'', emotional:'', workHabits:'' },
        history:[], createdAt: Date.now(), updatedAt: Date.now(),
      };
      // Save to localStorage
      try{ local.set('student:'+rec.id, JSON.stringify(rec)); }catch(e){}
      // Save to DB with awaited error handling
      if(db.isConnected()){
        try{
          const row = recToRow(rec);
          const { error } = await db.client.from('students').upsert(row, { onConflict: 'student_id' });
          if(error){
            dbErrors++;
            if(errorSamples.length < 3) errorSamples.push(rec.name + ': ' + error.message);
            state.dbSyncErrors = state.dbSyncErrors || [];
            state.dbSyncErrors.push({ name: rec.name, error: error.message, time: Date.now() });
          } else {
            added++;
          }
        }catch(e){
          dbErrors++;
          if(errorSamples.length < 3) errorSamples.push(rec.name + ': ' + e.message);
        }
      } else {
        added++;
      }
      state.students.unshift(rec);
    }

    if(dbErrors > 0){
      alert(
        `⚠ Bulk import had errors\n\n` +
        `Added: ${added} students (all saved locally)\n` +
        `Database errors: ${dbErrors}\n\n` +
        `Sample errors:\n` + errorSamples.join('\n') + `\n\n` +
        `MOST LIKELY CAUSE: You need to run auth-migration.sql in your Supabase SQL Editor. This adds the owner_id column that all writes require.\n\n` +
        `Your students are saved locally on this device. Once you fix the database, click the sync error banner to push them.`
      );
    } else {
      alert(`Added ${added} student${added===1?'':'s'} to ${className || 'Unassigned'}.`);
    }
    App.goDashboard();
  },

    const rec = state.students.find(s=>s.id===id);
    if(!rec) return;
    let target;
    if(choice === '__unassign__'){
      target = '';
    } else if(choice === '__new__'){
      const entered = prompt('Enter a new class name:', '');
      if(entered === null) return;
      target = entered.trim();
    } else if(choice.indexOf('__cls__') === 0){

    rec.className = target;
    saveStudent(rec);
    render(); // full re-render OK — regrouping the dashboard is the whole point

    const students = state.students.filter(s => (s.className||'').trim() === className);
    state.groupingResults = buildGroupings(students, state.groupingLesson, state.groupingSize);
    render();
  },

  /* ── AI Analysis Export ── */
  exportAIAnalysis(id){
    const rec = state.students.find(s=>s.id===id);
    if(!rec) return;
    // Store the generated doc for download/copy
    state._aiExportDoc = buildAIAnalysisDoc(rec);
    state._aiExportName = (rec.name||'student').replace(/[^a-zA-Z0-9]/g,'-');
    // Show the instruction modal
    showAIExportModal();
  },

  doAIExportDownload(){
    if(!state._aiExportDoc) return;
    const blob = new Blob([state._aiExportDoc], { type:'text/markdown;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `AI-Analysis-${state._aiExportName}.md`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  doAIExportCopy(){
    if(!state._aiExportDoc) return;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(state._aiExportDoc).then(()=>{
        const badge = document.getElementById('copy-badge');
        if(badge) badge.innerHTML = '<span class="copy-success">✓ Copied!</span>';
        setTimeout(()=>{ if(badge) badge.innerHTML = ''; }, 3000);
      }).catch(()=>{
        // Fallback
        fallbackCopy(state._aiExportDoc);
      });
    } else {
      fallbackCopy(state._aiExportDoc);
    }
  },

  closeAIExportModal(){
    const overlay = document.getElementById('ai-export-modal');
    if(overlay) overlay.remove();
  },

  /* ── CSV Export ── */
  exportStudentCSV(id){
    const rec = state.students.find(s=>s.id===id);
    if(!rec) return;
    const csv = buildStudentCSV([rec]);
    downloadCSV(csv, `learner-profile-${(rec.name||'student').replace(/[^a-zA-Z0-9]/g,'-')}.csv`);
  },

  exportClassCSV(className){
    const students = studentsInClass(className);
    if(!students.length){ alert('No students in this class.'); return; }
    const csv = buildStudentCSV(students);
    downloadCSV(csv, `class-${(className||'all').replace(/[^a-zA-Z0-9]/g,'-')}-profiles.csv`);
  },

  exportAllCSV(){
    if(!state.students.length){ alert('No student records to export.'); return; }
    const csv = buildStudentCSV(state.students);
    downloadCSV(csv, `all-learner-profiles-${new Date().toISOString().slice(0,10)}.csv`);
  },

  exportClassCredentialsCSV(className){
    const students = studentsInClass(className).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    if(!students.length) return;
    const classEntry = getClassEntry(className);
    const headers = ['#','English Name','Chinese Name','User ID','Password','Class','Class ID'];
    const rows = students.map((s,i) => [
      i+1, s.name||'', s.chineseName||'', s.userId||'', s.password||'',
      className, classEntry ? classEntry.classId : ''
    ].map(csvEscape).join(','));
    const csv = headers.map(csvEscape).join(',') + '\n' + rows.join('\n');
    downloadCSV(csv, `credentials-${(className||'class').replace(/[^a-zA-Z0-9]/g,'-')}.csv`);
  },

  /* ── Export / Import ── */
  exportAll(){
    const payload = {
      _tool: 'Learner Profile System',
      _version: 1,
      exportedAt: new Date().toISOString(),
      students: state.students,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `learner-profiles-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  handleImportFile(input){
    const file = input.files && input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = JSON.parse(e.target.result);
        if(!data.students || !Array.isArray(data.students)) throw new Error('Invalid file format');
        const mode = document.querySelector('input[name="import-mode"]:checked').value;
        const result = performImport(data.students, mode);
        state.students = loadAllStudents();
        alert(`Import complete. Added ${result.added}, updated ${result.updated}, skipped ${result.skipped}.`);
        render();
      } catch(err){
        alert('Could not import file: ' + err.message);
      }
    };
    reader.readAsText(file);
  },
};
window.App = App;
