<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learner Profile System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --paper: #F7F5F0;
    --paper-raised: #FFFFFF;
    --ink: #1E2A32;
    --ink-soft: #4A5A63;
    --ink-faint: #8B979D;
    --rule: #D8D3C7;
    --rule-soft: #E8E4DA;
    --accent: #3B6E71;
    --accent-light: #E3EEEE;
    --primary: #2B7A5F;
    --primary-light: #E8F5EE;
    --primary-mid: #B8DFC9;
    --junior: #2D5FA6;
    --junior-light: #E8EFF8;
    --junior-mid: #B3CCE8;
    --senior: #7B3FA0;
    --senior-light: #F3ECF8;
    --senior-mid: #D4B8E8;
    --green: #2E7D32;
    --green-bg: #E8F5E9;
    --green-border: #A5D6A7;
    --yellow: #B35C00;
    --yellow-bg: #FFF3E0;
    --yellow-border: #FFCC80;
    --red: #B23A34;
    --red-bg: #FBEAE9;
    --red-border: #E8A8A3;
    --shadow: 0 1px 2px rgba(30,42,50,0.06), 0 4px 12px rgba(30,42,50,0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  #app { min-height: 100vh; padding-bottom: 60px; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }
  .wrap-narrow { max-width: 640px; margin: 0 auto; padding: 0 24px; }

  h1, h2, h3, h4 { font-family: Georgia, "Times New Roman", serif; font-weight: 700; color: var(--ink); margin: 0; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

  /* ── Top bar ── */
  .topbar {
    background: var(--paper-raised);
    border-bottom: 1px solid var(--rule);
    padding: 18px 0;
    margin-bottom: 32px;
  }
  .topbar-inner { display: flex; align-items: baseline; justify-content: space-between; }
  .brand { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .brand-mark { font-family: Georgia, serif; font-weight: 700; font-size: 20px; color: var(--accent); letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); }
  .topbar-nav { display: flex; gap: 18px; align-items: center; }
  .topbar-nav a { font-size: 13px; color: var(--ink-soft); text-decoration: none; cursor: pointer; border-bottom: 1px solid transparent; }
  .topbar-nav a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 6px; border: 1.5px solid transparent;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.12s ease;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2f595c; }
  .btn-primary:disabled { background: #C6CDCF; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink-faint); color: var(--ink); }
  .btn-danger-ghost { background: transparent; color: var(--red); border-color: var(--red-border); }
  .btn-danger-ghost:hover { background: var(--red-bg); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 5px; }
  .btn-block { width: 100%; justify-content: center; }

  /* ── Cards / index-card motif ── */
  .card {
    background: var(--paper-raised);
    border: 1px solid var(--rule-soft);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .record-tab {
    font-family: Georgia, serif; font-weight: 700; font-size: 15px;
    width: 40px; height: 40px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .record-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .record-meta { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .zone-dot { width: 9px; height: 9px; border-radius: 50%; }
  .record-arrow { color: var(--ink-faint); font-size: 16px; flex-shrink: 0; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 64px 24px; color: var(--ink-faint); }
  .empty-state h3 { color: var(--ink-soft); margin-bottom: 8px; font-size: 17px; }
  .empty-state p { font-size: 14px; margin: 0 0 20px; }

  /* ── Form elements ── */
  label.field-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft); margin-bottom: 6px; }
  input[type=text], input[type=number] {
    width: 100%; padding: 11px 14px; border-radius: 6px;
    border: 1.5px solid var(--rule); font-size: 15px; font-family: inherit;
    background: var(--paper-raised); color: var(--ink);
    outline: none; transition: border-color 0.12s;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--accent); }
  .field-group { margin-bottom: 20px; }

  /* ── Level picker ── */
  .level-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .level-opt {
    border: 1.5px solid var(--rule); border-radius: 8px; padding: 14px 10px;
    text-align: center; cursor: pointer; background: var(--paper-raised);
    transition: all 0.12s;
  }
  .level-opt.selected { border-width: 2px; }
  .level-opt .lo-label { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .level-opt .lo-grades { font-size: 11px; color: var(--ink-faint); }

  /* ── Progress ── */
  .progress-track { height: 4px; background: var(--rule-soft); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.25s; }
  .progress-label { font-size: 11px; color: var(--ink-faint); display: flex; justify-content: space-between; margin-bottom: 20px; }

  .section-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .section-tab {
    padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--rule); background: var(--paper-raised); color: var(--ink-faint);
    cursor: pointer;
  }
  .section-tab.active { border-width: 2px; }
  .section-tab.complete::before { content: "✓ "; }

  /* ── Question items ── */
  .q-item {
    border: 1px solid var(--rule-soft); border-radius: 8px; padding: 16px 18px;
    margin-bottom: 12px; background: var(--paper-raised);
    transition: border-color 0.12s, background 0.12s;
  }
  .q-item.answered { }
  .q-text { font-size: 14px; color: var(--ink); margin-bottom: 12px; line-height: 1.5; }
  .q-num { color: var(--ink-faint); font-size: 12px; margin-right: 6px; }
  .q-scale { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-opt {
    flex: 1; min-width: 90px; padding: 8px 10px; border-radius: 6px; text-align: center;
    border: 1.5px solid var(--rule); font-size: 12px; cursor: pointer; background: var(--paper-raised);
    color: var(--ink-soft); font-weight: 500; transition: all 0.1s;
  }
  .q-opt.selected { color: #fff; }

  /* ── Interest checklist ── */
  .interest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 20px; }
  .interest-chip {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--rule); border-radius: 6px; cursor: pointer; background: var(--paper-raised);
    font-size: 13.5px; color: var(--ink-soft); transition: all 0.1s;
  }
  .interest-chip.checked { font-weight: 600; }
  .interest-chip .box { width: 16px; height: 16px; border: 1.5px solid var(--ink-faint); border-radius: 3px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size: 11px; }
  textarea {
    width: 100%; padding: 11px 14px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 70px; outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  /* ── Nav row ── */
  .nav-row { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; }

  /* ── Report ── */
  .report-header { margin-bottom: 28px; }
  .report-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 6px; }
  .report-title { font-size: 26px; margin-bottom: 4px; }
  .report-meta { font-size: 13px; color: var(--ink-faint); }

  .zone-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .zone-card { border-radius: 8px; padding: 14px 14px; text-align: center; border: 1.5px solid; }
  .zone-card .zc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .zone-card .zc-title { font-size: 12.5px; font-weight: 600; color: var(--ink); }

  .section-block {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 10px;
    padding: 22px 26px; margin-bottom: 20px;
  }
  .sb-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .sb-title { font-size: 17px; margin-bottom: 2px; }
  .sb-domain { font-size: 11.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; }
  .zone-pill { padding: 4px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; border: 1px solid; white-space: nowrap; }

  .score-bar-track { height: 9px; background: var(--rule-soft); border-radius: 5px; margin: 6px 0 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 5px; }
  .score-bar-label { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--ink-faint); margin-bottom: 4px; }

  .item-row { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--rule-soft); font-size: 13px; }
  .item-row:last-child { border-bottom: none; }
  .item-row .it-text { color: var(--ink-soft); flex: 1; }
  .item-tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--rule-soft); color: var(--ink-soft); white-space: nowrap; }

  .strategy-box { background: var(--accent-light); border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .strategy-box .sx-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .strategy-box ul { margin: 0; padding-left: 18px; }
  .strategy-box li { font-size: 13px; color: var(--ink); margin-bottom: 5px; line-height: 1.5; }

  .pref-row { margin-bottom: 12px; }
  .pref-row-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
  .pref-row-head strong { color: var(--ink); }
  .pref-bar-track { height: 8px; background: var(--rule-soft); border-radius: 4px; overflow: hidden; }
  .pref-bar-fill { height: 100%; border-radius: 4px; }
  .pref-strategy { font-size: 11.5px; color: var(--ink-faint); margin-top: 3px; }

  .info-callout {
    border-radius: 8px; padding: 14px 16px; font-size: 12.5px; line-height: 1.6;
    margin-bottom: 16px; border: 1px solid;
  }
  .info-callout strong { display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }

  .interest-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .interest-tag { background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 600; }
  .free-response { background: var(--rule-soft); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--ink-soft); font-style: italic; }

  .obs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  .obs-field select {
    width: 100%; padding: 9px 10px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 13px; font-family: inherit; background: var(--paper-raised); color: var(--ink);
  }
  .obs-field label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 4px; }
  .match-note { font-size: 12.5px; padding: 10px 12px; border-radius: 6px; margin-top: 10px; }

  .disclaimer-footer { font-size: 11px; color: var(--ink-faint); line-height: 1.6; padding-top: 18px; border-top: 1px solid var(--rule); margin-top: 8px; }

  .action-row { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }

  /* Research page */
  .evidence-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 13px; }
  .evidence-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-faint); border-bottom: 2px solid var(--rule); padding: 8px 10px; }
  .evidence-table td { padding: 10px; border-bottom: 1px solid var(--rule-soft); vertical-align: top; }
  .grade-badge { font-weight: 700; font-size: 12px; color: var(--accent); white-space: nowrap; }

  @media print {
    .topbar, .no-print { display: none !important; }
    body { background: #fff; }
    .section-block, .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }

  /* ── Class grouping on dashboard ── */
  .class-group { margin-bottom: 32px; }
  .class-group-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 12px 10px; margin-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    border-radius: 4px 4px 0 0;
    transition: background 0.1s;
  }
  .class-group-header.clickable { cursor: pointer; }
  .class-group-header.clickable:hover { background: var(--accent-light); }
  .class-group-name {
    font-family: Georgia, serif; font-weight: 700; font-size: 16px; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .class-group-hint { font-size: 11px; color: var(--accent); margin-top: 1px; }
  .class-group-count {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-faint);
  }

  /* ── Class overview page ── */
  .class-actions-bar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 8px; padding: 16px 18px; box-shadow: var(--shadow); }
  .stat-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-faint); margin-bottom: 12px; }
  .stat-bars { display: flex; flex-direction: column; gap: 6px; }
  .stat-bar-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
  .stat-bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--rule-soft); overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; }
  .stat-count { font-weight: 700; min-width: 24px; text-align: right; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .stat-names { font-size: 11.5px; color: var(--ink-faint); margin-top: 4px; padding-left: 18px; }
  .stat-names .name-chip { display: inline-block; margin: 2px 4px 2px 0; padding: 1px 8px; border-radius: 3px; background: var(--rule-soft); color: var(--ink-soft); cursor: pointer; font-size: 11px; }
  .stat-names .name-chip:hover { background: var(--accent-light); color: var(--accent); }

  /* Interest tally list */
  .interest-tally { display: flex; flex-direction: column; gap: 10px; }
  .interest-tally-row { border-bottom: 1px solid var(--rule-soft); padding-bottom: 8px; }
  .interest-tally-row:last-child { border-bottom: none; }
  .interest-tally-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .interest-tally-head strong { color: var(--ink); }
  .interest-tally-count { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink-faint); font-size: 12px; }

  /* Watch list */
  .watch-list-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 6px; background: var(--paper-raised);
    border: 1px solid var(--rule-soft); margin-bottom: 8px;
    cursor: pointer; transition: background 0.1s;
  }
  .watch-list-row:hover { background: var(--red-bg); }
  .watch-list-name { font-weight: 600; font-size: 14px; color: var(--ink); flex: 1; }
  .watch-list-reasons { font-size: 12px; color: var(--ink-faint); }
  .watch-list-badge { padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; background: var(--red-bg); color: var(--red); }

  /* Compare view */
  .compare-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .compare-picker select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit; background: var(--paper-raised); }
  .compare-table {
    width: 100%; border-collapse: collapse; background: var(--paper-raised);
    border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .compare-table th, .compare-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--rule-soft); font-size: 13.5px; }
  .compare-table th { background: var(--rule-soft); font-family: Georgia, serif; font-weight: 700; font-size: 15px; }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table td:first-child { font-weight: 600; color: var(--ink-soft); background: #FBFAF6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; width: 25%; }
  .compare-insights { background: var(--accent-light); border-radius: 8px; padding: 16px 20px; }
  .compare-insights h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .compare-insights li { font-size: 13px; margin-bottom: 6px; }

  /* Grouping view */
  .group-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 20px; align-items: end; }
  .group-controls select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit; background: var(--paper-raised); }
  .group-card {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-left: 4px solid var(--accent);
    border-radius: 6px; padding: 16px 20px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .group-card h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent); }
  .group-members { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .group-member { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
  .group-member .zone-dot { width: 8px; height: 8px; }
  .group-member-name { font-weight: 500; }
  .group-member-role { font-size: 11px; color: var(--ink-faint); font-style: italic; margin-left: 4px; }
  .group-rationale { font-size: 12.5px; color: var(--ink-soft); background: #FBFAF6; padding: 8px 12px; border-radius: 5px; line-height: 1.55; border-left: 3px solid var(--rule); }

  /* Data view */
  .data-section {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .data-section h2 { font-size: 17px; margin-bottom: 6px; }
  .data-section p { font-size: 13px; color: var(--ink-soft); margin: 0 0 12px; line-height: 1.55; }
  .file-input-wrap {
    border: 1.5px dashed var(--rule); border-radius: 6px; padding: 20px; text-align: center;
    background: #FBFAF6; margin-bottom: 12px;
  }
  .file-input-wrap input[type=file] { font-family: inherit; font-size: 13px; }

  /* Trend indicators on report */
  .trend-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700;
    margin-left: 8px; vertical-align: middle;
  }
  .trend-improved { background: var(--green-bg); color: var(--green); }
  .trend-worsened { background: var(--red-bg); color: var(--red); }
  .trend-same { background: var(--rule-soft); color: var(--ink-faint); }
  .history-strip {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 11.5px; color: var(--ink-faint);
    padding: 10px 14px; background: #FBFAF6; border-radius: 6px; margin-bottom: 16px;
  }
  .history-strip strong { color: var(--ink-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-item { padding: 3px 10px; border-radius: 12px; background: var(--paper-raised); border: 1px solid var(--rule); }
  .history-item.current { background: var(--accent-light); color: var(--accent); font-weight: 600; border-color: var(--accent); }

  /* ── Record card actions ── */
  .record-card {
    background: var(--paper-raised);
    border: 1px solid var(--rule-soft);
    border-left: 6px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.1s ease;
    margin-bottom: 10px;
  }
  .record-card:hover { transform: translateX(2px); }
  .record-info { flex: 1; min-width: 0; cursor: pointer; }
  .record-zones { display: flex; gap: 5px; flex-shrink: 0; cursor: pointer; }
  .record-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .record-move {
    padding: 6px 8px; border-radius: 5px; border: 1px solid var(--rule);
    background: var(--paper-raised); font-size: 12px; color: var(--ink-soft);
    cursor: pointer; font-family: inherit; max-width: 140px;
  }
  .record-move:hover { border-color: var(--accent); color: var(--accent); }
  .record-delete {
    width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--rule);
    background: var(--paper-raised); color: var(--ink-faint); font-size: 18px; line-height: 1;
    cursor: pointer; font-family: inherit; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .record-delete:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

  /* ── Report page — student meta card & notes ── */
  .student-meta-card {
    background: var(--paper-raised); border: 1px solid var(--rule-soft); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 20px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .student-meta-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-faint); margin-bottom: 4px; }
  .student-meta-field input { width: 100%; padding: 8px 10px; border-radius: 5px; border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit; background: var(--paper-raised); outline: none; }
  .student-meta-field input:focus { border-color: var(--accent); }
  .notes-textarea {
    width: 100%; padding: 12px 14px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 120px;
    outline: none; background: var(--paper-raised); line-height: 1.6;
  }
  .notes-textarea:focus { border-color: var(--accent); }

  /* ── Posts / Timeline section ── */
  .new-post-form {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 20px; padding: 14px 16px;
    border: 1px solid var(--rule-soft); border-radius: 6px;
    background: #FBFAF6;
  }
  .new-post-form textarea {
    width: 100%; padding: 10px 12px; border-radius: 5px;
    border: 1.5px solid var(--rule); font-family: inherit; font-size: 13.5px;
    resize: vertical; min-height: 60px; outline: none; background: var(--paper-raised);
    line-height: 1.55; box-sizing: border-box;
  }
  .new-post-form textarea:focus { border-color: var(--accent); }
  .new-post-form .form-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .new-post-hint { font-size: 11px; color: var(--ink-faint); }

  .posts-list { display: flex; flex-direction: column; gap: 10px; }
  .post-item {
    border: 1px solid var(--rule-soft); border-left: 3px solid var(--accent);
    border-radius: 5px; padding: 12px 14px; background: var(--paper-raised);
  }
  .post-timestamp {
    font-size: 11px; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px; font-weight: 600;
  }
  .post-timestamp .edited-marker {
    text-transform: none; font-weight: 400; margin-left: 6px; font-size: 10.5px;
  }
  .post-source-badge {
    display: inline-block; margin-left: 8px; padding: 2px 8px;
    border-radius: 10px; font-size: 10px; font-weight: 700;
    text-transform: none; letter-spacing: 0.2px; vertical-align: middle;
    background: #E8F0FE; color: #1a5fb4; border: 1px solid #c4d9f5;
  }
  .post-source-badge.live { background: #E7F6EC; color: #1a7f4b; border-color: #b8e6c9; }
  .post-item.external { border-left-color: #1a5fb4; }
  .post-item.external.live { border-left-color: #1a7f4b; }
  .post-content {
    font-size: 13.5px; line-height: 1.55; color: var(--ink);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .post-edit-textarea {
    width: 100%; padding: 8px 10px; border-radius: 4px;
    border: 1.5px solid var(--accent); font-family: inherit; font-size: 13.5px;
    resize: vertical; min-height: 60px; outline: none; background: var(--paper-raised);
    line-height: 1.55; box-sizing: border-box;
  }
  .post-actions {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .post-action {
    padding: 4px 12px; font-size: 11.5px; border-radius: 4px;
    border: 1px solid var(--rule); background: var(--paper-raised);
    color: var(--ink-soft); cursor: pointer; font-family: inherit;
    transition: all 0.1s;
  }
  .post-action:hover { border-color: var(--accent); color: var(--accent); }
  .post-action.danger:hover { border-color: var(--red-border); color: var(--red); background: var(--red-bg); }
  .post-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .post-action.primary:hover { background: #2f595c; color: #fff; }
  .no-posts-state {
    text-align: center; padding: 20px 12px; color: var(--ink-faint);
    font-size: 12.5px; font-style: italic;
  }

  /* ── Learning Context sections (subsection headers, radio chips, badges) ── */
  .subsection-header {
    font-family: Georgia, serif; font-weight: 700; font-size: 14px; color: var(--ink);
    margin: 22px 0 4px; padding-bottom: 6px; border-bottom: 1px solid var(--rule-soft);
    display: flex; align-items: center; gap: 8px;
  }
  .subsection-header:first-child { margin-top: 0; }
  .subsection-hint { font-size: 12px; color: var(--ink-faint); margin: 0 0 10px; line-height: 1.5; }

  .radio-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .radio-chip {
    padding: 6px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    border: 1.5px solid var(--rule); background: var(--paper-raised); color: var(--ink-soft);
    cursor: pointer; font-family: inherit; transition: all 0.1s;
  }
  .radio-chip:hover { border-color: var(--accent); color: var(--accent); }
  .radio-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

  .field-grid-2 {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
  }
  .field-grid-2 label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field-grid-2 input[type=text] {
    width: 100%; padding: 9px 12px; border-radius: 5px;
    border: 1.5px solid var(--rule); font-size: 13.5px; font-family: inherit;
    background: var(--paper-raised); color: var(--ink); outline: none; box-sizing: border-box;
  }
  .field-grid-2 input[type=text]:focus { border-color: var(--accent); }
  .context-textarea {
    width: 100%; padding: 10px 12px; border-radius: 5px; border: 1.5px solid var(--rule);
    font-size: 13.5px; font-family: inherit; resize: vertical; min-height: 60px;
    outline: none; background: var(--paper-raised); line-height: 1.55; box-sizing: border-box;
    margin-bottom: 8px;
  }
  .context-textarea:focus { border-color: var(--accent); }

  /* ACC badge on record cards */
  .acc-badge {
    background: var(--accent); color: #fff; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; text-transform: uppercase;
    margin-left: 6px; vertical-align: middle;
  }

  /* ── English test score cards ── */
  .test-card {
    border: 1px solid var(--rule); border-radius: 6px; padding: 12px 14px;
    margin-bottom: 10px; background: #FBFAF6;
  }
  .test-card-head {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap;
  }
  .test-card-head select, .test-card-head input[type=text], .test-card-head input[type=date] {
    padding: 6px 10px; border-radius: 4px; border: 1.5px solid var(--rule);
    font-size: 13px; font-family: inherit; background: var(--paper-raised);
    color: var(--ink); outline: none;
  }
  .test-card-head select:focus, .test-card-head input:focus { border-color: var(--accent); }
  .test-card-head select { flex: 1.5; min-width: 140px; }
  .test-card-head input[type=text].test-name { flex: 1.5; min-width: 140px; }
  .test-card-head input[type=date] { flex: 1; min-width: 120px; }
  .test-card-head .del-btn {
    background: transparent; border: 1px solid var(--rule);
    color: var(--ink-faint); width: 28px; height: 28px;
    border-radius: 4px; font-size: 16px; line-height: 1; cursor: pointer;
    padding: 0; display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .test-card-head .del-btn:hover {
    border-color: var(--red-border); color: var(--red); background: var(--red-bg);
  }
  .score-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    margin-bottom: 8px;
  }
  .score-field { display: flex; flex-direction: column; }
  .score-field label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ink-faint); margin-bottom: 3px; text-align: center; font-weight: 600;
  }
  .score-field input {
    padding: 7px 8px; border-radius: 4px; border: 1.5px solid var(--rule);
    font-size: 12.5px; font-family: inherit; background: var(--paper-raised);
    color: var(--ink); outline: none; text-align: center; box-sizing: border-box;
  }
  .score-field input:focus { border-color: var(--accent); }
  .other-test-score {
    width: 100%; padding: 8px 12px; border-radius: 4px; border: 1.5px solid var(--rule);
    font-size: 13px; font-family: inherit; background: var(--paper-raised);
    color: var(--ink); outline: none; margin-bottom: 8px; box-sizing: border-box;
  }
  .other-test-score:focus { border-color: var(--accent); }
  .test-empty-state {
    padding: 12px; text-align: center; color: var(--ink-faint);
    font-size: 12.5px; font-style: italic; margin-bottom: 8px;
  }

  /* ── Collapsible sections ── */
  .section-block > .sb-head {
    cursor: pointer;
    user-select: none;
    padding: 6px 8px;
    margin: -6px -8px 14px;
    border-radius: 5px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: background 0.1s;
  }
  .section-block > .sb-head:hover { background: rgba(30, 42, 50, 0.035); }
  .section-block > .sb-head > div:first-of-type { flex: 1; min-width: 0; }
  .section-block > .sb-head::before {
    content: '▾';
    color: var(--ink-faint);
    font-size: 12px;
    line-height: 1.8;
    flex-shrink: 0;
    transition: transform 0.15s ease;
    display: inline-block;
  }
  .section-block.collapsed > .sb-head::before { transform: rotate(-90deg); }
  .section-block.collapsed > .sb-head { margin-bottom: 0; }
  .section-block.collapsed {
    padding-top: 16px;
    padding-bottom: 16px;
  }
  .section-block.collapsed > *:not(.sb-head) { display: none !important; }

  .collapse-controls {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-bottom: 14px; font-size: 12px;
  }
  .collapse-controls button {
    padding: 5px 12px; border: 1px solid var(--rule);
    background: transparent; color: var(--ink-faint);
    border-radius: 4px; cursor: pointer; font-family: inherit;
    font-size: 11.5px; font-weight: 500;
    transition: all 0.1s;
  }
  .collapse-controls button:hover {
    border-color: var(--accent); color: var(--accent);
  }

  /* Print: always show everything in collapsible sections, no chevron */
  @media print {
    .section-block.collapsed > *:not(.sb-head) { display: revert !important; }
    .section-block > .sb-head::before { display: none; }
    .section-block > .sb-head { cursor: default; }
    .collapse-controls { display: none; }

    /* Hide verbose interactive report, show compact print summary */
    .screen-report-body { display: none !important; }
    .print-summary { display: block !important; }
    .print-summary * { color: #1a1a1a !important; }

    body { background: #fff; font-size: 11px; }
    .topbar, .no-print, .action-row, .student-meta-card { display: none !important; }
    .section-block, .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .report-header { margin-bottom: 12px; }
    .report-title { font-size: 20px; }
    .report-meta { font-size: 11px; }
  }

  /* Print summary styles (hidden on screen) */
  .print-summary { display: none; }
  .ps-header { border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 10px; }
  .ps-header h1 { font-size: 18px; margin: 0 0 2px; font-family: Georgia, serif; }
  .ps-header .ps-meta { font-size: 10px; color: #666; }
  .ps-section { margin-bottom: 12px; break-inside: avoid; }
  .ps-section-title {
    font-family: Georgia, serif; font-size: 12px; font-weight: 700;
    border-bottom: 1px solid #ccc; padding-bottom: 2px; margin-bottom: 6px;
  }
  .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 10.5px; line-height: 1.5; }
  .ps-grid dt { font-weight: 600; color: #555; }
  .ps-grid dd { margin: 0; }
  .ps-zone-table {
    width: 100%; border-collapse: collapse; font-size: 10.5px; margin-bottom: 8px;
  }
  .ps-zone-table th {
    text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1.5px solid #333; padding: 4px 6px; color: #555;
  }
  .ps-zone-table td { padding: 5px 6px; border-bottom: 1px solid #ddd; vertical-align: top; }
  .ps-zone-table td:nth-child(2), .ps-zone-table td:nth-child(3) { text-align: center; white-space: nowrap; }
  .ps-zone-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .ps-inline-list { font-size: 10.5px; line-height: 1.6; }
  .ps-inline-list strong { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; color: #555; }
  .ps-posts { font-size: 10px; line-height: 1.5; }
  .ps-post { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid #ccc; }
  .ps-post-date { font-weight: 600; font-size: 9px; color: #777; text-transform: uppercase; }
  .ps-goal-box {
    border: 1.5px solid #333; border-radius: 4px; padding: 6px 10px;
    font-size: 11px; font-style: italic; margin-bottom: 10px; line-height: 1.5;
  }
  .ps-footer { font-size: 8.5px; color: #888; border-top: 1px solid #ccc; padding-top: 6px; margin-top: 12px; }

  @media (max-width: 640px) {
    .field-grid-2 { grid-template-columns: 1fr; }
    .score-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 640px) {
    .interest-grid { grid-template-columns: 1fr; }
    .level-options { grid-template-columns: 1fr; }
    .obs-grid { grid-template-columns: 1fr; }
    .student-meta-card { grid-template-columns: 1fr; }
    .record-card { flex-wrap: wrap; }
    .record-actions { width: 100%; justify-content: flex-end; }
  }

  /* ── AI Export instruction modal ── */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(30, 42, 50, 0.5); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-box {
    background: var(--paper-raised); border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 32px;
  }
  .modal-box h2 { font-family: Georgia, serif; font-size: 20px; margin: 0 0 6px; color: var(--ink); }
  .modal-box .modal-sub { font-size: 13px; color: var(--ink-faint); margin: 0 0 24px; line-height: 1.5; }
  .modal-step { display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start; }
  .modal-step-num {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff; background: var(--accent);
    font-family: Georgia, serif;
  }
  .modal-step-body { flex: 1; padding-top: 4px; }
  .modal-step-body strong { font-size: 14.5px; display: block; margin-bottom: 4px; color: var(--ink); }
  .modal-step-body p { font-size: 13px; color: var(--ink-soft); margin: 0; line-height: 1.55; }
  .modal-step-body .modal-links {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
  }
  .modal-step-body .modal-links a {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    text-decoration: none; cursor: pointer; background: var(--paper-raised);
    transition: all 0.1s;
  }
  .modal-step-body .modal-links a:hover {
    border-color: var(--accent); color: var(--accent); background: var(--accent-light);
  }
  .modal-actions { display: flex; gap: 10px; justify-content: space-between; margin-top: 28px; flex-wrap: wrap; align-items: center; }
  .modal-tip {
    background: var(--accent-light); border-radius: 8px; padding: 12px 16px;
    font-size: 12.5px; color: var(--accent); line-height: 1.55; margin-top: 20px;
  }
  .copy-success {
    display: inline-block; padding: 4px 12px; border-radius: 4px;
    background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 600;
    margin-left: 8px;
  }

  @media print { .modal-overlay { display: none !important; } }

  /* ── Database connection status ── */
  .db-banner {
    padding: 8px 24px; font-size: 12px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }
  .db-banner.connected { background: var(--green-bg); color: var(--green); }
  .db-banner.disconnected { background: var(--yellow-bg); color: var(--yellow); }
  .db-banner.error { background: var(--red-bg); color: var(--red); }
  .db-banner .db-status { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .db-banner .db-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .db-banner.connected .db-dot { background: var(--green); }
  .db-banner.disconnected .db-dot { background: var(--yellow); }
  .db-banner.error .db-dot { background: var(--red); }
  .db-banner a { color: inherit; text-decoration: underline; cursor: pointer; font-weight: 500; }

  /* ── Auth screens ── */
  .auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--paper);
  }
  .auth-card {
    background: var(--paper-raised); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    padding: 40px 36px; width: 100%; max-width: 400px;
  }
  .auth-card h1 { font-family: Georgia, serif; font-size: 22px; margin: 0 0 4px; text-align: center; }
  .auth-card .auth-sub { font-size: 13px; color: var(--ink-faint); text-align: center; margin-bottom: 28px; }
  .auth-card .field-group { margin-bottom: 16px; }
  .auth-card input[type=email], .auth-card input[type=password], .auth-card input[type=text] {
    width: 100%; padding: 12px 14px; border-radius: 6px; border: 1.5px solid var(--rule);
    font-size: 15px; font-family: inherit; background: var(--paper-raised);
    color: var(--ink); outline: none; box-sizing: border-box;
  }
  .auth-card input:focus { border-color: var(--accent); }
  .auth-card .btn-block { width: 100%; }
  .auth-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--ink-faint); }
  .auth-toggle a { color: var(--accent); cursor: pointer; font-weight: 600; text-decoration: none; }
  .auth-error { background: var(--red-bg); color: var(--red); padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
  .auth-brand { text-align: center; margin-bottom: 24px; }
  .auth-brand .brand-mark { font-family: Georgia, serif; font-weight: 700; font-size: 24px; color: var(--accent); }
  .auth-brand .brand-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); display: block; margin-top: 2px; }
  .user-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 14px; background: var(--accent-light);
    font-size: 11.5px; color: var(--accent); font-weight: 600;
  }
  .user-pill a { color: var(--ink-faint); cursor: pointer; text-decoration: none; font-weight: 400; margin-left: 4px; }
  .user-pill a:hover { color: var(--red); }

  /* ── Multi-select mode ── */
  .select-checkbox {
    width: 20px; height: 20px; border-radius: 4px;
    border: 2px solid var(--rule); background: var(--paper-raised);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-right: 12px; cursor: pointer;
    font-weight: 700; font-size: 13px; color: transparent;
    transition: all 0.1s;
  }
  .select-checkbox:hover { border-color: var(--accent); }
  .select-checkbox.checked {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .selection-toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper-raised);
    border-radius: 10px; padding: 14px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    display: flex; align-items: center; gap: 14px; z-index: 500;
    font-size: 13.5px;
    flex-wrap: wrap; max-width: 90vw;
  }
  .selection-toolbar strong { color: #fff; }
  .selection-toolbar select {
    padding: 8px 12px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1); color: #fff; font-size: 13px;
    font-family: inherit; outline: none; min-width: 180px;
  }
  .selection-toolbar select option { color: var(--ink); background: var(--paper-raised); }
  .selection-toolbar button {

// Compute integer age (in whole years) from an ISO date string. Returns null if invalid.
function computeAge(birthdateISO){
  if(!birthdateISO) return null;
  const bd = new Date(birthdateISO);
  if(isNaN(bd.getTime())) return null;
  const now = new Date();
  let age = now.getFullYear() - bd.getFullYear();
  const m = now.getMonth() - bd.getMonth();
  if(m < 0 || (m === 0 && now.getDate() < bd.getDate())) age--;
  return age >= 0 && age < 130 ? age : null;
}

/* ══════════════════════════════════════════════════════════════
   STORAGE — Dual layer: Supabase (primary) + localStorage (cache/fallback)
   When Supabase is connected, all reads/writes go to the cloud database
   AND mirror to localStorage for offline access. When disconnected,
   falls back to localStorage only.
   ══════════════════════════════════════════════════════════════ */

// ── Local storage layer (always available) ──
const local = (function(){
  let mem = {};
  let persistent = false;
  try{
    if(typeof localStorage !== 'undefined'){
      localStorage.setItem('__lp_test__','1');
      localStorage.removeItem('__lp_test__');
      persistent = true;
    }
  }catch(e){ persistent = false; }

  if(persistent){
    return {
      persistent: true,
      set(k,v){ localStorage.setItem(k,v); },
      get(k){ return localStorage.getItem(k); },
      del(k){ localStorage.removeItem(k); },
      keys(prefix){
        const out = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(!prefix || (k && k.indexOf(prefix)===0)) out.push(k);
        }
        return out;
      },
    };
  }
  return {
    persistent: false,
    set(k,v){ mem[k]=v; },
    get(k){ return (k in mem) ? mem[k] : null; },
    del(k){ delete mem[k]; },
    keys(prefix){ return Object.keys(mem).filter(k=>!prefix||k.indexOf(prefix)===0); },
  };
})();

// ── Field mapping: JS camelCase <-> SQL snake_case ──
const FIELD_MAP = {
  chineseName:'chinese_name', className:'class_name', subjectStrengths:'subject_strengths',
  interestsChecked:'interests_checked', interestsFree:'interests_free',
  teacherObs:'teacher_obs', accommodationNotes:'accommodation_notes',
  attendancePattern:'attendance_pattern', attendanceNote:'attendance_note',
  firstLanguage:'first_language', otherLanguages:'other_languages',
  englishProficiency:'english_proficiency', chineseProficiency:'chinese_proficiency',
  cefrLevel:'cefr_level', cambridgeExams:'cambridge_exams',
  otherEnglishTests:'other_english_tests', familyContext:'family_context',
  physicalMedicalNotes:'physical_medical_notes', supportNetwork:'support_network',
  bestTimeOfDay:'best_time_of_day', communicationPreferences:'communication_preferences',
  groupRoleTendency:'group_role_tendency', userId:'user_id',
  createdAt:'created_at', updatedAt:'updated_at',
};
const FIELD_MAP_REV = {};
Object.entries(FIELD_MAP).forEach(([js,sql])=>{ FIELD_MAP_REV[sql]=js; });

function recToRow(rec){
  const row = {};
  Object.entries(rec).forEach(([k,v])=>{
    const sqlKey = FIELD_MAP[k] || k;
    if(k === 'id'){ row.student_id = v; return; }
    if(k.startsWith('_')) return;
    // Convert JS millisecond timestamps → Postgres ISO strings for TIMESTAMPTZ columns
    if((k === 'createdAt' || k === 'updatedAt')){
      if(typeof v === 'number'){ row[sqlKey] = new Date(v).toISOString(); return; }
      if(typeof v === 'string' && /^\d+$/.test(v)){ row[sqlKey] = new Date(Number(v)).toISOString(); return; }
      // already a date string or empty — pass through if valid, else skip
      if(v){ row[sqlKey] = v; }
      return;
    }
    row[sqlKey] = v;
  });
  // Always tag with current user's ID for RLS
  if(state.userId) row.owner_id = state.userId;
  return row;
}

function rowToRec(row){
  const rec = {};
  Object.entries(row).forEach(([k,v])=>{
    if(k === 'id') return; // UUID primary key, not needed in app
    if(k === 'student_id'){ rec.id = v; return; }
    if(k === 'owner_id') return; // internal, not needed in app model
    const jsKey = FIELD_MAP_REV[k] || k;
    // Convert Postgres ISO date strings → JS millisecond timestamps
    if((jsKey === 'createdAt' || jsKey === 'updatedAt') && v){
      const ms = new Date(v).getTime();
      rec[jsKey] = isNaN(ms) ? Date.now() : ms;
      return;
    }
    rec[jsKey] = v;
  });
  return rec;
}

async function loadAllStudentsAsync(){

    try{
      const { data, error } = await db.client.from('students').select('*').order('updated_at', { ascending: false });

      const students = data.map(row => migrateStudent(rowToRec(row)));

      return students;
    }catch(e){

  if(db.isConnected()){

    const row = recToRow(rec);
    db.client.from('students').upsert(row, { onConflict: 'student_id' }).then(({error})=>{
      state.dbSyncPending = Math.max(0, (state.dbSyncPending||1) - 1);

        state.dbSyncErrors.push({ name: rec.name || rec.id, error: error.message, time: Date.now() });

        console.error('DB sync error for', rec.name, ':', error.message);
        // Update banner to show error state
        if(typeof updateDbBanner === 'function') updateDbBanner();
      }
    });
  }
  return true;
}

// Sync all localStorage data up to Supabase
async function syncLocalToDb(){
  if(!db.isConnected()) return { synced: 0, errors: 0, firstError: null };
  let synced = 0, errors = 0, firstError = null;

  if(!state.userId){
    return { synced: 0, errors: 1, firstError: 'Not logged in — cannot set owner_id. Please log in first.' };
  }

  // Sync students
  const students = loadAllStudentsLocal();
  for(const rec of students){
    try{
      const row = recToRow(rec);
      row.owner_id = state.userId; // guarantee ownership tag
      const { error } = await db.client.from('students').upsert(row, { onConflict: 'student_id' });
      if(error) throw error;
      synced++;
    }catch(e){
      errors++;
      if(!firstError) firstError = e.message;
      console.error('Sync error for', rec.name, e);
    }
  }

  // Sync classes
  const classes = loadClassRegistry();
  for(const entry of Object.values(classes)){
    try{
      const row = {
        class_id: entry.classId, name: entry.name,
        owner_id: state.userId,
        created_at: new Date(entry.createdAt || Date.now()).toISOString(),
      };
      const { error } = await db.client.from('classes').upsert(row, { onConflict: 'class_id' });
      if(error) throw error;
    }catch(e){ errors++; if(!firstError) firstError = e.message; }
  }

  return { synced, errors, firstError };
}

  let id = 'STU-';
  for(let i=0;i<5;i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}

function generatePassword(){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let pw = '';
  for(let i=0;i<8;i++) pw += chars[Math.floor(Math.random()*chars.length)];
  return pw;

function generateClassId(className){
  const slug = (className||'class').replace(/[^a-zA-Z0-9]/g,'').substring(0,8).toUpperCase();

  let suffix = '';
  for(let i=0;i<4;i++) suffix += chars[Math.floor(Math.random()*chars.length)];
  return 'CLS-' + slug + '-' + suffix;
}

   SCORING
   ══════════════════════════════════════════════════════════════ */

function scaleMaxFor(level){ return LEVEL_META[level].scale.length - 1; }

function computeSectionResult(sec, answers, scaleMax){
  const isProfile = sec.items.every(i=>i.direction==='preference');
  if(isProfile){
    const domainScores = {};
    sec.items.forEach(it=>{
      domainScores[it.domain] = (domainScores[it.domain]||0) + (answers[it.id]||0);
    });
    return { type:'profile', domainScores };
  }
  let diffScore=0, diffMax=0, strScore=0, strMax=0;
  sec.items.forEach(it=>{
    const v = answers[it.id]||0;
    if(it.direction==='difficulty'){ diffScore+=v; diffMax+=scaleMax; }
    else if(it.direction==='strength'){ strScore+=v; strMax+=scaleMax; }
  });
  const isPositive = (sec.id==='D' || sec.id==='E');
  let compositeScore, compositeMax;
  if(isPositive){ compositeScore = strScore; compositeMax = strMax; }
  else { compositeScore = diffScore + (strMax - strScore); compositeMax = diffMax + strMax; }
  return { type:'composite', compositeScore, compositeMax, isPositive };
}

function getZone(compositeScore, compositeMax, isPositive){
  if(compositeMax===0) return 'neutral';
  const pct = compositeScore/compositeMax;
  if(isPositive){
    if(pct>=0.75) return 'green';
    if(pct>=0.4) return 'yellow';
    return 'red';
  }
  if(pct>=0.65) return 'red';
  if(pct>=0.35) return 'yellow';
  return 'green';
}

const ZONE_META = {
  green: { bg:'var(--green-bg)', border:'var(--green-border)', text:'var(--green)', label:'Strength' },
  yellow:{ bg:'var(--yellow-bg)', border:'var(--yellow-border)', text:'var(--yellow)', label:'Monitor' },
  red:   { bg:'var(--red-bg)', border:'var(--red-border)', text:'var(--red)', label:'Support Needed' },

};

      const { data: { session } } = await db.client.auth.getSession();
      if(session && session.user){
        state.userId = session.user.id;
        state.userEmail = session.user.email;
        state.students = await loadAllStudentsAsync();
        state.view = 'dashboard';
      } else {
        state.view = 'login';
      }
    }catch(e){
      console.error('Session check failed:', e);
      state.view = 'login';
    }
  } else {
    state.students = loadAllStudentsLocal();
    state.view = 'dashboard';
  }

  render();

  document.getElementById('app').addEventListener('click', function(e){
    const head = e.target.closest('.section-block > .sb-head');
    if(!head) return;
    if(e.target.closest('a, button, select, input, textarea')) return;
    const block = head.parentElement;
    if(block && block.classList.contains('section-block')){
      block.classList.toggle('collapsed');
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   RENDER: shell + router
   ══════════════════════════════════════════════════════════════ */

function render(opts){
  opts = opts || {};
  const app = document.getElementById('app');
  let body = '';
  if(state.view === 'loading') body = renderLoading();
  else if(state.view === 'login') body = renderAuth('login');
  else if(state.view === 'signup') body = renderAuth('signup');
  else if(state.view === 'dashboard') body = renderDashboard();
  else if(state.view === 'newInfo') body = renderNewInfo();
  else if(state.view === 'assess') body = renderAssess();
  else if(state.view === 'report') body = renderReport();
  else if(state.view === 'research') body = renderResearch();
  else if(state.view === 'classOverview') body = renderClassOverview();
  else if(state.view === 'compare') body = renderCompare();
  else if(state.view === 'grouping') body = renderGrouping();
  else if(state.view === 'data') body = renderData();
  else if(state.view === 'bulkImport') body = renderBulkImport();
  else if(state.view === 'classCredentials') body = renderClassCredentials();
  else if(state.view === 'dbSettings') body = renderDbSettings();

  app.innerHTML = `
    ${(state.view !== 'loading' && state.view !== 'login' && state.view !== 'signup') ? renderTopbar() : ''}
    ${body}
  `;
  if(!opts.preserveScroll) window.scrollTo(0,0);
}

  return `
  <div class="db-banner ${dbClass} no-print">

/* ── Dashboard ── */

function renderDashboard(){
  const students = state.students;
  if(!state.selectedIds) state.selectedIds = new Set();

  const groups = {};
  students.forEach(s => {
    const key = (s.className && s.className.trim()) ? s.className.trim() : '__unassigned__';
    if(!groups[key]) groups[key] = [];
    groups[key].push(s);
  });
  const classNames = Object.keys(groups).filter(k => k !== '__unassigned__').sort((a,b)=>a.localeCompare(b));
  const orderedGroups = classNames.map(c => ({ name: c, students: groups[c], isUnassigned: false }));
  if(groups.__unassigned__) orderedGroups.push({ name: 'Unassigned', students: groups.__unassigned__, isUnassigned: true });

  const selectMode = !!state.selectMode;
  const selectedCount = state.selectedIds.size;
  const allClassNames = getAllClassNames();

  return `
  <div class="wrap" style="${selectMode && selectedCount > 0 ? 'padding-bottom:100px;' : ''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap;">
      <div>
        <h1 style="font-size:24px;">Student Records</h1>
        <p style="color:var(--ink-faint);font-size:13px;margin-top:4px;">${students.length} record${students.length===1?'':'s'} across ${classNames.length} class${classNames.length===1?'':'es'}${groups.__unassigned__ ? ' + unassigned' : ''}</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${students.length > 0 ? `<button class="btn btn-ghost" onclick="App.toggleSelectMode()">${selectMode ? '✕ Exit select' : '☐ Select students'}</button>` : ''}
        <button class="btn btn-primary" onclick="App.startNew()">+ New Assessment</button>
        <button class="btn btn-ghost" onclick="App.openBulkImport()">📋 Bulk Import Class</button>
      </div>
    </div>
    ${students.length === 0 ? `
      <div class="empty-state card">
        <h3>No records yet</h3>
        <p>Start a new assessment to build a student's first learner profile.</p>
        <button class="btn btn-primary" onclick="App.startNew()">+ New Assessment</button>
      </div>
    ` : orderedGroups.map(g => renderClassGroup(g, selectMode)).join('')}
  </div>

  ${selectMode && selectedCount > 0 ? `
    <div class="selection-toolbar">
      <strong>${selectedCount} selected</strong>
      <select id="bulk-move-target" onchange="App.bulkMoveSelected(this.value); this.value='';">
        <option value="" disabled selected>Move to class…</option>
        ${allClassNames.map(c => `<option value="__cls__${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}
        <option value="__unassign__">Unassigned</option>
        <option value="__new__">+ New class…</option>
      </select>
      <button class="btn-clear" onclick="App.clearSelection()">Deselect all</button>
    </div>
  ` : ''}`;
}

function renderClassGroup(g, selectMode){
  const clickable = !g.isUnassigned && !selectMode;
  const allInGroup = g.students.every(s => state.selectedIds && state.selectedIds.has(s.id));
  return `
  <div class="class-group">
    <div class="class-group-header ${clickable?'clickable':''}" ${clickable?`onclick="App.openClassOverview('${escapeAttr(g.name)}')"`:''}>
      <div>
        <div class="class-group-name" style="${g.isUnassigned ? 'color:var(--ink-faint);font-style:italic;' : ''}">${escapeHtml(g.name)}${selectMode ? `<span class="select-all-link" onclick="event.stopPropagation();App.toggleSelectGroup('${escapeAttr(g.name)}', ${g.isUnassigned})">${allInGroup ? 'Deselect all' : 'Select all'}</span>` : ''}</div>
        ${clickable ? '<div class="class-group-hint">View class overview →</div>' : ''}
      </div>
      <div class="class-group-count">${g.students.length} student${g.students.length===1?'':'s'}</div>
    </div>
    ${g.students.map(rec => renderRecordCard(rec, selectMode)).join('')}
  </div>`;
}

function renderRecordCard(rec, selectMode){
  const lvl = LEVEL_META[rec.level] || LEVEL_META.primary;
  const zones = computeAllZones(rec);
  const date = new Date(rec.updatedAt || rec.createdAt).toLocaleDateString(undefined,{ day:'numeric', month:'short', year:'numeric' });
  const initials = (rec.name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const allClasses = getAllClassNames();
  const currentClass = (rec.className||'').trim();
  const hasAccommodations = (rec.accommodations && rec.accommodations.length) || (rec.accommodationNotes && rec.accommodationNotes.trim());
  const isSelected = state.selectedIds && state.selectedIds.has(rec.id);
  const moveOptions = [
    `<option value="" disabled selected>Move to…</option>`,
    ...allClasses.filter(c => c !== currentClass).map(c => `<option value="__cls__${escapeHtml(c)}">${escapeHtml(c)}</option>`),
    currentClass ? `<option value="__unassign__">Unassigned</option>` : '',
    `<option value="__new__">+ New class…</option>`,
  ].join('');

  const clickAction = selectMode
    ? `App.toggleSelectStudent('${rec.id}')`
    : `App.openReport('${rec.id}')`;

  return `
  <div class="record-card" style="border-left-color:${lvl.color};${isSelected ? 'background:var(--accent-light);' : ''}">
    ${selectMode ? `<div class="select-checkbox ${isSelected?'checked':''}" onclick="App.toggleSelectStudent('${rec.id}')">${isSelected?'✓':''}</div>` : ''}
    <div class="record-tab" style="background:${lvl.light};color:${lvl.color};">${initials}</div>
    <div class="record-info" onclick="${clickAction}">
      <div class="record-name">${escapeHtml(rec.name)}${rec.chineseName ? ' <span style="color:var(--ink-faint);font-weight:400;">(' + escapeHtml(rec.chineseName) + ')</span>' : ''}${hasAccommodations ? '<span class="acc-badge" title="Has accommodations on file">ACC</span>' : ''}</div>
      <div class="record-meta">${lvl.label} · Age ${escapeHtml(String(rec.age||'?'))} · Updated ${date}</div>
    </div>
    <div class="record-zones" onclick="${clickAction}" title="Section zones">
      ${zones.map(z=>`<div class="zone-dot" style="background:${ZONE_META[z].text};" title="${ZONE_META[z].label}"></div>`).join('')}
    </div>
    ${selectMode ? '' : `<div class="record-actions">
      <select class="record-move" onchange="App.quickMove('${rec.id}', this.value); this.value='';" onclick="event.stopPropagation()" title="Move to a different class">
        ${moveOptions}
      </select>
      <button class="record-delete" onclick="event.stopPropagation(); App.confirmDelete('${rec.id}')" title="Delete record">×</button>
    </div>`}
  </div>`;
}

function computeAllZones(rec){
  const secs = SECTIONS[rec.level] || [];
  const scaleMax = scaleMaxFor(rec.level);
  const zones = [];
  ['A','C','D','E'].forEach(id=>{
    const sec = secs.find(s=>s.id===id);
    if(!sec) return;
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    zones.push(getZone(res.compositeScore, res.compositeMax, res.isPositive));
  });
  return zones;
}

/* ── New assessment: Step 2..N — sections ── */

function renderAssess(){
  const d = state.draft;
  const lvl = LEVEL_META[d.level];
  const secs = SECTIONS[d.level];
  const idx = d.sectionIndex;
  // virtual section list: A,B,C,D,E,F(interests),G,H(personal profile)
  const order = ['A','B','C','D','E','F','G','H'];
  const currentKey = order[idx];

  const totalQuestions = secs.reduce((n,s)=>n+s.items.length,0);
  const answeredCount = Object.keys(d.answers).length;

  let content = '';
  if(currentKey === 'F'){
    content = renderInterestStep(d, lvl);
  } else if(currentKey === 'H'){
    content = renderPersonalProfileStep(d, lvl);
  } else {
    const sec = secs.find(s=>s.id===currentKey);
    content = renderQuestionStep(sec, d, lvl);
  }

  const allSectionsComplete = order.every(k => isStepComplete(k, d, secs));

  return `
  <div class="wrap-narrow">
    <div class="progress-label">
      <span>Step ${idx+1} of ${order.length}</span>
      <span>${answeredCount}/${totalQuestions} questions answered</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${((idx+1)/order.length)*100}%;background:${lvl.color};"></div>
    </div>

    <div class="section-tabs">
      ${order.map((k,i)=>{
        const complete = isStepComplete(k, d, secs);
        const active = i===idx;
        return `<div class="section-tab ${complete?'complete':''} ${active?'active':''}"
          style="${active? `border-color:${lvl.color};color:${lvl.color};background:${lvl.light};` : complete ? `color:var(--ink-soft);` : ''}"
          onclick="App.jumpToStep(${i})">${k}</div>`;
      }).join('')}
    </div>

    ${content}

    <div class="nav-row">
      <button class="btn btn-ghost" onclick="App.stepBack()">${idx===0?'Cancel':'← Back'}</button>
      ${idx < order.length-1
        ? `<button class="btn btn-primary" ${!isStepComplete(currentKey,d,secs)?'disabled':''} onclick="App.stepNext()" style="background:${lvl.color};">Next →</button>`
        : `<button class="btn btn-primary" ${!allSectionsComplete?'disabled':''} onclick="App.finishAssessment()" style="background:${lvl.color};">View Interpretation →</button>`
      }
    </div>
  </div>`;
}

function isStepComplete(key, d, secs){
  if(key === 'F') return true; // interests optional
  if(key === 'H') return true; // personal profile optional
  const sec = secs.find(s=>s.id===key);
  if(!sec) return true;
  return sec.items.every(it => d.answers[it.id] !== undefined);
}

function renderQuestionStep(sec, d, lvl){
  return `
  <div style="margin-bottom:8px;">
    <h2 style="font-size:19px;margin-bottom:4px;">${sec.title}</h2>
    <p style="color:var(--ink-faint);font-size:13px;margin:0 0 18px;">${sec.subtitle}</p>
  </div>
  ${sec.items.map((it,i)=>{
    const val = d.answers[it.id];
    return `
    <div class="q-item ${val!==undefined?'answered':''}" style="${val!==undefined?`border-color:${lvl.mid};`:''}">
      <div class="q-text"><span class="q-num">${i+1}</span>${escapeHtml(it.text)}</div>
      <div class="q-scale">
        ${lvl.scale.map((label,v)=>{
          const sel = val===v;
          return `<div class="q-opt ${sel?'selected':''}" style="${sel?`background:${lvl.color};border-color:${lvl.color};`:''}"
            onclick="App.answer('${it.id}', ${v})">${label}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}`;
}

function renderInterestStep(d, lvl){
  const list = INTERESTS[d.level];
  return `
  <div style="margin-bottom:8px;">
    <h2 style="font-size:19px;margin-bottom:4px;">My Interests</h2>

        <span class="box" style="${checked?`border-color:${lvl.color};color:${lvl.color};`:''}">${checked?'✓':''}</span>${escapeHtml(cat)}

    }).join('')}

  <label class="field-label">Outside school, this student really enjoys…</label>
  <textarea placeholder="Optional free response" oninput="App.updateInterestFree(this.value)">${escapeHtml(d.interestsFree)}</textarea>
  `;
}

function renderPersonalProfileStep(d, lvl){
  const strengths = d.subjectStrengths || [];

    <h2 style="font-size:19px;margin-bottom:4px;">About This Student</h2>

        <span class="box" style="${checked?`border-color:${lvl.color};color:${lvl.color};`:''}">${checked?'✓':''}</span>${escapeHtml(sub)}
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:8px;margin-bottom:24px;">
    <input type="text" id="custom-subject" placeholder="Add another subject (e.g. Robotics, Drama)…" style="flex:1;padding:9px 12px;border-radius:5px;border:1.5px solid var(--rule);font-size:13.5px;font-family:inherit;background:var(--paper-raised);outline:none;"
      onkeydown="if(event.key==='Enter'){event.preventDefault();App.addCustomSubject();}">
    <button class="btn btn-ghost btn-sm" onclick="App.addCustomSubject()" style="white-space:nowrap;">+ Add subject</button>
  </div>

  <div style="margin-bottom:22px;">
    <label class="field-label" for="f-likes">Likes</label>
    <p style="color:var(--ink-faint);font-size:12px;margin:0 0 6px;">What does this student enjoy? Foods, activities, topics, styles of work — anything specific helps.</p>
    <textarea id="f-likes" placeholder="e.g. animals, video games, working in small groups, humor, hands-on tasks"
      oninput="App.updateDraftLikes(this.value)">${escapeHtml(d.likes||'')}</textarea>
  </div>

  const secs = SECTIONS[rec.level];
  const scaleMax = scaleMaxFor(rec.level);
  const date = new Date(rec.updatedAt||rec.createdAt).toLocaleDateString(undefined,{day:'numeric',month:'long',year:'numeric'});

  const scoredSecs = secs.filter(s=>s.id!=='B' && s.id!=='G');
  const overview = scoredSecs.map(sec=>{
    const res = computeSectionResult(sec, rec.answers, scaleMax);
    const zone = getZone(res.compositeScore, res.compositeMax, res.isPositive);
    return { sec, zone };
  });

  return `

      <div class="report-meta">${(function(){
        const parts = [];
        const ageFromBirth = computeAge(rec.birthdate);
        if(ageFromBirth !== null) parts.push('Age ' + ageFromBirth);
        else if(rec.age) parts.push('Age ' + escapeHtml(String(rec.age)));
        parts.push('Assessed ' + date);
        if(rec.className) parts.push('Class: ' + escapeHtml(rec.className));
        parts.push('<span class="mono" style="color:var(--accent);">ID: ' + escapeHtml(rec.userId) + '</span>');
        return parts.join(' · ');
      })()}</div>
    </div>

      <div class="student-meta-field">

      <div class="student-meta-field">
        <label for="rp-birthdate">Birthdate ${rec.birthdate && computeAge(rec.birthdate)!==null ? '<span style="font-weight:400;color:var(--ink-faint);text-transform:none;">(age ' + computeAge(rec.birthdate) + ')</span>' : ''}</label>

      <div class="student-meta-field">
        <label>User ID &amp; Password</label>

          <input type="text" value="${escapeHtml(rec.userId||'')}" style="flex:1;font-family:ui-monospace,monospace;font-size:13px;letter-spacing:0.5px;" oninput="App.updateStudentUserId(this.value)">

        </div>
        <div>

    ${renderPostsSection(rec)}

    <div class="section-block no-print-collapse">

        oninput="App.updateStudentNotes(this.value)">${escapeHtml(rec.notes||'')}</textarea>
    </div>

    <div class="zone-overview">
      ${overview.map(({sec,zone})=>{
        const zm = ZONE_META[zone];
        return `<div class="zone-card" style="background:${zm.bg};border-color:${zm.border};">

    ${(rec.history && rec.history.length) ? `
      <div class="history-strip">
        <strong>Assessments:</strong>
        ${rec.history.map(h => `<span class="history-item">${new Date(h.date).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}</span>`).join('')}
        <span class="history-item current">${new Date(rec.updatedAt||rec.createdAt).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})} · current</span>
      </div>
    ` : ''}

    ${scoredSecs.map(sec => renderScoredSection(sec, rec, lvl, scaleMax)).join('')}

    ${renderPreferenceSection(secs.find(s=>s.id==='B'), rec, lvl)}
    ${renderInterestsSection(rec, lvl)}
    ${renderGoalsSection(secs.find(s=>s.id==='G'), rec, lvl, scaleMax)}
    ${renderObservationSection(rec)}

    <div class="disclaimer-footer">
      This is a screening tool for instructional planning, not a validated clinical instrument or diagnosis. Items are adapted and reworded from concepts in the SDQ (Goodman, 1997) and BASC-3 BESS (Kamphaus &amp; Reynolds, 2015) — the original reliability statistics apply to those exact instruments, not to this adapted version. Learning preferences are descriptive only (Pashler et al., 2008; Rogowsky et al., 2020). Score zones are proportional heuristics, not normed clinical cutoffs. Elevated emotional/behavioural scores should prompt follow-up with a school counsellor. See <a onclick="App.goResearch()" style="cursor:pointer;color:var(--accent);">Research &amp; Methodology</a> for full detail.
    </div>

    </div><!-- end screen-report-body -->

function formatPostTimestamp(ts){
  const d = new Date(ts);
  const dateStr = d.toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
  const timeStr = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
  return dateStr + ' · ' + timeStr;
}

// Render a single-select radio-chip group. currentValue is the stored value, options is [{value,label},...]
function renderRadioGroup(currentValue, options, onSelectMethod){
  return `<div class="radio-group">
    ${options.map(o => `<button class="radio-chip ${currentValue===o.value?'selected':''}" onclick="App.${onSelectMethod}('${escapeAttr(o.value)}')">${escapeHtml(o.label)}</button>`).join('')}
    ${currentValue ? `<button class="radio-chip" onclick="App.${onSelectMethod}('')" style="color:var(--ink-faint);border-style:dashed;">Clear</button>` : ''}
  </div>`;
}

// Render a multi-select chip group (checkbox-style), for accommodations/communication prefs
function renderChipMultiSelect(selectedList, allOptions, toggleMethod, lvl){
  const selected = selectedList || [];
  const custom = selected.filter(x => !allOptions.includes(x));
  const chips = [...allOptions, ...custom];
  return chips.map(item => {
    const checked = selected.includes(item);
    return `<div class="interest-chip ${checked?'checked':''}" style="${checked?`border-color:${lvl.color};background:${lvl.light};color:${lvl.color};`:''}" onclick="App.${toggleMethod}('${escapeAttr(item)}')">
      <span class="box" style="${checked?`border-color:${lvl.color};color:${lvl.color};`:''}">${checked?'✓':''}</span>${escapeHtml(item)}
    </div>`;
  }).join('');
}

function renderPost(post){
  const isEditing = state.editingPostId === post.id;
  // A post has a "source" when it came from another app (e.g. Live Classroom).
  // Posts created in this app have no source (or source === 'Learner Profile').
  const source = post.source && post.source !== 'Learner Profile' ? post.source : '';
  const isExternal = !!source;
  const isLive = /live classroom/i.test(source);
  return `
    <div class="post-item${isExternal ? ' external' : ''}${isLive ? ' live' : ''}">
      <div class="post-timestamp">
        ${formatPostTimestamp(post.timestamp)}${post.editedAt ? '<span class="edited-marker">(edited ' + formatPostTimestamp(post.editedAt) + ')</span>' : ''}${source ? `<span class="post-source-badge${isLive ? ' live' : ''}">${isLive ? '🔴 ' : '🔗 '}${escapeHtml(source)}</span>` : ''}
      </div>
      ${isEditing ? `
        <textarea id="edit-post-${post.id}" class="post-edit-textarea">${escapeHtml(post.content)}</textarea>
        <div class="post-actions no-print">
          <button class="post-action primary" onclick="App.saveEditPost('${post.id}')">Save</button>
          <button class="post-action" onclick="App.cancelEditPost()">Cancel</button>
        </div>
      ` : `
        <div class="post-content">${escapeHtml(post.content)}</div>
        <div class="post-actions no-print">
          ${isExternal ? '' : `<button class="post-action" onclick="App.startEditPost('${post.id}')">Edit</button>`}
          <button class="post-action danger" onclick="App.deleteStudentPost('${post.id}')">Delete</button>
        </div>
      `}
    </div>`;
}
