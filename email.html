<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compose Mail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --surface: #ffffff;
    --surface-hover: #faf9f7;
    --border: #ddd8d0;
    --border-focus: #6366f1;
    --text: #1e1e2a;
    --text-muted: #8a8694;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.18);
    --accent-hover: #4f46e5;
    --success: #059669;
    --error: #dc2626;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%);
    pointer-events: none;
    animation: drift 20s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 60%);
    pointer-events: none;
    animation: drift 25s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.1); }
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    margin-bottom: 40px;
    text-align: center;
  }

  .header .icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px var(--accent-glow);
  }

  .header .icon svg {
    width: 26px;
    height: 26px;
    stroke: white;
    stroke-width: 2;
    fill: none;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .header p {
    color: var(--text-muted);
    font-weight: 300;
    font-size: 0.95rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
    backdrop-filter: blur(10px);
  }

  .field {
    margin-bottom: 22px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
    transition: color 0.3s;
  }

  .field:focus-within label {
    color: var(--accent-hover);
  }

  .field input,
  .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: #b5b0be;
  }

  .field input:hover,
  .field textarea:hover {
    background: var(--surface-hover);
    border-color: #c5c0b8;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--surface-hover);
  }

  .field textarea {
    min-height: 180px;
    resize: vertical;
    line-height: 1.6;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
    opacity: 0.5;
  }

  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .char-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .btn-send {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 16px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }

  .btn-send::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--accent-glow);
  }

  .btn-send:hover::before {
    opacity: 1;
  }

  .btn-send:active {
    transform: translateY(0) scale(0.98);
  }

  .btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-send svg {
    width: 18px;
    height: 18px;
    stroke: white;
    stroke-width: 2;
    fill: none;
    transition: transform 0.3s;
  }

  .btn-send:hover svg {
    transform: translate(3px, -3px);
  }

  .status {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 400;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status.success {
    display: flex;
    background: rgba(5,150,105,0.08);
    border: 1px solid rgba(5,150,105,0.2);
    color: var(--success);
  }

  .status.error {
    display: flex;
    background: rgba(220,38,38,0.06);
    border: 1px solid rgba(220,38,38,0.15);
    color: var(--error);
  }

  .status.info {
    display: flex;
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.2);
    color: var(--accent-hover);
  }

  .note {
    text-align: center;
    margin-top: 24px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 300;
    opacity: 0.6;
  }

  @media (max-width: 500px) {
    .card { padding: 24px; }
    .header h1 { font-size: 1.6rem; }
    .actions { flex-direction: column-reverse; }
    .btn-send { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <h1>Compose Message</h1>
    <p>Send an email quickly and easily</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="to">To</label>
      <input type="text" id="to" placeholder="Student name or identifier" required />
    </div>

    <div class="field">
      <label for="from">From</label>
      <input type="email" id="from" placeholder="your.email@example.com" required />
    </div>

    <div class="field">
      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="What's this about?" required />
    </div>

    <div class="field">
      <label for="body">Body</label>
      <textarea id="body" placeholder="Write your message here..." required></textarea>
    </div>

    <div class="divider"></div>

    <div class="actions">
      <span class="char-count" id="charCount">0 characters</span>
      <button class="btn-send" id="sendBtn" onclick="sendEmail()">
        Send Message
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <p class="note">Messages are sent directly — no email client needed.</p>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">
  // Check if EmailJS loaded
  if (typeof emailjs === 'undefined') {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').innerHTML = '⚠ EmailJS failed to load. Please open this file in a browser (not a preview).';
  } else {
    emailjs.init('QtB0QlSQ5i_xqdz3T');
  }

  const bodyEl = document.getElementById('body');
  const charCount = document.getElementById('charCount');

  bodyEl.addEventListener('input', () => {
    const len = bodyEl.value.length;
    charCount.textContent = `${len} character${len !== 1 ? 's' : ''}`;
  });

  function showStatus(type, message) {
    const status = document.getElementById('status');
    status.className = 'status ' + type;
    status.innerHTML = message;
    if (type === 'success') {
      setTimeout(() => { status.className = 'status'; }, 5000);
    }
  }

  function sendEmail() {
    const toField = document.getElementById('to').value.trim();
    const from = document.getElementById('from').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const body = document.getElementById('body').value.trim();

    if (!toField) {
      showStatus('error', '⚠ Please enter the recipient.');
      document.getElementById('to').focus();
      return;
    }

    if (!from) {
      showStatus('error', '⚠ Please enter your email address.');
      document.getElementById('from').focus();
      return;
    }

    if (!from.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
      showStatus('error', '⚠ Please enter a valid email address.');
      document.getElementById('from').focus();
      return;
    }

    if (!subject) {
      showStatus('error', '⚠ Please enter a subject line.');
      document.getElementById('subject').focus();
      return;
    }

    if (!body) {
      showStatus('error', '⚠ Please write a message body.');
      document.getElementById('body').focus();
      return;
    }

    // Disable button while sending
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = 'Sending...';
    showStatus('info', '⏳ Sending your message...');

    const templateParams = {
      name: toField,
      time: new Date().toLocaleString(),
      message: `To: ${toField}\nFrom: ${from}\nSubject: ${subject}\n\n${body}`
    };

    // Check EmailJS is available
    if (typeof emailjs === 'undefined') {
      alert('EmailJS is not loaded. Please open this HTML file directly in your browser (Chrome, Firefox, etc.) — not in a preview window.');
      btn.disabled = false;
      btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
      return;
    }

    try {
      emailjs.send('service_hmmzogf', 'template_xxucxg6', templateParams)
        .then(function() {
          alert('Message Sent!');
          showStatus('success', '✓ Message sent successfully!');
          // Clear the form
          document.getElementById('to').value = '';
          document.getElementById('from').value = '';
          document.getElementById('subject').value = '';
          document.getElementById('body').value = '';
          charCount.textContent = '0 characters';
          btn.disabled = false;
          btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
        }, function(error) {
          alert('Failed to send: ' + (error.text || JSON.stringify(error)));
          showStatus('error', '⚠ Failed to send. ' + (error.text || 'Unknown error'));
          btn.disabled = false;
          btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
        });
    } catch(e) {
      alert('Error: ' + e.message);
      btn.disabled = false;
      btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
    }
  }

  // Enter key on inputs moves to next field
  document.querySelectorAll('.card input').forEach((input, i, arr) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = arr[i + 1] || document.getElementById('body');
        next.focus();
      }
    });
  });
</script>

</body>
</html>
