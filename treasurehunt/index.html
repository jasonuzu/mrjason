<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Class Memory Vault</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg-deep:#0b0e1a;--bg-card:#141829;--bg-card-hover:#1a1f38;--border:#2a2f4a;--border-correct:#34d399;--gold:#f4c542;--gold-dim:#b8942f;--amber:#f59e0b;--text:#e2e4ef;--text-dim:#7a7f9e;--correct-glow:rgba(52,211,153,0.15);--input-bg:#0f1225}
  body{font-family:'Outfit',sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;overflow-x:hidden}

  .name-gate{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg-deep)}
  .name-gate.hidden{display:none}
  .name-box{text-align:center;padding:48px 36px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;max-width:400px;width:90%}
  .name-box .icon{font-size:56px;display:block;margin-bottom:16px}
  .name-box h2{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:8px}
  .name-box p{color:var(--text-dim);font-size:0.9rem;margin-bottom:24px}
  .name-box input{width:100%;font-family:'Outfit',sans-serif;font-size:1.1rem;padding:12px 16px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);outline:none;text-align:center;margin-bottom:16px}
  .name-box input:focus{border-color:var(--gold-dim)}
  .name-box input::placeholder{color:#3d4260}
  .name-box button{width:100%;padding:12px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--bg-deep);cursor:pointer;transition:transform .15s,box-shadow .15s}
  .name-box button:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(244,197,66,0.3)}
  .name-box button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .stars span{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite alternate}
  @keyframes twinkle{0%{opacity:.15;transform:scale(.8)}100%{opacity:.7;transform:scale(1.2)}}

  .header{position:relative;z-index:1;text-align:center;padding:50px 20px 10px}
  .header .vault-icon{font-size:64px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .header h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;background:linear-gradient(135deg,var(--gold),#fde68a,var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header p{color:var(--text-dim);font-size:1rem;margin-top:8px;font-weight:300}
  .welcome-name{color:var(--gold);font-size:.9rem;margin-top:6px;font-weight:400}

  .progress-wrap{position:sticky;top:0;z-index:10;background:rgba(11,14,26,.92);backdrop-filter:blur(12px);padding:14px 20px;border-bottom:1px solid var(--border)}
  .progress-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .progress-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--border-correct));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}
  .progress-label{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--gold);min-width:50px;text-align:right}

  .grid{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  @media(max-width:420px){.grid{grid-template-columns:1fr}}

  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;gap:14px;transition:border-color .3s,background .3s,box-shadow .3s;position:relative;overflow:hidden}
  .card:hover{background:var(--bg-card-hover)}
  .card.correct{border-color:var(--border-correct);background:var(--correct-glow);box-shadow:0 0 20px rgba(52,211,153,.08)}
  .card.correct .status-dot{background:var(--border-correct);box-shadow:0 0 8px var(--border-correct)}
  .card.incorrect{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}

  .card-number{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--gold);min-width:32px;text-align:center;flex-shrink:0}
  .card-input-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
  .card input{width:100%;font-family:'Space Mono',monospace;font-size:.95rem;padding:10px 14px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border-color .3s}
  .card input:focus{border-color:var(--gold-dim)}
  .card.correct input{border-color:var(--border-correct);color:var(--border-correct);background:rgba(52,211,153,.06)}
  .card.correct input::placeholder{color:var(--border-correct);opacity:.7;font-style:normal;font-weight:600}
  .card input::placeholder{color:#3d4260;font-style:italic}
  .solved-by{font-size:.72rem;color:var(--border-correct);opacity:.8;font-weight:400;padding-left:2px;min-height:14px}
  .status-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s,box-shadow .3s}

  .flash-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(52,211,153,.2);border-radius:14px;pointer-events:none;opacity:0;z-index:5}
  .flash-overlay.show{animation:flashIn 1.2s ease forwards}
  @keyframes flashIn{0%{opacity:0;transform:scale(.9)}15%{opacity:1;transform:scale(1.03)}60%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}
  .flash-text{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;color:var(--border-correct);letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 20px rgba(52,211,153,.5)}

  .secret-wrap{position:relative;z-index:1;max-width:700px;margin:0 auto 80px;padding:0 20px;display:none}
  .secret-wrap.revealed{display:block;animation:riseIn .8s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes riseIn{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
  .secret-box{text-align:center;padding:44px 32px;border-radius:20px;background:linear-gradient(135deg,#1a1440,#0f2027,#1a1440);border:2px solid var(--gold);box-shadow:0 0 60px rgba(244,197,66,.12),0 0 120px rgba(244,197,66,.05)}
  .secret-box .trophy{font-size:56px;display:block;margin-bottom:16px}
  .secret-box h2{font-size:1.1rem;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
  .secret-box .message{font-size:clamp(1.3rem,4vw,1.8rem);font-weight:700;color:#fff;line-height:1.5;text-shadow:0 0 30px rgba(244,197,66,.3)}

  .confetti-piece{position:fixed;z-index:100;pointer-events:none;animation:confettiFall var(--fall-dur) ease-in forwards}
  @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

  .loading-overlay{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:var(--bg-deep)}
  .loading-overlay.hidden{display:none}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="name-gate" id="nameGate">
  <div class="name-box">
    <span class="icon">🔐</span>
    <h2>Class Memory Vault</h2>
    <p>Enter your name to join the challenge</p>
    <input type="text" id="nameInput" placeholder="Your name..." maxlength="30" autocomplete="off">
    <button id="nameBtn" disabled>Enter the Vault</button>
  </div>
</div>

<div class="stars" id="stars"></div>

<div class="header">
  <span class="vault-icon">🔐</span>
  <h1>Class Memory Vault</h1>
  <p>Enter the correct codes to unlock the message.</p>
  <div class="welcome-name" id="welcomeName"></div>
</div>

<div class="progress-wrap">
  <div class="progress-inner">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 19</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="secret-wrap" id="secretWrap">
  <div class="secret-box">
    <span class="trophy">🏆</span>
    <h2>Vault Unlocked</h2>
    <div class="message">You will always be classmates!<br>Keep in contact and help each other!</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ulkboabmzucbbgrpxykf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsa2JvYWJtenVjYmJncnB4eWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjEzNjgsImV4cCI6MjA5ODk5NzM2OH0.6PmiBuVAWlmvYVeCQ9YSqJ0gsJp6CF0CJ94RU6agaO4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const puzzles = [
  { id:1,  hash:"3949ac1596ec77106a709a618bf5adcb19b77537ce8bcbdf54ff830169cdd084" },
  { id:2,  hash:"ea325d761f98c6b73320e442b67f2a3574d9924716d788ddc0dbbdcaca853fe7" },
  { id:3,  hash:"06b9a6eacd7a77b9361123fd19776455eb16b9c83426a1abbf514a414792b73f" },
  { id:4,  hash:"bc56ada309bb04a86c197733cb92c50f46713b383aa8c3bb822518c5bc9e4441" },
  { id:5,  hash:"1680049d21eb8653db050b28e9cbdf8f20bfaad57409c283ee1573031df85452" },
  { id:6,  hash:"a3ec1ae842ed11dae4d70fbc044324d699c9d30176d2eb1a9c4d6de045110657" },
  { id:7,  hash:"dc2fc19d8fce376c47641cf15f823a03ad10f2dc7da3f43230551f50706914f5" },
  { id:8,  hash:"fc31ac92775f34f0410ac88080e2ff95b779ddd842e46c34bad18a7e9de9dd76" },
  { id:9,  hash:"033b0ed6f935d813721934a7f0e2c20f15c934f0aaf6e5da15c8291f996d24a0" },
  { id:10, hash:"0815b5f30f0b04bf3c15f698a8f3b5877005440e0e88807ff1cdb05f5f3a3876" },
  { id:11, hash:"490ca3ed5811c020ba8372021ff5dc839a726dc73b392a2ed564b6683e2e844a" },
  { id:12, hash:"1cb6508098e9e5955ef7b22b1f0c43f59fe17e429ac321791073cb04e06e4864" },
  { id:13, hash:"b6234d2ea0d6022be63db80d7b80e221097fe4a469dc44febcd2a9241effdeba" },
  { id:14, hash:"32c1cf49a2feee269ed74dd860f72644ac71029839b21b1ce0c212efafa9ef07" },
  { id:15, hash:"4507b9cefd7a5339c99de9eaed46d98bdd52da97dabdef52452f80aab11b5718" },
  { id:16, hash:"765dbb8c38a58a5dc019d7b3133dffb251d643cb291328ad8e86d4f05655e68b" },
  { id:17, hash:"c82edc3f5fd95a5feb60eded79f96ac3585958d1898c236daf2bfe139893585a" },
  { id:18, hash:"8a798890fe93817163b10b5f7bd2ca4d25d84c52739a645a889c173eee7d9d3d" },
  { id:19, hash:"4492aabd733f37cb76fc0ed1fd75a11c5dd05ba8977988e28487739a20975b85" },
];

const TOTAL = puzzles.length;
let studentName = '';
let completedSlots = new Set();
let secretRevealed = false;

async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Stars
(function(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('span');const sz=Math.random()*2.5+1;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;c.appendChild(s)}})();

// Name gate
const nameInput = document.getElementById('nameInput');
const nameBtn = document.getElementById('nameBtn');
nameInput.addEventListener('input', () => { nameBtn.disabled = !nameInput.value.trim(); });
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && nameInput.value.trim()) enterVault(); });
nameBtn.addEventListener('click', enterVault);

function enterVault() {
  studentName = nameInput.value.trim();
  if (!studentName) return;
  document.getElementById('nameGate').classList.add('hidden');
  document.getElementById('welcomeName').textContent = 'Welcome, ' + studentName;
  initVault();
}

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  puzzles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <span class="card-number">${p.id}</span>
      <div class="card-input-wrap">
        <input type="text" id="input-${p.id}" placeholder="..." autocomplete="off" spellcheck="false">
        <span class="solved-by" id="solvedby-${p.id}"></span>
      </div>
      <span class="status-dot" id="dot-${p.id}"></span>
      <div class="flash-overlay"><span class="flash-text">Correct!</span></div>
    `;
    grid.appendChild(card);
    const input = card.querySelector('input');
    let db = null;
    input.addEventListener('input', () => { clearTimeout(db); db = setTimeout(() => checkAnswer(p, card, input), 200); });
  });
}

function markSlotComplete(slotId, solverName, animate) {
  const card = document.getElementById('card-' + slotId);
  const input = document.getElementById('input-' + slotId);
  const solvedBy = document.getElementById('solvedby-' + slotId);
  if (!card || !input) return;
  completedSlots.add(slotId);
  card.classList.add('correct');
  input.value = '';
  input.setAttribute('readonly', true);
  input.setAttribute('placeholder', '✓ Complete');
  if (solverName) solvedBy.textContent = 'Solved by ' + solverName;
  if (animate) {
    const flash = card.querySelector('.flash-overlay');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1300);
  }
  updateProgress();
}

async function checkAnswer(puzzle, card, input) {
  const val = input.value.trim();
  if (!val || completedSlots.has(puzzle.id)) return;
  const hashed = await sha256(val.toLowerCase());
  if (hashed === puzzle.hash) {
    const { error } = await sb
      .from('vault_progress')
      .update({ completed: true, student_name: studentName, completed_at: new Date().toISOString() })
      .eq('slot_id', puzzle.id)
      .eq('completed', false);
    if (!error) {
      markSlotComplete(puzzle.id, studentName, true);
      checkAllComplete();
    }
  } else if (val.length >= 2) {
    card.classList.remove('incorrect');
    void card.offsetWidth;
    card.classList.add('incorrect');
    setTimeout(() => card.classList.remove('incorrect'), 500);
  }
}

function updateProgress() {
  const n = completedSlots.size;
  document.getElementById('progressFill').style.width = (n / TOTAL) * 100 + '%';
  document.getElementById('progressLabel').textContent = n + ' / ' + TOTAL;
}

function checkAllComplete() {
  if (completedSlots.size === TOTAL && !secretRevealed) {
    secretRevealed = true;
    const w = document.getElementById('secretWrap');
    w.classList.add('revealed');
    setTimeout(() => w.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    launchConfetti();
  }
}

function launchConfetti() {
  const colors = ['#f4c542','#34d399','#f59e0b','#60a5fa','#f472b6','#a78bfa','#fb923c'];
  for (let i = 0; i < 120; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+6}px;height:${Math.random()*8+6}px;border-radius:${Math.random()>.5?'50%':'2px'};--fall-dur:${Math.random()*2.5+2}s;animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

async function initVault() {
  buildCards();
  const { data } = await sb.from('vault_progress').select('*').order('slot_id');
  document.getElementById('loadingOverlay').classList.add('hidden');
  if (data) {
    data.forEach(row => { if (row.completed) markSlotComplete(row.slot_id, row.student_name, false); });
    checkAllComplete();
  }
  // Real-time: when ANY student solves a code, everyone sees it instantly
  sb.channel('vault-live')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'vault_progress' }, (payload) => {
      const row = payload.new;
      if (row.completed && !completedSlots.has(row.slot_id)) {
        markSlotComplete(row.slot_id, row.student_name, true);
        checkAllComplete();
      }
    })
    .subscribe();
}

document.getElementById('loadingOverlay').classList.add('hidden');
</script>
</body>
</html>
